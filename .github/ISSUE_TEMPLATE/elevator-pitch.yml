name: Elevator Pitch Submission
description: Submit your elevator pitch and reflection
title: "[Pitch]: "
labels: ["elevator-pitch"]

body:

  - type: input
    id: name
    attributes:
      label: Name
      placeholder: Enter your name
    validations:
      required: true

  - type: textarea
    id: pitch
    attributes:
      label: Elevator Pitch
      description: Imagine you are in an elevator with Elon Musk. What would you say?
      placeholder: Write your elevator pitch here...
    validations:
      required: true

  - type: textarea
    id: reflection
    attributes:
      label: Reflection on Your Pitch
      description: What did you think about your pitch? What was strong? What could improve?
      placeholder: Reflect on your pitch...
    validations:
      required: true

  - type: textarea
    id: reality
    attributes:
      label: What Do You Need to Do to Make This a Reality?
      description: Skills, knowledge, habits, experience, connections, discipline, etc.
      placeholder: What steps must you take?
    validations:
      required: true

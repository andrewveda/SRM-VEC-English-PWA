<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Speaking Quest 1: The Masterpiece Introduction</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Orbitron:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
  --bg-main: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
  --card-bg: #ffffff;
  --accent-main: #ff9800;
  --accent-soft: #ffcc80;
  --blue-main: #2979ff;
  --green-main: #00c853;
  --red-main: #e53935;
  --text-main: #1f2933;
}

* { box-sizing: border-box; }

body {
  margin: 0; padding: 0;
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  text-align: center;
  min-height: 100vh;
}

.container {
  position: relative;
  max-width: 900px;
  margin: 2rem auto;
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
  overflow: hidden;
}

/* Intro Form */
#nameForm {
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  background: linear-gradient(135deg, #ffffff, #f1f5f9);
  padding: 2rem 1.5rem; border-radius: 20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  max-width: 420px; margin: 2rem auto;
}

.hero-quote {
  max-width: 94%; margin: 0.6rem auto 1.2rem auto;
  padding: 1rem; background: linear-gradient(135deg, #000000, #1a1a1a);
  border-radius: 10px;
}
.hero-text { font-size: 1.2rem; font-weight: 700; color: #FFD700; line-height: 1.3; }
.hero-author { margin-top: 0.3rem; font-size: 0.95rem; font-weight: 600; color: #d4af37; }

#nameInput, #departmentSelect {
  width: 100%; padding: 0.9rem 1rem;
  background: #ffffff; border: 2px solid #cbd5e1;
  border-radius: 12px; font-size: 1rem; outline: none;
}
#nameInput:focus, #departmentSelect:focus {
  border-color: var(--blue-main);
  box-shadow: 0 0 0 3px rgba(41,121,255,0.25);
}

#nameForm button {
  width: 100%; padding: 1rem;
  background: linear-gradient(135deg, var(--accent-main), #ffb300);
  color: #000; font-size: 1.1rem; font-weight: bold;
  border: none; border-radius: 14px; cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#nameForm button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,152,0,0.45); }

/* Speaking Stage */
#speakingStage { display: none; padding-top: 2rem; }
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 2rem; font-size: 1rem; font-weight: bold; color: var(--blue-main);
}

.prompt-card {
  background: #f8fafc; border: 2px dashed var(--blue-main);
  border-radius: 16px; padding: 2rem 1.5rem; margin-bottom: 1.5rem;
}
.prompt-q { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-main); }
.prompt-hint { font-size: 1.1rem; color: var(--text-muted); background: #e3f2fd; padding: 0.5rem 1rem; border-radius: 8px; display: inline-block; }

/* Recording Controls */
.rec-btn {
  width: 100px; height: 100px; border-radius: 50%;
  background: var(--red-main); border: 4px solid #fff;
  box-shadow: 0 4px 15px rgba(229,57,53,0.4);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1rem auto; transition: transform 0.2s;
}
.rec-btn:hover { transform: scale(1.05); }
.rec-btn.recording { background: #d32f2f; animation: pulse 1.5s infinite; }
@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(229,57,53, 0.7); }
  70% { box-shadow: 0 0 0 20px rgba(229,57,53, 0); }
  100% { box-shadow: 0 0 0 0 rgba(229,57,53, 0); }
}
.rec-icon { width: 40px; height: 40px; background: #fff; border-radius: 50%; }

.audio-preview { margin: 1rem auto; width: 100%; max-width: 400px; }

.nav-btns { display: flex; justify-content: center; gap: 1rem; margin-top: 2rem; }
.nav-btn {
  padding: 0.8rem 2rem; border: none; border-radius: 12px;
  font-weight: bold; cursor: pointer; font-size: 1rem;
  transition: transform 0.2s;
}
.nav-btn:hover { transform: translateY(-2px); }
.btn-skip { background: #e2e8f0; color: #64748b; }
.btn-next { background: var(--green-main); color: #fff; }

/* Score Portal (Matching Original) */
.score-portal {
  display: none; padding: 2rem 1rem; background: #060d1a; color: #e2e8f0;
  border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
}
.portal-title { font-family: 'Orbitron', monospace; font-size: 1.2rem; color: #FFD700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1rem; }
.portal-player { font-size: 1.1rem; margin-bottom: 2rem; color: #fff; }
.download-btn {
  padding: 1rem 2rem; background: linear-gradient(135deg, #ff9800, #ffb300);
  color: #000; border: none; border-radius: 14px; font-size: 1.2rem; font-weight: bold;
  cursor: pointer; box-shadow: 0 4px 18px rgba(255,152,0,0.4); margin-top: 1rem;
}
.download-btn:hover { transform: scale(1.05); }

@media (max-width: 600px) {
  .container { margin: 0; border-radius: 0; min-height: 100dvh; padding: 1rem; }
  .prompt-q { font-size: 1.2rem; }
}
</style>
</head>
<body>

<div class="container" id="quizContainer">
  
  <!-- STAGE 1: NAME & DEPT INPUT -->
  <div id="nameForm">
    <div class="hero-quote">
      <div class="hero-text">Your voice is your identity. Let's build it.</div>
      <div class="hero-author">🗣️✨</div>
    </div>
    <input type="text" id="nameInput" placeholder="Enter your name"/>
    <select id="departmentSelect">
      <option value="">-- Select Department --</option>
      <option value="Cyber Security">Cyber Security</option>
      <option value="EIE">EIE</option>
      <option value="CSE-1">CSE-1</option>
      <option value="CSE-2">CSE-2</option>
      <option value="CSE-3">CSE-3</option>
      <option value="Mechanical Engineering">Mechanical Engineering</option>
      <option value="ECE-1">ECE-1</option>
      <option value="ECE-2">ECE-2</option>
      <option value="ECE-3">ECE-3</option>
      <option value="AI DS-1">AI DS-1</option>
      <option value="AI DS-2">AI DS-2</option>
      <option value="Agri and Civil">Agri and Civil</option>
      <option value="EEE">EEE</option>
      <option value="Medical Electronics">Medical Electronics</option>
      <option value="IT-1">IT-1</option>
      <option value="IT-2">IT-2</option>
    </select>
    <button onclick="beginQuest()">Start Speaking Quest</button>
  </div>

  <!-- STAGE 2: SPEAKING PAGES -->
  <div id="speakingStage">
    <div class="quiz-header">
      <div id="progressTracker">📍 1 of 10</div>
      <div id="timer">⏳ 0s</div>
    </div>

    <div class="prompt-card">
      <div class="prompt-q" id="questionText">Loading...</div>
      <div class="prompt-hint" id="questionHint">Hint loading...</div>
    </div>

    <div class="rec-btn" id="recordBtn" onclick="toggleRecording()">
      <div class="rec-icon"></div>
    </div>
    <p id="recStatus">Tap to Record</p>
    
    <div class="audio-preview" id="audioPreviewContainer" style="display:none;">
      <audio id="audioPlayback" controls style="width:100%;"></audio>
    </div>

    <div class="nav-btns">
      <button class="nav-btn btn-skip" onclick="skipQuestion()">Skip Question</button>
      <button class="nav-btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>Save & Next →</button>
    </div>
  </div>

  <!-- STAGE 3: SCORE PORTAL -->
  <div class="score-portal" id="scorePortal">
    <div class="portal-title">🎤 MASTERPIECE CREATED</div>
    <div class="portal-player" id="portalPlayer"></div>
    <p>You answered <strong id="answeredCount" style="color:#00e676;"></strong> out of 10 questions.</p>
    <p>Your audio file has been generated and downloaded automatically!</p>
    <button class="download-btn" onclick="downloadAudio()">📥 Download Audio Again</button>
  </div>

</div>

<script>
/* ========== DATA: 10 SCAFFOLDED SPEAKING PROMPTS ========== */
const speakingQuest = [
  { q: "What is your name and where are you from?", hint: "My name is [Name], and I am from [City]." },
  { q: "What are you currently studying?", hint: "Right now, I am studying [Subject] at [College]." },
  { q: "Tell me about your family.", hint: "There are [Number] people in my family. I have..." },
  { q: "What do you enjoy doing in your free time?", hint: "In my free time, I really enjoy [Hobby] because..." },
  { q: "Describe your hometown.", hint: "My hometown is [Place]. It is famous for..." },
  { q: "What is your favorite food and why?", hint: "My favorite food is [Food]. I love it because..." },
  { q: "What is a skill you are good at?", hint: "I am very good at [Skill]. I learned it by..." },
  { q: "Tell me about a goal you have for this year.", hint: "This year, I really want to achieve [Goal]." },
  { q: "What is a challenge you have overcome?", hint: "In the past, I struggled with [Challenge], but I..." },
  { q: "How would you like to end your introduction?", hint: "Thank you for taking the time to listen to my story." }
];

/* ========== STATE VARIABLES ========== */
let playerName = "", playerDept = "";
let currentStep = 0;
let answeredCount = 0, skippedCount = 0;
let startTime, timerInterval;
let audioBlobs = []; // Stores audio for each question
let currentBlob = null;

let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let stream;

const EDGE_FUNCTION_URL = "https://yellow-lab-4999.andrewveda.workers.dev/functions/v1/logQuest";

/* ========== INITIALIZATION ========== */
window.addEventListener("load", () => {
  const savedName = localStorage.getItem("questPlayerName");
  const savedDept = localStorage.getItem("questPlayerDept");
  if (savedName) document.getElementById("nameInput").value = savedName;
  if (savedDept) document.getElementById("departmentSelect").value = savedDept;
});

function beginQuest() {
  const nameField = document.getElementById("nameInput");
  const deptField = document.getElementById("departmentSelect");
  if (!nameField.value.trim()) { alert("Please enter your name!"); return; }
  if (!deptField.value) { alert("Please select your department!"); return; }
  
  playerName = nameField.value.trim();
  playerDept = deptField.value;
  localStorage.setItem("questPlayerName", playerName);
  localStorage.setItem("questPlayerDept", playerDept);

  document.getElementById("nameForm").style.display = "none";
  document.getElementById("speakingStage").style.display = "block";
  
  startTime = Date.now();
  startTimer();
  loadQuestion();
  initMic(); // Request mic permissions early
}

async function initMic() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    alert("Microphone access is required for this speaking quest.");
    console.error("Mic error:", err);
  }
}

function startTimer() {
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    document.getElementById("timer").innerText = `⏳ ${elapsed}s`;
  }, 1000);
}

/* ========== QUESTION FLOW ========== */
function loadQuestion() {
  if (currentStep >= speakingQuest.length) return finishQuest();
  
  document.getElementById("progressTracker").innerText = `📍 ${currentStep + 1} of 10`;
  document.getElementById("questionText").innerText = speakingQuest[currentStep].q;
  document.getElementById("questionHint").innerText = speakingQuest[currentStep].hint;
  
  // Reset UI for new question
  currentBlob = null;
  document.getElementById("audioPreviewContainer").style.display = "none";
  document.getElementById("nextBtn").disabled = true;
  document.getElementById("recStatus").innerText = "Tap to Record";
  document.getElementById("recordBtn").classList.remove("recording");
}

function skipQuestion() {
  skippedCount++;
  audioBlobs.push(null); // Keep array length consistent, null means skipped
  currentStep++;
  loadQuestion();
}

function nextQuestion() {
  if (!currentBlob) return;
  answeredCount++;
  audioBlobs.push(currentBlob);
  currentStep++;
  loadQuestion();
}

/* ========== AUDIO RECORDING LOGIC ========== */
async function toggleRecording() {
  if (!stream) await initMic();
  if (!stream) return;

  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  audioChunks = [];
  mediaRecorder = new MediaRecorder(stream);
  
  mediaRecorder.ondataavailable = (event) => {
    if (event.data.size > 0) audioChunks.push(event.data);
  };
  
  mediaRecorder.onstop = () => {
    currentBlob = new Blob(audioChunks, { type: 'audio/webm' });
    const audioURL = URL.createObjectURL(currentBlob);
    const audio = document.getElementById("audioPlayback");
    audio.src = audioURL;
    document.getElementById("audioPreviewContainer").style.display = "block";
    document.getElementById("recStatus").innerText = "Listen to your recording. Save it or record again!";
    document.getElementById("nextBtn").disabled = false;
  };
  
  mediaRecorder.start();
  isRecording = true;
  document.getElementById("recordBtn").classList.add("recording");
  document.getElementById("recStatus").innerText = "🔴 Recording... Tap to stop";
}

function stopRecording() {
  mediaRecorder.stop();
  isRecording = false;
  document.getElementById("recordBtn").classList.remove("recording");
}

/* ========== COMPLETION & SUPABASE INTEGRATION ========== */
async function finishQuest() {
  clearInterval(timerInterval);
  const totalTime = Math.floor((Date.now() - startTime) / 1000);

  // Send EXACT JSON to Supabase via Edge Function
  sendViaEdgeFunction({
    student_name: playerName,
    department: playerDept,
    correct: answeredCount, // mapped from original structure
    wrong: skippedCount,    // mapped from original structure
    time_spent: totalTime,
    quest_id: "Speaking Quest 1"
  });

  // Combine audio files
  downloadCombinedAudio();

  // Show Score Portal
  document.getElementById("speakingStage").style.display = "none";
  document.getElementById("scorePortal").style.display = "block";
  document.getElementById("portalPlayer").innerText = `👤 ${playerName} · ${playerDept}`;
  document.getElementById("answeredCount").innerText = answeredCount;

  // Celebration
  confetti({ particleCount: 150, spread: 100, origin: { y: 0.6 } });
}

function downloadCombinedAudio() {
  // Filter out skipped (null) blobs
  const validBlobs = audioBlobs.filter(blob => blob !== null);
  if (validBlobs.length === 0) {
    alert("No audio recorded. Cannot download file.");
    return;
  }

  // Combine blobs (WebM format allows simple concatenation)
  const combinedBlob = new Blob(validBlobs, { type: 'audio/webm' });
  const url = URL.createObjectURL(combinedBlob);
  
  // Trigger automatic download
  const a = document.createElement('a');
  a.href = url;
  a.download = `${playerName.replace(/[^a-zA-Z0-9]/g, '_')}_Self_Introduction.webm`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function downloadAudio() {
  downloadCombinedAudio();
}

async function sendViaEdgeFunction(payload) {
  try {
    const response = await fetch(EDGE_FUNCTION_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    if (!response.ok) { console.error("❌ Edge Function Error:", await response.text()); return; }
    console.log("✅ Saved to Supabase");
  } catch (err) { console.error("⚠️ Edge Function Error:", err); }
}
</script>
</body>
</html>

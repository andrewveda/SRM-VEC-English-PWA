<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-sans, Arial, sans-serif);
  color:var(--color-text-primary, #222);
  background:#fff;
}
.wrap{padding:1.5rem 0;max-width:680px;margin:auto}
h1{font-size:20px;font-weight:500;margin-bottom:4px}
.sub{font-size:13px;color:#666;margin-bottom:1.5rem}

.card{
  background:#fff;
  border:1px solid #ddd;
  border-radius:10px;
  padding:1.25rem;
  margin-bottom:1rem
}

.label{font-size:12px;color:#666;margin-bottom:8px}

.drop{
  border:1.5px dashed #aaa;
  border-radius:8px;
  padding:2rem 1rem;
  text-align:center;
  cursor:pointer;
}
.drop.active{border-color:#1D9E75;background:#E1F5EE}

textarea{
  width:100%;
  min-height:120px;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.btn{
  width:100%;
  padding:12px;
  background:#222;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.btn:disabled{opacity:.5}

.error-msg{
  background:#FCEBEB;
  color:#A32D2D;
  padding:10px;
  margin-top:10px;
  display:none;
  border-radius:6px;
}

.file-ok{
  display:none;
  gap:10px;
  padding:10px;
  background:#f5f5f5;
  border-radius:6px;
  margin-top:10px;
}

.kw{padding:4px 8px;border-radius:20px;font-size:12px}
.found{background:#E1F5EE}
.missing{background:#FCEBEB}
</style>
</head>

<body>
<div class="wrap">

<h1>ATS Resume Scanner</h1>
<p class="sub">Upload resume + paste job description</p>

<div class="card">
  <div class="label">Resume</div>
  <div class="drop" id="dropZone" onclick="resumeInput.click()">
    Click or Drop PDF/DOCX
  </div>
  <input type="file" id="resumeInput" accept=".pdf,.docx" hidden>
  <div class="file-ok" id="fileOk">
    <span id="fileName"></span>
    <button onclick="removeFile()">✕</button>
  </div>
</div>

<div class="card">
  <div class="label">Job Description</div>
  <textarea id="jobDesc"></textarea>
</div>

<button class="btn" id="analyzeBtn" onclick="analyze()">Analyze</button>
<div class="error-msg" id="errorMsg"></div>

<div class="card" id="results" style="display:none">
  <h3>Score: <span id="scoreNum"></span></h3>
  <p>Keyword Match: <span id="kwMatch"></span></p>
  <p>Format Score: <span id="formatScore"></span></p>

  <h4>Keywords Found</h4>
  <div id="kwFound"></div>

  <h4>Missing Keywords</h4>
  <div id="kwMissing"></div>

  <h4>Suggestions</h4>
  <pre id="suggestions"></pre>
</div>

</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const WORKER_URL = 'https://ats.andrewveda.workers.dev';

let resumeText = '';
let isProcessingFile = false;

const dropZone = document.getElementById('dropZone');
const resumeInput = document.getElementById('resumeInput');

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('active');
});

dropZone.addEventListener('dragleave', () => {
  dropZone.classList.remove('active');
});

dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('active');
  handleFile(e.dataTransfer.files[0]);
});

resumeInput.addEventListener('change', e => {
  handleFile(e.target.files[0]);
});

function handleFile(file){
  if(!file) return;

  const ext = file.name.split('.').pop().toLowerCase();

  if(ext !== 'pdf' && ext !== 'docx'){
    showError('Only PDF/DOCX allowed');
    return;
  }

  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileOk').style.display = 'flex';
  dropZone.style.display = 'none';

  if(ext === 'pdf') extractPDF(file);
  else extractDOCX(file);
}

function removeFile(){
  resumeText = '';
  resumeInput.value = '';
  dropZone.style.display = 'block';
  document.getElementById('fileOk').style.display = 'none';
}

async function extractPDF(file){
  isProcessingFile = true;

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;

  let text = '';

  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    text += content.items
      .map(s=>s.str)
      .join(' ')
      .replace(/\s+/g,' ') + '\n';
  }

  resumeText = text;
  isProcessingFile = false;
}

async function extractDOCX(file){
  isProcessingFile = true;

  const buf = await file.arrayBuffer();
  const result = await mammoth.extractRawText({arrayBuffer:buf});

  resumeText = result.value;
  isProcessingFile = false;
}

async function analyze(){

  if(isProcessingFile){
    showError('Wait for file processing');
    return;
  }

  if(!resumeText){
    showError('Upload resume first');
    return;
  }

  const jd = document.getElementById('jobDesc').value.trim();
  if(!jd){
    showError('Paste job description');
    return;
  }

  hideError();

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';

  const prompt = `
Analyze resume vs job description.

RESUME:
${resumeText.slice(0,8000)}

JOB:
${jd.slice(0,3000)}

Return ONLY JSON:
{
"ats_score":0-100,
"keyword_match_percent":0-100,
"format_score":0-100,
"keywords_found":[],
"keywords_missing":[],
"suggestions":"text"
}`;

  try{

    const res = await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompt}]}]
      })
    });

    const data = await res.json();
    console.log("API:",data);

    let raw =
      data.candidates?.[0]?.content?.parts?.[0]?.text ||
      data.text ||
      '';

    if(!raw) throw new Error('Empty API response');

    raw = raw.replace(/```json|```/g,'').trim();

    let r;

    try{
      r = JSON.parse(raw);
    }catch(e){
      console.error("BAD JSON:",raw);
      throw new Error('Invalid JSON from API');
    }

    renderResults(r);

  }catch(e){
    showError(e.message);
  }
  finally{
    btn.disabled = false;
    btn.textContent = 'Analyze';
  }
}

function renderResults(r){

  document.getElementById('results').style.display = 'block';

  document.getElementById('scoreNum').textContent =
    r.ats_score || 0;

  document.getElementById('kwMatch').textContent =
    (r.keyword_match_percent || 0) + '%';

  document.getElementById('formatScore').textContent =
    (r.format_score || 0) + '%';

  document.getElementById('kwFound').innerHTML =
    (r.keywords_found || [])
    .map(k=>`<span class="kw found">${k}</span>`).join(' ');

  document.getElementById('kwMissing').innerHTML =
    (r.keywords_missing || [])
    .map(k=>`<span class="kw missing">${k}</span>`).join(' ');

  document.getElementById('suggestions').textContent =
    r.suggestions || '';
}

function showError(msg){
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError(){
  document.getElementById('errorMsg').style.display = 'none';
}
</script>

</body>
</html>

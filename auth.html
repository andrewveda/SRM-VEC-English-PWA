<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#07080f">
<title>SRM VEC Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Syne:wght@400;600;700&display=swap">

<style>
:root {
  --bg: #07080f;
  --surface: #0e1020;
  --card: #12152a;
  --border: rgba(255,255,255,0.07);
  --gold: #f5c842;
  --gold-dim: rgba(245,200,66,0.18);
  --accent: #6c63ff;
  --accent-soft: rgba(108,99,255,0.2);
  --text: #e2e0f0;
  --muted: rgba(255,255,255,0.38);
  --green: #23d18b;
  --r: 14px;
  --font-head: 'Orbitron', monospace;
  --font-body: 'Syne', sans-serif;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

body::before {
  content:'';
  position:fixed;
  width:700px;
  height:700px;
  background: radial-gradient(circle, rgba(108,99,255,.09) 0%, transparent 65%);
  top:-250px;
  left:-200px;
  border-radius:50%;
  pointer-events:none;
}

body::after {
  content:'';
  position:fixed;
  width:500px;
  height:500px;
  background: radial-gradient(circle, rgba(245,200,66,.06) 0%, transparent 65%);
  bottom:-150px;
  right:-100px;
  border-radius:50%;
  pointer-events:none;
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 460px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2.2rem;
  box-shadow: 0 20px 80px rgba(0,0,0,.6);
}

.logo {
  font-family: var(--font-head);
  letter-spacing: .25em;
  color: var(--gold);
  font-size: .85rem;
  text-align: center;
  margin-bottom: 1rem;
}

.title {
  font-family: var(--font-head);
  font-size: 1.1rem;
  text-align: center;
  color: white;
  margin-bottom: .7rem;
}

.subtitle {
  text-align: center;
  color: var(--muted);
  font-size: .9rem;
  line-height: 1.6;
  margin-bottom: 2rem;
}

.github-btn {
  width: 100%;
  border: none;
  cursor: pointer;
  border-radius: var(--r);
  padding: 1rem;
  background: linear-gradient(135deg, #5a50e0, #8b7fff);
  color: white;
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 700;
  transition: .2s;
  box-shadow: 0 6px 24px rgba(108,99,255,.35);
}

.github-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(108,99,255,.45);
}

.identity {
  display: none;
  margin-bottom: 1.5rem;
  border: 1px solid rgba(108,99,255,.3);
  border-radius: 14px;
  padding: 1rem;
  background: rgba(108,99,255,.07);
  align-items: center;
  gap: 1rem;
}

.avatar {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--gold-dim);
}

.identity-name {
  font-weight: 700;
  font-size: .95rem;
}

.identity-handle {
  color: var(--muted);
  font-size: .8rem;
  margin-top: .2rem;
}

.identity-badge {
  margin-top: .35rem;
  font-size: .68rem;
  color: var(--green);
  text-transform: uppercase;
  letter-spacing: .08em;
}

.label {
  display: block;
  margin-bottom: .5rem;
  margin-top: 1rem;
  color: var(--muted);
  font-size: .72rem;
  text-transform: uppercase;
  letter-spacing: .1em;
}

select {
  width: 100%;
  padding: .9rem 1rem;
  border-radius: var(--r);
  border: 1px solid var(--border);
  background: rgba(255,255,255,.05);
  color: white;
  font-family: var(--font-body);
  font-size: .95rem;
}

select option {
  background: #1a1b30;
}

.continue-btn {
  width: 100%;
  margin-top: 1.5rem;
  border: none;
  cursor: pointer;
  border-radius: var(--r);
  padding: 1rem;
  background: linear-gradient(135deg, #23d18b, #16a34a);
  color: #04200e;
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 800;
  transition: .2s;
}

.continue-btn:hover {
  transform: translateY(-2px);
}

.continue-btn:disabled {
  opacity: .5;
  cursor: not-allowed;
}

.small {
  margin-top: 1.2rem;
  text-align: center;
  color: var(--muted);
  font-size: .78rem;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="card">

  <div class="logo">✦ SRM VEC ✦</div>

  <div class="title">GitHub Authentication</div>

  <div class="subtitle">
    Sign in with GitHub to continue to quests,
    videos, and progress tracking.
  </div>

  <div class="identity" id="identityCard">
    <img id="avatar" class="avatar" src="" alt="avatar">

    <div>
      <div class="identity-name" id="displayName"></div>
      <div class="identity-handle" id="handle"></div>
      <div class="identity-badge">GitHub Authenticated</div>
    </div>
  </div>

  <button class="github-btn" id="githubBtn">
    Continue with GitHub
  </button>

  <div id="deptSection" style="display:none;">

    <label class="label">Department</label>

    <select id="deptSelect">
      <option value="">— Select your department —</option>
      <option>Cyber Security</option>
      <option>CSE-1</option>
      <option>CSE-2</option>
      <option>CSE-3</option>
      <option>Mechanical Engineering</option>
      <option>ECE-1</option>
      <option>ECE-2</option>
      <option>ECE-3</option>
      <option>AI DS-1</option>
      <option>AI DS-2</option>
      <option>Civil</option>
      <option>Agri</option>
      <option>EEE</option>
      <option>EIE</option>
      <option>Medical Electronics</option>
      <option>IT-1</option>
      <option>IT-2</option>
    </select>

    <button class="continue-btn" id="continueBtn">
      Continue 🚀
    </button>

  </div>

  <div class="small">
    Your GitHub account is used for
    authentication and progress tracking.
  </div>

</div>

<script>

const CLIENT_ID = 'Ov23liFzJoxvrfeW8i0z';
const REDIRECT_URI =
  'https://andrewveda.github.io/SRM-VEC-English-PWA/auth.html';

const returnTo =
  new URLSearchParams(window.location.search)
    .get('return') || '/SRM-VEC-English-PWA/';

const githubBtn   = document.getElementById('githubBtn');
const deptSection = document.getElementById('deptSection');
const continueBtn = document.getElementById('continueBtn');

function beginGitHubLogin() {

  const state = Math.random().toString(36).slice(2);

  sessionStorage.setItem('oauth_state', state);

  const url =
    `https://github.com/login/oauth/authorize?client_id=${CLIENT_ID}` +
    `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
    `&scope=read:user` +
    `&state=${state}`;

  window.location.href = url;
}

async function exchangeCode(code) {

  const response = await fetch(
    `https://YOUR-WORKER.workers.dev/?code=${code}`
  );

  if (!response.ok) {
    throw new Error('OAuth failed');
  }

  return response.json();
}

function showIdentity(user) {

  document.getElementById('identityCard').style.display = 'flex';

  document.getElementById('avatar').src = user.avatar_url;

  document.getElementById('displayName').textContent =
    user.name || user.login;

  document.getElementById('handle').textContent =
    '@' + user.login;

  githubBtn.style.display = 'none';
  deptSection.style.display = 'block';
}

function saveUser(user) {

  localStorage.setItem('logged_in', 'true');

  localStorage.setItem('auth_provider', 'github');

  localStorage.setItem('github_username', user.login);

  localStorage.setItem('github_id', user.id);

  localStorage.setItem('github_profile', user.html_url);

  localStorage.setItem('avatar', user.avatar_url);

  localStorage.setItem(
    'userName',
    user.name || user.login
  );
}

continueBtn.addEventListener('click', () => {

  const dept = document.getElementById('deptSelect').value;

  if (!dept) {
    alert('Please select your department');
    return;
  }

  localStorage.setItem('userDept', dept);

  window.location.href = decodeURIComponent(returnTo);
});

githubBtn.addEventListener('click', beginGitHubLogin);

(async function init() {

  const params = new URLSearchParams(window.location.search);

  const code  = params.get('code');
  const state = params.get('state');

  if (!code) {
    return;
  }

  const savedState = sessionStorage.getItem('oauth_state');

  if (state !== savedState) {
    alert('Invalid OAuth state');
    return;
  }

  githubBtn.disabled = true;
  githubBtn.textContent = 'Authenticating...';

  try {

    const data = await exchangeCode(code);

    saveUser(data);

showIdentity(data);

    githubBtn.textContent = 'Authenticated';

  window.history.replaceState({}, '', '/SRM-VEC-English-PWA/auth.html');
  } catch (err) {

    console.error(err);

    githubBtn.disabled = false;
    githubBtn.textContent = 'Continue with GitHub';

    alert('GitHub login failed');
  }

})();

</script>

</body>
</html>

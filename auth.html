<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Authenticating...</title>

<style>
:root{
  --bg:#faf7f2;
  --card:#ffffff;
  --gold:#c9a84c;
  --text:#2a2a2a;
  --muted:#8a847c;
  --border:rgba(201,168,76,.25);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:var(--text);
}

.card{
  width:min(92vw,360px);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:20px;
  padding:32px 24px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.06);
}

.spinner{
  width:52px;
  height:52px;
  margin:0 auto 18px;
  border-radius:50%;
  border:3px solid rgba(201,168,76,.15);
  border-top-color:var(--gold);
  animation:spin .9s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

h1{
  font-size:1.1rem;
  margin-bottom:8px;
}

p{
  font-size:.92rem;
  color:var(--muted);
  line-height:1.5;
}

.error{
  color:#b42318;
}

.small{
  margin-top:14px;
  font-size:.75rem;
  opacity:.75;
  word-break:break-word;
}
</style>
</head>
<body>

<div class="card">

  <div class="spinner"></div>

  <h1 id="title">
    Authenticating…
  </h1>

  <p id="message">
    Connecting your GitHub account.
  </p>

  <div class="small" id="small"></div>

</div>

<script>
(async function(){

  // -----------------------------------
  // CONFIG
  // -----------------------------------

  const WORKER_URL =
    "https://YOUR-WORKER.workers.dev";

  const RETURN_PAGE =
    "/SRM-VEC-English-PWA/semII/";

  // -----------------------------------
  // GET CODE
  // -----------------------------------

  const params =
    new URLSearchParams(window.location.search);

  const code = params.get("code");

  const error = params.get("error");

  // -----------------------------------
  // HANDLE OAUTH ERRORS
  // -----------------------------------

  if (error) {

    showError(
      "GitHub login was cancelled.",
      error
    );

    return;
  }

  if (!code) {

    showError(
      "No authorization code received.",
      "Missing OAuth code."
    );

    return;
  }

  // -----------------------------------
  // EXCHANGE CODE
  // -----------------------------------

  try {

    const response = await fetch(
      `${WORKER_URL}?code=${encodeURIComponent(code)}`
    );

    if (!response.ok) {

      throw new Error(
        `HTTP ${response.status}`
      );
    }

    const user = await response.json();

    // -----------------------------------
    // VALIDATE USER
    // -----------------------------------

    if (!user || !user.id) {

      throw new Error(
        "Invalid GitHub user response."
      );
    }

    // -----------------------------------
    // SAVE USER
    // -----------------------------------

    localStorage.setItem(
      "github_id",
      String(user.id)
    );

    localStorage.setItem(
      "github_username",
      user.login || ""
    );

    localStorage.setItem(
      "userName",
      user.name || user.login || "GitHub User"
    );

    localStorage.setItem(
      "avatar",
      user.avatar_url || ""
    );

    localStorage.setItem(
      "github_profile",
      user.html_url || ""
    );

    localStorage.setItem(
      "auth_provider",
      "github"
    );

    localStorage.setItem(
      "logged_in",
      "true"
    );

    // OPTIONAL:
    // Keep department if already selected

    if (!localStorage.getItem("userDept")) {

      localStorage.setItem(
        "needs_department",
        "true"
      );
    }

    // -----------------------------------
    // SUCCESS UI
    // -----------------------------------

    document.getElementById("title")
      .textContent = "Welcome!";

    document.getElementById("message")
      .textContent =
        `Signed in as ${user.login}`;

    // -----------------------------------
    // REDIRECT
    // -----------------------------------

    setTimeout(() => {

      window.location.href = RETURN_PAGE;

    }, 1000);

  }

  catch(err) {

    console.error(err);

    showError(
      "Authentication failed.",
      err.message || String(err)
    );
  }

  // -----------------------------------
  // ERROR UI
  // -----------------------------------

  function showError(title, msg){

    document.querySelector(".spinner")
      .style.display = "none";

    const t =
      document.getElementById("title");

    const m =
      document.getElementById("message");

    const s =
      document.getElementById("small");

    t.textContent = title;

    t.classList.add("error");

    m.textContent =
      "Please try again.";

    s.textContent = msg;
  }

})();
</script>

</body>
</html>

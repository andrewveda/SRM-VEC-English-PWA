<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Book Insights</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=EB+Garamond&family=DM+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'EB Garamond', serif;
  background:#F7F2E8;
}

/* TOP BAR */
.top-bar {
  display:flex;
  justify-content:space-between;
  padding:12px 16px;
}
.player-pill {
  border:1px solid #C9A84C;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  color:#C9A84C;
  cursor:pointer;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
}
.title {
  font-family:'Playfair Display';
  font-size:28px;
}

/* PROGRESS */
.progress {
  margin:10px 16px;
}
.track {
  height:4px;
  background:#ddd;
}
.fill {
  height:100%;
  width:0%;
  background:#C9A84C;
  transition:0.6s;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  padding:16px;
}

.book-card {
  background:#fff;
  padding:18px;
  border:1px solid #C9A84C55;
  position:relative;
  cursor:pointer;
}

.book-card.done {
  background:#e8f5e9;
}

.done-badge {
  position:absolute;
  top:6px; right:6px;
  background:#4CAF50;
  color:#fff;
  border-radius:50%;
  width:18px; height:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  opacity:0;
}
.book-card.done .done-badge {
  opacity:1;
}

.book-title {
  font-family:'Playfair Display';
}

.book-author {
  font-style:italic;
  font-size:13px;
}

/* MODAL */
.modal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
}
.modal.show { display:flex; }

.modal-box {
  background:#fff;
  padding:20px;
  width:280px;
}
input,select {
  width:100%;
  margin-bottom:10px;
}
button {
  width:100%;
  background:#C9A84C;
  border:none;
  padding:10px;
}
</style>
</head>

<body>

<div class="top-bar">
  <div id="playerArea"></div>
</div>

<div class="header">
  <div class="title">Book Insights</div>
</div>

<div class="progress">
  <div class="track">
    <div class="fill" id="fill"></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <input id="nameInput" placeholder="Your name">
    <select id="deptSelect">
      <option value="">Department</option>
      <option>CSE</option>
      <option>Cyber Security</option>
    </select>
    <button onclick="login()">Continue</button>
  </div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://yellow-lab-4999.andrewveda.workers.dev",
  "YOUR_KEY"
);

/* BOOKS */
const BOOKS = [
 {id:1,title:"Lateral Thinking",author:"Edward de Bono",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/39"},
 {id:2,title:"Grit",author:"Angela Duckworth",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/40"},
 {id:3,title:"Psychology of Money",author:"Morgan Housel",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/41"},
 {id:4,title:"Atomic Habits",author:"James Clear",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/42"},
 {id:5,title:"How to Win Friends",author:"Dale Carnegie",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/43"},
 {id:6,title:"Daily Stoic",author:"Ryan Holiday",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/44"}
];

const OFFSET = 220;
const TOTAL = BOOKS.length;

let playerName = localStorage.getItem('name') || '';

/* RENDER BOOKS */
const grid = document.getElementById('grid');
grid.innerHTML = BOOKS.map(b=>`
<div class="book-card" data-bid="${b.id}" onclick="openBook('${b.url}')">
  <div class="done-badge">✓</div>
  <div class="book-title">${b.title}</div>
  <div class="book-author">${b.author}</div>
</div>
`).join('');

/* PLAYER */
function renderPlayer(){
  const area = document.getElementById('playerArea');
  if(playerName){
    area.innerHTML = `<div class="player-pill" onclick="openModal()">${playerName}</div>`;
  } else {
    area.innerHTML = `<button onclick="openModal()">Sign In</button>`;
  }
}

/* LOGIN */
window.openModal = ()=> document.getElementById('modal').classList.add('show');

window.login = ()=>{
  const name = document.getElementById('nameInput').value.trim();
  if(!name) return alert("Enter name");
  localStorage.setItem('name', name);
  playerName = name;
  document.getElementById('modal').classList.remove('show');
  renderPlayer();
  fetchData();
};

/* FETCH */
async function fetchData(){
  if(!playerName) return;

  const {data} = await supabase
    .from('report_card_view')
    .select('quest_list')
    .ilike('name', playerName);

  const ids = new Set();

  data?.forEach(row=>{
    (row.quest_list||'').split(',').forEach(q=>{
      const m = q.match(/\d+/);
      if(m){
        const id = Number(m[0]) - OFFSET;
        if(id>=1 && id<=TOTAL) ids.add(id);
      }
    });
  });

  applyCompletion(ids);
}

/* APPLY */
function applyCompletion(ids){
  let done = 0;

  document.querySelectorAll('.book-card').forEach(card=>{
    const id = Number(card.dataset.bid);
    if(ids.has(id)){
      card.classList.add('done');
      done++;
    }
  });

  document.getElementById('fill').style.width =
    (done/TOTAL*100) + "%";
}

/* OPEN BOOK */
window.openBook = (url)=>{
  window.location.href = url;
};

/* INIT */
renderPlayer();
if(playerName) fetchData();
else openModal();

</script>
</body>
</html>

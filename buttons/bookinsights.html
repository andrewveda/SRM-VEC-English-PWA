

<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IM+Fell+English&display=swap');
  :root {
    --gold:#C9A84C;--gold-light:#E8C97A;--bg:#1a1208;
    --card:linear-gradient(160deg,#2e2010,#1a1208);
    --border:rgba(201,168,76,0.22);--surface:rgba(201,168,76,0.07);
    --pattern-op:0.02;
  }
  .light{
    --gold:#9a6e00;--gold-light:#7a5400;--bg:#faf4e8;
    --card:linear-gradient(160deg,#ede0c0,#faf4e8);
    --border:rgba(154,110,0,0.28);--surface:rgba(154,110,0,0.08);
    --pattern-op:0.035;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  .wrap{background:var(--bg);min-height:600px;position:relative;overflow:hidden;transition:background .3s;}
  .wrap::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:var(--pattern-op);background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,var(--gold) 35px,var(--gold) 36px),repeating-linear-gradient(-45deg,transparent,transparent 35px,var(--gold) 35px,var(--gold) 36px);}
  .inner{position:relative;z-index:1;}

  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 0;}
  .edition{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.18em;color:var(--gold);opacity:.55;}
  .theme-btn{font-size:11px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 12px;color:var(--gold);font-family:'Cormorant Garamond',serif;letter-spacing:.08em;}

  .header{text-align:center;padding:12px 16px 10px;}
  .eyebrow{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:11px;letter-spacing:.25em;color:var(--gold);opacity:.5;margin-bottom:6px;}
  .main-title{font-family:'Playfair Display',serif;font-size:clamp(22px,7vw,34px);font-weight:600;letter-spacing:.06em;color:var(--gold-light);line-height:1.1;}
  .divider{width:40px;height:1px;background:var(--gold);opacity:.35;margin:8px auto 0;}

  .books{padding:12px 11px 20px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .book-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:15px 12px 13px;display:flex;flex-direction:column;gap:0;position:relative;overflow:hidden;transition:border-color .2s,transform .15s;}
  .book-card:active{transform:scale(.96);}
  .accent-bar{position:absolute;top:0;left:0;width:100%;height:2px;}

  .book-title{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;line-height:1.3;margin-bottom:5px;padding:8px 10px 6px;border-radius:6px;background:rgba(201,168,76,0.13);border:1px solid rgba(201,168,76,0.18);}
  .light .book-title{background:rgba(154,110,0,0.1);border-color:rgba(154,110,0,0.2);}

  .book-author{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12px;letter-spacing:.06em;padding:5px 10px 5px;border-radius:6px;background:rgba(201,168,76,0.07);border:1px solid rgba(201,168,76,0.12);margin-bottom:10px;}
  .light .book-author{background:rgba(154,110,0,0.07);border-color:rgba(154,110,0,0.15);}

  .read-btn{display:block;width:100%;background:linear-gradient(135deg,var(--gold),#a07828);color:#1a1208;border:none;border-radius:7px;padding:8px 0;font-family:'Playfair Display',serif;font-size:11px;font-weight:600;letter-spacing:.08em;cursor:pointer;text-align:center;text-decoration:none;margin-top:auto;}
  .read-btn:active{opacity:.85;}

  .footer{text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10px;letter-spacing:.18em;color:var(--gold);opacity:.3;padding:4px 0 14px;}
</style>

<div class="wrap" id="app">
  <div class="inner">
    <div class="top-bar">
      <span class="edition">Student Edition</span>
      <button class="theme-btn" onclick="toggleTheme()">☀ / ☾</button>
    </div>
    <div class="header">
      <div class="eyebrow">A curated reading list</div>
      <div class="main-title">Insights from Books</div>
      <div class="divider"></div>
    </div>
    <div class="books" id="bookGrid"></div>
    <div class="footer">Insights from Books · Student Directory</div>
  </div>
</div>

<script>
const BOOKS = [
  {title:"Lateral Thinking",author:"Edward de Bono",color:"#c07a40",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/39"},
  {title:"Grit",author:"Angela Duckworth",color:"#aa6a5a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/40"},
  {title:"Psychology of Money",author:"Morgan Housel",color:"#5a8aaa",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/41"},
  {title:"Atomic Habits",author:"James Clear",color:"#6aaa6a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/42"},
  {title:"How to Win Friends & Influence People",author:"Dale Carnegie",color:"#8a6aaa",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/43"},
  {title:"The Daily Stoic",author:"Ryan Holiday",color:"#8aaa6a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/44"},
];

let dark = true;

function toggleTheme(){
  dark = !dark;
  document.getElementById('app').classList.toggle('light');
}

function render(){
  document.getElementById('bookGrid').innerHTML = BOOKS.map(b=>`
    <div class="book-card">
      <div class="accent-bar" style="background:linear-gradient(90deg,${b.color},transparent);"></div>
      <div class="book-title" style="color:${b.color};">${b.title}</div>
      <div class="book-author" style="color:${b.color};">${b.author}</div>
      <a class="read-btn" href="${b.url}" target="_blank" rel="noopener">Read Insights ↗</a>
    </div>
  `).join('');
}

render();
</script>

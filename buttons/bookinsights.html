<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { -webkit-text-size-adjust: 100%; }

.lib-wrap {
  min-height: 100vh;
  min-height: 100dvh;
  background: #F7F2E8;
  font-family: 'EB Garamond', Georgia, serif;
  padding-bottom: max(48px, env(safe-area-inset-bottom, 48px));
  padding-left: env(safe-area-inset-left, 0px);
  padding-right: env(safe-area-inset-right, 0px);
}

.lib-header {
  text-align: center;
  padding: max(36px, env(safe-area-inset-top, 36px)) 24px 24px;
  border-bottom: 1px solid #C9A84C44;
}

.lib-ornament {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-bottom: 14px;
}

.lib-ornament-line {
  height: 1px;
  width: 60px;
  background: linear-gradient(90deg, transparent, #C9A84C, transparent);
}

.lib-ornament-diamond {
  width: 6px; height: 6px;
  background: #C9A84C;
  transform: rotate(45deg);
  flex-shrink: 0;
}

.lib-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: clamp(22px, 7vw, 38px);
  font-weight: 500;
  color: #2C1F08;
  letter-spacing: .04em;
  line-height: 1.2;
}

.lib-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  padding: 24px 16px 0;
  max-width: 720px;
  margin: 0 auto;
}

@media (min-width: 540px) {
  .lib-grid {
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    padding: 32px 24px 0;
  }
}

.book-card {
  background: #FDFAF3;
  border: 1px solid #D4B86A55;
  border-top: 3px solid #C9A84C;
  border-radius: 3px;
  padding: clamp(18px, 5vw, 28px) clamp(16px, 5vw, 22px);
  cursor: pointer;
  touch-action: manipulation;
  user-select: none;
  -webkit-user-select: none;
  position: relative;
  transition: transform .15s ease, box-shadow .15s ease;
  min-height: 88px;
}

.book-card::after {
  content: '';
  position: absolute;
  bottom: 0; right: 0;
  width: 36px; height: 36px;
  border-bottom: 1px solid #C9A84C44;
  border-right: 1px solid #C9A84C44;
  border-radius: 0 0 3px 0;
}

.book-card:active {
  transform: scale(.97);
  box-shadow: 0 2px 12px #C9A84C14;
}

@media (hover: hover) {
  .book-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px #C9A84C18;
    border-top-color: #E8C45A;
  }
}

.book-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(16px, 4.5vw, 19px);
  font-weight: 500;
  color: #1E1408;
  line-height: 1.35;
  margin-bottom: 10px;
  padding-right: 20px;
}

.book-divider {
  height: 1px;
  background: linear-gradient(90deg, #C9A84C66, transparent);
  margin-bottom: 10px;
}

.book-author {
  font-family: 'EB Garamond', serif;
  font-style: italic;
  font-size: clamp(13px, 3.5vw, 15px);
  color: #7A5F2A;
  letter-spacing: .06em;
}

.book-chevron {
  position: absolute;
  top: 50%; right: 18px;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  opacity: .35;
  flex-shrink: 0;
}

.book-chevron path {
  stroke: #8B6914;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  fill: none;
}
</style>
</head>
<body>
<div class="lib-wrap">
  <div class="lib-header">
    <div class="lib-ornament">
      <div class="lib-ornament-line"></div>
      <div class="lib-ornament-diamond"></div>
      <div class="lib-ornament-line"></div>
    </div>
    <div class="lib-title">Insights from Books</div>
  </div>

  <div class="lib-grid" id="grid"></div>
</div>

<script>
const BOOKS = [
  {title:"Lateral Thinking",author:"Edward de Bono",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/39"},
  {title:"Grit",author:"Angela Duckworth",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/40"},
  {title:"Psychology of Money",author:"Morgan Housel",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/41"},
  {title:"Atomic Habits",author:"James Clear",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/42"},
  {title:"How to Win Friends & Influence People",author:"Dale Carnegie",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/43"},
  {title:"The Daily Stoic",author:"Ryan Holiday",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/44"},
];

const chevron = `<svg class="book-chevron" viewBox="0 0 18 18"><path d="M6 4l5 5-5 5"/></svg>`;

const grid = document.getElementById('grid');
grid.innerHTML = BOOKS.map(b=>`
  <div class="book-card" onclick="window.location.href='${b.url}'">
    <div class="book-title">${b.title}</div>
    <div class="book-divider"></div>
    <div class="book-author">${b.author}</div>
    ${chevron}
  </div>
`).join('');
</script>
</body>
</html>

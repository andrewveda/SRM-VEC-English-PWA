<style>
  :root {
    --gold:#C9A84C;--gold-light:#E8C97A;--bg:#1a1208;--surface:rgba(201,168,76,0.06);
    --surface2:rgba(201,168,76,0.12);--card:linear-gradient(160deg,#2e2010,#1a1208);
    --text:#F9F3E3;--text-dim:rgba(249,243,227,0.5);--border:rgba(201,168,76,0.2);
    --gold-dim:rgba(201,168,76,0.12);--pattern-op:0.02;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  .wrap{background:var(--bg);min-height:600px;font-family:'Georgia',serif;position:relative;overflow:hidden;}
  .wrap::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:var(--pattern-op);background-image:repeating-linear-gradient(45deg,transparent,transparent 35px,var(--gold) 35px,var(--gold) 36px),repeating-linear-gradient(-45deg,transparent,transparent 35px,var(--gold) 35px,var(--gold) 36px);}
  .inner{position:relative;z-index:1;}

  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 0;}
  .theme-btn{font-size:11px;cursor:pointer;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:4px 11px;color:var(--gold);font-family:monospace;letter-spacing:.05em;}

  .header{text-align:center;padding:10px 16px 8px;}
  .eyebrow{font-family:monospace;font-size:9px;letter-spacing:.35em;text-transform:uppercase;color:var(--gold);opacity:.45;margin-bottom:5px;}
  .main-title{font-size:clamp(20px,6vw,30px);font-weight:400;letter-spacing:.06em;color:var(--gold-light);line-height:1.1;}
  .divider{width:40px;height:1px;background:var(--gold);opacity:.3;margin:7px auto 0;}

  .books{padding:12px 12px 20px;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .book-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 12px;display:flex;flex-direction:column;gap:5px;cursor:pointer;transition:border-color .2s,transform .15s;text-decoration:none;color:inherit;position:relative;overflow:hidden;}
  .book-card:active{transform:scale(.96);border-color:var(--gold);}
  .book-spine{width:22px;height:3px;border-radius:2px;margin-bottom:4px;flex-shrink:0;}
  .book-title{font-size:13px;font-weight:400;color:var(--gold-light);letter-spacing:.02em;line-height:1.3;}
  .book-author{font-family:monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);opacity:.5;margin-top:2px;}
  .read-btn{margin-top:8px;display:inline-flex;align-items:center;justify-content:center;gap:5px;background:linear-gradient(135deg,var(--gold),#a07828);color:#1a1208;border:none;border-radius:7px;padding:7px 0;font-family:monospace;font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;}

  .footer{text-align:center;font-family:monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);opacity:.22;padding:4px 0 14px;}
</style>

<div class="wrap" id="app">
  <div class="inner">
    <div class="top-bar">
      <span style="font-family:monospace;font-size:9px;letter-spacing:.2em;color:var(--gold);opacity:.5;text-transform:uppercase;">Student Edition</span>
      <button class="theme-btn" onclick="toggleTheme()">☀ / ☾</button>
    </div>
    <div class="header">
      <div class="eyebrow">A curated reading list</div>
      <div class="main-title">Insights from Books</div>
      <div class="divider"></div>
    </div>
    <div class="books" id="bookGrid"></div>
    <div class="footer">Insights from Books · Student Directory</div>
  </div>
</div>

<script>
const BOOKS = [
  {title:"Lateral Thinking",author:"Edward de Bono",color:"#c07a40",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/39"},
  {title:"Grit",author:"Angela Duckworth",color:"#aa6a5a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/40"},
  {title:"Psychology of Money",author:"Morgan Housel",color:"#5a8aaa",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/41"},
  {title:"Atomic Habits",author:"James Clear",color:"#6aaa6a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/42"},
  {title:"How to Win Friends & Influence People",author:"Dale Carnegie",color:"#8a6aaa",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/43"},
  {title:"The Daily Stoic",author:"Ryan Holiday",color:"#8aaa6a",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/44"},
];

let dark = true;

function toggleTheme(){
  dark = !dark;
  document.getElementById('app').style.cssText = dark ? '' : '--gold:#9a6e00;--gold-light:#b88a00;--bg:#faf4e8;--surface:rgba(154,110,0,0.06);--surface2:rgba(154,110,0,0.12);--card:linear-gradient(160deg,#ede0c0,#faf4e8);--text:#3a2800;--text-dim:rgba(58,40,0,0.5);--border:rgba(154,110,0,0.25);--gold-dim:rgba(154,110,0,0.14);--pattern-op:0.035;';
}

function render(){
  document.getElementById('bookGrid').innerHTML = BOOKS.map(b=>`
    <div class="book-card">
      <div class="book-spine" style="background:${b.color};opacity:.75;"></div>
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
      <button class="read-btn" onclick="openLink('${b.url}')">Read Insights ↗</button>
    </div>
  `).join('');
}

render();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap');

:root {
  --gold:#C9A84C;
  --bg:#1a1208;
  --card:linear-gradient(160deg,#2e2010,#1a1208);
  --border:rgba(201,168,76,0.2);
}

*{box-sizing:border-box;margin:0;padding:0;}

.wrap{
  min-height:100vh;
  background:var(--bg);
  font-family:'Cormorant Garamond',serif;
}

/* HEADER */
.header{
  text-align:center;
  padding:24px 16px 10px;
}

.main-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(24px,6vw,36px);
  color:var(--gold);
  letter-spacing:.08em;
}

/* GRID */
.books{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  padding:20px;
}

@media(min-width:480px){
  .books{
    grid-template-columns:1fr 1fr;
  }
}

/* CARD */
.book-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:24px 18px;
  cursor:pointer;
  transition:transform .2s, border-color .2s;
}

.book-card:active{
  transform:scale(.97);
}

.book-title{
  font-family:'Playfair Display',serif;
  font-size:18px;
  margin-bottom:10px;
  color:var(--gold);
  line-height:1.3;
}

.book-author{
  font-size:14px;
  font-style:italic;
  letter-spacing:.08em;
  opacity:.8;
  color:var(--gold);
}

</style>
</head>

<body>

<div class="wrap">
  <div class="header">
    <div class="main-title">Insights from Books</div>
  </div>

  <div class="books" id="grid"></div>
</div>
  
<script>
const BOOKS = [
  {title:"Lateral Thinking",author:"Edward de Bono",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/39"},
  {title:"Grit",author:"Angela Duckworth",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/40"},
  {title:"Psychology of Money",author:"Morgan Housel",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/41"},
  {title:"Atomic Habits",author:"James Clear",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/42"},
  {title:"How to Win Friends & Influence People",author:"Dale Carnegie",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/43"},
  {title:"The Daily Stoic",author:"Ryan Holiday",url:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/44"},
];

const grid = document.getElementById('grid');
function openBook(url){
  window.location.href = url;
}

function render(){
  grid.innerHTML = BOOKS.map(b=>`
    <div class="book-card" onclick="openBook('${b.url}')">
      <div class="book-title">${b.title}</div>
      <div class="book-author">${b.author}</div>
    </div>
  `).join('');
}

render();
</script>

</body>
</html>

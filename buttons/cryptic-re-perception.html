<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cryptic Re-perception Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --ink:         #08090d;
  --paper:       #e8eaf2;
  --gold:        #7eb8d4;
  --gold-light:  #a8d4e8;
  --gold-dim:    rgba(126,184,212,0.35);
  --gold-ghost:  rgba(126,184,212,0.07);
  --text-dim:    rgba(232,234,242,0.82);
  --text-muted:  rgba(232,234,242,0.55);
  --text-faint:  rgba(232,234,242,0.36);
  --border:      rgba(126,184,212,0.18);
  --border-soft: rgba(126,184,212,0.11);
  --card-bg:     #0d1018;
  --sidebar-bg:  #0a0c12;
  --input-bg:    rgba(126,184,212,0.04);
  --input-bdr:   rgba(126,184,212,0.18);
  --input-foc:   rgba(126,184,212,0.36);
  --nav-bg:      rgba(8,9,13,0.97);
  --nav-bot:     rgba(8,9,13,1);
  --pat-op:      0.025;
}
html.light {
  --ink:         #f0f2f8;
  --paper:       #0d1018;
  --gold:        #2a7a9e;
  --gold-light:  #3d96ba;
  --gold-dim:    rgba(42,122,158,0.4);
  --gold-ghost:  rgba(42,122,158,0.07);
  --text-dim:    rgba(13,16,24,0.88);
  --text-muted:  rgba(13,16,24,0.56);
  --text-faint:  rgba(13,16,24,0.38);
  --border:      rgba(42,122,158,0.18);
  --border-soft: rgba(42,122,158,0.11);
  --card-bg:     #e2e6f0;
  --sidebar-bg:  #e8ecf4;
  --input-bg:    rgba(42,122,158,0.05);
  --input-bdr:   rgba(42,122,158,0.2);
  --input-foc:   rgba(42,122,158,0.38);
  --nav-bg:      rgba(240,242,248,0.97);
  --nav-bot:     rgba(240,242,248,1);
  --pat-op:      0.05;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--ink);color:var(--paper);font-family:'Courier Prime',monospace;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(126,184,212,var(--pat-op)) 1px,transparent 1px),linear-gradient(90deg,rgba(126,184,212,var(--pat-op)) 1px,transparent 1px);background-size:48px 48px;}

/* ══════════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════════ */
.sec-label{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}
.mech-block{background:var(--gold-ghost);border:1px solid var(--border);border-left:3px solid var(--lc,var(--gold));padding:11px 13px 10px;margin-bottom:11px;}
.mech-type{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.mech-type::after{content:'';flex:1;height:1px;background:var(--border);}
.mech-name{font-family:'Cormorant Garamond',serif;font-size:.94rem;font-weight:700;color:var(--paper);margin-bottom:5px;line-height:1.2;}
.mech-desc{font-size:.75rem;color:var(--text-muted);line-height:1.5;margin-bottom:8px;}
.mech-stage{font-size:.57rem;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-dim);padding-top:7px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:6px;}
.mech-stage span{font-weight:700;color:var(--gold);}
.neural-note{font-size:.6rem;color:var(--text-faint);font-style:italic;padding:5px 9px;border-left:2px solid var(--border-soft);margin-bottom:11px;line-height:1.5;}
.prompt-list{display:flex;flex-direction:column;gap:5px;}
.prompt-item{background:var(--gold-ghost);border:1px solid var(--border-soft);padding:7px 11px;font-size:.77rem;line-height:1.47;color:var(--text-muted);display:flex;gap:8px;align-items:flex-start;}
.p-arrow{color:var(--gold);flex-shrink:0;font-weight:700;font-size:.7rem;margin-top:1px;}
.prompt-entry{background:var(--card-bg);border:1px solid var(--input-bdr);border-left:3px solid var(--lc,var(--gold));padding:9px 11px;margin-bottom:7px;}
.pe-top{display:flex;gap:7px;align-items:center;margin-bottom:7px;}
.pe-num{width:19px;height:19px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:.6rem;color:var(--gold);flex-shrink:0;}
.pe-label{font-size:.55rem;letter-spacing:.13em;text-transform:uppercase;color:var(--gold-dim);flex:1;}
.q-sel{background:transparent;border:1px solid var(--input-bdr);color:var(--gold-dim);font-family:'Courier Prime',monospace;font-size:.6rem;padding:3px 5px;cursor:pointer;transition:border-color .2s;}
.q-sel:focus{outline:none;border-color:var(--gold);color:var(--gold);}
.pt-ta{width:100%;background:var(--input-bg);border:1px solid var(--input-bdr);border-bottom:none;color:var(--paper);font-family:'Courier Prime',monospace;font-size:.79rem;line-height:1.5;padding:8px 10px;resize:none;min-height:54px;transition:border-color .2s,background .2s;}
.pt-ta:focus{outline:none;border-color:var(--input-foc);background:rgba(126,184,212,.06);}
.pt-ta::placeholder{color:var(--text-faint);font-style:italic;}
.pi-ta{width:100%;background:var(--input-bg);border:1px solid var(--input-bdr);color:var(--text-muted);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.82rem;line-height:1.5;padding:7px 10px;resize:none;min-height:44px;transition:border-color .2s;}
.pi-ta:focus{outline:none;border-color:var(--input-foc);}
.pi-ta::placeholder{color:var(--text-faint);}
.an-ta{width:100%;background:var(--input-bg);border:1px solid var(--input-bdr);color:var(--paper);font-family:'Cormorant Garamond',serif;font-size:.85rem;line-height:1.65;padding:9px 11px;resize:none;transition:border-color .2s;}
.an-ta:focus{outline:none;border-color:var(--input-foc);}
.an-ta::placeholder{color:var(--text-faint);font-style:italic;}
.add-btn{width:100%;background:transparent;border:1px dashed var(--gold-dim);color:var(--gold-dim);font-family:'Courier Prime',monospace;font-size:.67rem;letter-spacing:.14em;text-transform:uppercase;padding:8px;cursor:pointer;margin-bottom:11px;transition:color .2s,border-color .2s;}
.add-btn:hover{color:var(--gold);border-color:var(--gold);}
.save-bar{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.save-btn{background:var(--gold);color:var(--ink);border:none;font-family:'Courier Prime',monospace;font-size:.67rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;padding:8px 15px;cursor:pointer;transition:opacity .2s,transform .15s;flex-shrink:0;}
.save-btn:active{opacity:.8;transform:scale(.97);}
.save-st{font-size:.59rem;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);transition:color .3s;}
.save-st.ok{color:var(--gold);}

/* ══════════════════════════════════════════
   MOBILE  (< 1024 px)
══════════════════════════════════════════ */
@media(max-width:1023px){
  .dt-shell{display:none!important;}
  .progress-bar{position:fixed;top:0;left:0;right:0;height:2px;background:var(--gold-ghost);z-index:200;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));transition:width .4s cubic-bezier(.4,0,.2,1);}
  .top-nav{position:fixed;top:0;left:0;right:0;z-index:199;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 9px;background:linear-gradient(to bottom,var(--nav-bg) 65%,transparent);transition:background .3s;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase;}
  .nav-counter{font-size:11px;color:var(--gold-dim);letter-spacing:2px;}
  .theme-btn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);font-size:13px;padding:5px 9px;cursor:pointer;transition:background .2s,transform .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
  .theme-btn:active{transform:scale(.92);background:var(--gold-dim);}
  .slides-wrap{position:fixed;inset:0;z-index:1;overflow:hidden;}
  .slides-track{display:flex;height:100%;transition:transform .45s cubic-bezier(.4,0,.2,1);will-change:transform;}
  .slide{min-width:100vw;width:100vw;height:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:62px 20px 100px;display:flex;flex-direction:column;align-items:center;}
  .slide-inner{width:100%;max-width:540px;flex:1;}
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:199;padding:10px 18px 26px;background:linear-gradient(to top,var(--nav-bot) 65%,transparent);display:flex;align-items:center;justify-content:space-between;gap:10px;transition:background .3s;}
  .dot-row{display:flex;gap:5px;align-items:center;flex:1;justify-content:center;overflow:hidden;flex-wrap:wrap;}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--gold-dim);flex-shrink:0;transition:all .3s;cursor:pointer;}
  .dot.active{background:var(--gold);transform:scale(1.55);}
  .dot.nearby{background:rgba(126,184,212,.42);}
  html.light .dot.nearby{background:rgba(42,122,158,.42);}
  .dot.hw{box-shadow:0 0 0 2px var(--gold-dim);}
  .nav-btn{width:44px;height:44px;flex-shrink:0;border:2px solid var(--gold-dim);background:transparent;color:var(--gold);font-size:19px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;font-family:sans-serif;}
  .nav-btn:active{background:var(--gold-ghost);border-color:var(--gold);}
  .nav-btn:disabled{opacity:.2;pointer-events:none;}
  .nav-btn.primary{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .swipe-hint{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:3px;color:var(--gold-dim);pointer-events:none;z-index:198;white-space:nowrap;animation:hintFade 3.5s ease-out 1.8s forwards;opacity:0;}

  /* mobile hero */
  .hero{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:68vh;}
  .eyebrow{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold-dim);margin-bottom:14px;}
  .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.1rem,9vw,3.4rem);font-weight:700;line-height:1.04;background:linear-gradient(135deg,var(--gold),var(--gold-light),#4a9ab8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:13px;}
  .hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.88rem,3.5vw,1.02rem);color:var(--text-muted);line-height:1.7;margin-bottom:20px;max-width:360px;}
  .m-block{width:100%;max-width:340px;background:var(--gold-ghost);border:1px solid var(--border);border-top:3px solid var(--gold);padding:13px 15px 12px;text-align:left;margin-bottom:16px;}
  .m-block-title{font-size:.57rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .m-block-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .m-loop-s{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;font-size:.75rem;color:var(--text-dim);line-height:1.4;}
  .m-snum{width:18px;height:18px;border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--gold);flex-shrink:0;margin-top:1px;}
  .m-slabel{color:var(--gold);font-size:.64rem;letter-spacing:.08em;}
  .m-rule{display:flex;gap:9px;align-items:flex-start;margin-bottom:7px;font-size:.75rem;color:var(--text-dim);line-height:1.4;}
  .m-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:4px;}
  .m-chip{padding:4px 10px;border:1px solid var(--gold-dim);color:var(--gold-dim);font-size:8px;letter-spacing:2px;text-transform:uppercase;}
  .m-essay-inp{width:100%;background:var(--input-bg);border:1px solid var(--input-bdr);border-top:none;color:var(--paper);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1rem;padding:9px 13px;outline:none;transition:border-color .2s;}
  .m-essay-inp:focus{border-color:var(--input-foc);}
  .m-essay-inp::placeholder{color:var(--text-faint);}

  /* mobile lens */
  .m-dim-tag{font-size:.51rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-faint);margin-bottom:10px;}
  .m-lens-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,7vw,2.1rem);font-weight:700;line-height:1.05;margin-bottom:3px;}
  .m-lens-tag{font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;margin-bottom:13px;}

  /* mobile finale */
  .finale{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;min-height:66vh;}
  .fin-icon{font-size:2.5rem;margin-bottom:13px;display:block;opacity:.7;}
  .fin-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.5rem,7vw,2.3rem);font-weight:700;background:linear-gradient(135deg,var(--gold),var(--gold-light));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;}
  .fin-sub{font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.7;max-width:300px;}
  .fin-loop{width:100%;max-width:320px;background:var(--gold-ghost);border:1px solid var(--border);border-top:3px solid var(--gold);padding:13px 15px 12px;margin-bottom:16px;text-align:left;}
  .fin-steps{display:flex;flex-direction:column;}
  .fin-step{display:flex;align-items:stretch;gap:10px;}
  .fin-line{display:flex;flex-direction:column;align-items:center;flex-shrink:0;}
  .fin-dot{width:18px;height:18px;border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:.55rem;color:var(--gold);}
  .fin-conn{width:1px;background:var(--border);flex:1;min-height:8px;margin:2px 0;}
  .fin-step:last-child .fin-conn{display:none;}
  .fin-text{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--text-dim);line-height:1.3;padding:2px 0 9px;}
  .fin-heur{margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);font-size:.57rem;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-dim);text-align:center;}
  .fin-heur b{color:var(--gold);}
  .fin-btn{display:inline-flex;align-items:center;gap:8px;background:var(--gold);color:var(--ink);font-family:'Courier Prime',monospace;font-size:.67rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;padding:10px 20px;margin-bottom:8px;border:none;cursor:pointer;transition:opacity .2s;}
  .fin-btn:hover{opacity:.85;}
  .fin-restart{background:none;border:1px solid var(--gold-dim);color:var(--gold-dim);font-size:10px;font-family:'Courier Prime',monospace;letter-spacing:2px;padding:8px 18px;cursor:pointer;transition:color .2s,border-color .2s;}
  .fin-restart:hover{color:var(--gold);border-color:var(--gold);}
}

/* ══════════════════════════════════════════
   DESKTOP  (≥ 1024 px)
══════════════════════════════════════════ */
@media(min-width:1024px){
  html,body{touch-action:auto;}
  .slides-wrap,.bottom-nav,.swipe-hint,.progress-bar,.top-nav{display:none!important;}

  /* shell grid: sidebar | content | work */
  .dt-shell{
    position:fixed;inset:0;z-index:1;
    display:grid;
    grid-template-columns:205px 1fr 1fr;
    grid-template-rows:46px 1fr;
    grid-template-areas:"tb tb tb" "sb ct wk";
  }

  /* top bar */
  .dt-tb{grid-area:tb;display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:var(--sidebar-bg);border-bottom:1px solid var(--border);z-index:10;}
  .dt-logo{font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:4px;text-transform:uppercase;}
  .dt-tb-mid{display:flex;align-items:center;gap:14px;}
  .dt-essay-inp{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--paper);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.9rem;padding:3px 7px;width:260px;outline:none;transition:border-color .2s;}
  .dt-essay-inp:focus{border-color:var(--gold);}
  .dt-essay-inp::placeholder{color:var(--text-faint);}
  .dt-ctr{font-size:10px;color:var(--gold-dim);letter-spacing:2px;white-space:nowrap;}
  .dt-tb-right{display:flex;align-items:center;gap:9px;}
  .dt-exp-btn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold-dim);font-family:'Courier Prime',monospace;font-size:.59rem;letter-spacing:.13em;text-transform:uppercase;padding:5px 11px;cursor:pointer;transition:color .2s,border-color .2s;}
  .dt-exp-btn:hover{color:var(--gold);border-color:var(--gold);}
  .dt-th-btn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);font-size:13px;padding:4px 9px;cursor:pointer;transition:background .2s;user-select:none;}
  .dt-th-btn:hover{background:var(--gold-ghost);}

  /* sidebar */
  .dt-sb{grid-area:sb;background:var(--sidebar-bg);border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;padding:12px 0 20px;display:flex;flex-direction:column;}
  .dt-sb::-webkit-scrollbar{width:3px;}
  .dt-sb::-webkit-scrollbar-thumb{background:var(--gold-dim);}
  .dt-sp{display:flex;align-items:center;gap:9px;padding:8px 13px;cursor:pointer;border-left:3px solid transparent;transition:background .15s,border-color .15s;font-size:.61rem;letter-spacing:.11em;text-transform:uppercase;color:var(--text-faint);}
  .dt-sp:hover{background:var(--gold-ghost);color:var(--text-muted);}
  .dt-sp.on{border-left-color:var(--gold);color:var(--gold);background:var(--gold-ghost);}
  .dt-sp-ic{font-size:.9rem;opacity:.6;}
  .dt-dg{margin-bottom:2px;}
  .dt-dl{font-size:.49rem;letter-spacing:.24em;text-transform:uppercase;color:var(--text-faint);padding:9px 13px 3px;display:flex;align-items:center;gap:6px;}
  .dt-dl::after{content:'';flex:1;height:1px;background:var(--border-soft);}
  .dt-ni{display:flex;align-items:center;gap:8px;padding:6px 13px 6px 16px;cursor:pointer;border-left:3px solid transparent;transition:background .15s,border-color .15s;}
  .dt-ni:hover{background:var(--gold-ghost);}
  .dt-ni.on{background:var(--gold-ghost);}
  .dt-nd{width:7px;height:7px;border-radius:50%;background:var(--gold-dim);flex-shrink:0;transition:background .2s,transform .2s;}
  .dt-ni.on .dt-nd{transform:scale(1.4);}
  .dt-ni.hw .dt-nd{box-shadow:0 0 0 2px var(--gold-dim);}
  .dt-nn{font-size:.67rem;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);flex:1;transition:color .15s;}
  .dt-ni.on .dt-nn{color:var(--paper);font-weight:700;}
  .dt-nt{font-size:.51rem;color:var(--text-faint);white-space:nowrap;letter-spacing:.05em;}

  /* content panel */
  .dt-ct{grid-area:ct;overflow-y:auto;overflow-x:hidden;padding:20px 22px 22px;border-right:1px solid var(--border);}
  .dt-ct::-webkit-scrollbar{width:3px;}
  .dt-ct::-webkit-scrollbar-thumb{background:var(--gold-dim);}

  /* work panel */
  .dt-wk{grid-area:wk;overflow-y:auto;overflow-x:hidden;padding:20px 20px 22px;}
  .dt-wk::-webkit-scrollbar{width:3px;}
  .dt-wk::-webkit-scrollbar-thumb{background:var(--gold-dim);}

  /* panel fade transition */
  .dt-ct,.dt-wk{transition:opacity .2s ease;}
  .dt-ct.fd,.dt-wk.fd{opacity:0;}

  /* desktop hero */
  .dt-hero-ttl{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,2.8vw,2.5rem);font-weight:700;line-height:1.05;background:linear-gradient(135deg,var(--gold),var(--gold-light),#4a9ab8);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:9px;}
  .dt-hero-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.93rem;color:var(--text-muted);line-height:1.7;margin-bottom:18px;max-width:390px;}
  .dt-lb{background:var(--gold-ghost);border:1px solid var(--border);border-top:3px solid var(--gold);padding:13px 15px 12px;margin-bottom:14px;}
  .dt-lbt{font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:11px;display:flex;align-items:center;gap:7px;}
  .dt-lbt::after{content:'';flex:1;height:1px;background:var(--border);}

<script>
/* ══════════════════════════════════
   LENS DATA
══════════════════════════════════ */
var L=[
  {n:'WHO',tg:'People & Stakeholders',dim:'Interrogative',c:'#5b9ec9',
   m:{ct:'Charade / Reversal',mn:'Reverse the Perspective',md:'A charade clue assembles meaning from parts in sequence; a reversal clue requires reading elements backwards. Applying this to stakeholders means asking whose perspective has been ignored — then reversing it to the foreground.',st:'Stage 2 — Inhibition: Representational Release',nr:'Left posterior temporal cortex (Rodd et al., 2012): suppression of dominant viewpoint to access alternative stakeholder frames.'},
   ps:['Who benefits most from this idea, and who is most harmed?','Whose voice is absent from this framing?','Who would be the strongest critic — and might they be right?','If the people most affected were the ones solving this, what would change?','Who are the unexpected stakeholders nobody has named yet?','Reverse roles: who becomes the problem-setter, who becomes the solver?']},
  {n:'WHAT',tg:'Definitions & Assumptions',dim:'Interrogative',c:'#a87c2e',
   m:{ct:'Double Definition',mn:'Semantic Multiplicity',md:'A double-definition clue offers two entirely valid meanings of the same word. Applied to assumptions, this asks: what else could this term coherently mean? Many reasoning failures arise because a single definition is locked in while others remain invisible.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Right anterior temporal lobe (Jung-Beeman et al., 2004): integration of distant semantic associations; access to weakly activated nodes.'},
   ps:['What are we assuming is true that might not be?','What would change if we defined this problem differently?','What is not being said in this conversation?','What is the opposite of this idea — and is there value in it?','What would this look like if the most important constraint were removed?','What would a 10-year-old say the problem actually is?']},
  {n:'WHEN',tg:'Timing & Sequence',dim:'Interrogative',c:'#7a5ea8',
   m:{ct:'Charade',mn:'Sequential Re-encoding',md:'A charade clue encodes meaning through ordered assembly of components. Timing analysis applies the same logic: the sequence in which conditions are met determines whether an intervention works. Re-encoding the timeline can reveal that the problem is a sequencing error, not a content error.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Attentional redistribution across the problem sequence (Öllinger et al., 2013): changing where attention lands in time restructures what counts as the critical element.'},
   ps:['When is the best moment to introduce this idea?','When would this be a terrible idea — what conditions cause failure?','When has something similar succeeded or failed in the past?','What needs to happen first before this can work?','When do people care most about this problem?','What would need to change about timing to change the outcome?']},
  {n:'WHERE',tg:'Context & Environment',dim:'Interrogative',c:'#3d8a6e',
   m:{ct:'Hidden Word / Acrostic',mn:'Boundary Relaxation',md:'A hidden-word clue conceals the answer inside a larger string — the solver must relax boundaries of attention to see what was always there. Applying this to context means asking what is hidden within the familiar environment that has not been perceived because boundaries were drawn too tightly.',st:'Stage 2 — Inhibition: Representational Release',nr:'Left inferior frontal gyrus (Thompson-Schill et al., 1997): chunk decomposition — relaxing perceptual boundaries to see embedded structure.'},
   ps:['Where does this idea work best — and where does it fail?','Where else could this same solution apply in a completely different field?','Where in the world is this already being done differently?','Where do the exceptions happen, and what do they reveal?','Where would you need to be standing to see this problem differently?','Where is the environment making this harder than it needs to be?']},
  {n:'WHY',tg:'Purpose & Root Cause',dim:'Interrogative',c:'#a85858',
   m:{ct:'Double Definition',mn:'Causal Re-encoding',md:'A double definition exposes that the same surface admits two structural meanings. Applied to causation, the stated "why" may be a surface reading concealing a deeper causal structure. Re-encoding the causal chain by asking "why" repeatedly is structurally identical to peeling back interpretive layers in a cryptic clue.',st:'Stage 1→2: Predictive Fixation to Representational Release',nr:'Default mode network (Raichle et al., 2001): dominant causal narrative is the high-probability inference. Inhibition via LIFG is required to access alternative causal chains.'},
   ps:['Why does this problem exist in the first place?','Why has it not been solved — what forces keep it in place?','Why does anyone care? What deeper need is driving the surface complaint?','Why might the obvious solution make things worse?','Ask "why" five times in succession. What do you find at the bottom?','Why would a rational actor choose NOT to adopt this idea?']},
  {n:'HOW',tg:'Methods & Mechanisms',dim:'Interrogative',c:'#5a7aa8',
   m:{ct:'Anagram',mn:'Re-encoding of Elements',md:'An anagram uses the same letters rearranged to produce a different word. Applied to method, the question is: what alternative configuration of the same components produces a better outcome? The elements are not wrong — their arrangement is. This is RCT re-encoding in its purest form.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Attentional redistribution (Öllinger et al., 2013): same elements, different attentional weighting, different configuration, different result.'},
   ps:['How else could you achieve the same goal with completely different means?','How would you do this with half the budget? With ten times the budget?','How would a different industry solve this exact problem?','How could you make this idea deliberately worse — then reverse-engineer from that?','How would you explain this method to someone from 200 years ago?','How do you know the method is working — what is the measurable signal?']},
  {n:'PAST',tg:'History & Precedent',dim:'Temporal',c:'#6b5a3e',
   m:{ct:'Hidden Word / Acrostic',mn:'Embedded Pattern Recognition',md:'A hidden-word clue requires the solver to find an answer concealed within prior material — already there, awaiting notice. Examining the past applies the same operation: solutions and failures are embedded in historical precedent but are invisible when the solver is fixated on the present framing.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Semantic memory retrieval via distributed cortical networks; pattern-matching activates existing associative structures (Kenett et al., 2014).'},
   ps:['When was something similar tried before — and what happened?','What solution was abandoned in the past that might deserve a second look?','What did people do before this problem existed — what can we learn?','What historical parallel is being ignored right now?','What assumption from the past is still running the present unexamined?','If this is a new problem, what specifically changed to make it new?']},
  {n:'PRESENT',tg:'Current Reality',dim:'Temporal',c:'#4a7a5a',
   m:{ct:'Double Definition',mn:'Static Evaluation',md:'A double-definition clue has two simultaneous valid readings of the same surface. Evaluating the present requires holding two readings simultaneously: what the data says, and what we are inferring beyond the data. Conflating these is a predictive fixation error.',st:'Stage 1 — Predictive Fixation (diagnostic awareness)',nr:'Predictive processing (Friston, 2010; Bar, 2007): current perception is a high-probability inference, not a direct readout.'},
   ps:['What is actually happening right now — not what we hope or fear?','What data exists, and what are we inferring beyond the data?','What is everyone in the room avoiding saying out loud?','What is hiding in plain sight that nobody has named?','What small signal is being missed because everyone is focused on the obvious one?','What would a neutral outsider see that insiders cannot?']},
  {n:'FUTURE',tg:'Scenarios & Consequences',dim:'Temporal',c:'#3a5a8a',
   m:{ct:'Charade',mn:'Forward Calculation',md:'A charade clue requires the solver to assemble a sequence of components and trace the result forward. Scenario planning is structurally identical: assembling known elements in sequence and projecting the consequence. Re-encoding the sequence changes the projected outcome.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Executive control networks (Shenhav et al., 2013); DMN-executive coupling (Beaty et al., 2015) supports generative projection.'},
   ps:['What does the world look like in 10 years if this idea succeeds?','What does the world look like in 10 years if nothing changes?','What trend will make this idea more valuable in the future?','What trend will make this idea irrelevant?','What second-order consequence will nobody predict?','If this becomes mainstream, what problems does it create next?']},
  {n:'SIMILAR',tg:'Analogical Mapping',dim:'Relational',c:'#5a8a72',
   m:{ct:'Homophone',mn:'Representational Modality Shift',md:'A homophone clue signals that the answer sounds like something else — structurally equivalent in sound but different in meaning. Analogical thinking applies the same operation across domains: a different field with the same relational structure provides a fresh representational lens (Gentner, 1983).',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'Left posterior temporal cortex (Rodd et al., 2012): cross-domain structural mapping. Right ATL (Jung-Beeman et al., 2004): integration of distant associations.'},
   ps:['What other situation, field, or domain has the same relational structure?','What existing solution from a different context could map directly onto this?','What does this remind you of — and what can that analogy teach you?','If you had to explain this problem using only a metaphor, what would it be?','What discipline has solved the structural equivalent of this problem?','What connection between this and something unrelated might be productive?']},
  {n:'OPPOSITE',tg:'Constraint Destabilisation',dim:'Relational',c:'#7a4a8a',
   m:{ct:'Reversal',mn:'Directional Inversion',md:'A reversal clue requires the solver to read an element backwards to find the encoded answer. Applying inversion to any proposition exposes implicit assumptions embedded in its directionality: what would it mean if the goal and the obstacle swapped places? If cause and effect were reversed?',st:'Stage 2 — Inhibition: Representational Release',nr:'LIFG inhibitory control (Aron et al., 2014): suppression of the dominant directional assumption enables access to its inverse.'},
   ps:['What if you tried to make this problem deliberately worse — what does that reveal?','What would happen if you did the exact opposite of the obvious thing?','What if the flaw is actually the feature?','Reverse the roles: who becomes who?','What if the goal and the method swapped places?','What if less of the "solution" is actually better?']},
  {n:'POSITIVE',tg:'Value & Opportunity',dim:'Evaluative',c:'#3a7a3a',
   m:{ct:'Anagram',mn:'Reconfiguration for Gain',md:'An anagram re-arranges existing material to reveal value that was already present but inaccessible. The positive evaluative lens applies the same operation: what value is latent in the current configuration that a different arrangement would surface? This is deliberate expansive re-encoding.',st:'Stage 3 — Structured Expansion: Generative Engine',nr:'DMN (Beaty et al., 2016): associative recombination generates novel positive readings. Executive network validates plausibility.'},
   ps:['What is the best-case scenario if this idea works?','What unexpected benefit might emerge that has not yet been anticipated?','Who gains the most — and could that gain be larger than currently assumed?','What becomes possible if this idea succeeds?','What is genuinely novel or exciting about this approach?','What existing strength could this idea amplify?']},
  {n:'NEGATIVE',tg:'Risk & Constraint',dim:'Evaluative',c:'#8a3a3a',
   m:{ct:'Hidden Word',mn:'Concealed Threat Detection',md:'A hidden-word clue trains the solver to look for danger concealed within an apparently innocuous surface. The negative evaluative lens applies this vigilance to risk: what threat is embedded in the current framing that is not visible because the surface reading is reassuring?',st:'Stage 1 — Predictive Fixation (blunder prevention)',nr:'Fronto-basal ganglia circuits (Aron et al., 2014): suppression of habitual optimism; LIFG inhibitory control applied to premature convergence on a positive evaluation.'},
   ps:['What is most likely to go wrong — and how badly could it go?','Who is hurt by this that has not been considered?','What hidden cost will only reveal itself later?','What assumption, if wrong, makes the whole idea collapse?','What would a hostile journalist write about this plan?','What does this idea make harder that is currently easy?']},
  {n:'BEST POSSIBLE OUTCOME',tg:'Constrained Convergence',dim:'Outcome',c:'#c9a84c',
   m:{ct:'All five mechanisms — verification check',mn:'Dual Verification',md:'In cryptic solving, a correct solution must independently satisfy both the definition component and the wordplay component. The framework proposes an analogous dual-verification principle: a selected representation must be both internally coherent (does it hang together?) and externally actionable (does it generate useful moves?). This is Stage 4 of the re-perception loop.',st:'Stage 4 — Selection: Constrained Convergence',nr:'Anterior cingulate cortex (Shenhav et al., 2013): expected value computation; DMN-executive coupling (Beaty et al., 2015) supports evaluation of imaginative outputs against real-world constraints.'},
   ps:['If everything worked as intended, what exactly does success look like?','What would feel like a solved problem, even if it isn\'t technically fixed?','What invisible variable — psychological, social, perceptual — is doing most of the real work?','What change in meaning or framing could substitute for a change in substance?','Which representation generated across all lenses is most coherent AND most actionable?','What single thing must be true for the best outcome to be reachable?']}
];
var TOTAL=L.length+2;

/* ══════════════════════════════════
   STORAGE
══════════════════════════════════ */
function sf(n){return n.replace(/\s+/g,'-');}
function sk(s,f,i){return'crp-'+s+'-'+f+(i!=null?'-'+i:'');}
function lg(k){return localStorage.getItem(k)||'';}
function ls(k,v){localStorage.setItem(k,v);}
function hw(n){var s=sf(n);return!!(lg(sk(s,'prompt',0))||lg(sk(s,'analysis')));}

/* ══════════════════════════════════
   THEME
══════════════════════════════════ */
function applyTheme(t){
  document.documentElement.classList.toggle('light',t==='light');
  var ic=t!=='light'?'☀':'☾';
  ['mTheme','dtTheme'].forEach(function(id){var el=document.getElementById(id);if(el)el.textContent=ic;});
}
function tog(){var nx=document.documentElement.classList.contains('light')?'dark':'light';ls('crp-theme',nx);applyTheme(nx);}
document.getElementById('mTheme').addEventListener('click',tog);
document.getElementById('dtTheme').addEventListener('click',tog);
applyTheme(lg('crp-theme')||'dark');

/* ══════════════════════════════════
   ESSAY TITLE SYNC
══════════════════════════════════ */
(function(){
  var v=localStorage.getItem('crp-essay-title')||'';
  var m=document.getElementById('mEssay'),d=document.getElementById('dtTitle');
  function sync(val){ls('crp-essay-title',val);if(m)m.value=val;if(d)d.value=val;}
  if(m&&v)m.value=v; if(d&&v)d.value=v;
  if(m)m.addEventListener('input',function(){sync(this.value);});
  if(d)d.addEventListener('input',function(){sync(this.value);});
})();

/* ══════════════════════════════════
   ENTRY HELPERS (shared)
══════════════════════════════════ */
var EC={};L.forEach(function(l){EC[l.n]=0;});
function entryCount(n){var s=sf(n),i=0;while(localStorage.getItem(sk(s,'prompt',i))!==null)i++;return Math.max(i,1);}

function mkEntry(n,color,idx){
  var s=sf(n);
  var d=document.createElement('div');
  d.className='prompt-entry'; d.style.setProperty('--lc',color); d.setAttribute('data-idx',idx);
  d.innerHTML='<div class="pe-top"><div class="pe-num">'+(idx+1)+'</div><div class="pe-label">Prompt to ChatGPT</div>'+
    '<select class="q-sel" data-lens="'+s+'" data-field="quality" data-idx="'+idx+'">'+
    '<option value="">Rate</option><option value="strong">★★★ Strong</option><option value="good">★★ Good</option><option value="weak">★ Weak</option></select></div>'+
    '<textarea class="pt-ta" rows="3" data-lens="'+s+'" data-field="prompt" data-idx="'+idx+'" placeholder="Paste or type the exact prompt you sent to ChatGPT…"></textarea>'+
    '<textarea class="pi-ta" rows="2" data-lens="'+s+'" data-field="intent" data-idx="'+idx+'" placeholder="Your intent: what representational shift were you trying to trigger?"></textarea>';
  var pv=lg(sk(s,'prompt',idx)),iv=lg(sk(s,'intent',idx)),qv=lg(sk(s,'quality',idx));
  if(pv)d.querySelector('[data-field="prompt"]').value=pv;
  if(iv)d.querySelector('[data-field="intent"]').value=iv;
  if(qv)d.querySelector('[data-field="quality"]').value=qv;
  return d;
}
function wireEntry(el,n,cb){el.querySelectorAll('textarea,select').forEach(function(i){i.addEventListener('input',function(){if(cb)cb(n);});i.addEventListener('change',function(){if(cb)cb(n);});});}
function fillEntries(ctr,n,c,cb){var cnt=entryCount(n);EC[n]=cnt;for(var i=0;i<cnt;i++){var e=mkEntry(n,c,i);wireEntry(e,n,cb);ctr.appendChild(e);}}
function addEntry(ctr,n,c,cb){var idx=EC[n]||0;EC[n]=idx+1;var e=mkEntry(n,c,idx);wireEntry(e,n,cb);ctr.appendChild(e);setTimeout(function(){e.querySelector('textarea').focus();},50);}
function saveData(n,ctr,aTa){
  var s=sf(n);
  if(ctr)ctr.querySelectorAll('.prompt-entry').forEach(function(e){var i=e.getAttribute('data-idx');var p=e.querySelector('[data-field="prompt"]'),iv=e.querySelector('[data-field="intent"]'),q=e.querySelector('[data-field="quality"]');if(p)ls(sk(s,'prompt',i),p.value);if(iv)ls(sk(s,'intent',i),iv.value);if(q)ls(sk(s,'quality',i),q.value);});
  if(aTa)ls(sk(s,'analysis'),aTa.value);
}

══════════════════════════════════ */
var track=document.getElementById('track');
function mSlide(html){var s=document.createElement('div');s.className='slide';s.innerHTML='<div class="slide-inner">'+html+'</div>';track.appendChild(s);}

}

/* Slide 0: hero */
mSlide('<div class="hero">'+
  '<div class="eyebrow">Prompt Engineering Assignment</div>'+
  '<h1 class="hero-title">Cryptic<br>Re-perception<br><em style="-webkit-text-fill-color:var(--gold);color:var(--gold)">Assignment</em></h1>'+

  '<div class="m-block" style="margin-bottom:14px"><div class="m-block-title">✎ &nbsp;Your Essay Title</div>'+
  '<input id="mEssay" class="m-essay-inp" type="text" placeholder="Enter the title of your essay…"/></div>'+
  '<div class="m-block"><div class="m-block-title">◈ &nbsp;The Re-perception Loop</div>'+
  '<div class="m-loop-s"><div class="m-snum">1</div><div><span class="m-slabel">Predictive Fixation</span> — your initial dominant interpretation</div></div>'+
  '<div class="m-loop-s"><div class="m-snum">2</div><div><span class="m-slabel">Representational Release</span> — deliberately inhibit that reading</div></div>'+
  '<div class="m-loop-s"><div class="m-snum">3</div><div><span class="m-slabel">Structured Expansion</span> — use the grid lens to generate alternatives</div></div>'+
  '<div class="m-loop-s"><div class="m-snum">4</div><div><span class="m-slabel">Constrained Convergence</span> — select the most coherent and actionable representation</div></div>'+
  '</div>'+
  '<div class="m-block"><div class="m-block-title">↳ &nbsp;How to complete this</div>'+
  '<div class="m-rule"><div class="m-snum">1</div><div>For each lens, read the cryptic mechanism and its neural grounding</div></div>'+

    '.ab{padding:12px 15px;background:#f0f4f8;border-top:1px solid #dde4ec;}.al{font-size:.56rem;letter-spacing:.17em;text-transform:uppercase;color:#5a8aaa;margin-bottom:6px;}.ab p{font-family:"Cormorant Garamond",serif;font-size:.98rem;line-height:1.75;color:#2a3a4a;}'+
    '.empty{padding:11px 15px;font-style:italic;color:#8a9ab0;font-size:.83rem;}'+
    '@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}section{page-break-inside:avoid;}@page{margin:13mm 11mm;}}'+
    '</style></head><body>'+
    '<div class="cover"><div class="cover-ic">◈</div><div class="cover-ttl">Cryptic Re-perception<br>Assignment</div>'+
    (et?'<div class="cover-es">'+esc(et)+'</div>':'')+
    '<p class="cover-sub">Expansion Grid — prompts and analysis across all dimensions</p>'+
    '<div class="cover-meta">Generated '+date+'</div>'+
    '<div class="cover-stat">'+tp+' prompts &nbsp;·&nbsp; '+rows.filter(function(r){return r.entries.length>0;}).length+' lenses completed</div></div>'+
    '<div class="pb">'+secs+'</div></body></html>';
}
function generatePDF(){var h=buildHTML(collectRows());var w=window.open('','_blank');w.document.write(h);w.document.close();w.addEventListener('load',function(){setTimeout(function(){w.print();},400);});}
function downloadHTML(){var h=buildHTML(collectRows());var b=new Blob([h],{type:'text/html;charset=utf-8'});var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download='crp-assignment-'+new Date().toISOString().slice(0,10)+'.html';document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(u);},2000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
</script>

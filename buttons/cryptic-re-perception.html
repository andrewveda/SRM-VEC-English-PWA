<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cryptic Re-perception Assignment</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --ink:         #08090d;
  --paper:       #e8eaf2;
  --gold:        #7eb8d4;
  --gold-light:  #a8d4e8;
  --gold-dim:    rgba(126,184,212,0.38);
  --gold-ghost:  rgba(126,184,212,0.07);
  --text-dim:    rgba(232,234,242,0.82);
  --text-muted:  rgba(232,234,242,0.55);
  --text-faint:  rgba(232,234,242,0.38);
  --border:      rgba(126,184,212,0.22);
  --border-soft: rgba(126,184,212,0.13);
  --nav-bg:      rgba(8,9,13,0.97);
  --nav-bottom:  rgba(8,9,13,1);
  --card-bg:     #0d1018;
  --input-bg:    rgba(126,184,212,0.04);
  --input-border:rgba(126,184,212,0.2);
  --input-focus: rgba(126,184,212,0.38);
  --pattern-op:  0.028;
}
html.light {
  --ink:         #f0f2f8;
  --paper:       #0d1018;
  --gold:        #2a7a9e;
  --gold-light:  #3d96ba;
  --gold-dim:    rgba(42,122,158,0.42);
  --gold-ghost:  rgba(42,122,158,0.07);
  --text-dim:    rgba(13,16,24,0.88);
  --text-muted:  rgba(13,16,24,0.58);
  --text-faint:  rgba(13,16,24,0.40);
  --border:      rgba(42,122,158,0.22);
  --border-soft: rgba(42,122,158,0.13);
  --nav-bg:      rgba(240,242,248,0.97);
  --nav-bottom:  rgba(240,242,248,1);
  --card-bg:     #e2e6f0;
  --input-bg:    rgba(42,122,158,0.05);
  --input-border:rgba(42,122,158,0.22);
  --input-focus: rgba(42,122,158,0.4);
  --pattern-op:  0.05;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--ink);
  color: var(--paper);
  font-family: 'Courier Prime', monospace;
  -webkit-font-smoothing: antialiased;
  touch-action: none;
  transition: background 0.3s, color 0.3s;
}

/* Subtle noise-grid background */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(126,184,212,var(--pattern-op)) 1px, transparent 1px),
    linear-gradient(90deg, rgba(126,184,212,var(--pattern-op)) 1px, transparent 1px);
  background-size: 48px 48px;
}

.progress-bar {
  position: fixed; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gold-ghost); z-index: 100;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
}

.top-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 99;
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 10px;
  background: linear-gradient(to bottom, var(--nav-bg) 65%, transparent);
  transition: background 0.3s;
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 700;
  color: var(--gold); letter-spacing: 4px; text-transform: uppercase;
}
.nav-counter { font-size: 11px; color: var(--gold-dim); letter-spacing: 2px; }
.theme-btn {
  background: transparent; border: 1px solid var(--gold-dim);
  color: var(--gold); font-size: 14px; padding: 5px 10px; cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.theme-btn:active { transform: scale(0.92); background: var(--gold-dim); }

.slides-wrap { position: fixed; inset: 0; z-index: 1; overflow: hidden; }
.slides-track {
  display: flex; height: 100%;
  transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
  will-change: transform;
}

.slide {
  min-width: 100vw; width: 100vw; height: 100%;
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding: 68px 22px 110px;
  display: flex; flex-direction: column; align-items: center;
}
.slide-inner { width: 100%; max-width: 560px; flex: 1; }

.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  padding: 12px 20px 28px;
  background: linear-gradient(to top, var(--nav-bottom) 65%, transparent);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  transition: background 0.3s;
}
.dot-row { display: flex; gap: 5px; align-items: center; flex: 1; justify-content: center; overflow: hidden; flex-wrap: wrap; }
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold-dim); flex-shrink: 0;
  transition: all 0.3s; cursor: pointer;
}
.dot.active { background: var(--gold); transform: scale(1.55); }
.dot.nearby { background: rgba(126,184,212,0.42); }
html.light .dot.nearby { background: rgba(42,122,158,0.42); }
.dot.has-work { box-shadow: 0 0 0 2px var(--gold-dim); }

.nav-btn {
  width: 46px; height: 46px; flex-shrink: 0;
  border: 2px solid var(--gold-dim); background: transparent;
  color: var(--gold); font-size: 20px; cursor: pointer;
  transition: all 0.2s; display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; font-family: sans-serif;
}
.nav-btn:active { background: var(--gold-ghost); border-color: var(--gold); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }
.nav-btn.primary { background: var(--gold); color: var(--ink); border-color: var(--gold); }
.nav-btn.primary:active { opacity: 0.85; }

.swipe-hint {
  position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
  font-size: 9px; letter-spacing: 3px; color: var(--gold-dim);
  pointer-events: none; z-index: 98; white-space: nowrap;
  animation: hintFade 3.5s ease-out 1.8s forwards; opacity: 0;
}
@keyframes hintFade {
  0%   { opacity:0; transform:translateX(-50%) translateY(5px); }
  20%  { opacity:1; transform:translateX(-50%) translateY(0); }
  80%  { opacity:1; }
  100% { opacity:0; }
}

/* ── HERO ── */
.hero {
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center; min-height: 70vh;
}
.eyebrow {
  font-size: 9px; letter-spacing: 5px; text-transform: uppercase;
  color: var(--gold-dim); margin-bottom: 18px;
}
.hero-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.2rem, 9vw, 3.6rem);
  font-weight: 700; line-height: 1.04; letter-spacing: -0.01em;
  background: linear-gradient(135deg, var(--gold), var(--gold-light), #4a9ab8);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}
.hero-sub {
  font-family: 'Cormorant Garamond', serif; font-style: italic;
  font-size: clamp(0.9rem, 3.5vw, 1.05rem);
  color: var(--text-muted); line-height: 1.7; margin-bottom: 24px;
  max-width: 380px;
}

/* Loop stages block */
.loop-block {
  width: 100%; max-width: 340px;
  background: var(--gold-ghost);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  padding: 16px 18px 14px;
  text-align: left; margin-bottom: 20px;
}
.loop-block-title {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 14px;
  display: flex; align-items: center; gap: 7px;
}
.loop-block-title::after { content:''; flex:1; height:1px; background:var(--border); }
.loop-stage {
  display: flex; gap: 10px; align-items: flex-start;
  margin-bottom: 9px; font-size: 0.78rem; color: var(--text-dim); line-height: 1.4;
}
.stage-num {
  width: 20px; height: 20px; border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.58rem; color: var(--gold); flex-shrink: 0; margin-top: 1px;
}
.stage-label { color: var(--gold); font-size: 0.68rem; letter-spacing: 0.08em; }
.hero-rules {
  width: 100%; max-width: 340px;
  background: var(--gold-ghost);
  border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  padding: 16px 18px 14px;
  text-align: left; margin-bottom: 20px;
}
.hero-rules-title {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
  display: flex; align-items: center; gap: 7px;
}
.hero-rules-title::after { content:''; flex:1; height:1px; background:var(--border); }
.hero-rule-item {
  display: flex; gap: 10px; align-items: flex-start;
  margin-bottom: 8px; font-size: 0.78rem; color: var(--text-dim); line-height: 1.4;
}
.rule-num {
  width: 18px; height: 18px; border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--gold); flex-shrink: 0; margin-top: 1px;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-bottom: 4px; }
.chip {
  padding: 4px 10px; border: 1px solid var(--gold-dim); color: var(--gold-dim);
  font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
}

/* ── LENS SLIDE ── */
.lens-slide-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 6px;
}
.lens-dimension-tag {
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 14px; padding-left: 2px;
}
.lens-name-big {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 7vw, 2.4rem); font-weight: 700; line-height: 1.05;
}
.lens-tagline-big {
  font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 5px;
}

/* Cryptic mechanism block — replaces chess principle */
.mechanism-block {
  background: var(--gold-ghost);
  border: 1px solid var(--border);
  border-left: 3px solid var(--gold);
  padding: 14px 16px 13px;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.mech-label {
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px;
  display: flex; align-items: center; gap: 7px;
}
.mech-label::after { content:''; flex:1; height:1px; background:var(--border); }
.mech-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1rem; font-weight: 700;
  color: var(--paper); margin-bottom: 6px; line-height: 1.2;
}
.mech-description {
  font-size: 0.78rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px;
}
.mech-stage-tag {
  font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--gold-dim); margin-top: 9px;
  padding-top: 9px; border-top: 1px solid var(--border-soft);
  display: flex; align-items: center; gap: 7px;
}
.mech-stage-tag span { font-weight: 700; color: var(--gold); letter-spacing: 0.1em; }

/* Neural note */
.neural-note {
  font-size: 0.62rem; color: var(--text-faint); font-style: italic;
  padding: 6px 10px; border-left: 2px solid var(--border-soft);
  margin-bottom: 14px; line-height: 1.5;
}

/* Thinking prompts */
.prompts-section { margin-bottom: 16px; }
.prompts-label {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.prompts-label::after { content:''; flex:1; height:1px; background:var(--border); }
.prompt-list { display: flex; flex-direction: column; gap: 6px; }
.prompt-item {
  background: var(--gold-ghost); border: 1px solid var(--border-soft);
  padding: 9px 13px; font-size: 0.82rem; line-height: 1.5;
  color: var(--text-muted); display: flex; gap: 9px; align-items: flex-start;
}
.prompt-arrow { color: var(--gold); flex-shrink: 0; font-weight: 700; }

/* ── STUDENT WORK AREA ── */
.work-area { margin-bottom: 0; }
.work-label {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.work-label::after { content:''; flex:1; height:1px; background:var(--border); }

.prompt-entry {
  background: var(--card-bg);
  border: 1px solid var(--input-border);
  border-left: 3px solid var(--lc, var(--gold));
  padding: 12px 14px;
  margin-bottom: 8px;
}
.prompt-entry-top {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.prompt-num {
  width: 22px; height: 22px; border: 1px solid var(--gold-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.62rem; color: var(--gold); flex-shrink: 0;
}
.prompt-entry-label {
  font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold-dim); flex: 1;
}
.quality-select {
  background: transparent; border: 1px solid var(--input-border);
  color: var(--gold-dim); font-family: 'Courier Prime', monospace;
  font-size: 0.62rem; padding: 3px 6px; cursor: pointer;
  transition: border-color 0.2s;
}
.quality-select:focus { outline: none; border-color: var(--gold); color: var(--gold); }
html.light .quality-select { background: transparent; }

.prompt-textarea {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--input-border); border-bottom: none;
  color: var(--paper); font-family: 'Courier Prime', monospace;
  font-size: 0.82rem; line-height: 1.55; padding: 10px 12px;
  resize: none; min-height: 62px;
  transition: border-color 0.2s, background 0.2s;
}
.prompt-textarea:focus { outline: none; border-color: var(--input-focus); background: rgba(126,184,212,0.06); }
.prompt-textarea::placeholder { color: var(--text-faint); font-style: italic; }
html.light .prompt-textarea { color: var(--paper); }

.intent-textarea {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--input-border);
  color: var(--text-muted); font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 0.85rem; line-height: 1.55;
  padding: 8px 12px; resize: none; min-height: 52px;
  transition: border-color 0.2s;
}
.intent-textarea:focus { outline: none; border-color: var(--input-focus); }
.intent-textarea::placeholder { color: var(--text-faint); }

.analysis-textarea {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--input-border);
  color: var(--paper); font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem; line-height: 1.7;
  padding: 12px 14px; resize: none; min-height: 100px;
  transition: border-color 0.2s;
}
.analysis-textarea:focus { outline: none; border-color: var(--input-focus); }
.analysis-textarea::placeholder { color: var(--text-faint); font-style: italic; }

.add-prompt-btn {
  width: 100%; background: transparent;
  border: 1px dashed var(--gold-dim); color: var(--gold-dim);
  font-family: 'Courier Prime', monospace; font-size: 0.72rem;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 10px; cursor: pointer; margin-bottom: 16px;
  transition: color 0.2s, border-color 0.2s;
}
.add-prompt-btn:hover { color: var(--gold); border-color: var(--gold); }

.save-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; margin-bottom: 6px;
}
.save-btn {
  background: var(--gold); color: var(--ink);
  border: none; font-family: 'Courier Prime', monospace;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 9px 18px; cursor: pointer;
  transition: opacity 0.2s, transform 0.15s; flex-shrink: 0;
}
.save-btn:active { opacity: 0.8; transform: scale(0.97); }
.save-status {
  font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-faint); transition: color 0.3s;
}
.save-status.saved { color: var(--gold); }

/* ── FINALE ── */
.finale {
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  text-align: center; min-height: 68vh;
}
.finale-icon { font-size: 2.8rem; margin-bottom: 16px; display: block; opacity: 0.75; }
.finale-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 7vw, 2.5rem); font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.finale-sub {
  font-size: 14px; color: var(--text-muted);
  margin-bottom: 24px; line-height: 1.7; max-width: 320px;
}
.finale-loop {
  width: 100%; max-width: 320px;
  background: var(--gold-ghost); border: 1px solid var(--border);
  border-top: 3px solid var(--gold);
  padding: 16px 18px 14px; margin-bottom: 20px; text-align: left;
}
.finale-loop-title {
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
  display: flex; align-items: center; gap: 7px;
}
.finale-loop-title::after { content:''; flex:1; height:1px; background:var(--border); }
.finale-steps { display: flex; flex-direction: column; gap: 0; }
.finale-step { display: flex; align-items: stretch; gap: 12px; }
.finale-step-line { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.finale-step-dot {
  width: 20px; height: 20px; border: 1.5px solid var(--gold);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: var(--gold); flex-shrink: 0;
}
.finale-step-connector { width: 1px; background: var(--border); flex: 1; min-height: 10px; margin: 2px 0; }
.finale-step:last-child .finale-step-connector { display: none; }
.finale-step-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 0.9rem; color: var(--text-dim); line-height: 1.3; padding: 2px 0 12px;
}
.finale-heuristic {
  margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-soft);
  font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--gold-dim); text-align: center;
}
.finale-heuristic b { color: var(--gold); }

.portfolio-link {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold); color: var(--ink);
  text-decoration: none;
  font-family: 'Courier Prime', monospace; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  padding: 11px 22px; margin-bottom: 10px;
  transition: opacity 0.2s; border: none; cursor: pointer;
}
.portfolio-link:hover { opacity: 0.85; }
.finale-restart {
  background: none; border: 1px solid var(--gold-dim); color: var(--gold-dim);
  font-size: 11px; font-family: 'Courier Prime', monospace;
  letter-spacing: 2px; padding: 10px 22px; cursor: pointer;
  transition: color 0.2s, border-color 0.2s;
}
.finale-restart:hover { color: var(--gold); border-color: var(--gold); }

/* Essay title input */
.essay-input {
  width: 100%; background: var(--input-bg);
  border: 1px solid var(--input-border); border-top: none;
  color: var(--paper); font-family: 'Cormorant Garamond', serif;
  font-style: italic; font-size: 1.05rem;
  padding: 10px 14px; outline: none;
  transition: border-color 0.2s;
}
.essay-input:focus { border-color: var(--input-focus); }
.essay-input::placeholder { color: var(--text-faint); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
<div class="swipe-hint">← SWIPE TO NAVIGATE →</div>

<nav class="top-nav">
  <span class="nav-logo">◈ Re-perception</span>
  <span class="nav-counter" id="counter">1 / 16</span>
  <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">☀</button>
</nav>

<div class="slides-wrap">
  <div class="slides-track" id="track"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" disabled>‹</button>
  <div class="dot-row" id="dotRow"></div>
  <button class="nav-btn primary" id="nextBtn">›</button>
</div>

<script>
/* ── THEME ── */
function applyTheme(t) {
  document.documentElement.classList.toggle('light', t === 'light');
  document.getElementById('themeBtn').textContent = t === 'light' ? '☾' : '☀';
}
document.getElementById('themeBtn').addEventListener('click', function() {
  const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem('crp-theme', next); applyTheme(next);
});
applyTheme(localStorage.getItem('crp-theme') || 'dark');

/* ──────────────────────────────────────────────────────────────────
   LENS DATA — aligned with the Cryptic Re-perception Expansion Grid
   (Veda & Christie, 2024)
   
   Dimensions per the paper:
   • Interrogative: Who, What, When, Where, Why, How

var entryCounts = {};
LENSES.forEach(function(l) { entryCounts[l.name] = 0; });

function entryCount(lensName) {
  var safe = lensName.replace(/\s+/g, '-');
  var i = 0;
  while (localStorage.getItem('crp-' + safe + '-prompt-' + i) !== null) i++;
  return Math.max(i, 1);
}

function addEntry(lensName, color, forceIdx, focus) {
  var safe = lensName.replace(/\s+/g, '-');
  var container = document.getElementById('entries-' + safe);
  if (!container) return;
  var idx = (forceIdx !== undefined) ? forceIdx : entryCounts[lensName];
  entryCounts[lensName] = Math.max(entryCounts[lensName], idx + 1);

  var div = document.createElement('div');
  div.className = 'prompt-entry';
  div.style.setProperty('--lc', color);
  div.setAttribute('data-idx', idx);

  div.innerHTML =
    '<div class="prompt-entry-top">' +
      '<div class="prompt-num">' + (idx + 1) + '</div>' +
      '<div class="prompt-entry-label">Prompt to ChatGPT</div>' +
      '<select class="quality-select" data-lens="' + safe + '" data-field="quality" data-idx="' + idx + '">' +
        '<option value="">Rate</option>' +
        '<option value="strong">★★★ Strong</option>' +
        '<option value="good">★★ Good</option>' +
        '<option value="weak">★ Weak</option>' +
      '</select>' +
    '</div>' +
    '<textarea class="prompt-textarea" rows="3" data-lens="' + safe + '" data-field="prompt" data-idx="' + idx + '" placeholder="Paste or type the exact prompt you sent to ChatGPT…"></textarea>' +
    '<textarea class="intent-textarea" rows="2" data-lens="' + safe + '" data-field="intent" data-idx="' + idx + '" placeholder="Your intent: what representational shift were you trying to trigger?"></textarea>';

  container.appendChild(div);

  var pVal = localStorage.getItem('crp-' + safe + '-prompt-' + idx) || '';
  var iVal = localStorage.getItem('crp-' + safe + '-intent-'  + idx) || '';
  var qVal = localStorage.getItem('crp-' + safe + '-quality-' + idx) || '';
  if (pVal) div.querySelector('[data-field="prompt"]').value   = pVal;
  if (iVal) div.querySelector('[data-field="intent"]').value   = iVal;
  if (qVal) div.querySelector('[data-field="quality"]').value  = qVal;

  div.querySelectorAll('textarea, select').forEach(function(el) {
    el.addEventListener('input',  function() { setStatus(safe, 'unsaved'); });
    el.addEventListener('change', function() { setStatus(safe, 'unsaved'); });
  });

  if (focus !== false && forceIdx === undefined) {
    setTimeout(function() { div.querySelector('textarea').focus(); }, 50);
  }
}

function buildEntries(lensName, color) {
  var count = entryCount(lensName);
  for (var i = 0; i < count; i++) addEntry(lensName, color, i, false);
}

function saveLens(lensName) {
  var safe = lensName.replace(/\s+/g, '-');
  var container = document.getElementById('entries-' + safe);
  if (container) {
    container.querySelectorAll('.prompt-entry').forEach(function(entry) {
      var idx = entry.getAttribute('data-idx');
      var p  = entry.querySelector('[data-field="prompt"]');
      var iv = entry.querySelector('[data-field="intent"]');
      var q  = entry.querySelector('[data-field="quality"]');
      if (p)  localStorage.setItem('crp-' + safe + '-prompt-'  + idx, p.value);
      if (iv) localStorage.setItem('crp-' + safe + '-intent-'  + idx, iv.value);
      if (q)  localStorage.setItem('crp-' + safe + '-quality-' + idx, q.value);
    });
  }
  var aEl = document.querySelector('.analysis-textarea[data-lens="' + safe + '"]');
  if (aEl) localStorage.setItem('crp-' + safe + '-analysis', aEl.value);
  setStatus(safe, 'saved');
  updateDotWork();
}

function setStatus(safe, state) {
  var el = document.getElementById('status-' + safe);
  if (!el) return;
  el.textContent = state === 'saved' ? '✓ saved' : 'unsaved';
  el.classList.toggle('saved', state === 'saved');
}

        '<div class="finale-step"><div class="finale-step-line"><div class="finale-step-dot">1</div><div class="finale-step-connector"></div></div><div class="finale-step-text">Identify your initial dominant interpretation (Predictive Fixation)</div></div>' +
        '<div class="finale-step"><div class="finale-step-line"><div class="finale-step-dot">2</div><div class="finale-step-connector"></div></div><div class="finale-step-text">Deliberately inhibit it (Representational Release)</div></div>' +
        '<div class="finale-step"><div class="finale-step-line"><div class="finale-step-dot">3</div><div class="finale-step-connector"></div></div><div class="finale-step-text">Generate alternatives across the grid (Structured Expansion)</div></div>' +
        '<div class="finale-step"><div class="finale-step-line"><div class="finale-step-dot">4</div><div class="finale-step-connector"></div></div><div class="finale-step-text">Select by dual verification: coherent AND actionable (Constrained Convergence)</div></div>' +
        '<div class="finale-step"><div class="finale-step-line"><div class="finale-step-dot">5</div><div class="finale-step-connector"></div></div><div class="finale-step-text">Publish your portfolio</div></div>' +
      '</div>' +
      '<div class="finale-heuristic">Framework: <b>Inhibit → Expand → Verify</b></div>' +
    '</div>' +
    '<button class="portfolio-link" id="pdfBtn">⬇ &nbsp;Download as PDF</button>' +
    '<button class="portfolio-link" id="htmlBtn">⬇ &nbsp;Download as HTML</button>' +
    '<button class="finale-restart" id="restartBtn">← Back to the beginning</button>' +
  '</div>'
);

/* ── DOTS ── */
var dotRow = document.getElementById('dotRow');
for (var i = 0; i < TOTAL; i++) {
  var d = document.createElement('div');
  d.className = 'dot';
  (function(idx) {
    d.addEventListener('click', function() { goTo(idx); });
  })(i);
  dotRow.appendChild(d);
}

function updateDotWork() {
  var dots = dotRow.querySelectorAll('.dot');
  LENSES.forEach(function(l, i) {
    if (hasWork(l.name)) dots[i + 1].classList.add('has-work');
    else dots[i + 1].classList.remove('has-work');
  });
}
updateDotWork();

/* ── NAVIGATION ── */
var cur = 0;

function ui() {
  document.getElementById('track').style.transform = 'translateX(-' + (cur * 100) + 'vw)';
  document.getElementById('pFill').style.width = ((cur + 1) / TOTAL * 100) + '%';
  document.getElementById('counter').textContent = (cur + 1) + ' / ' + TOTAL;
  document.getElementById('prevBtn').disabled = cur === 0;

  var nb = document.getElementById('nextBtn');
  nb.textContent = cur === TOTAL - 1 ? '✓' : '›';
  nb.dataset.last = cur === TOTAL - 1 ? '1' : '0';

  dotRow.querySelectorAll('.dot').forEach(function(dot, i) {
    dot.classList.toggle('active', i === cur);
    dot.classList.toggle('nearby', Math.abs(i - cur) === 1);
  });

  var inner = document.querySelectorAll('.slide')[cur].querySelector('.slide-inner');
  Array.from(inner.children).forEach(function(child, i) {
    child.style.opacity = '0';
    child.style.animation = 'none';
    void child.offsetWidth;
    child.style.animation = 'fadeUp 0.42s ease-out ' + (i * 0.06) + 's forwards';
  });
}

function next() { if (cur < TOTAL - 1) { cur++; ui(); } }
function prev() { if (cur > 0) { cur--; ui(); } }
function goTo(i) { cur = i; ui(); }

document.addEventListener('click', function(e) {
  if (e.target && e.target.id === 'restartBtn') goTo(0);
});
document.getElementById('prevBtn').addEventListener('click', prev);
document.getElementById('nextBtn').addEventListener('click', function() {
  this.dataset.last === '1' ? goTo(0) : next();
});

/* ── SWIPE ── */
var sx = 0, sy = 0, dragging = false;
var wrap = document.querySelector('.slides-wrap');
wrap.addEventListener('touchstart', function(e) { sx = e.touches[0].clientX; sy = e.touches[0].clientY; dragging = false; }, { passive: true });
wrap.addEventListener('touchmove', function(e) {
  var dx = e.touches[0].clientX - sx, dy = e.touches[0].clientY - sy;
  if (!dragging && Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 8) dragging = true;
}, { passive: true });
wrap.addEventListener('touchend', function(e) {
  if (!dragging) return;
  var dx = e.changedTouches[0].clientX - sx;
  if (Math.abs(dx) > 48) dx < 0 ? next() : prev();
  dragging = false;
});

document.querySelectorAll('textarea, select').forEach(function(el) {
  el.addEventListener('touchstart', function(e) { e.stopPropagation(); }, { passive: true });
  el.addEventListener('touchmove',  function(e) { e.stopPropagation(); }, { passive: true });
  el.addEventListener('touchend',   function(e) { e.stopPropagation(); });
});

document.addEventListener('keydown', function(e) {
  if (document.activeElement.tagName === 'TEXTAREA' || document.activeElement.tagName === 'SELECT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') next();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prev();
});

ui();

/* ── PDF / HTML EXPORT ── */
document.addEventListener('click', function(e) {
  if (e.target && e.target.id === 'pdfBtn')  generatePDF();
  if (e.target && e.target.id === 'htmlBtn') downloadHTML();
});

function collectRows() {
  return LENSES.map(function(lens) {
    var safe = lens.name.replace(/\s+/g, '-');
    var entries = [];
    for (var i = 0; i < 30; i++) {
      var p = localStorage.getItem('crp-' + safe + '-prompt-' + i);
      if (p === null) break;
      entries.push({
        prompt:  p,
        intent:  localStorage.getItem('crp-' + safe + '-intent-'  + i) || '',
        quality: localStorage.getItem('crp-' + safe + '-quality-' + i) || ''
      });
    }
    return {
      lens: lens,
      entries: entries,
      analysis: localStorage.getItem('crp-' + safe + '-analysis') || ''
    };
  });
}

function qLabel(v) {
  if (v === 'strong') return '★★★ Strong';
  if (v === 'good')   return '★★ Good';
  if (v === 'weak')   return '★ Weak';
  return '— unrated';
}

function buildExportHTML(rows, forPrint) {
  var essayTitle  = localStorage.getItem('crp-essay-title') || '';
  var totalPrompts = rows.reduce(function(n, r) { return n + r.entries.length; }, 0);
  var date = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });

  var sections = rows.map(function(row) {
    if (!row.entries.length && !row.analysis) return '';
    var promptRows = row.entries.map(function(e, i) {
      return '<tr><td class="pn">' + (i+1) + '</td><td class="pt">' + esc(e.prompt) + '</td><td class="pi"><em>' + esc(e.intent) + '</em></td><td class="pq">' + qLabel(e.quality) + '</td></tr>';
    }).join('');
    var table = row.entries.length
      ? '<table><thead><tr><th>#</th><th>Prompt</th><th>Intent</th><th>Rating</th></tr></thead><tbody>' + promptRows + '</tbody></table>'
      : '<p class="empty">No prompts recorded.</p>';
    var analysisBlock = row.analysis
      ? '<div class="analysis-block"><div class="analysis-label">Analysis</div><p>' + esc(row.analysis) + '</p></div>'
      : '';
    return '<section>' +
      '<div class="lens-head" style="border-left-color:' + row.lens.color + '">' +
        '<div>' +
          '<div class="dim-tag">' + row.lens.dimension + '</div>' +
          '<div class="lens-name" style="color:' + row.lens.color + '">' + row.lens.name + '</div>' +
          '<div class="lens-tag">' + row.lens.tagline + '</div>' +
        '</div>' +
        '<div class="mech-tag">◈ ' + row.lens.mechanism.clueType + '<br><em>' + row.lens.mechanism.stage + '</em></div>' +
      '</div>' +
      table + analysisBlock +
    '</section>';
  }).join('');

  return '<!DOCTYPE html><html lang="en"><head>' +
    '<meta charset="UTF-8"><title>Cryptic Re-perception Assignment</title>' +
    '<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">' +
    '<style>' +
    '*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }' +
    'body { font-family: "Courier Prime", monospace; font-size: 11pt; color: #1a1208; background: #fff; }' +
    '.cover { page-break-after: always; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; background: #08090d; color: #e8eaf2; padding: 60px 40px; }' +
    '.cover-icon { font-size: 3rem; margin-bottom: 20px; color: #7eb8d4; }' +
    '.cover-title { font-family: "Cormorant Garamond", serif; font-size: 2.6rem; font-weight: 700; color: #7eb8d4; line-height: 1.1; margin-bottom: 14px; }' +
    '.cover-essay { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 1.25rem; color: #a8d4e8; margin: 8px 0 6px; }' +
    '.cover-sub { font-family: "Cormorant Garamond", serif; font-style: italic; font-size: 1rem; color: rgba(232,234,242,0.55); margin-bottom: 28px; }' +
    '.cover-meta { font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(126,184,212,0.5); }' +
    '.cover-stat { margin-top: 24px; display: inline-block; border: 1px solid rgba(126,184,212,0.3); padding: 9px 22px; font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: #7eb8d4; }' +
    '.page-body { max-width: 720px; margin: 0 auto; padding: 40px 32px; }' +
    'section { margin-bottom: 28px; border: 1px solid #dde4ec; border-radius: 3px; overflow: hidden; page-break-inside: avoid; }' +
    '.lens-head { display: flex; align-items: flex-start; gap: 14px; padding: 12px 16px; background: #f0f4f8; border-left: 4px solid #7eb8d4; border-bottom: 1px solid #dde4ec; }' +
    '.dim-tag { font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase; color: #8a9ab0; margin-bottom: 3px; }' +
    '.lens-name { font-family: "Cormorant Garamond", serif; font-size: 1.25rem; font-weight: 700; line-height: 1; }' +
    '.lens-tag { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: #6a7a8a; margin-top: 3px; }' +
    '.mech-tag { margin-left: auto; font-size: 0.58rem; letter-spacing: 0.08em; text-transform: uppercase; color: #5a8aaa; text-align: right; flex-shrink: 0; max-width: 160px; line-height: 1.4; }' +
    '.mech-tag em { display: block; font-style: italic; font-size: 0.55rem; color: #8a9ab0; margin-top: 2px; text-transform: none; letter-spacing: 0; }' +
    'table { width: 100%; border-collapse: collapse; font-size: 9.5pt; }' +
    'thead tr { background: #0d1018; }' +
    'thead th { padding: 8px 12px; text-align: left; font-size: 0.56rem; letter-spacing: 0.15em; text-transform: uppercase; color: #7eb8d4; font-weight: 700; }' +
    'tbody tr { border-bottom: 1px solid #dde4ec; }' +
    'tbody tr:last-child { border-bottom: none; }' +
    'tbody tr:nth-child(even) { background: #f8fafe; }' +
    'td { padding: 9px 12px; vertical-align: top; line-height: 1.5; color: #2a3a4a; }' +
    'td.pn { width: 28px; text-align: center; font-family: "Cormorant Garamond", serif; font-size: 1.1rem; color: #3a7a9e; font-weight: 700; }' +
    'td.pt { width: 35%; }' +
    'td.pi { font-family: "Cormorant Garamond", serif; font-style: italic; color: #4a6a7a; }' +
    'td.pq { white-space: nowrap; font-size: 0.75rem; color: #3a7a9e; width: 90px; }' +
    '.analysis-block { padding: 13px 16px; background: #f0f4f8; border-top: 1px solid #dde4ec; }' +
    '.analysis-label { font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: #5a8aaa; margin-bottom: 7px; }' +
    '.analysis-block p { font-family: "Cormorant Garamond", serif; font-size: 1rem; line-height: 1.75; color: #2a3a4a; }' +
    '.empty { padding: 12px 16px; font-style: italic; color: #8a9ab0; font-size: 0.85rem; }' +
    '@media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } section { page-break-inside: avoid; } @page { margin: 14mm 12mm; } }' +
    '</style></head><body>' +
    '<div class="cover">' +
      '<div class="cover-icon">◈</div>' +
      '<div class="cover-title">Cryptic Re-perception<br>Assignment</div>' +
      (essayTitle ? '<div class="cover-essay">' + esc(essayTitle) + '</div>' : '') +
      '<p class="cover-sub">Expansion Grid — prompts and analysis across all dimensions</p>' +
      '<div class="cover-meta">Generated ' + date + '</div>' +
      '<div class="cover-stat">' + totalPrompts + ' prompts &nbsp;·&nbsp; ' + rows.filter(function(r){return r.entries.length>0;}).length + ' lenses completed</div>' +
    '</div>' +
    '<div class="page-body">' + sections + '</div>' +
    '</body></html>';
}

function generatePDF() {
  var rows = collectRows();
  var html = buildExportHTML(rows, true);
  var win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.addEventListener('load', function() { setTimeout(function() { win.print(); }, 400); });
}

function downloadHTML() {
  var rows = collectRows();
  var html = buildExportHTML(rows, false);
  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url;
  a.download = 'crp-assignment-' + new Date().toISOString().slice(0,10) + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function() { URL.revokeObjectURL(url); }, 2000);
}

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}
</script>
</body>
</html>

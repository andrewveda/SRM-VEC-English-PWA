<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Idiom Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-pale: #F5E6B8;
    --cream: #F9F3E3;
    --cream-dark: #EDE3C8;
    --dark: #1a1208;
    --dark-mid: #2d2010;
    --dark-warm: #3d2e12;
    --danger: #8B2020;
    --danger-light: #c43030;
    --success: #2D5A27;
    --success-light: #4a9c3f;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--dark);
    font-family: 'Cormorant Garamond', serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  body {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 90%, rgba(201,168,76,0.06) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 40px,
        rgba(201,168,76,0.02) 40px, rgba(201,168,76,0.02) 41px);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    padding: 18px 16px 10px;
    border-bottom: 1px solid rgba(201,168,76,0.25);
    flex-shrink: 0;
    position: relative;
  }
  header::before, header::after {
    content: '✦';
    position: absolute;
    top: 50%; transform: translateY(-50%);
    color: var(--gold); font-size: 13px; opacity: 0.5;
  }
  header::before { left: 18px; }
  header::after  { right: 18px; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 5.5vw, 28px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }
  .subtitle {
    font-size: 10px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
    margin-top: 3px;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 14px 14px;
    gap: 10px;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── SCORE ROW ── */
  .score-row {
    display: flex;
    justify-content: center;
    gap: 20px;
  }
  .score-item { text-align: center; }
  .score-val {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--gold-light);
    line-height: 1;
  }
  .score-lbl {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.45);
    margin-top: 2px;
  }
  .divider {
    width: 1px;
    background: rgba(201,168,76,0.2);
    align-self: stretch;
    margin: 3px 0;
  }

  /* ── TIMER CARD ── */
  .timer-card {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 14px;
    padding: 14px 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    position: relative;
    overflow: hidden;
  }

  .timer-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 24px,
      rgba(201,168,76,0.018) 24px, rgba(201,168,76,0.018) 25px);
    pointer-events: none;
  }

  /* Arc progress ring */
  .timer-ring-wrap {
    position: relative;
    width: 110px;
    height: 110px;
  }

  .timer-ring-wrap svg {
    transform: rotate(-90deg);
    width: 110px; height: 110px;
  }

  .ring-track {
    fill: none;
    stroke: rgba(201,168,76,0.12);
    stroke-width: 6;
  }

  .ring-progress {
    fill: none;
    stroke: var(--gold);
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.4s ease;
    filter: drop-shadow(0 0 4px rgba(201,168,76,0.5));
  }

  .timer-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .timer-display {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.04em;
    line-height: 1;
    transition: color 0.4s ease;
  }

  .timer-display.urgent { color: var(--danger-light); text-shadow: 0 0 12px rgba(196,48,48,0.5); }

  /* Streak info row */
  .streak-row {
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .streak-badge {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .streak-val {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    line-height: 1;
  }

  .streak-val.correct-color { color: #6ecf5a; }
  .streak-val.wrong-color   { color: #d96060; }

  .streak-lbl {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    opacity: 0.5;
  }

  /* Delta toast */
  .delta-toast {
    position: absolute;
    top: 10px; right: 14px;
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    opacity: 0;
    pointer-events: none;
    transition: none;
  }
  .delta-toast.correct { color: #6ecf5a; }
  .delta-toast.wrong   { color: #d96060; }
  .delta-toast.animate {
    animation: toastPop 1.4s ease forwards;
  }

  @keyframes toastPop {
    0%   { opacity: 0; transform: translateY(0); }
    15%  { opacity: 1; transform: translateY(-4px); }
    70%  { opacity: 1; transform: translateY(-12px); }
    100% { opacity: 0; transform: translateY(-20px); }
  }

  /* ── HINT ── */
  .hint-strip {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.48);
  }
  .hint-strip span {
    color: var(--gold);
    font-style: italic;
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    text-transform: none;
  }

  /* ── WORD AREA ── */
  .word-area {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px 8px;
    padding: 2px 0;
    min-height: 52px;
    align-items: flex-end;
  }

  .word-group {
    display: flex;
    gap: 4px;
    align-items: flex-end;
  }

  .letter-slot {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .letter-char {
    font-family: 'Playfair Display', serif;
    font-size: clamp(17px, 4.8vw, 24px);
    font-weight: 700;
    color: var(--gold-light);
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-shadow: 0 0 12px rgba(201,168,76,0.4);
    min-width: 16px;
    text-align: center;
  }

  .letter-char.revealed {
    animation: revealLetter 0.45s ease forwards;
  }

  @keyframes revealLetter {
    0%   { transform: translateY(-8px); opacity: 0; }
    60%  { transform: translateY(2px); }
    100% { transform: translateY(0); opacity: 1; }
  }

  .letter-line {
    width: 100%;
    min-width: 14px;
    height: 1.5px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    opacity: 0.65;
  }

  /* ── WRONG LETTERS ── */
  .wrong-letters {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: rgba(200, 70, 70, 0.85);
    min-height: 20px;
  }
  .wrong-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(180,60,60,0.5);
    margin-right: 5px;
  }

  /* ── KEYBOARD ── */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .kb-row {
    display: flex;
    justify-content: center;
    gap: 4px;
  }

  .kb-key {
    width: 29px;
    height: 36px;
    border-radius: 6px;
    border: 1px solid rgba(201,168,76,0.32);
    background: rgba(201,168,76,0.06);
    color: var(--gold-light);
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    flex-shrink: 0;
  }
  .kb-key::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(201,168,76,0.1) 0%, transparent 100%);
    border-radius: 6px;
    pointer-events: none;
  }
  .kb-key:active { transform: scale(0.9); background: rgba(201,168,76,0.2); }

  .kb-key.correct {
    background: rgba(45,90,39,0.35);
    border-color: rgba(100,180,80,0.4);
    color: rgba(130,220,100,0.85);
    cursor: not-allowed;
  }
  .kb-key.wrong {
    background: rgba(100,20,20,0.3);
    border-color: rgba(150,40,40,0.3);
    color: rgba(180,80,80,0.45);
    cursor: not-allowed;
  }
  .kb-key:disabled { cursor: not-allowed; }

  /* ── ORNAMENT ── */
  .ornament {
    text-align: center;
    color: rgba(201,168,76,0.2);
    font-size: 16px;
    letter-spacing: 8px;
  }

  /* ── OVERLAY ── */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,8,3,0.9);
    z-index: 100;
    justify-content: center;
    align-items: center;
    padding: 24px;
    backdrop-filter: blur(6px);
  }
  .overlay.show { display: flex; }

  .msg-card {
    background: linear-gradient(160deg, var(--dark-warm), var(--dark));
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    max-width: 340px;
    width: 100%;
    box-shadow: 0 0 60px rgba(201,168,76,0.2), inset 0 1px 0 rgba(201,168,76,0.15);
    animation: cardIn 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes cardIn {
    from { transform: scale(0.75) translateY(16px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  .msg-icon   { font-size: 44px; margin-bottom: 10px; display: block; }
  .msg-title  {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 400;
    color: var(--gold-light); margin-bottom: 6px;
  }
  .msg-idiom  {
    font-family: 'Playfair Display', serif;
    font-style: italic; font-size: 16px;
    color: var(--cream); margin-bottom: 6px;
    line-height: 1.4;
  }
  .msg-hint   {
    font-size: 13px; color: rgba(201,168,76,0.6);
    line-height: 1.5; margin-bottom: 8px;
    font-style: italic;
  }
  .msg-time {
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    color: rgba(201,168,76,0.5);
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }
  .msg-time strong { color: var(--gold-light); }

  .btn-play {
    background: linear-gradient(135deg, var(--gold), #a07828);
    color: var(--dark);
    border: none;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }
  .btn-play:active { transform: scale(0.97); }

  /* shake */
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-5px); }
    60%      { transform: translateX(5px); }
    80%      { transform: translateX(-3px); }
  }
  .shake { animation: wrongShake 0.35s ease; }

  /* timer flash on penalty */
  @keyframes timerFlash {
    0%,100% { background: rgba(201,168,76,0.05); }
    40%      { background: rgba(139,32,32,0.22); }
  }
  .timer-card.penalty { animation: timerFlash 0.5s ease; }

  @keyframes timerBonus {
    0%,100% { background: rgba(201,168,76,0.05); }
    40%      { background: rgba(45,90,39,0.25); }
  }
  .timer-card.bonus { animation: timerBonus 0.5s ease; }
</style>
</head>
<body>

<header>
  <h1>Idiom Game</h1>
  <p class="subtitle">A Game of Elegant Expression</p>
</header>

<main>

  <!-- Score -->
  <div class="score-row">
    <div class="score-item">
      <div class="score-val" id="scoreWins">0</div>
      <div class="score-lbl">Won</div>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <div class="score-val" id="scoreWinStreak">0</div>
      <div class="score-lbl">Best Streak</div>
    </div>
    <div class="divider"></div>
    <div class="score-item">
      <div class="score-val" id="scoreLosses">0</div>
      <div class="score-lbl">Lost</div>
    </div>
  </div>

  <div class="ornament">✦ ✦ ✦</div>

  <!-- Timer card -->
  <div class="timer-card" id="timerCard">
    <div class="delta-toast" id="deltaToast"></div>

    <div class="timer-ring-wrap">
      <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg">
        <circle class="ring-track"    cx="55" cy="55" r="48"/>
        <circle class="ring-progress" id="ringProgress" cx="55" cy="55" r="48"
          stroke-dasharray="301.6" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timerDisplay">3:00</div>
      </div>
    </div>

    <!-- Consecutive streaks -->
    <div class="streak-row">
      <div class="streak-badge">
        <div class="streak-val correct-color" id="correctStreak">0</div>
        <div class="streak-lbl">Correct run</div>
      </div>
      <div class="divider" style="height:28px;margin:0;"></div>
      <div class="streak-badge">
        <div class="streak-val wrong-color" id="wrongStreak">0</div>
        <div class="streak-lbl">Wrong run</div>
      </div>
    </div>
  </div>

  <!-- Category hint -->
  <div class="hint-strip">Theme: <span id="hintText">—</span></div>

  <!-- Word -->
  <div class="word-area" id="wordArea"></div>

  <!-- Wrong letters -->
  <div class="wrong-letters" id="wrongLetters"></div>

  <!-- Keyboard -->
  <div class="keyboard" id="keyboard"></div>

</main>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="msg-card">
    <span class="msg-icon"  id="msgIcon"></span>
    <div class="msg-title"  id="msgTitle"></div>
    <div class="msg-idiom"  id="msgIdiom"></div>
    <div class="msg-hint"   id="msgHint"></div>
    <div class="msg-time"   id="msgTime"></div>
    <button class="btn-play" onclick="newGame()">Next Idiom</button>
  </div>
</div>

<script>
// ── IDIOMS ────────────────────────────────────────────────────────
const idioms = [
  { phrase: "bite the bullet",                   hint: "Endure a painful situation stoically.",              theme: "Courage" },
  { phrase: "barking up the wrong tree",          hint: "Pursuing a mistaken course of action.",             theme: "Mistakes" },
  { phrase: "beat around the bush",               hint: "Avoid coming to the main point.",                   theme: "Communication" },
  { phrase: "bite off more than you can chew",    hint: "Take on a task too big to manage.",                 theme: "Ambition" },
  { phrase: "burn the midnight oil",              hint: "Work late into the night.",                         theme: "Hard Work" },
  { phrase: "cut corners",                        hint: "Do something the easy way, sacrificing quality.",   theme: "Shortcuts" },
  { phrase: "hit the nail on the head",           hint: "Describe exactly what is causing a situation.",     theme: "Accuracy" },
  { phrase: "let the cat out of the bag",         hint: "Reveal a secret carelessly or by mistake.",        theme: "Secrets" },
  { phrase: "a blessing in disguise",             hint: "Something bad that turns out to be good.",          theme: "Fortune" },
  { phrase: "piece of cake",                      hint: "Something very easy to do.",                        theme: "Ease" },
  { phrase: "once in a blue moon",                hint: "Very rarely.",                                      theme: "Rarity" },
  { phrase: "under the weather",                  hint: "Feeling slightly unwell.",                          theme: "Health" },
  { phrase: "kill two birds with one stone",      hint: "Accomplish two things with a single action.",       theme: "Efficiency" },
  { phrase: "add fuel to the fire",               hint: "Worsen an already bad situation.",                  theme: "Conflict" },
  { phrase: "miss the boat",                      hint: "Miss an opportunity.",                              theme: "Opportunity" },
  { phrase: "spill the beans",                    hint: "Reveal secret information unintentionally.",        theme: "Secrets" },
  { phrase: "the ball is in your court",          hint: "It is up to you to make the next decision.",        theme: "Decision" },
  { phrase: "break a leg",                        hint: "Good luck — used especially in theatre.",           theme: "Theatre" },
  { phrase: "cost an arm and a leg",              hint: "Be extremely expensive.",                           theme: "Money" },
  { phrase: "get out of hand",                    hint: "Become impossible to control.",                     theme: "Control" },
  { phrase: "hit the sack",                       hint: "Go to bed.",                                        theme: "Sleep" },
  { phrase: "put all your eggs in one basket",    hint: "Rely on a single plan or source.",                  theme: "Risk" },
  { phrase: "speak of the devil",                 hint: "Said when someone appears right after being mentioned.", theme: "Coincidence" },
  { phrase: "sit on the fence",                   hint: "Avoid committing to a side in a debate.",           theme: "Indecision" },
  { phrase: "the best of both worlds",            hint: "Enjoy two advantages simultaneously.",              theme: "Balance" },
  { phrase: "no pain no gain",                    hint: "Hard work is necessary to achieve results.",        theme: "Effort" },
  { phrase: "go back to the drawing board",       hint: "Start over after a plan fails.",                   theme: "Planning" },
  { phrase: "hang in there",                      hint: "Persist despite difficulty.",                       theme: "Resilience" },
  { phrase: "read between the lines",             hint: "Find a hidden meaning.",                            theme: "Insight" },
  { phrase: "steal someone's thunder",            hint: "Overshadow someone else's achievement.",            theme: "Rivalry" },
  { phrase: "wrap your head around it",           hint: "Understand something complex.",                     theme: "Comprehension" },
  { phrase: "on the fence",                       hint: "Undecided about something.",                        theme: "Indecision" },
];

// ── CONSTANTS ─────────────────────────────────────────────────────
const TOTAL_SECS    = 180; // 3:00
const CIRCUMFERENCE = 2 * Math.PI * 48; // ~301.6

// Penalty: 15s base, +2s each consecutive wrong
// Bonus:    1s base, +1s each consecutive correct
function penaltySecs(consecutiveWrong) { return 15 + (consecutiveWrong - 1) * 2; }
function bonusSecs(consecutiveCorrect)  { return consecutiveCorrect; } // 1,2,3,4…

// ── STATE ─────────────────────────────────────────────────────────
let currentIdiom, guessed;
let consecutiveCorrect = 0, consecutiveWrong = 0;
let wins = 0, losses = 0, bestStreak = 0, currentStreak = 0;
let usedIndices = [];
let timeLeft, timerInterval, gameOver;

const KB_ROWS = ['QWERTYUIOP'.split(''), 'ASDFGHJKL'.split(''), 'ZXCVBNM'.split('')];

// ── BUILD KEYBOARD ────────────────────────────────────────────────
function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'kb-key';
      btn.textContent = letter;
      btn.id = 'key-' + letter;
      btn.onclick = () => guess(letter);
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

// ── TIMER ─────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (gameOver) return;
    timeLeft--;
    if (timeLeft <= 0) { timeLeft = 0; updateTimerUI(); endGame(false); return; }
    updateTimerUI();
  }, 1000);
}

function updateTimerUI() {
  const mins = Math.floor(timeLeft / 60);
  const secs = timeLeft % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  display.className   = 'timer-display' + (timeLeft <= 30 ? ' urgent' : '');

  const progress = timeLeft / TOTAL_SECS;
  const offset   = CIRCUMFERENCE * (1 - progress);
  const ring     = document.getElementById('ringProgress');
  ring.style.strokeDashoffset = offset;

  // colour shift: gold → amber → red
  if (timeLeft <= 30)       ring.style.stroke = '#c43030';
  else if (timeLeft <= 60)  ring.style.stroke = '#d4813a';
  else                      ring.style.stroke = 'var(--gold)';
}

function adjustTime(delta, type) {
  timeLeft = Math.min(TOTAL_SECS, Math.max(0, timeLeft + delta));
  updateTimerUI();

  // Flash card
  const card = document.getElementById('timerCard');
  card.classList.remove('penalty','bonus');
  void card.offsetWidth;
  card.classList.add(type === 'bonus' ? 'bonus' : 'penalty');

  // Toast
  const toast = document.getElementById('deltaToast');
  toast.textContent = (delta > 0 ? '+' : '') + delta + 's';
  toast.className   = 'delta-toast ' + (delta > 0 ? 'correct' : 'wrong');
  void toast.offsetWidth;
  toast.classList.add('animate');
  setTimeout(() => toast.classList.remove('animate'), 1400);
}

// ── NEW GAME ──────────────────────────────────────────────────────
function newGame() {
  hideOverlay();
  clearInterval(timerInterval);
  gameOver = false;

  if (usedIndices.length >= idioms.length) usedIndices = [];
  let idx;
  do { idx = Math.floor(Math.random() * idioms.length); } while (usedIndices.includes(idx));
  usedIndices.push(idx);
  currentIdiom = idioms[idx];

  guessed = new Set();
  consecutiveCorrect = 0;
  consecutiveWrong   = 0;
  timeLeft = TOTAL_SECS;

  document.querySelectorAll('.kb-key').forEach(k => { k.className = 'kb-key'; k.disabled = false; });
  document.getElementById('wrongLetters').innerHTML = '';
  document.getElementById('hintText').textContent   = currentIdiom.theme;
  document.getElementById('correctStreak').textContent = '0';
  document.getElementById('wrongStreak').textContent   = '0';

  updateTimerUI();
  renderWord();
  startTimer();
}

// ── GUESS ─────────────────────────────────────────────────────────
function guess(letter) {
  letter = letter.toUpperCase();
  if (guessed.has(letter) || gameOver) return;
  guessed.add(letter);

  const btn = document.getElementById('key-' + letter);

  if (currentIdiom.phrase.toUpperCase().includes(letter)) {
    // CORRECT
    consecutiveWrong = 0;
    consecutiveCorrect++;
    if (btn) { btn.className = 'kb-key correct'; btn.disabled = true; }

    const bonus = bonusSecs(consecutiveCorrect);
    adjustTime(bonus, 'bonus');
    document.getElementById('correctStreak').textContent = consecutiveCorrect;
    document.getElementById('wrongStreak').textContent   = '0';

    renderWord();
    if (checkWin()) { endGame(true); return; }

  } else {
    // WRONG
    consecutiveCorrect = 0;
    consecutiveWrong++;
    if (btn) { btn.className = 'kb-key wrong'; btn.disabled = true; }

    const penalty = penaltySecs(consecutiveWrong);
    adjustTime(-penalty, 'penalty');
    document.getElementById('wrongStreak').textContent   = consecutiveWrong;
    document.getElementById('correctStreak').textContent = '0';
    updateWrongLetters(letter);

    // Shake word area
    const wa = document.getElementById('wordArea');
    wa.classList.remove('shake');
    void wa.offsetWidth;
    wa.classList.add('shake');

    if (timeLeft <= 0) { endGame(false); return; }
  }
}

// ── RENDER WORD ───────────────────────────────────────────────────
function renderWord() {
  const area = document.getElementById('wordArea');
  area.innerHTML = '';
  currentIdiom.phrase.split(' ').forEach(word => {
    const group = document.createElement('div');
    group.className = 'word-group';
    word.split('').forEach(ch => {
      const slot  = document.createElement('div');
      slot.className = 'letter-slot';
      const char  = document.createElement('div');
      char.className = 'letter-char';
      const isLetter = /[a-z]/i.test(ch);
      if (!isLetter || guessed.has(ch.toUpperCase())) {
        char.textContent = ch.toUpperCase();
        if (isLetter) char.classList.add('revealed');
      }
      const line = document.createElement('div');
      line.className = 'letter-line';
      if (!isLetter) line.style.opacity = '0';
      slot.appendChild(char);
      slot.appendChild(line);
      group.appendChild(slot);
    });
    area.appendChild(group);
  });
}

function checkWin() {
  return currentIdiom.phrase.split('').every(ch => !/[a-z]/i.test(ch) || guessed.has(ch.toUpperCase()));
}

function updateWrongLetters(letter) {
  const el = document.getElementById('wrongLetters');
  if (!el.querySelector('.wrong-label')) {
    const lbl = document.createElement('span');
    lbl.className = 'wrong-label';
    lbl.textContent = 'Missed:';
    el.appendChild(lbl);
  }
  const span = document.createElement('span');
  span.textContent = letter + ' ';
  el.appendChild(span);
}

// ── END GAME ──────────────────────────────────────────────────────
function endGame(won) {
  gameOver = true;
  clearInterval(timerInterval);

  if (won) {
    wins++;
    currentStreak++;
    if (currentStreak > bestStreak) bestStreak = currentStreak;
    document.getElementById('scoreWins').textContent      = wins;
    document.getElementById('scoreWinStreak').textContent = bestStreak;
    document.getElementById('msgIcon').textContent  = '🏆';
    document.getElementById('msgTitle').textContent = 'Splendid!';
    document.getElementById('msgTime').innerHTML    =
      `Time remaining: <strong>${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2,'0')}</strong>`;
  } else {
    losses++;
    currentStreak = 0;
    document.getElementById('scoreLosses').textContent = losses;
    // Reveal phrase
    guessed = new Set(currentIdiom.phrase.toUpperCase().replace(/[^A-Z]/g,'').split(''));
    renderWord();
    document.getElementById('msgIcon').textContent  = '⏳';
    document.getElementById('msgTitle').textContent = "Time\u2019s Up!";
    document.getElementById('msgTime').innerHTML    = ``;
  }

  document.getElementById('msgIdiom').textContent = `"${currentIdiom.phrase}"`;
  document.getElementById('msgHint').textContent  = currentIdiom.hint;
  showOverlay();
}

function showOverlay() { document.getElementById('overlay').classList.add('show'); }
function hideOverlay()  { document.getElementById('overlay').classList.remove('show'); }

// Physical keyboard
document.addEventListener('keydown', e => {
  if (/^[a-zA-Z]$/.test(e.key) && !document.getElementById('overlay').classList.contains('show')) {
    guess(e.key.toUpperCase());
  }
});

// Boot
buildKeyboard();
newGame();
</script>

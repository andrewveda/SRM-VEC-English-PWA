<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Student Voices — Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/SRM-VEC-English-PWA/auth-guard.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
  --paper: #f8f5ef; --ink: #1c1a16; --ink-mid: #4a4640; --ink-muted: #8a837a; --ink-ghost: #c5bdb5;
  --gold: #b8913a; --gold-light: #d4aa58; --gold-pale: rgba(184,145,58,0.10); --gold-border: rgba(184,145,58,0.22);
  --crimson: #6b0f1a; --surface: #ffffff; --green: #2f8f5b;
  --serif: 'Cormorant Garamond', Georgia, serif; --fell: 'IM Fell English', Georgia, serif;
  --mono: 'DM Mono', monospace; --sans: 'Jost', system-ui, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1); --spring: cubic-bezier(0.34,1.56,0.64,1);
  --topbar-h: 54px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: #000; color: var(--ink); font-family: var(--sans); overscroll-behavior: none; }
button { touch-action: manipulation; font-family: inherit; }

/* ─── SCREENS ─── */
.screen { display: none; height: 100dvh; width: 100vw; }
.screen.active { display: block; }

/* ═══════════════════════════════════════════
   TOP BAR — shared
═══════════════════════════════════════════ */
.reel-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: calc(10px + var(--safe-top)) 14px 10px;
  pointer-events: none;
}
.reel-topbar > * { pointer-events: auto; }
.reel-back {
  width: 40px; height: 40px; min-width: 40px; border-radius: 50%; background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 17px; cursor: pointer; transition: all 0.2s var(--ease); flex-shrink: 0;
}
.reel-back:active { background: var(--gold); border-color: var(--gold); transform: scale(0.92); }
.reel-title {
  font-family: var(--fell); font-style: italic; font-size: 1.1rem; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5); letter-spacing: 0.5px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
}
.reel-search-wrap { position: relative; flex-shrink: 0; }
.reel-search {
  font-family: var(--sans); font-size: 13px; padding: 9px 14px 9px 30px;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
  color: #fff; outline: none; width: 42vw; max-width: 190px; transition: all 0.3s var(--ease);
}
.reel-search::placeholder { color: rgba(255,255,255,0.5); }
.reel-search:focus { width: 52vw; max-width: 230px; border-color: var(--gold); background: rgba(0,0,0,0.6); }
.reel-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 13px; color: rgba(255,255,255,0.5); pointer-events: none;
}

/* ═══════════════════════════════════════════
   HOME SCREEN — student directory
═══════════════════════════════════════════ */
#screenHome {
  background: var(--paper);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.home-scroll {
  padding: calc(var(--topbar-h) + var(--safe-top) + 14px) 0 calc(24px + var(--safe-bottom));
  min-height: 100%;
}
.home-heading {
  padding: 4px 18px 14px;
}
.home-eyebrow {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 4px;
}
.home-headline {
  font-family: var(--fell); font-style: italic; font-size: 1.6rem; color: var(--ink);
}
.home-list { display: flex; flex-direction: column; }
.home-item {
  display: flex; align-items: center; gap: 13px;
  padding: 14px 18px; border-bottom: 1px solid rgba(28,26,22,0.08);
  cursor: pointer; transition: background 0.15s var(--ease); min-height: 74px;
  -webkit-user-select: none; user-select: none;
}
.home-item:active { background: var(--gold-pale); }
.home-avatar {
  width: 46px; height: 46px; min-width: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--crimson));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fell); font-style: italic; font-size: 16px; color: #fff;
  position: relative; flex-shrink: 0;
}
.home-avatar .check {
  position: absolute; bottom: -2px; right: -2px;
  width: 18px; height: 18px; border-radius: 50%; background: var(--green);
  border: 2px solid var(--paper); color: #fff; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
}
.home-content { flex: 1; min-width: 0; }
.home-name {
  font-family: var(--sans); font-weight: 500; font-size: 15px; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.home-vidtitle {
  font-family: var(--serif); font-style: italic; font-size: 15px; color: var(--ink-mid);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
}
.home-meta-row {
  display: flex; align-items: center; gap: 7px; margin-top: 5px;
}
.home-dept {
  font-family: var(--mono); font-size: 8.5px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--gold); border: 1px solid var(--gold-border); border-radius: 10px;
  padding: 2px 7px;
}
.home-date {
  font-family: var(--mono); font-size: 9px; letter-spacing: 0.5px; color: var(--ink-ghost);
}
.home-chevron { color: var(--ink-ghost); font-size: 18px; flex-shrink: 0; padding-left: 2px; }
.home-progress-mini {
  height: 2px; width: 100%; background: rgba(28,26,22,0.08); border-radius: 2px; margin-top: 7px; overflow: hidden;
}
.home-progress-mini-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s var(--ease); }

.home-empty {
  padding: 60px 30px; text-align: center; color: var(--ink-muted);
  font-family: var(--fell); font-style: italic; font-size: 1.2rem;
}

/* ═══════════════════════════════════════════
   FEED SCREEN — vertical reels
═══════════════════════════════════════════ */
.reel-feed {
  height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory;
  scroll-behavior: smooth; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain; touch-action: pan-y;
}
.reel-feed::-webkit-scrollbar { display: none; }

.reel-item {
  height: 100dvh; width: 100vw; scroll-snap-align: start; scroll-snap-stop: always;
  position: relative; display: flex; align-items: center; justify-content: center;
  background: #000; overflow: hidden;
}

.reel-yt-wrap {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: #000; pointer-events: auto;
}
.reel-yt-wrap > div, .reel-yt-wrap iframe {
  width: 100%; height: 100%; border: 0;
}

/* ─── BOTTOM INFO ─── */
.reel-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 60px 18px calc(22px + var(--safe-bottom));
  background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.35) 55%, transparent 100%);
  z-index: 10; pointer-events: none;
}
.reel-info > * { pointer-events: auto; }
.reel-quote {
  font-family: var(--serif); font-style: italic; font-size: 1.22rem;
  color: #fff; line-height: 1.42; max-width: 86%; margin-bottom: 11px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.reel-meta {
  display: flex; align-items: center; gap: 9px; flex-wrap: wrap;
}
.reel-avatar {
  width: 30px; height: 30px; min-width: 30px; border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--crimson));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fell); font-style: italic; font-size: 13px; color: #fff;
  border: 2px solid rgba(255,255,255,0.2);
}
.reel-name { font-family: var(--sans); font-weight: 500; font-size: 13.5px; color: #fff; }
.reel-dept {
  font-family: var(--mono); font-size: 8.5px; letter-spacing: 1.8px; text-transform: uppercase;
  color: var(--gold-light); border: 1px solid rgba(184,145,58,0.4); border-radius: 10px;
  padding: 2px 7px;
}
.reel-date {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.5);
  margin-left: auto;
}

/* ─── WATCH TRACKER ─── */
.reel-watch-row {
  display: flex; align-items: center; gap: 8px; margin-top: 12px;
}
.reel-watch-track {
  flex: 1; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.18); overflow: hidden;
}
.reel-watch-fill {
  height: 100%; width: 0%; background: var(--gold); border-radius: 4px; transition: width 0.4s var(--ease);
}
.reel-watch-fill.done { background: var(--green); }
.reel-watch-label {
  font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.5px; color: rgba(255,255,255,0.75);
  white-space: nowrap; min-width: 68px; text-align: right;
}
.reel-watch-label.done { color: #7fe0ac; }

.reel-toast {
  position: absolute; top: calc(var(--topbar-h) + var(--safe-top) + 10px); left: 50%;
  transform: translateX(-50%) translateY(-14px);
  background: rgba(20,20,20,0.9); backdrop-filter: blur(8px);
  border: 1px solid rgba(127,224,172,0.4); color: #7fe0ac;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.5px;
  padding: 8px 16px; border-radius: 20px; z-index: 30;
  opacity: 0; transition: all 0.35s var(--spring); pointer-events: none; white-space: nowrap;
}
.reel-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── PROGRESS SEGMENTS (position in feed) ─── */
.reel-progress-wrap {
  position: fixed; top: calc(var(--safe-top) + 6px); left: 0; right: 0; z-index: 50;
  display: flex; gap: 3px; padding: 0 8px;
}
.reel-progress-seg {
  flex: 1; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.15);
  overflow: hidden;
}
.reel-progress-seg.active { background: rgba(255,255,255,0.3); }
.reel-progress-fill {
  height: 100%; width: 0%; background: var(--gold); border-radius: 2px;
}

/* ─── NO RESULTS ─── */
.reel-empty {
  height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  color: var(--ink-muted); font-family: var(--fell); font-style: italic;
  font-size: 1.4rem; text-align: center; padding: 40px;
}
.reel-empty-sub {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--ink-ghost);
}

/* ─── MOBILE TWEAKS ─── */
@media (max-width: 480px) {
  .reel-quote { font-size: 1.08rem; max-width: 82%; }
  .home-headline { font-size: 1.4rem; }
  .reel-search { width: 38vw; }
}
@media (max-width: 360px) {
  .home-item { padding: 12px 14px; gap: 10px; }
  .home-avatar { width: 40px; height: 40px; min-width: 40px; font-size: 14px; }
}
</style>
<base target="_blank">
</head>
<body>

<!-- TOP BAR -->
<div class="reel-topbar">
  <button class="reel-back" id="topBackBtn" aria-label="Back">←</button>
  <span class="reel-title" id="topTitle">Student Voices</span>
  <div class="reel-search-wrap" id="homeSearchWrap">
    <span class="reel-search-icon">⌕</span>
    <input type="text" class="reel-search" id="reelSearch" placeholder="Search…" autocomplete="off">
  </div>
</div>

<!-- HOME SCREEN -->
<div class="screen active" id="screenHome">
  <div class="home-scroll">
    <div class="home-heading">
      <div class="home-eyebrow">The Archive</div>
      <div class="home-headline">Student Voices</div>
    </div>
    <div class="home-list" id="homeList"></div>
  </div>
</div>

<!-- FEED SCREEN -->
<div class="screen" id="screenFeed">
  <div class="reel-feed" id="reelFeed"></div>
</div>

<script>
/* ═══════════════════════════════════════════
   STUDENT VOICES — Reels + Directory
═══════════════════════════════════════════ */

const GH = window.GH || {};

const DEMO_VIDEOS = [
  {
    id: 1, questId: "voice-1", student: "Lohendra", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=jNQXAC9IVRw",
    title: "On Being Yourself",
    quote: "Be yourself; everyone else is already taken.",
    dateStr: "2026-07-01", date: new Date("2026-07-01"),
    watchTarget: 15
  },
  {
    id: 2, questId: "voice-2", student: "Azeema", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
    title: "The Examined Life",
    quote: "The unexamined life is not worth living.",
    dateStr: "2026-07-05", date: new Date("2026-07-05"),
    watchTarget: 20
  },
  {
    id: 3, questId: "voice-3", student: "DK", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=LXb3EKWsInQ",
    title: "Finding Opportunity",
    quote: "In the middle of difficulty lies opportunity.",
    dateStr: "2026-07-10", date: new Date("2026-07-10"),
    watchTarget: 20
  },
  {
    id: 4, questId: "voice-4", student: "Catherine", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=9bZkp7q19f0",
    title: "Remembering the Past",
    quote: "Those who cannot remember the past are condemned to repeat it.",
    dateStr: "2026-07-14", date: new Date("2026-07-14"),
    watchTarget: 25
  },
  {
    id: 5, questId: "voice-5", student: "Pacman", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=RgKAFK5djSk",
    title: "Looking at the Stars",
    quote: "We are all in the gutter, but some of us are looking at the stars.",
    dateStr: "2026-07-16", date: new Date("2026-07-16"),
    watchTarget: 20
  },
  {
    id: 6, questId: "voice-6", student: "Meenz", department: "Cyber Security", platform: "youtube",
    url: "https://www.youtube.com/watch?v=60ItHLz5WEA",
    title: "The Why and the How",
    quote: "He who has a why to live can bear almost any how.",
    dateStr: "2026-07-18", date: new Date("2026-07-18"),
    watchTarget: 25
  },
];

const SAVE_ENDPOINT = "https://orange-term-57cf.andrewveda.workers.dev/save";

let VDB = [];
let currentVideos = [];
let activeIdx = 0;
let observer = null;
let ytPlayers = {};        // idx -> YT.Player
let youtubeReady = false;
let watchInterval = null;

let watchedMap  = loadJSON('vfv_reel_watched', {});     // questId -> seconds
let completedSet = new Set(loadJSON('vfv_reel_completed', []));

function loadJSON(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch (e) { return fallback; }
}
function persist() {
  try {
    localStorage.setItem('vfv_reel_watched', JSON.stringify(watchedMap));
    localStorage.setItem('vfv_reel_completed', JSON.stringify([...completedSet]));
  } catch (e) {}
}

window.onYouTubeIframeAPIReady = () => { youtubeReady = true; };

function extractYouTubeId(url) {
  if (!url) return null;
  const m = url.match(/(?:youtube\.com\/watch\?v=|youtube\.com\/shorts\/|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  return m ? m[1] : null;
}

function init() {
  VDB = DEMO_VIDEOS.map(v => ({
    ...v,
    youtubeId: v.platform === 'youtube' ? extractYouTubeId(v.url) : null
  })).filter(v => v.platform !== 'youtube' || v.youtubeId)
    .sort((a, b) => b.date - a.date);

  currentVideos = [...VDB];
  renderHome(VDB);
  setupSearch();
  setupTopBack();
  showScreen('home');
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

/* ═══════════════════════════════════════════
   SCREEN SWITCHING
═══════════════════════════════════════════ */
let currentScreen = 'home';

function showScreen(which) {
  currentScreen = which;
  document.getElementById('screenHome').classList.toggle('active', which === 'home');
  document.getElementById('screenFeed').classList.toggle('active', which === 'feed');
  document.getElementById('homeSearchWrap').style.display = which === 'home' ? '' : 'none';
  document.getElementById('topTitle').textContent = which === 'home' ? 'Student Voices' : 'Now Watching';
}

function setupTopBack() {
  document.getElementById('topBackBtn').addEventListener('click', () => {
    if (currentScreen === 'feed') {
      goHome();
    } else {
      window.history.back();
    }
  });
}

function goHome() {
  pauseAllPlayers();
  clearInterval(watchInterval); watchInterval = null;
  if (observer) { observer.disconnect(); observer = null; }
  renderHome(currentVideos.length ? filteredList() : VDB);
  showScreen('home');
}

/* ═══════════════════════════════════════════
   HOME (DIRECTORY) SCREEN
═══════════════════════════════════════════ */
function filteredList() {
  const q = document.getElementById('reelSearch').value.trim().toLowerCase();
  if (!q) return [...VDB];
  return VDB.filter(v =>
    v.student.toLowerCase().includes(q) ||
    v.title.toLowerCase().includes(q) ||
    v.department.toLowerCase().includes(q)
  );
}

function renderHome(list) {
  const container = document.getElementById('homeList');
  container.innerHTML = '';

  if (!list.length) {
    container.innerHTML = `
      <div class="home-empty">
        No students found<br>
        <span style="font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-ghost);">Try a different search</span>
      </div>`;
    return;
  }

  list.forEach(v => {
    const done = completedSet.has(v.questId);
    const watched = watchedMap[v.questId] || 0;
    const pct = v.watchTarget > 0 ? Math.min((watched / v.watchTarget) * 100, 100) : 0;

    const item = document.createElement('div');
    item.className = 'home-item';
    item.innerHTML = `
      <div class="home-avatar">
        ${getInitials(v.student)}
        ${done ? '<div class="check">✓</div>' : ''}
      </div>
      <div class="home-content">
        <div class="home-name">${escHtml(v.student)}</div>
        <div class="home-vidtitle">${escHtml(v.title)}</div>
        <div class="home-meta-row">
          <span class="home-dept">${escHtml(v.department)}</span>
          <span class="home-date">${v.dateStr}</span>
        </div>
        ${!done && pct > 0 ? `<div class="home-progress-mini"><div class="home-progress-mini-fill" style="width:${pct}%"></div></div>` : ''}
      </div>
      <div class="home-chevron">›</div>`;
    item.addEventListener('click', () => openFeedAt(v, list));
    container.appendChild(item);
  });
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════
   FEED (REELS) SCREEN
═══════════════════════════════════════════ */
function openFeedAt(video, list) {
  currentVideos = list && list.length ? list : [...VDB];
  const idx = currentVideos.findIndex(v => v.questId === video.questId);
  showScreen('feed');
  renderFeed(currentVideos, idx >= 0 ? idx : 0);
}

function renderFeed(videos, startIdx) {
  const feed = document.getElementById('reelFeed');
  feed.innerHTML = '';
  ytPlayers = {};

  const oldProgress = document.getElementById('reelProgress');
  if (oldProgress) oldProgress.remove();

  if (videos.length === 0) {
    feed.innerHTML = `
      <div class="reel-empty">
        <div>No videos found</div>
        <div class="reel-empty-sub">Try a different search</div>
      </div>`;
    return;
  }

  const progressWrap = document.createElement('div');
  progressWrap.className = 'reel-progress-wrap';
  progressWrap.id = 'reelProgress';
  videos.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'reel-progress-seg' + (i === startIdx ? ' active' : '');
    seg.innerHTML = '<div class="reel-progress-fill"></div>';
    progressWrap.appendChild(seg);
  });
  document.body.appendChild(progressWrap);

  videos.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'reel-item';
    item.dataset.idx = i;

    const ytId = v.youtubeId;
    const done = completedSet.has(v.questId);
    const watched = watchedMap[v.questId] || 0;
    const pct = v.watchTarget > 0 ? Math.min((watched / v.watchTarget) * 100, 100) : 0;

    const playerHTML = ytId
      ? `<div class="reel-yt-wrap"><div id="ytplayer-${i}"></div></div>`
      : `<div class="reel-yt-wrap"><div style="color:rgba(255,255,255,0.4);font-family:var(--mono);font-size:11px;letter-spacing:2px;">Video unavailable</div></div>`;

    const infoHTML = `
      <div class="reel-info">
        <div class="reel-quote">"${escHtml(v.quote)}"</div>
        <div class="reel-meta">
          <div class="reel-avatar">${getInitials(v.student)}</div>
          <span class="reel-name">${escHtml(v.student)}</span>
          <span class="reel-dept">${escHtml(v.department)}</span>
          <span class="reel-date">${v.dateStr}</span>
        </div>
        <div class="reel-watch-row">
          <div class="reel-watch-track"><div class="reel-watch-fill${done ? ' done' : ''}" id="watchFill-${i}" style="width:${pct}%"></div></div>
          <div class="reel-watch-label${done ? ' done' : ''}" id="watchLabel-${i}">${done ? '✓ Watched' : watched + 's / ' + v.watchTarget + 's'}</div>
        </div>
      </div>
      <div class="reel-toast" id="toast-${i}">✓ Progress saved</div>`;

    item.innerHTML = playerHTML + infoHTML;
    feed.appendChild(item);
  });

  activeIdx = startIdx;
  setupScrollObserver();

  // Wait for the YouTube API then create players
  waitForYT().then(() => {
    videos.forEach((v, i) => {
      if (!v.youtubeId) return;
      ytPlayers[i] = new YT.Player(`ytplayer-${i}`, {
        videoId: v.youtubeId,
        playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 1, mute: 1, autoplay: 0 },
        events: {
          onReady: () => {
            if (i === startIdx) jumpToIndex(startIdx, true);
          },
          onStateChange: (e) => onPlayerState(i, e)
        }
      });
    });
  });
}

function waitForYT() {
  return new Promise((resolve) => {
    if (youtubeReady && window.YT && YT.Player) return resolve();
    const check = setInterval(() => {
      if (youtubeReady && window.YT && YT.Player) { clearInterval(check); resolve(); }
    }, 100);
  });
}

function jumpToIndex(idx, instant) {
  const feed = document.getElementById('reelFeed');
  const items = feed.querySelectorAll('.reel-item');
  if (!items[idx]) return;
  items[idx].scrollIntoView({ behavior: instant ? 'auto' : 'smooth', block: 'start' });
  playVideo(idx);
  updateProgress(idx);
}

/* ─── SCROLL OBSERVER ─── */
function setupScrollObserver() {
  const feed = document.getElementById('reelFeed');
  const items = feed.querySelectorAll('.reel-item');

  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const idx = parseInt(entry.target.dataset.idx);
      if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
        if (activeIdx !== idx) {
          pauseVideo(activeIdx);
          activeIdx = idx;
          playVideo(idx);
          updateProgress(idx);
        }
      }
    });
  }, { threshold: [0.6] });

  items.forEach(item => observer.observe(item));
}

/* ─── VIDEO CONTROL ─── */
function playVideo(idx) {
  const p = ytPlayers[idx];
  if (!p || typeof p.playVideo !== 'function') return;
  try { p.unMute(); p.playVideo(); } catch (e) {}
}
function pauseVideo(idx) {
  const p = ytPlayers[idx];
  if (!p || typeof p.pauseVideo !== 'function') return;
  try { p.pauseVideo(); } catch (e) {}
}
function pauseAllPlayers() {
  Object.keys(ytPlayers).forEach(k => pauseVideo(k));
}

/* ─── PROGRESS BAR (position in feed) ─── */
function updateProgress(idx) {
  const segs = document.querySelectorAll('.reel-progress-seg');
  segs.forEach((s, i) => {
    s.classList.toggle('active', i === idx);
    const fill = s.querySelector('.reel-progress-fill');
    if (fill) fill.style.width = i < idx ? '100%' : '0%';
  });
}

/* ═══════════════════════════════════════════
   WATCH-TIME TRACKING + SUBMISSION
═══════════════════════════════════════════ */
function onPlayerState(idx, event) {
  if (idx !== activeIdx) return;
  const vid = currentVideos[idx];
  if (!vid) return;

  if (event.data === YT.PlayerState.PLAYING) {
    startWatchTimer(idx, vid);
  } else {
    clearInterval(watchInterval); watchInterval = null;
  }
}

function startWatchTimer(idx, vid) {
  clearInterval(watchInterval);
  watchInterval = setInterval(() => {
    if (completedSet.has(vid.questId)) { clearInterval(watchInterval); watchInterval = null; return; }

    watchedMap[vid.questId] = (watchedMap[vid.questId] || 0) + 1;
    const watched = watchedMap[vid.questId];
    const pct = vid.watchTarget > 0 ? Math.min((watched / vid.watchTarget) * 100, 100) : 100;

    const fill = document.getElementById(`watchFill-${idx}`);
    const label = document.getElementById(`watchLabel-${idx}`);
    if (fill) fill.style.width = pct + '%';
    if (label) label.textContent = `${watched}s / ${vid.watchTarget}s`;

    persist();

    if (watched >= vid.watchTarget && !completedSet.has(vid.questId)) {
      clearInterval(watchInterval); watchInterval = null;
      submitWatch(vid, idx);
    }
  }, 1000);
}

async function submitWatch(vid, idx) {
  completedSet.add(vid.questId);
  persist();

  const fill = document.getElementById(`watchFill-${idx}`);
  const label = document.getElementById(`watchLabel-${idx}`);
  if (fill) fill.classList.add('done');
  if (label) { label.classList.add('done'); label.textContent = '✓ Watched'; }

  try {
    const res = await fetch(SAVE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_name:    GH.name || GH.username || 'Guest',
        department:      GH.dept || localStorage.getItem('vfv_dept') || localStorage.getItem('userDept') || '',
        github_username: GH.username || '',
        github_id:       GH.githubId || '',
        github_profile:  GH.profile || '',
        quest_id:        vid.questId,
        time_spent:      watchedMap[vid.questId] || vid.watchTarget
      })
    });
    if (!res.ok) throw new Error(await res.text());
    showToast(idx, '✓ Progress saved');
  } catch (e) {
    console.error('Save failed', e);
    showToast(idx, '⚠ Save failed — will retry next visit');
    completedSet.delete(vid.questId);
    persist();
  }
}

function showToast(idx, msg) {
  const t = document.getElementById(`toast-${idx}`);
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

/* ═══════════════════════════════════════════
   SEARCH (home directory)
═══════════════════════════════════════════ */
function setupSearch() {
  const input = document.getElementById('reelSearch');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      renderHome(filteredList());
    }, 250);
  });
}

/* ─── KEYBOARD NAV (desktop convenience) ─── */
document.addEventListener('keydown', e => {
  if (currentScreen !== 'feed') return;
  const feed = document.getElementById('reelFeed');
  const itemHeight = window.innerHeight;
  if (e.key === 'ArrowDown') {
    feed.scrollBy({ top: itemHeight, behavior: 'smooth' });
  } else if (e.key === 'ArrowUp') {
    feed.scrollBy({ top: -itemHeight, behavior: 'smooth' });
  } else if (e.key === 'Escape') {
    goHome();
  }
});

/* ─── INIT ─── */
document.addEventListener('DOMContentLoaded', init);
</script>

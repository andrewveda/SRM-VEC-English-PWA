<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox Forum</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<style>
/* 🔥 USE YOUR EXISTING ROOT VARIABLES */
:root {
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --bg-body:#1a1208;
  --surface:rgba(201,168,76,0.05);
  --border:rgba(201,168,76,0.22);
  --text-main:#F9F3E3;
}

body{
  margin:0;
  font-family:'Cormorant Garamond',serif;
  background:var(--bg-body);
  color:var(--text-main);
}

/* HEADER */
header{
  text-align:center;
  padding:20px 10px;
  border-bottom:1px solid var(--border);
}

h1{
  font-family:'Playfair Display',serif;
  letter-spacing:.15em;
  color:var(--gold-light);
}

.subtitle{
  font-size:11px;
  letter-spacing:.25em;
  color:var(--gold);
  opacity:.6;
  margin-top:5px;
  font-family:'DM Mono',monospace;
}

/* MAIN */
main{
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* PRESENTATION CARD */
.presentation{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:18px;
  margin-bottom:20px;
}

.presentation-title{
  font-family:'Playfair Display',serif;
  font-size:22px;
  color:var(--gold-light);
}

.presentation-meta{
  font-size:10px;
  letter-spacing:.2em;
  color:var(--gold);
  opacity:.5;
  margin-top:5px;
  font-family:'DM Mono',monospace;
}

.presentation-content{
  margin-top:12px;
  font-size:18px;
  line-height:1.5;
}

/* DISCUSSION BOX */
.discussion-box{
  margin-top:30px;
}
</style>
</head>

<body>

<header>
  <h1>VOX FORUM</h1>
  <div class="subtitle">Speak. Answer. Refine.</div>
</header>

<main>

  <!-- PRESENTATION CONTENT -->
  <div class="presentation">
    <div class="presentation-title" id="title">Loading...</div>
    <div class="presentation-meta" id="meta"></div>
    <div class="presentation-content" id="content"></div>
  </div>

  <!-- DISCUSSION -->
  <div class="discussion-box" id="discussion"></div>

</main>

<script>
// 🔥 Example dynamic content (replace with your system)
const presentationId = "presentation-101";

document.getElementById("title").innerText = "";
document.getElementById("meta").innerText = "Presented by Mr Barid Baran • EIE";
document.getElementById("content").innerText =
"AI systems are increasingly shaping human decisions. The question is not whether AI is intelligent, but whether it is responsible.";


// 🔥 LOAD GISCUS PER PRESENTATION
function loadGiscus(id) {
  const container = document.getElementById("discussion");
  container.innerHTML = "";

  const script = document.createElement("script");
  script.src = "https://giscus.app/client.js";

  script.setAttribute("data-repo", "andrewveda/a-quote-a-day");
  script.setAttribute("data-repo-id", "R_kgDORI8-yw");
  script.setAttribute("data-category", "General");
  script.setAttribute("data-category-id", "DIC_kwDORI8-y84C1-Jq");

  script.setAttribute("data-mapping", "specific");
  script.setAttribute("data-term", id);

  script.setAttribute("data-reactions-enabled", "1");
  script.setAttribute("data-theme", "dark"); // 🔥 matches your theme

  script.crossOrigin = "anonymous";
  script.async = true;

  container.appendChild(script);
}

loadGiscus(presentationId);
</script>

</body>
</html>

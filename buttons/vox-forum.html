<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox Forum — Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --bg:#1a1208;
  --surface:rgba(201,168,76,0.06);
  --border:rgba(201,168,76,0.25);
  --text:#F9F3E3;
}

/* LIGHT MODE */
html.light {
  --bg:#faf4e8;
  --surface:rgba(154,110,0,0.08);
  --border:rgba(154,110,0,0.3);
  --text:#3a2800;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Cormorant Garamond',serif;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  border-bottom:1px solid var(--border);
  position:relative;
}

h1{
  font-family:'Playfair Display',serif;
  letter-spacing:.15em;
  color:var(--gold-light);
}

.subtitle{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:.25em;
  opacity:.6;
}

/* TOGGLE */
.toggle{
  position:absolute;
  right:20px;
  top:20px;
  cursor:pointer;
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
}

/* MAIN */
main{
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:transform .15s, border .2s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-3px);
  border-color:var(--gold);
}

.title{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:var(--gold-light);
}

.meta{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:.2em;
  opacity:.5;
  margin-top:4px;
}

.desc{
  margin-top:8px;
  font-size:16px;
  line-height:1.4;
}

/* FOOTER */
footer{
  text-align:center;
  opacity:.6;
  font-size:14px;
  margin-top:20px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --obsidian: #ffffff;
  --deep:     #faf7f2;
  --surface:  #ffffff;
  --surface2: #f5efe6;

  --gold:       #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim:   rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.35);

  --crimson:    #7A0019;

  --text:       #2a2a2a;
  --text-muted: #7a766f;
  --text-dim:   #b0a99f;

  --border:     rgba(0,0,0,0.06);
  --border-gold: rgba(201,168,76,0.35);
  --shadow-sm:  0 2px 8px rgba(0,0,0,0.06);
  --shadow-md:  0 8px 24px rgba(0,0,0,0.08);
  --shadow-gold: 0 8px 24px rgba(201,168,76,0.18);

  --serif: 'Playfair Display', Georgia, serif;
  --mono:  'DM Mono', monospace;
  --sans:  'Raleway', sans-serif;
  --fell:  'IM Fell English', Georgia, serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--deep);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  top: -20%; left: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(201,168,76,0.07), transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: breathe 12s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.1); opacity: 1; }
}

/* ─── MASTHEAD ─── */
.masthead {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 16px 20px 0;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-sm);
}
.masthead-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.masthead-dateline { color: var(--text-muted); }
.masthead-edition {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 9px;
  font-family: var(--sans);
  font-weight: 700;
  letter-spacing: 1.5px;
  box-shadow: 0 2px 8px rgba(201,168,76,0.25);
}
.masthead-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(32px, 7vw, 60px);
  color: var(--text);
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 2px;
}
.masthead-rule-ornament {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
}
.masthead-rule-ornament::before,
.masthead-rule-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gold-border);
}
.masthead-ornament { font-size: 14px; color: var(--gold); }
.masthead-tagline {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.5px;
  padding-bottom: 14px;
}

/* ─── BREADCRUMB ─── */
.breadcrumb-bar {
  background: rgba(255,255,255,0.95);
  border-top: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.breadcrumb-bar a {
  color: var(--gold);
  text-decoration: none;
  transition: opacity 0.2s;
}
.breadcrumb-bar a:hover { opacity: 0.7; }
.breadcrumb-sep { opacity: 0.4; }

/* ─── LAYOUT ─── */
.page-body {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ─── SECTION LABEL ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 32px 0 20px;
}
.section-label-text {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: white;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  padding: 5px 16px;
  border-radius: 4px 0 0 4px;
}
.section-label-rule {
  flex: 1;
  height: 2px;
  background: var(--gold-border);
}
.section-label-end {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-muted);
  padding: 5px 12px;
  border: 1px solid var(--gold-border);
  border-left: none;
  border-radius: 0 4px 4px 0;
  background: var(--surface);
}

/* ─── HERO ─── */
.forum-hero {
  background: linear-gradient(145deg, #ffffff, #f8f2e8);
  border: 1px solid var(--border);
  border-top: 4px solid var(--gold);
  border-radius: 0 0 16px 16px;
  padding: 32px 36px 28px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-gold);
}
.forum-hero::before {
  content: '❡';
  position: absolute;
  top: -10px; right: 24px;
  font-size: 180px;
  line-height: 1;
  color: var(--gold);
  opacity: 0.05;
  user-select: none;
}
.forum-hero-banner {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  text-align: center;
  padding: 8px;
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  box-shadow: 0 2px 12px rgba(201,168,76,0.3);
}
.forum-hero-kicker {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  margin-bottom: 12px;
}
.forum-hero-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(26px, 4vw, 44px);
  font-weight: 400;
  line-height: 1.25;
  color: var(--text);
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.forum-hero-desc {
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-muted);
  max-width: 640px;
  position: relative;
  z-index: 1;
}
.forum-hero-stats {
  display: flex;
  gap: 24px;
  margin-top: 20px;
  padding-top: 20px;
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.forum-stat { display: flex; flex-direction: column; gap: 2px; }
.forum-stat-num {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
}
.forum-stat-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* ─── SEARCH ─── */
.search-wrap { margin: 24px 0 8px; position: relative; }
.search-input {
  width: 100%;
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 12px 20px 12px 44px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  box-shadow: var(--shadow-sm);
}
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus {
  border-color: var(--gold-border);
  box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
}
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-dim);
  font-size: 16px;
  pointer-events: none;
}

/* ─── FILTER TABS ─── */
.filter-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 4px 0;
}
.filter-tabs::-webkit-scrollbar { display: none; }
.filter-tab {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 6px 16px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  outline: none;
}
.filter-tab:hover {
  background: var(--gold-dim);
  color: var(--gold);
  border-color: var(--gold-border);
}
.filter-tab.active {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  border-color: transparent;
  box-shadow: 0 3px 10px rgba(201,168,76,0.3);
}

/* ─── ARTICLES GRID ─── */
.articles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
}

/* ─── ARTICLE CARD ─── */
.article-card {
  background: linear-gradient(145deg, #ffffff, #f8f2e8);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px 22px 20px;
  position: relative;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(.4,0,.2,1);
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  animation: fadeUp 0.45s cubic-bezier(.4,0,.2,1) both;
}
.article-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 16px 16px 0 0;
  opacity: 0;
  transition: opacity 0.3s;
}
.article-card:hover {
  border-color: var(--gold-border);
  box-shadow: var(--shadow-gold);
  transform: translateY(-3px);
}
.article-card:hover::before { opacity: 1; }

.article-card.featured {
  grid-column: 1 / -1;
  flex-direction: row;
  gap: 32px;
  align-items: flex-start;
  padding: 28px 32px;
}
.article-card.featured::before { opacity: 1; }
.article-card.featured .card-content { flex: 1; }
.article-card.featured .card-title { font-size: clamp(20px, 2.8vw, 30px); }

.card-kicker {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  margin-bottom: 10px;
}
.card-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(17px, 2.2vw, 22px);
  font-weight: 400;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 12px;
  flex: 1;
}
.card-desc {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-muted);
  margin-bottom: 18px;
  flex: 1;
}
.card-rule { height: 1px; background: var(--border); margin-bottom: 14px; }

.card-byline { display: flex; align-items: center; gap: 10px; margin-top: auto; }
.card-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(201,168,76,0.25);
}
.card-byline-info { flex: 1; min-width: 0; }
.card-author {
  font-family: var(--serif);
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-dept {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 1px;
}

.card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.card-tag {
  font-family: var(--mono);
  font-size: 8px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 3px 9px;
  border-radius: 10px;
}
.card-tag.primary {
  color: var(--gold);
  background: var(--gold-dim);
  border-color: var(--gold-border);
}

.card-read {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--gold);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  transition: gap 0.2s;
}
.article-card:hover .card-read { gap: 10px; }

.coming-soon {
  border: 2px dashed var(--gold-border);
  background: var(--gold-dim);
  opacity: 0.7;
  cursor: default;
}
.coming-soon:hover {
  transform: none;
  box-shadow: var(--shadow-sm);
  border-color: var(--gold-border);
}
.coming-soon-label {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
  margin-top: auto;
  padding-top: 12px;
}

/* ─── SUBMIT CTA ─── */
.submit-cta {
  margin-top: 40px;
  background: linear-gradient(145deg, var(--gold-dim), rgba(201,168,76,0.06));
  border: 1px solid var(--gold-border);
  border-top: 3px solid var(--gold);
  border-radius: 16px;
  padding: 28px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
  box-shadow: var(--shadow-sm);
}
.cta-kicker {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  margin-bottom: 6px;
}
.cta-heading {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(18px, 2.5vw, 26px);
  color: var(--text);
  margin-bottom: 6px;
}
.cta-desc {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}
.cta-btn {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: white;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border: none;
  border-radius: 24px;
  padding: 12px 24px;
  cursor: pointer;
  text-decoration: none;
  display: inline-block;
  box-shadow: 0 4px 14px rgba(201,168,76,0.35);
  transition: all 0.25s;
  white-space: nowrap;
  flex-shrink: 0;
}
.cta-btn:hover {
  transform: translateY(-2px);
  filter: brightness(1.06);
  box-shadow: 0 8px 20px rgba(201,168,76,0.4);
}

/* ─── FOOTER ─── */
.site-footer {
  background: var(--text);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 20px;
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.35); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
  .article-card.featured { flex-direction: column; gap: 0; }
  .submit-cta { flex-direction: column; align-items: flex-start; }
  .forum-hero { padding: 22px 18px 20px; }
}
@media (max-width: 500px) {
  .masthead-meta { flex-direction: column; gap: 4px; text-align: center; }
  .articles-grid { grid-template-columns: 1fr; }
}

/* ─── NO RESULTS ─── */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-family: var(--sans);
  font-size: 15px;
  border: 2px dashed var(--gold-border);
  border-radius: 16px;
  margin-top: 20px;
  background: var(--gold-dim);
  display: none;
}
</style>

</head>

<body>

<header>
  <h1>VOX FORUM</h1>
  <div class="subtitle">Forum of Thinking Voices</div>
  <div class="toggle" onclick="toggleTheme()">☼</div>
</header>

<main>

  <!-- STUDENT CARD -->

  <div class="card" onclick="openLink('https://andrewveda.github.io/SRM-VEC-English-PWA/vox-forum/Barid_Baran')">
    <div class="title">Freedom, Democracy and the Cost of Silence</div>
    <div class="meta">Barid Baran • EIE </div>
    <div class="desc">
      Freedom declines not by force alone, but through silence. This discussion explores accountability, participation, and civic responsibility.
    </div>
  </div>

  <!-- ADD MORE LIKE THIS -->

  <!--
  <div class="card" onclick="openLink('LINK_HERE')">
    <div class="title">Topic</div>
    <div class="meta">Student Name</div>
    <div class="desc">Short description</div>
  </div>
  -->

</main>

<footer>
  Enter. Question deeply..
</footer>

<script>
function openLink(url){
  window.location.href = url;
}

function toggleTheme(){
  document.documentElement.classList.toggle("light");
}
</script>

</body>
</html>

<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Vox Forum — Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
body {
  font-family: 'Raleway', sans-serif;
  background: #faf7f2;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-family: 'IM Fell English', serif;
  text-align: center;
}

/* SEARCH */
.search {
  width: 100%;
  padding: 12px;
  margin: 20px 0;
  border-radius: 20px;
  border: 1px solid #ccc;
}

/* FILTERS */
.filters {
  margin-bottom: 20px;
}
.filters button {
  margin-right: 8px;
  padding: 6px 12px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 16px;
}

/* CARD */
.card {
  background: white;
  padding: 16px;
  border-radius: 12px;
  text-decoration: none;
  color: black;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  transition: 0.2s;
}
.card:hover {
  transform: translateY(-4px);
}

/* FEATURED */
.featured {
  grid-column: 1 / -1;
  background: #fff8e6;
}

/* TEXT */
.title {
  font-family: 'IM Fell English', serif;
  font-size: 18px;
  margin-bottom: 10px;
}
.author {
  font-weight: bold;
}
.dept {
  font-size: 12px;
  color: #888;
}
</style>

</head>

<body>

<div class="container">

  <h1>Vox Forum</h1>

  <input id="search" class="search" placeholder="Search..." />

  <div class="filters">
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('civic')">Civic</button>
    <button onclick="setFilter('philosophy')">Philosophy</button>
    <button onclick="setFilter('society')">Society</button>
  </div>

  <div id="grid" class="grid"></div>

</div>

<script>
let students = [];
let currentFilter = "all";

async function load() {
  const res = await fetch('/SRM-VEC-English-PWA/vox-forum/students.json');
  students = await res.json();
  render();
}

function render() {
  const grid = document.getElementById('grid');
  const search = document.getElementById('search').value.toLowerCase();

  grid.innerHTML = "";

  students.forEach(s => {

    const matchSearch =
      s.name.toLowerCase().includes(search) ||
      s.title.toLowerCase().includes(search);

    const matchFilter =
      currentFilter === "all" ||
      (s.tags && s.tags.includes(currentFilter));

    if (!matchSearch || !matchFilter) return;

    const card = document.createElement('a');
  card.href = `/SRM-VEC-English-PWA/buttons/vox-forum/page.html?id=${s.id}`;
    card.className = "card";

    if (s.id === "Barid_Baran") {
      card.classList.add("featured");
    }

    card.innerHTML = `
      <div class="title">${s.title}</div>
      <div class="author">${s.name}</div>
      <div class="dept">${s.dept}</div>
    `;

    grid.appendChild(card);
  });
}

function setFilter(f) {
  currentFilter = f;
  render();
}

document.getElementById('search').addEventListener('input', render);

load();
</script>

</body>
</html>

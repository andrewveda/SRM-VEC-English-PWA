<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox Forum — Directory</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@400;600&family=DM+Mono:wght@400&display=swap" rel="stylesheet">

<style>
:root {
  --gold:#C9A84C;
  --gold-light:#E8C97A;
  --bg:#1a1208;
  --surface:rgba(201,168,76,0.06);
  --border:rgba(201,168,76,0.25);
  --text:#F9F3E3;
}

/* LIGHT MODE */
html.light {
  --bg:#faf4e8;
  --surface:rgba(154,110,0,0.08);
  --border:rgba(154,110,0,0.3);
  --text:#3a2800;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Cormorant Garamond',serif;
}

/* HEADER */
header{
  text-align:center;
  padding:20px;
  border-bottom:1px solid var(--border);
  position:relative;
}

h1{
  font-family:'Playfair Display',serif;
  letter-spacing:.15em;
  color:var(--gold-light);
}

.subtitle{
  font-family:'DM Mono',monospace;
  font-size:11px;
  letter-spacing:.25em;
  opacity:.6;
}

/* TOGGLE */
.toggle{
  position:absolute;
  right:20px;
  top:20px;
  cursor:pointer;
  border:1px solid var(--border);
  padding:6px 10px;
  border-radius:20px;
  font-size:12px;
}

/* MAIN */
main{
  max-width:800px;
  margin:auto;
  padding:20px;
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:12px;
  transition:transform .15s, border .2s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-3px);
  border-color:var(--gold);
}

.title{
  font-family:'Playfair Display',serif;
  font-size:20px;
  color:var(--gold-light);
}

.meta{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:.2em;
  opacity:.5;
  margin-top:4px;
}

.desc{
  margin-top:8px;
  font-size:16px;
  line-height:1.4;
}

/* FOOTER */
footer{
  text-align:center;
  opacity:.6;
  font-size:14px;
  margin-top:20px;
}
</style>

</head>

<body>

<header>
  <h1>VOX FORUM</h1>
  <div class="subtitle">Directory of Voices</div>
  <div class="toggle" onclick="toggleTheme()">☼</div>
</header>

<main>

  <!-- STUDENT CARD -->

  <div class="card" onclick="openLink('https://andrewveda.github.io/SRM-VEC-English-PWA/vox-forum/Barid_Baran')">
    <div class="title">Freedom, Democracy and the Cost of Silence</div>
    <div class="meta">Barid Baran • Presentation</div>
    <div class="desc">
      Freedom declines not by force alone, but through silence. This discussion explores accountability, participation, and civic responsibility.
    </div>
  </div>

  <!-- ADD MORE LIKE THIS -->

  <!--
  <div class="card" onclick="openLink('LINK_HERE')">
    <div class="title">Topic</div>
    <div class="meta">Student Name</div>
    <div class="desc">Short description</div>
  </div>
  -->

</main>

<footer>
  Enter. Respond. Leave a trace.
</footer>

<script>
function openLink(url){
  window.location.href = url;
}

function toggleTheme(){
  document.documentElement.classList.toggle("light");
}
</script>

</body>
</html>

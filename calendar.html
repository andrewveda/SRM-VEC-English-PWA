<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quest Calendar — SRM VEC English</title>
  <link rel="icon" type="image/png" href="icons/icon-96x96.png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#faf7f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --obsidian: #ffffff;
      --deep: #faf7f2;
      --surface: #ffffff;
      --surface2: #f5efe6;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: rgba(201,168,76,0.12);
      --crimson: #7A0019;
      --text: #2a2a2a;
      --text-muted: #7a766f;
      --text-dim: #b0a99f;
      --border: rgba(201,168,76,0.35);
      --border-dim: rgba(0,0,0,0.06);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--deep);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Ambient background blur */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .ambient::before {
      content: '';
      position: absolute;
      top: -10vw;
      left: -10vw;
      width: 70vw;
      height: 70vw;
      background: radial-gradient(circle, rgba(201,168,76,0.08), transparent 70%);
      animation: breathe 10s ease-in-out infinite;
    }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.4; }
      50% { transform: scale(1.15); opacity: 0.8; }
    }

    /* Container */
    .cal-app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--obsidian);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 40px rgba(0,0,0,0.05);
    }

    /* Header */
    .header {
      padding: 16px 20px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-dim);
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-user {
      display: flex;
      flex-direction: column;
    }
    .user-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }
    .user-dept {
      font-size: 0.58rem;
      letter-spacing: 2px;
      color: var(--gold);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .home-link {
      background: var(--surface2);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text-muted);
      font-size: 0.7rem;
      text-decoration: none;
      transition: all 0.2s;
    }
    .home-link:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    /* Tabs */
    .type-tabs {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: var(--deep);
      border-bottom: 1px solid var(--border-dim);
    }
    .type-tab {
      flex: 1;
      padding: 10px 4px;
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      text-align: center;
    }
    .type-tab.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 500;
    }

    /* Offline Banner */
    .offline-banner {
      background: rgba(255,152,0,0.12);
      border-bottom: 1px solid rgba(255,152,0,0.25);
      padding: 8px 16px;
      text-align: center;
      font-size: 0.62rem;
      letter-spacing: 1px;
      color: #e65100;
      text-transform: uppercase;
      display: none;
    }
    .offline-banner.show { display: block; }

    /* Calendar Body */
    .cal-body {
      flex: 1;
      padding: 20px 16px 40px;
      display: flex;
      flex-direction: column;
    }

    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .cal-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border-dim);
      border-radius: 10px;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .cal-nav-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .cal-month-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    /* Grid */
    .cal-dow {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 8px;
      text-align: center;
    }
    .cal-dow div {
      font-size: 0.55rem;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      padding: 4px 0;
    }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid transparent;
      font-family: 'DM Mono', monospace;
      position: relative;
      user-select: none;
    }
    .cal-day:active:not(.disabled) {
      transform: scale(0.92);
    }
    .cal-day.disabled {
      opacity: 0.15;
      cursor: default;
    }

    /* Day States */
    .cal-day.done {
      background: linear-gradient(135deg, rgba(201,168,76,0.3), rgba(232,201,122,0.15));
      border-color: rgba(201,168,76,0.7);
      border-width: 1.5px;
      color: #8c6a18;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(201,168,76,0.18);
    }
    .cal-day.done::after {
      content: '🔥';
      font-size: 0.65rem;
      position: absolute;
      bottom: 2px;
      right: 3px;
      filter: drop-shadow(0 0 2px rgba(255,150,0,0.6));
    }
    .cal-day.missed {
      background: rgba(122,0,25,0.04);
      border-color: rgba(122,0,25,0.12);
      color: rgba(122,0,25,0.45);
    }
    .cal-day.today-available {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 700;
      box-shadow: 0 0 12px rgba(201,168,76,0.3);
    }
    .cal-day.future {
      background: var(--surface);
      color: var(--text-dim);
      border-color: var(--border-dim);
    }

    /* Modal for duplicate matching */
    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 600;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      padding: 16px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .modal-btn {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border-dim);
      background: var(--deep);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
      margin-top: 8px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 20px 12px;
      font-size: 0.58rem;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-top: auto;
    }
    .footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>

<div class="ambient"></div>

<div class="cal-app">
  <div class="header">
    <div class="header-user">
      <span class="user-name" id="userNameLabel">Guest User</span>

    <button class="type-tab" onclick="switchType('story', this)">📚 Stories</button>
  </div>

  <div class="cal-body">
    <div class="cal-nav">

      <span class="cal-month-label" id="calMonthLabel"></span>
      <button class="cal-nav-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="cal-dow">
      <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
      <div>Thu</div><div>Fri</div><div>Sat</div>
    </div>

    <div class="cal-days" id="calDays"></div>

    <div class="footer">
      Created with grit, nurtured with love and charged with passion ♥ by <a href="https://andrewveda.github.io/" target="_blank">Andrew Veda</a><br>SRM Valliammai Engineering College
    </div>
  </div>
</div>

<!-- Modal for choosing student record -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" id="modalBox"></div>
</div>

// Init
async function init() {
  checkOnlineStatus();
  const savedName = localStorage.getItem("userName") || "Guest";
  const savedDept = localStorage.getItem("userDept") || "—";
  
  document.getElementById("userNameLabel").textContent = savedName;
  document.getElementById("userDeptLabel").textContent = savedDept;

  const cached = localStorage.getItem("cachedUserData");
  if (cached) {
    userData = JSON.parse(cached);
    renderCalendar(currentMonth, currentYear, currentType);
  }

  if (savedName !== "Guest") {
    fetchUserData(savedName);
  } else {
    renderCalendar(currentMonth, currentYear, currentType);
  }
}

async function fetchUserData(name) {
  try {
    const { data, error } = await supabase.from("report_card_view").select("*");
    if (error) throw error;

    const matches = (data || []).filter(u => u.name && u.name.trim().toLowerCase() === name.trim().toLowerCase());

    if (matches.length === 0) {
      userData = { name, quest_list: "", video_list: "", story_list: "" };
    } else if (matches.length === 1) {
      userData = matches[0];
    } else {
      const mode = localStorage.getItem("userIdentityMode");
      if (mode === "merged") {
        userData = mergeUserRecords(matches);
      } else if (mode === "single") {
        const index = parseInt(localStorage.getItem("userIdentityIndex"), 10);
        if (!isNaN(index) && matches[index]) userData = matches[index];
      } else {
        showDuplicatePicker(matches);
        return;
      }
    }

    localStorage.setItem("cachedUserData", JSON.stringify(userData));
    renderCalendar(currentMonth, currentYear, currentType);
  } catch (err) {
    console.error("Fetch error:", err);
    document.getElementById("offlineBanner").classList.add("show");
  }
}

function showDuplicatePicker(matches) {
  const modal = document.getElementById("confirmModal");
  const box = document.getElementById("modalBox");

  box.innerHTML = `
    <p style="font-size:0.9rem;margin-bottom:12px;">Multiple records found.<br>Which one are you?</p>
    <div id="pickerOptions" style="display:flex;flex-direction:column;gap:6px;"></div>
  `;

  const container = document.getElementById("pickerOptions");
  matches.forEach((match, i) => {
    const btn = document.createElement("button");
    btn.className = "modal-btn";
    btn.style.textAlign = "left";
    btn.innerHTML = `
      <div style="font-weight:700;">${match.name}</div>
      <div style="color:var(--gold);font-size:0.6rem;">${match.department || "No dept"} · ${match.quests_completed ?? 0} quests</div>
    `;
    btn.onclick = () => {
      userData = match;
      localStorage.setItem("userIdentityMode", "single");
      localStorage.setItem("userIdentityIndex", i);
      localStorage.setItem("cachedUserData", JSON.stringify(userData));
      modal.classList.remove("show");
      renderCalendar(currentMonth, currentYear, currentType);
    };
    container.appendChild(btn);
  });

  const mergeBtn = document.createElement("button");
  mergeBtn.className = "modal-btn";
  mergeBtn.style.borderColor = "var(--gold)";
  mergeBtn.style.color = "var(--gold)";
  mergeBtn.textContent = "Merge All Records";
  mergeBtn.onclick = () => {
    userData = mergeUserRecords(matches);
    localStorage.setItem("userIdentityMode", "merged");
    localStorage.setItem("cachedUserData", JSON.stringify(userData));
    modal.classList.remove("show");
    renderCalendar(currentMonth, currentYear, currentType);
  };
  container.appendChild(mergeBtn);

  modal.classList.add("show");
}

function mergeUserRecords(records) {
  const merged = { ...records[0] };
  let questSet = new Set(), videoSet = new Set(), storySet = new Set();

  records.forEach(r => {
    parseList(r.quest_list).forEach(x => questSet.add(x));
    parseList(r.video_list).forEach(x => videoSet.add(x));
    parseList(r.story_list).forEach(x => storySet.add(x));
  });

  merged.quest_list = [...questSet].join(",");
  merged.video_list = [...videoSet].join(",");
  merged.story_list = [...storySet].join(",");
  return merged;
}

function parseList(raw) {
  if (!raw) return [];
  return raw.split(",").map(x => x.trim().replace(/\s+/g, "").toLowerCase()).filter(Boolean);
}

window.changeMonth = function(dir) {
  currentMonth += dir;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  else if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar(currentMonth, currentYear, currentType);
};

window.switchType = function(type, btn) {
  currentType = type;
  document.querySelectorAll(".type-tab").forEach(t => t.classList.remove("active"));
  if (btn) btn.classList.add("active");
  renderCalendar(currentMonth, currentYear, currentType);
};

function renderCalendar(month, year, type) {
  const grid = document.getElementById("calDays");
  const label = document.getElementById("calMonthLabel");
  if (!grid || !label) return;

  label.textContent = new Date(year, month).toLocaleString("default", { month: "long" }) + " " + year;
  grid.innerHTML = "";

  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const today = new Date(); today.setHours(0, 0, 0, 0);

  let rawList = "";
  if (type === "quest") rawList = userData?.quest_list || "";
  else if (type === "video") rawList = userData?.video_list || "";
  else rawList = userData?.story_list || "";

  const list = parseList(rawList);

  for (let i = 0; i < firstDay; i++) {
    const e = document.createElement("div");
    e.className = "cal-day disabled";
    grid.appendChild(e);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const diff = Math.floor((date - startDate) / 86400000);
    const qn = diff >= 0 ? diff + 1 : null;

    const div = document.createElement("div");
    div.className = "cal-day";
    div.textContent = d;

    if (!qn) {
      div.classList.add("disabled");
      grid.appendChild(div);
      continue;
    }

    const key = type === "quest" ? `quest${qn}` : type === "video" ? `video${qn}` : `story${qn}`;
    const done = list.includes(key);

    if (done) div.classList.add("done");
    else if (date < today) div.classList.add("missed");
    else if (date.getTime() === today.getTime()) div.classList.add("today-available");
    else div.classList.add("future");

    div.onclick = () => {
      let link = null;
      if (type === "quest") link = questLinks[qn];
      else if (type === "video") link = videoLink;
      else link = storyLinks[qn];
      if (link) window.location.href = link;
    };

    grid.appendChild(div);
  }
}

function checkOnlineStatus() {
  if (!navigator.onLine) document.getElementById("offlineBanner").classList.add("show");
}
window.addEventListener("online", () => document.getElementById("offlineBanner").classList.remove("show"));
window.addEventListener("offline", () => document.getElementById("offlineBanner").classList.show());

init();
</script>
</body>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Idiom Comic Showcase</title>
<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

a{
    display:inline-block;
    margin-top:10px;
}
</style>
</head>
<body>

<h1>📚 Idiom Comic Showcase</h1>

<div id="gallery">Loading...</div>

<script>

fetch(
'https://api.github.com/repos/andrewveda/SRM-VEC-English-PWA/issues?state=open&per_page=100'
)
.then(r => r.json())
.then(issues => {

    const gallery = document.getElementById('gallery');

    gallery.innerHTML = '';

    issues.forEach(issue => {

        gallery.innerHTML += `
        <div class="card">
            <h3>${issue.title}</h3>
            <pre>${issue.body}</pre>
        </div>
        `;

    });

});

</script>

</body>
</html>

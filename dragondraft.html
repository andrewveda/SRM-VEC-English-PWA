<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>English Quests — SRM VEC</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

/* ── THEME VARIABLES ── */
:root {
  --bg:         #0a0a0a;
  --bg2:        #111114;
  --surface:    rgba(212,175,55,0.04);
  --surface2:   rgba(212,175,55,0.07);
  --surface3:   rgba(212,175,55,0.11);
  --surface4:   rgba(212,175,55,0.16);
  --border:     rgba(212,175,55,0.20);
  --border2:    rgba(212,175,55,0.30);
  --border3:    rgba(212,175,55,0.38);
  --gold:       #d4af37;
  --gold-l:     #f0d060;
  --gold-d:     #a88520;
  --gold-dim:   rgba(212,175,55,0.55);
  --gold-faint: rgba(212,175,55,0.22);
  --text:       #f0ead8;
  --text-dim:   rgba(240,234,216,0.42);
  --input-bg:   rgba(0,0,0,0.38);
  --pattern-op: 0.028;
  --card-shadow:rgba(212,175,55,0.12);
}

html.light {
  --bg:         #f5eedc;
  --bg2:        #ede4cc;
  --surface:    rgba(138,101,0,0.05);
  --surface2:   rgba(138,101,0,0.08);
  --surface3:   rgba(138,101,0,0.12);
  --surface4:   rgba(138,101,0,0.17);
  --border:     rgba(138,101,0,0.18);
  --border2:    rgba(138,101,0,0.28);
  --border3:    rgba(138,101,0,0.38);
  --gold:       #8a6500;
  --gold-l:     #b08000;
  --gold-d:     #6a4e00;
  --gold-dim:   rgba(138,101,0,0.55);
  --gold-faint: rgba(138,101,0,0.22);
  --text:       #2a1f00;
  --text-dim:   rgba(42,31,0,0.42);
  --input-bg:   rgba(245,238,220,0.6);
  --pattern-op: 0.055;
  --card-shadow:rgba(138,101,0,0.1);
}

html, body { transition: background .3s, color .3s; }

body {
  font-family:'Raleway',sans-serif;
  background:var(--bg); color:var(--text);
  overflow-x:hidden; min-height:100vh;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

/* ── BACKGROUND ── */
.bg-pattern {
  position:fixed; inset:0; opacity:var(--pattern-op);
  pointer-events:none; z-index:0;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 38px,var(--gold) 38px,var(--gold) 39px),
    repeating-linear-gradient(-45deg,transparent,transparent 38px,var(--gold) 38px,var(--gold) 39px);
  transition:opacity .3s;
}
.nebula {
  position:fixed; border-radius:50%; pointer-events:none; z-index:0;
  filter:blur(90px); animation:nebDrift 50s ease-in-out infinite; transition:opacity .3s;
}
.nebula:nth-child(2){width:480px;height:480px;top:5%;left:8%;background:radial-gradient(circle,rgba(130,50,220,.18),transparent);--dx:110px;--dy:55px;animation-delay:0s;}
.nebula:nth-child(3){width:400px;height:400px;bottom:12%;right:8%;background:radial-gradient(circle,rgba(212,175,55,.11),transparent);--dx:-80px;--dy:-65px;animation-delay:14s;}
.nebula:nth-child(4){width:360px;height:360px;top:55%;left:52%;background:radial-gradient(circle,rgba(60,130,230,.16),transparent);--dx:65px;--dy:80px;animation-delay:28s;}
@keyframes nebDrift{0%,100%{transform:translate(0,0) scale(1);opacity:.15}50%{transform:translate(var(--dx),var(--dy)) scale(1.18);opacity:.28}}
html.light .nebula{opacity:.07;}

.stars-layer {
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    radial-gradient(1px 1px at 11% 17%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 33%  6%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 22%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 77% 10%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 39%,rgba(255,255,255,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 64%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 44% 79%,rgba(255,255,255,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 66% 57%,rgba(212,175,55,.6)  0%,transparent 100%),
    radial-gradient(1px 1px at 87% 71%,rgba(255,255,255,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at  4% 89%,rgba(255,255,255,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 18% 42%,rgba(212,175,55,.5)  0%,transparent 100%),
    radial-gradient(1px 1px at 71% 87%,rgba(255,255,255,.6) 0%,transparent 100%);
  animation:starTwinkle 4s ease-in-out infinite alternate; transition:opacity .3s;
}
@keyframes starTwinkle{0%{opacity:.4}100%{opacity:1}}
html.light .stars-layer{opacity:.12;}

/* ── LAYOUT ── */
.container{max-width:1500px;margin:0 auto;padding:24px 20px;position:relative;z-index:1;}

/* ── HEADER ── */
header{text-align:center;padding:28px 20px 16px;position:relative;z-index:1;}
.header-eyebrow{font-size:10px;letter-spacing:5px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:12px;}
h1{
  font-family:'Cinzel',serif;font-size:clamp(1.6rem,4.5vw,3rem);
  font-weight:900;letter-spacing:6px;text-transform:uppercase;
  background:linear-gradient(135deg,var(--gold-l) 0%,var(--gold) 45%,var(--gold-d) 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  display:inline-block;line-height:1.15;position:relative;
}
h1::after{
  content:'';position:absolute;left:8%;right:8%;bottom:-7px;
  height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.deco-row{display:flex;align-items:center;justify-content:center;gap:8px;margin:16px 0 10px;}
.deco-row span{width:5px;height:5px;background:var(--gold);transform:rotate(45deg);}
.deco-row::before,.deco-row::after{content:'';flex:1;max-width:130px;height:1px;}
.deco-row::before{background:linear-gradient(90deg,transparent,var(--gold-dim));}
.deco-row::after{background:linear-gradient(90deg,var(--gold-dim),transparent);}
.subtitle{color:var(--text-dim);letter-spacing:4px;font-size:11px;text-transform:uppercase;}

.header-actions{display:inline-flex;align-items:center;gap:10px;margin-top:14px;}
.hdr-btn{
  padding:7px 18px;border:1.5px solid var(--gold);
  background:transparent;color:var(--gold);
  font-family:'Raleway',sans-serif;font-weight:600;font-size:11px;
  letter-spacing:1.5px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);
}
.hdr-btn:hover{background:var(--gold);color:var(--bg);}
.theme-toggle{
  font-size:15px;cursor:pointer;
  background:var(--surface2);border:1.5px solid var(--border2);
  color:var(--gold);padding:7px 11px;
  clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px);
  transition:background .2s,transform .15s;
  -webkit-tap-highlight-color:transparent;user-select:none;line-height:1;
}
.theme-toggle:hover{background:var(--surface3);transform:scale(1.08);}
.theme-toggle:active{transform:scale(.93);}

/* ── GAME PANEL ── */
.game-panel{
  margin:30px auto 36px;max-width:760px;
  border:2px solid var(--gold);
  clip-path:polygon(14px 0,100% 0,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px);
  background:var(--surface);overflow:hidden;position:relative;
}
.game-panel-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px 10px;border-bottom:1px solid var(--border);
  background:var(--surface2);
}
.game-panel-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;}
.game-score-wrap{display:flex;align-items:center;gap:12px;}
.score-lbl{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.score-val{font-family:'Cinzel',serif;font-size:16px;color:var(--gold);font-weight:700;}
.hi-val{font-family:'Cinzel',serif;font-size:12px;color:var(--gold-dim);}
#gameCanvas{display:block;width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:none;}
.game-hint{text-align:center;padding:8px 16px;font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--border);background:var(--surface);}

/* ── FILTER BAR ── */
.controls{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 26px;}
.filter-btn{
  padding:10px 18px;border:2px solid var(--gold);
  background:transparent;color:var(--gold);
  font-family:'Raleway',sans-serif;font-weight:600;
  font-size:11px;letter-spacing:1.5px;cursor:pointer;transition:all .2s;text-transform:uppercase;
  clip-path:polygon(5px 0,100% 0,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px);
}
.filter-btn.active,.filter-btn:hover{background:var(--gold);color:var(--bg);}

/* ── QUEST GRID ── */
.quest-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;}

.quest-card{
  border:2px solid var(--border2);padding:20px 18px 16px;
  background:var(--surface);
  clip-path:polygon(13px 0,100% 0,100% calc(100% - 13px),calc(100% - 13px) 100%,0 100%,0 13px);
  text-decoration:none;color:inherit;
  display:flex;flex-direction:column;gap:8px;
  position:relative;overflow:hidden;
  transition:transform .3s cubic-bezier(.2,0,.2,1),box-shadow .3s,border-color .3s;
  animation:fadeUp .5s ease both;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;will-change:transform;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

.quest-card::before{
  content:'';position:absolute;top:0;left:-120%;width:55%;height:100%;
  background:linear-gradient(110deg,transparent,rgba(212,175,55,.11),transparent);
  animation:cardShimmer 5.5s ease-in-out infinite;pointer-events:none;
}
@keyframes cardShimmer{0%{left:-120%}60%,100%{left:170%}}
.quest-card:nth-child(2)::before{animation-delay:.5s}
.quest-card:nth-child(3)::before{animation-delay:1s}
.quest-card:nth-child(4)::before{animation-delay:1.5s}
.quest-card:nth-child(5)::before{animation-delay:2s}
.quest-card:nth-child(6)::before{animation-delay:2.5s}
.quest-card:nth-child(7)::before{animation-delay:3s}
.quest-card:nth-child(8)::before{animation-delay:3.5s}

.quest-card:hover{transform:translateY(-5px);border-color:var(--gold);box-shadow:0 12px 32px var(--card-shadow);}
.quest-card:active{transform:translateY(-2px) scale(.98);}

.quest-num{
  position:absolute;top:11px;right:11px;
  width:32px;height:32px;border-radius:50%;
  background:var(--gold);color:var(--bg);
  font-family:'Cinzel',serif;font-weight:700;font-size:11px;
  display:flex;align-items:center;justify-content:center;
}
.quest-title{font-family:'Cinzel',serif;font-size:13px;color:var(--gold-l);line-height:1.45;padding-right:40px;letter-spacing:.4px;}
html.light .quest-title{color:var(--gold-d);}
.quest-topic{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;}
.quest-footer{margin-top:auto;padding-top:10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.quest-date{font-size:10px;color:var(--gold-dim);font-style:italic;}
.solve-btn{
  font-size:10px;padding:5px 12px;border:1.5px solid var(--gold);
  color:var(--gold);letter-spacing:1px;text-transform:uppercase;font-weight:600;
  clip-path:polygon(3px 0,100% 0,100% calc(100% - 3px),calc(100% - 3px) 100%,0 100%,0 3px);
  transition:all .2s;font-family:'Raleway',sans-serif;
}
.quest-card:hover .solve-btn{background:var(--gold);color:var(--bg);}

footer{text-align:center;margin-top:40px;padding:20px;border-top:1px solid var(--border);}
footer p{font-size:11px;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase;}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .quest-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;}
  .quest-card{padding:14px 12px 12px;}
  .nebula{display:none;}
}
@media(max-width:480px){
  .quest-grid{grid-template-columns:repeat(2,1fr);gap:10px;}
  .stars-layer{display:none;}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;}
  .nebula,.stars-layer,.bg-pattern{display:none;}
}
.quest-card:nth-child(n){animation-delay:calc(.04s * var(--i,1))}
</style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="stars-layer"></div>
<div class="nebula"></div>
<div class="nebula"></div>
<div class="nebula"></div>

<div class="container">

  <header>
    <div class="header-eyebrow">SRM VEC · Language Laboratory</div>
    <h1>English Quests</h1>
    <div class="deco-row"><span></span><span></span><span></span></div>
    <div class="subtitle">Choose your next challenge · Forge your mastery</div>
    <div class="header-actions">
      <a href="https://andrewveda.github.io/cryptic/instruction" target="_blank" class="hdr-btn">HOW TO PLAY →</a>
      <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle theme">☀️</button>
    </div>
  </header>

  <!-- DRAGON GAME -->
  <div class="game-panel">
    <div class="game-panel-header">
      <span class="game-panel-title">🐉 Dragon Flight</span>
      <div class="game-score-wrap">
        <span class="score-lbl">BEST</span>
        <span class="hi-val" id="hiScore">0</span>
        <span class="score-lbl">SCORE</span>
        <span class="score-val" id="scoreDisp">0</span>
      </div>
    </div>
    <canvas id="gameCanvas" height="180"></canvas>
    <div class="game-hint" id="gameHint">TAP · CLICK · SPACE to flap &nbsp;|&nbsp; Dodge the castle towers!</div>
  </div>

  <!-- FILTER -->
  <div class="controls">
    <button class="filter-btn active" data-filter="all">ALL</button>
    <button class="filter-btn" data-filter="grammar">GRAMMAR</button>
    <button class="filter-btn" data-filter="vocab">VOCABULARY</button>
    <button class="filter-btn" data-filter="writing">WRITING</button>
  </div>

  <!-- QUEST GRID -->
  <div class="quest-grid" id="questGrid"></div>

  <footer><p>Live long and prosper · Aut inveniam viam aut faciam</p></footer>
</div>

<script>
/* ════════════════════════ THEME ════════════════════════ */
const THEME_KEY = 'crypticTheme';
function applyTheme(t){
  document.documentElement.classList.toggle('light', t==='light');
  document.getElementById('themeToggle').textContent = t==='light' ? '🌙' : '☀️';
}
function toggleTheme(){
  const next = document.documentElement.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
  makeStars();
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

/* ════════════════════════ QUEST DATA ════════════════════════ */
const QUESTS = [
  {id:1,  title:"Noun and Verb",               topic:"Quest 1",             date:"Feb 11", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/verb"},
  {id:2,  title:"Preposition",                  topic:"Quest 2",             date:"Feb 12", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/prep"},
  {id:3,  title:"Contextual Meaning",           topic:"Quest 3",             date:"Feb 13", cat:"vocab",   href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/3"},
  {id:4,  title:"Adverbs — I",                  topic:"Quest 4",             date:"Feb 14", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/4"},
  {id:5,  title:"Verbal Analogy",               topic:"Quest 5",             date:"Feb 15", cat:"vocab",   href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/5"},
  {id:6,  title:"Active & Passive Voice",       topic:"Quest 6",             date:"Feb 16", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/6"},
  {id:7,  title:"Gerunds & Infinitives",        topic:"Quest 7",             date:"Feb 17", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/7"},
  {id:8,  title:"Adverbs & Tenses",             topic:"Quest 8",             date:"Feb 18", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/8"},
  {id:9,  title:"Prefixes & Suffixes",          topic:"Quest 9",             date:"Feb 19", cat:"vocab",   href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/9"},
  {id:10, title:"Purpose Statements",           topic:"Quest 10",            date:"Feb 20", cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/10"},
  {id:11, title:"Tense Correction",             topic:"Error Correction 11", date:"Feb 21", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/11"},
  {id:12, title:"Conditionals — If",            topic:"Quest 12",            date:"Feb 22", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/12"},
  {id:13, title:"Connotations",                 topic:"Quest 13",            date:"Feb 23", cat:"vocab",   href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/13"},
  {id:14, title:"Conditionals — If II",         topic:"Quest 14",            date:"Feb 24", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/14"},
  {id:15, title:"Reported Speech",              topic:"Quest 15",            date:"Feb 25", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/15"},
  {id:16, title:"Modals",                       topic:"Quest 16",            date:"Feb 26", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/16"},
  {id:17, title:"Conjunction — I",              topic:"Quest 17",            date:"Feb 27", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/17"},
  {id:18, title:"Conjunction — II",             topic:"Quest 18",            date:"Feb 28", cat:"grammar", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/18"},
  {id:19, title:"Idioms",                       topic:"Quest 19",            date:"March 1",cat:"vocab",   href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/19"},
  {id:20, title:"Recycling Recommendations",    topic:"Quest 20",            date:"March 2",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/20"},
  {id:21, title:"Energy Recommendations",       topic:"Quest 21",            date:"March 3",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/21"},
  {id:22, title:"Essay — Leadership",           topic:"Quest 22",            date:"March 4",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/22"},
  {id:23, title:"Essay — Transport",            topic:"Quest 23",            date:"March 5",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/23"},
  {id:24, title:"Essay — Energy",               topic:"Quest 24",            date:"March 6",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/24"},
  {id:25, title:"Essay — Schools",              topic:"Quest 25",            date:"March 7",cat:"writing", href:"https://andrewveda.github.io/SRM-VEC-English-PWA/semII/25"},
];

/* ════════════════════════ RENDER QUESTS ════════════════════════ */
let currentFilter = 'all';
function render(){
  const grid = document.getElementById('questGrid');
  const list = currentFilter === 'all' ? QUESTS : QUESTS.filter(q => q.cat === currentFilter);
  grid.innerHTML = list.map((q,i) => `
    <a class="quest-card" href="${q.href}" style="--i:${i+1}" target="_blank">
      <div class="quest-num">${q.id}</div>
      <div class="quest-title">${q.title}</div>
      <div class="quest-topic">${q.topic}</div>
      <div class="quest-footer">
        <span class="quest-date">${q.date}</span>
        <span class="solve-btn">ENTER →</span>
      </div>
    </a>`).join('');
}
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
});
render();

/* ════════════════════════ DRAGON FLIGHT GAME ════════════════════════ */

let dragonImgLoaded = false;
let framesLoaded = 0;
DRAGON_FRAMES.forEach(img => { img.onload = () => { framesLoaded++; if(framesLoaded>=2) dragonImgLoaded=true; }; });

const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const HI_KEY = 'dragonHiBest';

let W, H, dpr;
let dragon, pipes, particles, bgStars;
let score, hiScore, gameState, frameId, speed, frameCount;

const PIPE_W    = 30;
const GAP       = 74;
const PIPE_FREQ = 95;

function isLight(){ return document.documentElement.classList.contains('light'); }

function resize(){
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width;
  H = 188;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}

/* ── Draw the dragon (real image sprite, animated wing flap) ── */
function drawDragon(x, y, angle, flap, alive){
  if(!dragonImgLoaded) return;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  const flash = !alive && Math.floor(Date.now()/90)%2===0;
  if(flash) ctx.globalAlpha = 0.28;

  // Wing flap: alternate frames on a sinusoidal cycle
  // When flap triggered → fast cycle; otherwise slow majestic beat
  const t = Date.now();
  const beatSpeed = flap ? 220 : 520; // ms per full cycle
  const beatPhase = (t % beatSpeed) / beatSpeed; // 0..1
  // 0..0.5 = wings up (frame 0), 0.5..1 = wings down (frame 1)
  const frameIdx = beatPhase < 0.5 ? 0 : 1;
  const sprite = DRAGON_FRAMES[frameIdx];

  // Smooth vertical scale for extra majesty (slight stretch at extremes)
  const scaleY = 1 + Math.sin(beatPhase * Math.PI * 2) * 0.06;

  const drawH = 80;
  const drawW = sprite.width / sprite.height * drawH;

  ctx.scale(1, scaleY);

  // Subtle body bob tied to wing beat
  const bob = Math.sin(beatPhase * Math.PI * 2) * 2.5;
  ctx.drawImage(sprite, -drawW * 0.52, -drawH * 0.5 + bob, drawW, drawH);

  // Enhanced fire breath on flap — drawn over the mouth area of the image
  if(flap){
    const fireX = drawW * 0.46;
    const fireY = bob + 4;

    // Outer glow
    const outerGrad = ctx.createRadialGradient(fireX+10, fireY, 0, fireX+22, fireY, 45);
    outerGrad.addColorStop(0,   'rgba(255,255,180,.55)');
    outerGrad.addColorStop(0.3, 'rgba(255,160,20,.45)');
    outerGrad.addColorStop(0.65,'rgba(255,50,0,.25)');
    outerGrad.addColorStop(1,   'rgba(255,30,0,0)');
    ctx.beginPath();
    ctx.ellipse(fireX+22, fireY, 45, 14, 0, 0, Math.PI*2);
    ctx.fillStyle = outerGrad;
    ctx.fill();

    // Core bright jet
    const coreGrad = ctx.createRadialGradient(fireX+4, fireY, 0, fireX+16, fireY, 22);
    coreGrad.addColorStop(0,   'rgba(255,255,220,.95)');
    coreGrad.addColorStop(0.4, 'rgba(255,200,40,.80)');
    coreGrad.addColorStop(0.8, 'rgba(255,80,10,.50)');
    coreGrad.addColorStop(1,   'rgba(255,30,0,0)');
    ctx.beginPath();
    ctx.ellipse(fireX+14, fireY, 22, 7, 0, 0, Math.PI*2);
    ctx.fillStyle = coreGrad;
    ctx.fill();

    // Bright tip
    ctx.beginPath();
    ctx.arc(fireX+2, fireY, 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,240,.9)';
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── Castle tower obstacles ── */
function drawPipe(p){
  const light = isLight();
  const c1 = light ? '#9a8a6a' : '#3a3020';
  const c2 = light ? '#b09870' : '#504030';
  const c3 = light ? '#c8ae80' : '#685840';
  const bt = light ? '#7a6a50' : '#28200e';

  function drawTower(x, y, w, h, battleBottom){
    // gradient shaft
    const g = ctx.createLinearGradient(x, y, x+w, y);
    g.addColorStop(0, c1);
    g.addColorStop(.38, c2);
    g.addColorStop(.65, c3);
    g.addColorStop(1, c1);
    ctx.fillStyle = g;
    ctx.fillRect(x, y, w, h);

    // horizontal stone rows
    const rowH = 13;
    ctx.strokeStyle = light ? 'rgba(0,0,0,.13)' : 'rgba(0,0,0,.35)';
    ctx.lineWidth = .8;
    for(let ry = y + rowH; ry < y + h; ry += rowH){
      ctx.beginPath(); ctx.moveTo(x, ry); ctx.lineTo(x+w, ry); ctx.stroke();
    }
    // vertical mortar alternating
    for(let row=0; row < h/rowH; row++){
      const ry2 = y + row*rowH;
      const off = (row%2===0) ? w/2 : 0;
      ctx.strokeStyle = light ? 'rgba(0,0,0,.09)' : 'rgba(0,0,0,.25)';
      ctx.beginPath(); ctx.moveTo(x+off, ry2); ctx.lineTo(x+off, ry2+rowH); ctx.stroke();
    }

    // battlements
    const mW=7, mH=9, mGap=6;
    ctx.fillStyle = bt;
    for(let mx=x-1; mx < x+w+1; mx += mW+mGap){
      if(battleBottom) ctx.fillRect(mx, y+h, mW, mH);
      else             ctx.fillRect(mx, y-mH, mW, mH);
    }

    // gold edge trim
    const edgeY = battleBottom ? y : y+h;
    ctx.strokeStyle = '#d4af37';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, edgeY); ctx.lineTo(x+w, edgeY); ctx.stroke();

    // window slit (if tall enough)
    if(h > 35){
      const slitX = x + w/2 - 2;
      const slitY = battleBottom ? y + 16 : y + h - 26;
      ctx.fillStyle = light ? 'rgba(0,0,0,.25)' : 'rgba(0,0,0,.65)';
      ctx.fillRect(slitX, slitY, 4, 11);
      ctx.fillStyle = 'rgba(212,175,55,.13)';
      ctx.fillRect(slitX+1, slitY+1, 2, 9);
    }
  }

  // top tower (hangs from top)
  drawTower(p.x, 0, PIPE_W, p.topY, true);
  // bottom tower (rises from floor)
  drawTower(p.x, p.botY, PIPE_W, H - p.botY, false);
}

/* ── Particles ── */
function spawnParticles(x, y, n=8){
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const s = 1.2 + Math.random()*3;
    particles.push({
      x, y,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s - 1.2,
      life:1, decay:.04+Math.random()*.04,
      r:1.5+Math.random()*2,
      col:Math.random()<.6?'#d4af37':'#ff8030',
    });
  }
}
function tickParticles(){
  particles = particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=p.decay; return p.life>0;
  });
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col; ctx.fill();
  });
  ctx.globalAlpha=1;
}

/* ── BG stars / clouds ── */
function makeStars(){
  bgStars=[];
  const light = isLight();
  for(let i=0;i<32;i++){
    const cloud = light && Math.random()<.38;
    bgStars.push({
      x:Math.random()*W, y:Math.random()*(H-22),
      r:.6+Math.random()*2.2,
      spd:.12+Math.random()*.28,
      col: cloud ? null
         : light
           ? `rgba(${100+~~(Math.random()*80)},${120+~~(Math.random()*80)},${160+~~(Math.random()*70)},.55)`
           : `rgba(255,255,${200+~~(Math.random()*55)},${.25+Math.random()*.7})`,
      cloud,
    });
  }
}

function drawBG(){
  const light = isLight();
  // sky
  const sg = ctx.createLinearGradient(0,0,0,H);
  if(light){ sg.addColorStop(0,'#5aadee'); sg.addColorStop(1,'#c0e0ff'); }
  else      { sg.addColorStop(0,'#05050f'); sg.addColorStop(1,'#10102a'); }
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // moon / sun
  if(!light){
    const mg=ctx.createRadialGradient(W-55,26,4,W-55,26,17);
    mg.addColorStop(0,'#fffff8'); mg.addColorStop(1,'rgba(212,175,55,.25)');
    ctx.beginPath(); ctx.arc(W-55,26,17,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();
    ctx.beginPath(); ctx.arc(W-55,26,23,0,Math.PI*2); ctx.fillStyle='rgba(212,175,55,.07)'; ctx.fill();
  } else {
    const sg2=ctx.createRadialGradient(W-55,26,5,W-55,26,20);
    sg2.addColorStop(0,'#fff8d0'); sg2.addColorStop(1,'rgba(255,200,40,.45)');
    ctx.beginPath(); ctx.arc(W-55,26,20,0,Math.PI*2); ctx.fillStyle=sg2; ctx.fill();
  }

  // bg stars / clouds
  bgStars.forEach(s=>{
    if(gameState==='playing') s.x -= s.spd*speed*.4;
    if(s.x < -30) s.x = W+30;
    if(s.cloud){
      ctx.globalAlpha=.55;
      ctx.beginPath();
      ctx.arc(s.x,      s.y,       s.r*5,   0,Math.PI*2);
      ctx.arc(s.x+s.r*4,s.y-s.r*2,s.r*3.5, 0,Math.PI*2);
      ctx.arc(s.x+s.r*8,s.y,       s.r*4.5, 0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,.85)'; ctx.fill();
      ctx.globalAlpha=1;
    } else {
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=s.col; ctx.fill();
    }
  });

  // distant mountain silhouettes (dark mode only)
  if(!light){
    ctx.fillStyle='rgba(30,20,10,.6)';
    ctx.beginPath(); ctx.moveTo(0,H-22);
    const mts=[
      [0.05,0.55],[0.12,0.38],[0.2,0.48],[0.28,0.32],[0.38,0.52],[0.45,0.4],
      [0.53,0.55],[0.6,0.36],[0.7,0.50],[0.78,0.38],[0.88,0.53],[0.95,0.44],[1,0.55]
    ];
    mts.forEach(([xr,yr])=> ctx.lineTo(xr*W, yr*(H-22)));
    ctx.lineTo(W,H-22); ctx.closePath(); ctx.fill();
  }

  // ground
  const gg=ctx.createLinearGradient(0,H-22,0,H);
  if(light){ gg.addColorStop(0,'#4a9020'); gg.addColorStop(1,'#2e6010'); }
  else      { gg.addColorStop(0,'#251e0a'); gg.addColorStop(1,'#150f04'); }
  ctx.fillStyle=gg; ctx.fillRect(0,H-22,W,22);
  ctx.strokeStyle = light ? 'rgba(255,255,255,.22)' : 'rgba(212,175,55,.13)';
  ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H-22); ctx.lineTo(W,H-22); ctx.stroke();
}


/* ════════════════════════ TRASH TALK ════════════════════════ */
const TRASH = [
  "Oh look, you actually tried. Adorable. 🐉",
  "My grandmother flies faster and she's been dead for 300 years.",
  "Bro tapped the screen like it owes him money 💀",
  "Score of ZERO? I've seen rocks with more talent.",
  "Even the castle stones are laughing at you right now.",
  "Did you close your eyes? Because it looked like you closed your eyes.",
  "Bold strategy. Fly directly INTO the tower. Genius.",

  "The towers are STATIONARY. They're not even trying.",
  "Sir this is a dragon game, not a 'crash simulator'.",

];

let talkRetry = 0;
let lastTalkScore = 0;

function getTrashLine(score, hi){
  talkRetry++;
  let pool = TRASH.filter(t => {
    // avoid repeating last shown
    return true;
  });
  const raw = pool[Math.floor(Math.random() * pool.length)];
  return raw
    .replace('${retry}', talkRetry)
    .replace('${score}', score)
    .replace('${hi}', hi)
    .replace('${gap}', GAP);
}

// Toast UI
let toastTimer = null;
function showTrash(score, hi){
  let el = document.getElementById('trashToast');
  if(!el){
    el = document.createElement('div');
    el.id = 'trashToast';
    el.style.cssText = `
      position:absolute; bottom:46px; left:50%; transform:translateX(-50%);
      max-width:92%; padding:9px 18px;
      background:rgba(0,0,0,.82); border:1.5px solid #d4af37;
      color:#f0d060; font-family:'Cinzel',serif; font-size:11px; letter-spacing:.5px;
      text-align:center; line-height:1.5; z-index:10; pointer-events:none;
      clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);
      opacity:0; transition:opacity .3s ease;
    `;
    document.querySelector('.game-panel').style.position = 'relative';
    document.querySelector('.game-panel').appendChild(el);
  }
  el.textContent = getTrashLine(score, hi);
  el.style.opacity = '1';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 4200);
}

/* ════════════════════════ GAME LOOP ════════════════════════ */
function initGame(){
  if(frameId) cancelAnimationFrame(frameId);
  resize();
  hiScore = parseInt(localStorage.getItem(HI_KEY)||'0');
  document.getElementById('hiScore').textContent = hiScore;
  score=0; speed=2.5; frameCount=0;
  gameState='idle';
  dragon={ x:W*.2, y:H/2, vy:0, angle:0, flap:false, flapTimer:0, alive:true };
  pipes=[]; particles=[];
  makeStars();
  document.getElementById('scoreDisp').textContent='0';
  document.getElementById('gameHint').textContent='TAP · CLICK · SPACE to flap  |  Dodge the castle towers!';
  loop();
}

function doFlap(){
  if(gameState==='dead'){ initGame(); return; }
  if(gameState==='idle') gameState='playing';
  dragon.vy=-5.4;
  dragon.flap=true; dragon.flapTimer=9;
  spawnParticles(dragon.x-12, dragon.y, 5);
}

function spawnPipe(){
  const minTop=28, maxTop=H-GAP-48;
  const topY=minTop+Math.random()*(maxTop-minTop);
  pipes.push({x:W+PIPE_W, topY, botY:topY+GAP, passed:false});
}

function loop(){
  ctx.clearRect(0,0,W,H);
  drawBG();

  if(gameState==='playing'){
    frameCount++;
    if(frameCount%PIPE_FREQ===0) spawnPipe();
    speed = 2.5 + score*.09;

    dragon.vy  += .33;
    dragon.y   += dragon.vy;
    dragon.angle = Math.min(Math.max(dragon.vy*.065,-.5),.62);
    if(dragon.flapTimer>0) dragon.flapTimer--;
    else dragon.flap=false;

    pipes.forEach(p=>{
      p.x -= speed;
      if(!p.passed && p.x+PIPE_W < dragon.x){
        p.passed=true; score++;
        document.getElementById('scoreDisp').textContent=score;
        spawnParticles(dragon.x+22, dragon.y, 7);
      }
    });
    pipes=pipes.filter(p=>p.x>-PIPE_W-12);

    const DR=10;
    const hit =
      dragon.y-DR<0 || dragon.y+DR>H-22 ||
      pipes.some(p=>
        dragon.x+DR>p.x && dragon.x-DR<p.x+PIPE_W &&
        (dragon.y-DR<p.topY || dragon.y+DR>p.botY)
      );

    if(hit){
      gameState='dead'; dragon.alive=false;
      spawnParticles(dragon.x, dragon.y, 22);
      if(score>hiScore){
        hiScore=score;
        localStorage.setItem(HI_KEY,hiScore);
        document.getElementById('hiScore').textContent=hiScore;
      }
      document.getElementById('gameHint').textContent=
        `Score: ${score}  ·  Best: ${hiScore}  —  TAP to play again!`;
      showTrash(score, hiScore);
    }
  }

  // draw pipes, then dragon, then particles
  pipes.forEach(drawPipe);

  if(gameState!=='dead' || Math.floor(Date.now()/110)%2===0){
    drawDragon(dragon.x, dragon.y, dragon.angle, dragon.flap, dragon.alive);
  }

  tickParticles(); drawParticles();

  // idle screen
  if(gameState==='idle'){
    ctx.fillStyle='rgba(0,0,0,.42)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#d4af37';
    ctx.font=`bold ${Math.max(14,~~(W*.036))}px Cinzel,serif`;
    ctx.textAlign='center';
    ctx.fillText('TAP TO BEGIN', W/2, H/2-10);
    ctx.fillStyle='rgba(212,175,55,.6)';
    ctx.font=`${Math.max(10,~~(W*.023))}px Raleway,sans-serif`;
    ctx.fillText('Flap your dragon through the castle towers!', W/2, H/2+13);
    ctx.textAlign='left';
  }

  // live score overlay
  if(gameState==='playing'){
    ctx.font=`bold 20px Cinzel,serif`;
    ctx.fillStyle='rgba(212,175,55,.85)';
    ctx.textAlign='left';
    ctx.fillText(score, 14, 28);
    ctx.textAlign='left';
  }

  frameId=requestAnimationFrame(loop);
}

/* ── Input ── */
canvas.addEventListener('click',     doFlap);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); doFlap(); },{passive:false});
document.addEventListener('keydown',  e=>{ if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doFlap(); }});
window.addEventListener('resize',    ()=>{ resize(); makeStars(); });

/* ── Start ── */
const _anyFrame = DRAGON_FRAMES[0];
if(framesLoaded >= 2 || (_anyFrame.complete && _anyFrame.naturalWidth > 0)){
  dragonImgLoaded = true; initGame();
} else {
  // poll until both frames loaded
  const _waitId = setInterval(() => {
    if(framesLoaded >= 2){ dragonImgLoaded = true; clearInterval(_waitId); initGame(); }
  }, 50);
  setTimeout(() => { clearInterval(_waitId); if(!dragonImgLoaded){ dragonImgLoaded=true; initGame(); } }, 1500);
}

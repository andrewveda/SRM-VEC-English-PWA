  border-radius:0;

  transition:opacity .35s ease;
  pointer-events:none;
  z-index:10;
  white-space:normal;
  word-break:break-word;
}

let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.opacity = '1';
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.style.opacity='0'; }, 3800);
}

// ── Background stars ──
function makeStars(){
  stars = [];
  for(let i=0;i<40;i++){
    stars.push({
      x:Math.random()*W, y:Math.random()*(H*.82),
      r:.4+Math.random()*1.8,
      spd:.1+Math.random()*.25,
      col: Math.random()<.15
        ? `rgba(212,175,55,${(.3+Math.random()*.6).toFixed(2)})`
        : `rgba(255,255,255,${(.2+Math.random()*.7).toFixed(2)})`,
    });
  }
}
makeStars();

// ── Draw background ──
function drawBG(){
  // Sky gradient
  const sg = ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#04040e');
  sg.addColorStop(0.7,'#0d0d22');
  sg.addColorStop(1,'#151520');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Moon
  const mx=W*.88, my=H*.1, mr=Math.min(W,H)*.045;
  const mg=ctx.createRadialGradient(mx,my,mr*.25,mx,my,mr);
  mg.addColorStop(0,'#fffff8'); mg.addColorStop(1,'rgba(212,175,55,.2)');
  ctx.beginPath(); ctx.arc(mx,my,mr,0,Math.PI*2); ctx.fillStyle=mg; ctx.fill();
  ctx.beginPath(); ctx.arc(mx,my,mr*1.5,0,Math.PI*2);
  ctx.fillStyle='rgba(212,175,55,.05)'; ctx.fill();

  // Stars
  stars.forEach(s=>{
    if(gameState==='playing') s.x -= s.spd*speed*.35;
    if(s.x<-4) s.x=W+4;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=s.col; ctx.fill();
  });

  // Distant mountains
  ctx.fillStyle='rgba(25,18,8,.7)';
  ctx.beginPath(); ctx.moveTo(0,H*.78);
  [[.04,.58],[.1,.44],[.18,.55],[.26,.38],[.34,.52],[.42,.41],
   [.5,.56],[.58,.38],[.66,.50],[.74,.40],[.82,.54],[.91,.42],[1,.57]]
    .forEach(([xr,yr])=>ctx.lineTo(xr*W,yr*H));
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();

  // Ground
  const gg=ctx.createLinearGradient(0,H*.88,0,H);
  gg.addColorStop(0,'#1e1608'); gg.addColorStop(1,'#0e0b04');
  ctx.fillStyle=gg; ctx.fillRect(0,H*.88,W,H*.12);
  ctx.strokeStyle='rgba(212,175,55,.12)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,H*.88); ctx.lineTo(W,H*.88); ctx.stroke();
}

// ── Draw castle tower ──
function drawPipe(p){
  const c1='#2a2010', c2='#3e3020', c3='#524030';
  const bt='#1c1608';
  const GROUND = H*.88;

  function tower(x, ty, th, battleDown){
    const g=ctx.createLinearGradient(x,ty,x+PIPE_W,ty);
    g.addColorStop(0,c1); g.addColorStop(.35,c2); g.addColorStop(.65,c3); g.addColorStop(1,c1);
    ctx.fillStyle=g; ctx.fillRect(x,ty,PIPE_W,th);

    // stone rows
    const rh=16;
    ctx.strokeStyle='rgba(0,0,0,.32)'; ctx.lineWidth=.8;
    for(let ry=ty+rh;ry<ty+th;ry+=rh){ctx.beginPath();ctx.moveTo(x,ry);ctx.lineTo(x+PIPE_W,ry);ctx.stroke();}
    for(let row=0;row<th/rh;row++){
      const ry2=ty+row*rh, off=(row%2===0)?PIPE_W/2:0;
      ctx.strokeStyle='rgba(0,0,0,.18)';
      ctx.beginPath();ctx.moveTo(x+off,ry2);ctx.lineTo(x+off,ry2+rh);ctx.stroke();
    }

    // battlements
    const mW=9,mH=11,mG=7;
    ctx.fillStyle=bt;
    for(let mx=x-1;mx<x+PIPE_W+1;mx+=mW+mG){
      if(battleDown) ctx.fillRect(mx,ty+th,mW,mH);
      else           ctx.fillRect(mx,ty-mH,mW,mH);
    }
    const edgeY=battleDown?ty:ty+th;
    ctx.strokeStyle='rgba(212,175,55,.55)'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(x,edgeY);ctx.lineTo(x+PIPE_W,edgeY);ctx.stroke();

    if(th>40){
      const slitX=x+PIPE_W/2-2, slitY=battleDown?ty+18:ty+th-30;
      ctx.fillStyle='rgba(0,0,0,.65)'; ctx.fillRect(slitX,slitY,4,12);
      ctx.fillStyle='rgba(212,175,55,.1)'; ctx.fillRect(slitX+1,slitY+1,2,10);
    }
  }

  tower(p.x, 0, p.topY, true);
  tower(p.x, p.botY, GROUND - p.botY, false);
}

// ── Draw dragon ──
function drawDragon(x,y,angle,flap,alive){
  if(!sprLoaded) return;
  const sw=SPR.width, sh=SPR.height;
  const dw=Math.min(W*.22, 155);
  const dh=dw/sw*sh;

  const now=Date.now();
  const flash=!alive&&Math.floor(now/90)%2===0;
  const beatHz=flap?3.8:1.4;
  const phase=(now/1000)*beatHz*Math.PI*2;
  const beat=Math.sin(phase);
  const stretch=beat*(flap?.28:.18);

  const bodyAnchor=dh*.50;

  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(angle);
  if(flash) ctx.globalAlpha=.28;

  // upper wing half
  const topSrcH=sh*.52;
  const topDstH=dh*.52*(1+stretch);
  ctx.drawImage(SPR, 0,0,sw,topSrcH, 0,bodyAnchor-topDstH,dw,topDstH);

  // lower wing half
  const botSrcY=sh*.52, botSrcH=sh-botSrcY;
  const botDstH=(dh-dh*.52)*(1+stretch);
  ctx.drawImage(SPR, 0,botSrcY,sw,botSrcH, 0,bodyAnchor,dw,botDstH);

  // body strip (flat, on top)
  const bSrcY=sh*.38, bSrcH=sh*.24, bDstH=dh*.24;
  ctx.drawImage(SPR, 0,bSrcY,sw,bSrcH, 0,bodyAnchor-bDstH*.5,dw,bDstH);

  // fire
  const fx=dw*.93, fy=bodyAnchor-dh*.04;
  if(flap){
    const pulse=.7+Math.abs(beat)*.3;
    const og=ctx.createRadialGradient(fx,fy,0,fx+32,fy,58);
    og.addColorStop(0,`rgba(255,255,180,${(.55*pulse).toFixed(2)})`)
    og.addColorStop(.3,`rgba(255,150,20,${(.5*pulse).toFixed(2)})`)
    og.addColorStop(.7,`rgba(255,50,0,${(.28*pulse).toFixed(2)})`)
    og.addColorStop(1,'rgba(255,30,0,0)');
    ctx.beginPath(); ctx.ellipse(fx+30,fy,58,18,0,0,Math.PI*2);
    ctx.fillStyle=og; ctx.fill();
    const cg=ctx.createRadialGradient(fx+2,fy,0,fx+18,fy,27);
    cg.addColorStop(0,'rgba(255,255,220,.98)');
    cg.addColorStop(.4,'rgba(255,200,40,.88)');
    cg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.beginPath(); ctx.ellipse(fx+16,fy,27,9,0,0,Math.PI*2);
    ctx.fillStyle=cg; ctx.fill();
    ctx.beginPath(); ctx.arc(fx+2,fy,6,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,.96)'; ctx.fill();
  } else {
    const eg=ctx.createRadialGradient(fx,fy,0,fx+8,fy,16);
    eg.addColorStop(0,'rgba(255,140,20,.28)'); eg.addColorStop(1,'rgba(255,60,0,0)');
    ctx.beginPath(); ctx.arc(fx+4,fy,12,0,Math.PI*2);
    ctx.fillStyle=eg; ctx.fill();
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

// ── Particles ──
function spawnParticles(x,y,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, s=1.2+Math.random()*3.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-1.5,
      life:1,decay:.04+Math.random()*.05,r:1.5+Math.random()*2.5,
      col:Math.random()<.6?'#d4af37':'#ff8030'});
  }
}
function tickParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;return p.life>0;
  });
}
function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.col;ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ── Spawn pipe ──
function spawnPipe(){
  const GROUND=H*.88;
  const gap=Math.max(H*.26,130);
  const minTop=H*.08, maxTop=GROUND-gap-H*.08;
  const topY=minTop+Math.random()*(maxTop-minTop);
  pipes.push({x:W+PIPE_W,topY,botY:topY+gap,passed:false});
}

// ── Init ──
function init(){
  if(raf) cancelAnimationFrame(raf);
  resize();
  hiScore=parseInt(localStorage.getItem(HI_KEY)||'0');
  score=0; speed=2.6; frame=0; gameState='idle';
  const dw=Math.min(W*.22,155);
  dragon={x:W*.2, y:H*.45, vy:0, angle:0, flap:false, flapTimer:0, alive:true};
  pipes=[]; particles=[];
  makeStars();
  loop();
}

// ── Flap ──
function doFlap(){
  if(gameState==='dead'){ init(); return; }
  if(gameState==='idle') gameState='playing';
  dragon.vy=FLAP_VEL;
  dragon.flap=true; dragon.flapTimer=28;
  spawnParticles(dragon.x-14,dragon.y,5);
  // trash talk on EVERY tap
  showToast(nextTrash());
}

// ── HUD ──
function drawHUD(){
  const fs=Math.max(20,Math.min(W*.055,42));
  ctx.font=`bold ${fs}px Cinzel,Georgia,serif`;
  ctx.textAlign='center';
  // shadow
  ctx.fillStyle='rgba(0,0,0,.6)';
  ctx.fillText(score, W/2+2, H*.08+2);
  // gold
  ctx.fillStyle='rgba(212,175,55,.92)';
  ctx.fillText(score, W/2, H*.08);
  ctx.textAlign='left';
}

// ── Idle / Dead overlays ──
function drawOverlay(){
  ctx.fillStyle='rgba(0,0,0,.5)';
  ctx.fillRect(0,0,W,H);

  const bigF=Math.max(22,Math.min(W*.07,54));
  const smF =Math.max(12,Math.min(W*.035,22));

  ctx.textAlign='center';

  if(gameState==='idle'){
    ctx.fillStyle='#d4af37';
    ctx.font=`bold ${bigF}px Cinzel,Georgia,serif`;
    // glow
    ctx.shadowColor='rgba(212,175,55,.7)'; ctx.shadowBlur=18;
    ctx.fillText('DRAGON FLIGHT', W/2, H*.42);
    ctx.shadowBlur=0;
    ctx.font=`${smF}px Cinzel,Georgia,serif`;
    ctx.fillStyle='rgba(212,175,55,.7)';
    ctx.fillText('TAP TO BEGIN', W/2, H*.52);
    ctx.font=`${smF*.75}px Raleway,sans-serif`;
    ctx.fillStyle='rgba(212,175,55,.4)';
    ctx.fillText('Dodge the castle towers', W/2, H*.59);
  } else {
    // dead
    ctx.fillStyle='#d4af37';
    ctx.font=`bold ${bigF*.8}px Cinzel,Georgia,serif`;
    ctx.shadowColor='rgba(212,175,55,.5)'; ctx.shadowBlur=14;
    ctx.fillText('DEFEATED', W/2, H*.4);
    ctx.shadowBlur=0;
    ctx.font=`${smF}px Cinzel,Georgia,serif`;
    ctx.fillStyle='rgba(212,175,55,.85)';
    ctx.fillText(`Score: ${score}   Best: ${hiScore}`, W/2, H*.5);
    ctx.font=`${smF*.85}px Cinzel,Georgia,serif`;
    ctx.fillStyle='rgba(212,175,55,.55)';
    ctx.fillText('TAP TO PLAY AGAIN', W/2, H*.58);
  }

  ctx.textAlign='left';
}

// ── Main loop ──
function loop(){
  ctx.clearRect(0,0,W,H);
  drawBG();

  const GROUND=H*.88;

  if(gameState==='playing'){
    frame++;
    if(frame%PIPE_FREQ===0) spawnPipe();
    speed=2.6+score*.09;

    dragon.vy+=GRAVITY;
    dragon.y +=dragon.vy;
    dragon.angle=Math.min(Math.max(dragon.vy*.068,-.48),.68);
    if(dragon.flapTimer>0) dragon.flapTimer--;
    else dragon.flap=false;

    pipes.forEach(p=>{
      p.x-=speed;
      if(!p.passed&&p.x+PIPE_W<dragon.x){
        p.passed=true; score++;
        spawnParticles(dragon.x+20,dragon.y,7);
      }
    });
    pipes=pipes.filter(p=>p.x>-PIPE_W-10);

    const DR=11;
    const hit=
      dragon.y-DR<0 || dragon.y+DR>GROUND ||
      pipes.some(p=>
        dragon.x+DR>p.x&&dragon.x-DR<p.x+PIPE_W&&
        (dragon.y-DR<p.topY||dragon.y+DR>p.botY));

    if(hit){
      gameState='dead'; dragon.alive=false;
      spawnParticles(dragon.x,dragon.y,24);
      if(score>hiScore){
        hiScore=score;
        localStorage.setItem(HI_KEY,hiScore);
      }
    }
  }

  pipes.forEach(drawPipe);

  if(gameState!=='dead'||Math.floor(Date.now()/110)%2===0)
    drawDragon(dragon.x,dragon.y,dragon.angle,dragon.flap,dragon.alive);

  tickParticles(); drawParticles();

  if(gameState!=='playing') drawOverlay();
  else drawHUD();

  raf=requestAnimationFrame(loop);
}

// ── Input ──
canvas.addEventListener('click', doFlap);
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); doFlap(); },{passive:false});
document.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); doFlap(); }
});

// ── Go ──
if(SPR.complete&&SPR.naturalWidth>0){ sprLoaded=true; init(); }
else{ SPR.onload=()=>{sprLoaded=true; init();}; setTimeout(()=>{if(!sprLoaded){sprLoaded=true;init();}},1200); }
</script>

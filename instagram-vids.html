<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Student Voices — Reels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f8f5ef; --ink: #1c1a16; --ink-mid: #4a4640; --ink-muted: #8a837a; --ink-ghost: #c5bdb5;
  --gold: #b8913a; --gold-light: #d4aa58; --gold-pale: rgba(184,145,58,0.10); --gold-border: rgba(184,145,58,0.22);
  --crimson: #6b0f1a; --surface: #ffffff;
  --ig-grad: linear-gradient(45deg, #feda75, #fa7e1e, #d62976, #962fbf, #4f5bd5);
  --serif: 'Cormorant Garamond', Georgia, serif; --fell: 'IM Fell English', Georgia, serif;
  --mono: 'DM Mono', monospace; --sans: 'Jost', system-ui, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1); --spring: cubic-bezier(0.34,1.56,0.64,1);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; color: var(--ink); font-family: var(--sans); }

/* ─── TOP BAR ─── */
.reel-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; pointer-events: none;
}
.reel-topbar > * { pointer-events: auto; }
.reel-back {
  width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.45);
  backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.12);
  color: #fff; display: flex; align-items: center; justify-content: center;
  font-size: 16px; cursor: pointer; transition: all 0.2s var(--ease);
}
.reel-back:hover { background: var(--gold); border-color: var(--gold); }
.reel-title {
  font-family: var(--fell); font-style: italic; font-size: 1.15rem; color: #fff;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5); letter-spacing: 0.5px;
}
.reel-search-wrap { position: relative; }
.reel-search {
  font-family: var(--sans); font-size: 12px; padding: 7px 14px 7px 30px;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.12); border-radius: 20px;
  color: #fff; outline: none; width: 160px; transition: all 0.3s var(--ease);
}
.reel-search::placeholder { color: rgba(255,255,255,0.5); }
.reel-search:focus { width: 220px; border-color: var(--gold); background: rgba(0,0,0,0.6); }
.reel-search-icon {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  font-size: 13px; color: rgba(255,255,255,0.5); pointer-events: none;
}

/* ─── VERTICAL SCROLL CONTAINER ─── */
.reel-feed {
  height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory;
  scroll-behavior: smooth; scrollbar-width: none;
}
.reel-feed::-webkit-scrollbar { display: none; }

.reel-item {
  height: 100dvh; width: 100vw; scroll-snap-align: start;
  position: relative; display: flex; align-items: center; justify-content: center;
  background: #000; overflow: hidden;
}

/* ─── INSTAGRAM EMBED ─── */
.reel-ig-wrap {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  background: #000;
  padding: 0;
}
.reel-ig-wrap iframe, .reel-ig-wrap blockquote {
  width: 100% !important; height: 100% !important; border: 0 !important;
  min-width: unset !important; max-width: unset !important;
}
.reel-ig-mount {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
}
.reel-ig-placeholder {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; color: rgba(255,255,255,0.5);
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
}
.reel-ig-spin {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--gold);
  animation: igSpin 0.8s linear infinite;
}
@keyframes igSpin { to { transform: rotate(360deg); } }

/* ─── SIDE ACTIONS ─── */
.reel-actions {
  position: absolute; right: 14px; bottom: 100px;
  display: flex; flex-direction: column; gap: 18px; z-index: 20;
}
.reel-action-btn {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(0,0,0,0.35); backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.1); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; transition: all 0.2s var(--ease);
}
.reel-action-btn:hover { background: var(--gold); border-color: var(--gold); transform: scale(1.1); }
.reel-action-btn.liked { color: #ff2d55; border-color: rgba(255,45,85,0.4); background: rgba(255,45,85,0.15); }
.reel-action-btn.saved { color: var(--gold); border-color: var(--gold); background: var(--gold-pale); }
.reel-action-count {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: rgba(255,255,255,0.7); text-align: center; margin-top: 3px;
}

/* ─── BOTTOM INFO ─── */
.reel-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 60px 20px 28px;
  background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
  z-index: 10;
}
.reel-quote {
  font-family: var(--serif); font-style: italic; font-size: 1.3rem;
  color: #fff; line-height: 1.45; max-width: 80%; margin-bottom: 12px;
  text-shadow: 0 2px 8px rgba(0,0,0,0.4);
}
.reel-meta {
  display: flex; align-items: center; gap: 10px;
}
.reel-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--ig-grad);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fell); font-style: italic; font-size: 14px; color: #fff;
  border: 2px solid rgba(255,255,255,0.2);
}
.reel-name { font-family: var(--sans); font-weight: 500; font-size: 14px; color: #fff; }
.reel-dept {
  font-family: var(--mono); font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold-light); border: 1px solid rgba(184,145,58,0.4); border-radius: 10px;
  padding: 2px 8px;
}
.reel-date {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px; color: rgba(255,255,255,0.5);
  margin-left: auto;
}
.reel-sound {
  display: flex; align-items: center; gap: 6px; margin-top: 10px;
  font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
  color: rgba(255,255,255,0.6);
}
.reel-sound-icon { font-size: 12px; animation: soundWave 1.5s ease-in-out infinite; }
@keyframes soundWave { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.2)} }

/* ─── PROGRESS BAR ─── */
.reel-progress-wrap {
  position: absolute; top: 0; left: 0; right: 0; z-index: 50;
  display: flex; gap: 3px; padding: 6px 8px 0;
}
.reel-progress-seg {
  flex: 1; height: 2px; border-radius: 2px; background: rgba(255,255,255,0.15);
  overflow: hidden;
}
.reel-progress-seg.active { background: rgba(255,255,255,0.3); }
.reel-progress-fill {
  height: 100%; width: 0%; background: var(--gold); border-radius: 2px;
  transition: width 0.1s linear;
}

/* ─── NO RESULTS ─── */
.reel-empty {
  height: 100dvh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
  color: var(--ink-muted); font-family: var(--fell); font-style: italic;
  font-size: 1.4rem; text-align: center; padding: 40px;
}
.reel-empty-sub {
  font-family: var(--mono); font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--ink-ghost);
}

/* ─── MOBILE TWEAKS ─── */
@media (max-width: 480px) {
  .reel-quote { font-size: 1.1rem; max-width: 75%; }
  .reel-actions { right: 10px; bottom: 90px; gap: 14px; }
  .reel-action-btn { width: 40px; height: 40px; font-size: 16px; }
}
</style>
<base target="_blank">
</head>
<body>

<!-- TOP BAR -->
<div class="reel-topbar">
  <button class="reel-back" onclick="goBack()" aria-label="Back">←</button>
  <span class="reel-title">Student Voices</span>
  <div class="reel-search-wrap">
    <span class="reel-search-icon">⌕</span>
    <input type="text" class="reel-search" id="reelSearch" placeholder="Search…" autocomplete="off">
  </div>
</div>

<!-- FEED -->
<div class="reel-feed" id="reelFeed"></div>

<script>
/* ═══════════════════════════════════════════
   REELS FEED — Instagram-only vertical scroll
═══════════════════════════════════════════ */

const DEMO_VIDEOS = [
  {
    id: 1, student: "Ananya Rao", department: "English", platform: "instagram",
    url: "https://www.instagram.com/reel/C9xYzAbN2X1/",
    quote: "Be yourself; everyone else is already taken.",
    dateStr: "2026-07-01", date: new Date("2026-07-01"),
    likes: 124, saves: 18
  },
  {
    id: 2, student: "Kabir Mehta", department: "Philosophy", platform: "instagram",
    url: "https://www.instagram.com/reel/C9vWqPjM5L8/",
    quote: "The unexamined life is not worth living.",
    dateStr: "2026-07-05", date: new Date("2026-07-05"),
    likes: 89, saves: 12
  },
  {
    id: 3, student: "Divya Nair", department: "English", platform: "instagram",
    url: "https://www.instagram.com/reel/C9tUnGhK3J6/",
    quote: "In the middle of difficulty lies opportunity.",
    dateStr: "2026-07-10", date: new Date("2026-07-10"),
    likes: 203, saves: 34
  },
  {
    id: 4, student: "Rohan Iyer", department: "History", platform: "instagram",
    url: "https://www.instagram.com/reel/C9rSlEfH1Q4/",
    quote: "Those who cannot remember the past are condemned to repeat it.",
    dateStr: "2026-07-14", date: new Date("2026-07-14"),
    likes: 67, saves: 9
  },
  {
    id: 5, student: "Meera Krishnan", department: "English", platform: "instagram",
    url: "https://www.instagram.com/reel/C9pQjDcF9Z2/",
    quote: "We are all in the gutter, but some of us are looking at the stars.",
    dateStr: "2026-07-16", date: new Date("2026-07-16"),
    likes: 156, saves: 27
  },
  {
    id: 6, student: "Arjun Patel", department: "Philosophy", platform: "instagram",
    url: "https://www.instagram.com/reel/C9nOhBaD7X0/",
    quote: "He who has a why to live can bear almost any how.",
    dateStr: "2026-07-18", date: new Date("2026-07-18"),
    likes: 91, saves: 15
  },
];

let VDB = [];
let currentVideos = [];
let activeIdx = 0;
let observer;
let igScriptLoaded = false;

function init() {
  VDB = DEMO_VIDEOS.map(v => ({ ...v }))
    .sort((a, b) => b.date - a.date);

  currentVideos = [...VDB];
  renderFeed(currentVideos);
  setupSearch();
  setupScrollObserver();
}

function getInitials(name) {
  return name.split(' ').map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function renderFeed(videos) {
  const feed = document.getElementById('reelFeed');
  feed.innerHTML = '';

  if (videos.length === 0) {
    feed.innerHTML = `
      <div class="reel-empty">
        <div>No videos found</div>
        <div class="reel-empty-sub">Try a different search</div>
      </div>`;
    return;
  }

  // Progress segments at top
  const progressWrap = document.createElement('div');
  progressWrap.className = 'reel-progress-wrap';
  progressWrap.id = 'reelProgress';
  videos.forEach((_, i) => {
    const seg = document.createElement('div');
    seg.className = 'reel-progress-seg' + (i === 0 ? ' active' : '');
    seg.innerHTML = '<div class="reel-progress-fill"></div>';
    progressWrap.appendChild(seg);
  });
  document.body.appendChild(progressWrap);

  videos.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'reel-item';
    item.dataset.idx = i;
    item.dataset.loaded = 'false';

    // Instagram embed container (lazy-loaded)
    const playerHTML = `
      <div class="reel-ig-wrap" id="player-${i}">
        <div class="reel-ig-mount" id="ig-mount-${i}">
          <div class="reel-ig-placeholder">
            <div class="reel-ig-spin"></div>
            <span>Loading Reel…</span>
          </div>
        </div>
      </div>`;

    // Side actions
    const actionsHTML = `
      <div class="reel-actions">
        <div>
          <button class="reel-action-btn" onclick="toggleLike(this, ${i})" aria-label="Like">
            <span>♥</span>
          </button>
          <div class="reel-action-count" id="likeCount-${i}">${v.likes}</div>
        </div>
        <div>
          <button class="reel-action-btn" onclick="toggleSave(this, ${i})" aria-label="Save">
            <span>★</span>
          </button>
          <div class="reel-action-count" id="saveCount-${i}">${v.saves}</div>
        </div>
        <div>
          <button class="reel-action-btn" onclick="shareVideo(${i})" aria-label="Share">
            <span>↗</span>
          </button>
        </div>
      </div>`;

    // Bottom info
    const infoHTML = `
      <div class="reel-info">
        <div class="reel-quote">"${v.quote}"</div>
        <div class="reel-meta">
          <div class="reel-avatar">${getInitials(v.student)}</div>
          <span class="reel-name">${v.student}</span>
          <span class="reel-dept">${v.department}</span>
          <span class="reel-date">${v.dateStr}</span>
        </div>
        <div class="reel-sound">
          <span class="reel-sound-icon">♪</span>
          <span>Original Sound — ${v.student}</span>
        </div>
      </div>`;

    item.innerHTML = playerHTML + actionsHTML + infoHTML;
    feed.appendChild(item);
  });

  // Load first video immediately
  setTimeout(() => loadInstagramEmbedForIdx(0), 500);
}

/* ─── INSTAGRAM EMBED LOADER ─── */
function loadInstagramEmbedForIdx(idx) {
  const item = document.querySelector(`.reel-item[data-idx="${idx}"]`);
  if (!item || item.dataset.loaded === 'true') return;
  item.dataset.loaded = 'true';

  const v = currentVideos[idx];
  const mount = document.getElementById(`ig-mount-${idx}`);
  if (!mount) return;

  mount.innerHTML = `
    <blockquote
      class="instagram-media"
      data-instgrm-permalink="${v.url}"
      data-instgrm-version="14"
      data-instgrm-captioned="false"
      style="background:#FFF; border:0; border-radius:3px; box-shadow:0 0 1px 0 rgba(0,0,0,0.5),0 1px 10px 0 rgba(0,0,0,0.15); margin: 1px; max-width:540px; min-width:326px; padding:0; width:99.375%; width:-webkit-calc(100% - 2px); width:calc(100% - 2px);">
    </blockquote>`;

  const process = () => { if (window.instgrm) window.instgrm.Embeds.process(); };

  if (igScriptLoaded) {
    process();
  } else {
    const existing = document.getElementById('ig-embed-script');
    if (existing) {
      existing.addEventListener('load', () => { igScriptLoaded = true; process(); });
    } else {
      const script = document.createElement('script');
      script.id = 'ig-embed-script';
      script.src = 'https://www.instagram.com/embed.js';
      script.async = true;
      script.onload = () => { igScriptLoaded = true; process(); };
      document.body.appendChild(script);
    }
  }
}

/* ─── SCROLL OBSERVER (Intersection) ─── */
function setupScrollObserver() {
  const feed = document.getElementById('reelFeed');
  const items = feed.querySelectorAll('.reel-item');

  observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const idx = parseInt(entry.target.dataset.idx);
      if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
        if (activeIdx !== idx) {
          activeIdx = idx;
          updateProgress(idx);
          // Lazy-load current + preload next
          loadInstagramEmbedForIdx(idx);
          loadInstagramEmbedForIdx(idx + 1);
        }
      }
    });
  }, { threshold: [0.6] });

  items.forEach(item => observer.observe(item));
}

/* ─── PROGRESS BAR ─── */
function updateProgress(idx) {
  const segs = document.querySelectorAll('.reel-progress-seg');
  segs.forEach((s, i) => {
    s.classList.toggle('active', i === idx);
    const fill = s.querySelector('.reel-progress-fill');
    if (fill) fill.style.width = i < idx ? '100%' : (i === idx ? '0%' : '0%');
  });
}

/* ─── INTERACTIONS ─── */
function toggleLike(btn, idx) {
  btn.classList.toggle('liked');
  const countEl = document.getElementById(`likeCount-${idx}`);
  const current = parseInt(countEl.textContent);
  countEl.textContent = btn.classList.contains('liked') ? current + 1 : current - 1;
}

function toggleSave(btn, idx) {
  btn.classList.toggle('saved');
  const countEl = document.getElementById(`saveCount-${idx}`);
  const current = parseInt(countEl.textContent);
  countEl.textContent = btn.classList.contains('saved') ? current + 1 : current - 1;
}

function shareVideo(idx) {
  const v = currentVideos[idx];
  if (navigator.share) {
    navigator.share({ title: `${v.student} — "${v.quote}"`, url: v.url });
  } else {
    navigator.clipboard.writeText(v.url);
    alert('Link copied to clipboard!');
  }
}

function goBack() {
  window.history.back();
}

/* ─── SEARCH ─── */
function setupSearch() {
  const input = document.getElementById('reelSearch');
  let timer;
  input.addEventListener('input', () => {
    clearTimeout(timer);
    timer = setTimeout(() => {
      const q = input.value.trim().toLowerCase();
      if (!q) {
        currentVideos = [...VDB];
      } else {
        currentVideos = VDB.filter(v =>
          v.student.toLowerCase().includes(q) ||
          v.department.toLowerCase().includes(q) ||
          v.quote.toLowerCase().includes(q)
        );
      }
      // Rebuild feed
      const oldProgress = document.getElementById('reelProgress');
      if (oldProgress) oldProgress.remove();
      if (observer) observer.disconnect();
      renderFeed(currentVideos);
      setupScrollObserver();
      activeIdx = 0;
    }, 300);
  });
}

/* ─── KEYBOARD NAV ─── */
document.addEventListener('keydown', e => {
  const feed = document.getElementById('reelFeed');
  const itemHeight = window.innerHeight;
  if (e.key === 'ArrowDown') {
    feed.scrollBy({ top: itemHeight, behavior: 'smooth' });
  } else if (e.key === 'ArrowUp') {
    feed.scrollBy({ top: -itemHeight, behavior: 'smooth' });
  }
});

/* ─── INIT ─── */
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>

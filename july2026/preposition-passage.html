// ============================================================
// HELPER: Split passages into pages of 5 blanks each
// ============================================================

function buildQuizPages() {
  const pages = [];
  quizDataStore.forEach((passage, pIdx) => {
    const totalBlanks = passage.answers.length;
    const totalPages = Math.ceil(totalBlanks / blanksPerPage);
    for (let i = 0; i < totalPages; i++) {
      const start = i * blanksPerPage;
      const end = Math.min(start + blanksPerPage, totalBlanks);
      pages.push({
        passageIndex: pIdx,
        pageIndex: i,
        totalPages: totalPages,
        title: passage.title,
        passage: passage.passage,
        answers: passage.answers,
        start: start,
        end: end,
        pageId: `p${pIdx}-pg${i}`
      });
    }
  });
  return pages;
}

// ============================================================
// LAYOUT HELPERS
// ============================================================

function adjustForTopStrip() {
  const h = topStripEl ? topStripEl.offsetHeight : 0;
  dropContainerEl.style.marginTop = h + "px";
  dropContainerEl.style.maxHeight = `calc(100vh - ${h}px - 2rem)`;
}

function autoFillFromStorage() {
  try {
    const storedName = localStorage.getItem('playerName');
    const storedDept = localStorage.getItem('playerDept');
    if (storedName) nameInputEl.value = storedName;
    if (storedDept) deptSelectEl.value = storedDept;
  } catch (e) { console.log('localStorage unavailable'); }
}

// ============================================================
// QUIZ FLOW
// ============================================================

function beginQuiz() {
  if (!nameInputEl.value.trim()) { nameInputEl.style.borderColor = "red"; return; }
  if (!deptSelectEl.value) { deptSelectEl.style.borderColor = "red"; return; }
  nameInputEl.style.borderColor = "#c2a677";
  deptSelectEl.style.borderColor = "#c2a677";

  playerName = nameInputEl.value.trim();
  playerDept = deptSelectEl.value;
  try {
    localStorage.setItem('playerName', playerName);
    localStorage.setItem('playerDept', playerDept);
  } catch (e) {}

  document.getElementById("quizTitle").style.display = "none";
  nameFormEl.style.display = "none";
  quizContentEl.style.display = "block";
  startQuiz();
}
window.beginQuiz = beginQuiz;

function startQuiz() {
  quizData = buildQuizPages();
  wrongQuestions = [];
  current = 0;
  correctCount = 0;
  totalWrongGuesses = 0;
  gemsCount = 0;
  startTime = Date.now();
  totalQuestionsInQuiz = quizData.length;

  timerEl.innerText = `📚 `;
  gemsCounterEl.innerText = `💎 0`;
  scoreCard.innerHTML = "";
  restartBtn.style.display = "none";
  nextPageBtn.style.display = "none";

  loadQuestion();
  startTimer();
}

function updateProgress() {
  const currentQuestionNumber = current + 1;
  if (quizData[current]) {
    progressTracker.innerText = `📍 ${currentQuestionNumber} / ${totalQuestionsInQuiz}`;
  } else if (current > 0) {
    progressTracker.innerText = "Done!";
  } else {
    progressTracker.innerText = `📍 1 / ${totalQuestionsInQuiz}`;
  }
}

// ============================================================
// RENDER QUESTION
// ============================================================

function loadQuestion() {
  if (current >= quizData.length) {
    return showScore();
  }

  selectedOption = null;
  const d = quizData[current];

  updateProgress();
  dragOptionsEl.innerHTML = "";
  dropContainerEl.innerHTML = "";
  nextPageBtn.style.display = "none";

  // Show passage title
  const titleEl = document.createElement("div");
  titleEl.className = "passage-title";
  titleEl.innerText = `${d.title} — Page ${d.pageIndex + 1}/${d.totalPages}`;
  dropContainerEl.appendChild(titleEl);

  // Slice answers for this page
  const pageAnswers = d.answers.slice(d.start, d.end);
  const shuffled = [...pageAnswers].sort(() => Math.random() - 0.5);

  shuffled.forEach(ans => {
    const div = document.createElement("div");
    div.classList.add("drag-item");
    div.innerText = ans;
    div.onclick = () => selectOption(div);
    dragOptionsEl.appendChild(div);
  });

  // Build the passage with blanks for this page only
  const fullText = d.passage;
  const allMatches = [];
  const regex = /\*\*([^*]+)\*\*/g;
  let match;
  while ((match = regex.exec(fullText)) !== null) {
    allMatches.push(match[1]);
  }

  const parts = fullText.split(/\*\*[^*]+\*\*/);
  let blankIdx = 0;
  let globalBlankIdx = 0;

  for (let i = 0; i < parts.length; i++) {
    if (parts[i]) {
      dropContainerEl.appendChild(document.createTextNode(parts[i]));
    }
    if (blankIdx < allMatches.length) {
      const isInPage = (globalBlankIdx >= d.start && globalBlankIdx < d.end);
      if (isInPage) {
        const b = document.createElement("button");
        b.classList.add("drop-zone");
        b.innerText = "___";
        b.dataset.answer = allMatches[blankIdx];
        b.dataset.blankIdx = globalBlankIdx;
        b.onclick = () => placeOption(b);
        dropContainerEl.appendChild(b);
      } else {
        const span = document.createElement("span");
        span.style.fontWeight = "bold";
        span.style.color = "#888";
        span.innerText = allMatches[blankIdx];
        dropContainerEl.appendChild(span);
      }
      blankIdx++;
      globalBlankIdx++;
    }
  }

  adjustForTopStrip();
}

function selectOption(div) {
  if (div.classList.contains("used")) return;
  if (selectedOption) selectedOption.classList.remove("selected");
  selectedOption = div;
  div.classList.add("selected");
}

function placeOption(dz) {
  if (!selectedOption || dz.classList.contains("filled")) return;

  const ans = selectedOption.innerText;
  const correct = dz.dataset.answer;

  if (ans === correct) {
    correctCount++;
    gemsCount++;
    gemsCounterEl.innerText = `💎 ${gemsCount}`;

    createSparkleEffect(dz);
    gemsCounterEl.classList.add('gem-counter-pulse');
    setTimeout(() => gemsCounterEl.classList.remove('gem-counter-pulse'), 400);

    dz.innerText = ans;
    dz.classList.add("correct", "filled");
    dz.disabled = true;
    selectedOption.classList.add("used");
  } else {
    totalWrongGuesses++;
    gemsCount--;
    gemsCounterEl.innerText = `💎 ${gemsCount}`;
    dz.classList.add("wrong");
    setTimeout(() => dz.classList.remove("wrong"), 600);

    const currentData = quizData[current];
    if (!wrongQuestions.some(w => w.pageId === currentData.pageId)) {
      wrongQuestions.push(currentData);
      totalQuestionsInQuiz++;
      updateProgress();
    }
  }

  if (selectedOption) {
    selectedOption.classList.remove("selected");
    selectedOption = null;
  }

  if (!dropContainerEl.querySelector(".drop-zone:not(.filled)")) {
    nextPageBtn.style.display = "block";
  }
}

function createSparkleEffect(element) {
  const rect = element.getBoundingClientRect();
  const containerRect = quizContainer.getBoundingClientRect();
  for (let i = 0; i < 8; i++) {
    const spark = document.createElement('div');
    spark.className = 'gem-spark';
    spark.innerText = ['💎', '✨', '⭐'][Math.floor(Math.random() * 3)];
    spark.style.left = `${rect.left - containerRect.left + rect.width / 2}px`;
    spark.style.top  = `${rect.top  - containerRect.top  + rect.height / 2}px`;
    spark.style.setProperty('--random-x', `${(Math.random() - 0.5) * 100}px`);
    quizContainer.appendChild(spark);
    setTimeout(() => spark.remove(), 1000);
  }
}

async function showScore() {
  clearInterval(timerInterval);
  const totalTime = Math.floor((Date.now() - startTime) / 1000);

  dragOptionsEl.innerHTML = "";
  dropContainerEl.innerHTML = "<h2 style='text-align:center;'>🎉 Preposition Quest Completed!</h2>";
  progressTracker.innerText = "Done!";
  nextPageBtn.style.display = "none";

  const successMessage = (totalWrongGuesses === 0)
    ? "<p>✅ Flawless! All prepositions mastered on the first attempt!</p>"
    : `<p>✅ Correct Answers (total): ${correctCount}</p>
       <p>❌ Wrong Attempts (total): ${totalWrongGuesses}</p>`;

  scoreCard.innerHTML = `
    <p>👤 Player: <strong>${playerName}</strong> (${playerDept})</p>
    ${successMessage}
    <p>💎 Final Gems: ${gemsCount}</p>
    <p>⏱️ Time Taken: ${totalTime} seconds</p>
    <button onclick="downloadPDFReport()" style="margin-top: 1rem; padding: 0.7rem 2rem; background-color: #4CAF50; border: none; border-radius: 10px; cursor: pointer; color: white; font-size: 1rem;">📥 Download PDF Report with Explanations</button>
  `;
  restartBtn.style.display = "block";

  try {
    const { error } = await supabase.from('Quests').insert([{
      student_name: playerName,
      department: playerDept,
      correct: correctCount,
      wrong: totalWrongGuesses,
      time_spent: totalTime,
      quest_id: currentQuestID
    }]);

    else console.log('✅ Saved to Supabase');
  } catch (err) {
    console.error('Supabase insert error:', err);
  }
}

function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    timerEl.innerText = `⏳ ${elapsed}s`;
  }, 1000);
}

// ============================================================
// PDF REPORT WITH EXPLANATIONS
// ============================================================

function downloadPDFReport() {
  if (!window.jspdf || !window.jspdf.jsPDF) {
    alert("PDF library not loaded yet. Please try again.");
    return;
  }
  const doc = new window.jspdf.jsPDF({ unit: "mm", format: "a4" });
  if (typeof doc.autoTable !== "function") {
    alert("AutoTable plugin not loaded.");
    return;
  }

  const pageHeight = doc.internal.pageSize.height;
  const marginLeft = 20;
  const usableWidth = 170;
  const topMargin = 20;
  const bottomSafeMargin = 30;
  const totalTime = Math.floor((Date.now() - startTime) / 1000);
  const reportDate = new Date().toLocaleString("en-IN", { timeZone: "Asia/Kolkata" });

  // Header
  doc.setFillColor(25, 25, 60);
  doc.rect(0, 0, 210, 45, "F");
  doc.setTextColor(255, 255, 255);
  doc.setFont("times", "bold");
  doc.setFontSize(18);
  doc.text("SRM VALLIAMMAI ENGINEERING COLLEGE", 105, 16, { align: "center" });
  doc.setFontSize(12);
  doc.setFont("times", "italic");
  doc.text("(Autonomous)", 105, 23, { align: "center" });
  doc.setFontSize(15);
  doc.setFont("times", "normal");
  doc.text("Department of English", 105, 31, { align: "center" });
  doc.setFontSize(14);
  doc.setFont("times", "bold");
  doc.setTextColor(212, 175, 55);
  doc.text(`${currentQuestID} — Performance Report`, 105, 39, { align: "center" });

  // Student Info
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(11);
  doc.text("CANDIDATE INFORMATION", marginLeft, 55);
  doc.autoTable({
    startY: 58,
    body: [
      ["Student Name", playerName],
      ["Department", playerDept],
      ["Quest ID", currentQuestID],
      ["Completed On", reportDate],
    ],
    theme: "plain",
    styles: { fontSize: 10, font: "times", cellPadding: 3 },
    columnStyles: {
      0: { fontStyle: "bold", cellWidth: 60, textColor: [70, 70, 70] },
      1: { cellWidth: 120 },
    },
    margin: { left: marginLeft, right: marginLeft },
  });

  // Performance Summary
  let y = doc.lastAutoTable.finalY + 10;
  if (y > pageHeight - bottomSafeMargin) { doc.addPage(); y = topMargin; }

  doc.setFont("times", "bold");
  doc.setFontSize(11);
  doc.text("PERFORMANCE SUMMARY", marginLeft, y);
  y += 6;

  doc.autoTable({
    startY: y,
    body: [
      ["Total Question Pages", quizData.length.toString()],
      ["Correct Answers (Total)", correctCount.toString()],
      ["Wrong Attempts (Total)", totalWrongGuesses.toString()],
      ["Final Gems Earned", gemsCount.toString()],
      ["Total Time", `${Math.floor(totalTime / 60)}m ${totalTime % 60}s`],
    ],
    theme: "grid",
    styles: { fontSize: 10, font: "times", cellPadding: 3 },
    margin: { left: marginLeft, right: marginLeft },
  });

  y = doc.lastAutoTable.finalY + 12;

  // Preposition Explanations
  if (y > pageHeight - bottomSafeMargin) { doc.addPage(); y = topMargin; }
  doc.setFont("times", "bold");
  doc.setFontSize(11);
  doc.text("PREPOSITION REFERENCE GUIDE", marginLeft, y);
  y += 8;

  const uniquePreps = new Set();
  quizDataStore.forEach(p => p.answers.forEach(a => uniquePreps.add(a)));

  doc.setFont("times", "normal");
  doc.setFontSize(9);
  doc.setLineHeightFactor(1.3);

  const sortedPreps = Array.from(uniquePreps).sort();
  sortedPreps.forEach(prep => {
    const exp = explanations[prep] || `Usage of "${prep}" in context.`;
    const line = `• ${prep}: ${exp}`;
    const lines = doc.splitTextToSize(line, usableWidth);
    const lineHeight = doc.getFontSize() * 1.3;
    const blockHeight = lines.length * lineHeight + 2;

    if (y + blockHeight > pageHeight - bottomSafeMargin) {
      doc.addPage();
      y = topMargin;
    }

    doc.text(lines, marginLeft, y);
    y += lines.length * lineHeight + 2;
  });

  y += 8;

  // Question Bank with Answers
  if (y > pageHeight - bottomSafeMargin) { doc.addPage(); y = topMargin; }
  doc.setFont("times", "bold");
  doc.setFontSize(11);
  doc.text("QUESTION BANK WITH CORRECT ANSWERS", marginLeft, y);
  y += 8;

  quizDataStore.forEach((item, i) => {
    let fullPassage = item.passage;
    item.answers.forEach(ans => {
      fullPassage = fullPassage.replace("**" + ans + "**", ` [${ans}] `);
    });

    doc.setFont("times", "normal");
    doc.setFontSize(9);
    doc.setLineHeightFactor(1.15);

    const lines = doc.splitTextToSize(fullPassage, usableWidth);
    const lineHeight = doc.getFontSize() * 1.15;
    const blockHeight = lines.length * lineHeight + 10;

    if (y + blockHeight > pageHeight - bottomSafeMargin) {
      doc.addPage();
      y = topMargin;
    }

    doc.setFont("times", "bold");
    doc.setTextColor(25, 25, 60);
    doc.text(`Passage ${i + 1}: ${item.title}`, marginLeft, y);
    y += 6;

    doc.setFont("times", "normal");
    doc.setTextColor(0, 0, 0);
    doc.text(lines, marginLeft + 5, y, { align: "left" });
    y += lines.length * lineHeight + 5;

    doc.setDrawColor(230, 230, 230);
    doc.setLineWidth(0.3);
    doc.line(marginLeft, y, 190, y);
    y += 6;
  });

  // Footer
  const totalPages = doc.getNumberOfPages();
  for (let i = 1; i <= totalPages; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(128, 128, 128);
    doc.setFont("times", "italic");
    doc.text(`Page ${i} of ${totalPages}`, 105, pageHeight - 10, { align: "center" });
  }

  const cleanName = playerName.replace(/[^a-zA-Z0-9]/g, "_");
  const cleanQuest = currentQuestID.replace(/[^a-zA-Z0-9]/g, "_");
  doc.save(`${cleanName}_${cleanQuest}_Report.pdf`);
}

// ============================================================
// EVENT LISTENERS
// ============================================================

window.addEventListener('DOMContentLoaded', autoFillFromStorage);
window.addEventListener('resize', adjustForTopStrip);

restartBtn.onclick = () => {
  quizContentEl.style.display = "none";
  nameFormEl.style.display = "block";
  nameInputEl.value = "";
  deptSelectEl.value = "";
  try {
    localStorage.removeItem('playerName');
    localStorage.removeItem('playerDept');
  } catch(e) {}
  nextPageBtn.style.display = "none";
  document.getElementById("quizTitle").style.display = "block";
};

nextPageBtn.onclick = () => {
  current++;
  if (current >= quizData.length && wrongQuestions.length > 0) {
    quizData.push(...wrongQuestions);
    wrongQuestions = [];
  }
  loadQuestion();
};

</script>

<script>
document.addEventListener("click", function (e) {
  const target = e.target.closest("a");
  if (!target) return;
  const url = target.href;
  const internalDomains = [
    window.location.origin,
    "andrewveda.github.io",
    "sites.google.com/view/cys-english/",
    "sites.google.com/view/srm-vec-english/"
  ];
  const isInternal = internalDomains.some(domain => url.includes(domain));
  if (isInternal) {
    if (window.matchMedia("(display-mode: standalone)").matches ||
        window.matchMedia("(display-mode: fullscreen)").matches) {
      e.preventDefault();
      window.location.href = url;
    }
  } else {
    target.setAttribute("target", "_blank");
  }
});
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⏱️ 5-Minute Timed Quest</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=Orbitron:wght@700;900&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
:root {
  --bg-main: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
  --card-bg: #ffffff;
  --accent-main: #ff9800;
  --accent-soft: #ffcc80;
  --blue-main: #2979ff;
  --green-main: #00c853;
  --red-main: #e53935;
  --text-main: #1f2933;
  --text-muted: #6b7280;
  --timer-color: #2979ff;
}
* { box-sizing: border-box; }
body {
  margin: 0; padding: 0;
  font-family: 'DM Sans', 'Segoe UI', sans-serif;
  background: var(--bg-main);
  color: var(--text-main);
  text-align: center;
}

/* ── CONTAINER ── */
.container {
  position: relative;
  max-width: 900px;
  margin: 2rem auto;
  background: var(--card-bg);
  padding: 2rem;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.12);
}
@media (max-width: 600px) {
  .container { margin: 0; border-radius: 0; min-height: 100dvh; padding: 1rem 0.9rem; box-shadow: none; }
}

/* ── LOADING SCREEN ── */
#loadingScreen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 1.2rem; min-height: 220px;
  padding: 2rem;
}
.loader-ring {
  width: 64px; height: 64px; border-radius: 50%;
  border: 6px solid #e2e8f0;
  border-top-color: var(--accent-main);
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-text { font-size: 1rem; font-weight: 600; color: var(--text-muted); }
.loader-error { color: var(--red-main); font-weight: 700; font-size: 1rem; }

/* ── NAME FORM ── */
#nameForm {
  display: flex; flex-direction: column; align-items: center; gap: 1rem;
  background: linear-gradient(135deg, #ffffff, #f1f5f9);
  padding: 2rem 1.5rem; border-radius: 20px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.18);
  max-width: 420px; margin: 2rem auto;
}
.hero-quote {
  max-width: 94%; margin: 0.6rem auto 1.2rem auto;
  padding: 1rem; background: linear-gradient(135deg, #000000, #1a1a1a);
  border-radius: 10px;
}
.hero-text { font-size: 1.2rem; font-weight: 700; color: #FFD700; line-height: 1.3; }
.hero-author { margin-top: 0.3rem; font-size: 0.95rem; font-weight: 600; color: #d4af37; }
#nameInput, #departmentSelect {
  width: 100%; padding: 0.9rem 1rem;
  background: #ffffff; border: 2px solid #cbd5e1;
  border-radius: 12px; font-size: 1rem; outline: none;
}
#nameInput:focus, #departmentSelect:focus {
  border-color: var(--blue-main);
  box-shadow: 0 0 0 3px rgba(41,121,255,0.25);
}
.timer-badge {
  display: flex; align-items: center; gap: 0.5rem;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: #FFD700; border-radius: 12px; padding: 0.7rem 1.2rem;
  font-family: 'Orbitron', monospace; font-size: 0.9rem; font-weight: 700;
  letter-spacing: 1px; width: 100%; justify-content: center;
}
#nameForm button {
  width: 100%; padding: 1rem;
  background: linear-gradient(135deg, var(--accent-main), #ffb300);
  color: #000; font-size: 1.1rem; font-weight: bold;
  border: none; border-radius: 14px; cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
#nameForm button:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(255,152,0,0.45); }

/* ── QUIZ HEADER ── */
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 0.5rem; margin-bottom: 1.5rem;
  flex-wrap: wrap; gap: 0.5rem;
}

/* ── COUNTDOWN TIMER ── */
#countdown {
  font-family: 'Orbitron', monospace;
  font-size: 1.5rem; font-weight: 900;
  color: var(--timer-color);
  background: #f0f4ff;
  border: 2px solid var(--timer-color);
  border-radius: 12px;
  padding: 0.35rem 0.9rem;
  letter-spacing: 2px;
  transition: color 0.3s, background 0.3s, border-color 0.3s;
  min-width: 90px;
}
#countdown.warning {
  color: #ff9800; background: #fff8f0; border-color: #ff9800;
  animation: timerPulse 0.8s ease infinite;
}
#countdown.critical {
  color: #e53935; background: #fff0f0; border-color: #e53935;
  animation: timerPulse 0.4s ease infinite;
}
@keyframes timerPulse {
  0%,100% { transform: scale(1); } 50% { transform: scale(1.06); }
}

#gemsCounter {
  font-size: 1rem; font-weight: bold; color: var(--accent-main);
  background: #fff8f0; border-radius: 10px; padding: 0.35rem 0.8rem;
  border: 2px solid var(--accent-soft);
}
#progressTracker {
  font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
  background: #f8fafc; border-radius: 10px; padding: 0.35rem 0.8rem;
}
#muteBtn {
  background: none; border: none; font-size: 1.2rem; cursor: pointer;
  padding: 0.3rem 0.5rem; border-radius: 8px;
}
#muteBtn:hover { background: #f1f5f9; }

/* ── PROGRESS BAR ── */
.time-bar-wrap {
  width: 100%; height: 8px; background: #e2e8f0;
  border-radius: 99px; overflow: hidden; margin-bottom: 1.2rem;
}
#timeBar {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, #2979ff, #00b0ff);
  transition: width 0.5s linear, background 0.5s;
  width: 100%;
}
#timeBar.warning { background: linear-gradient(90deg, #ff9800, #ffcc00); }
#timeBar.critical { background: linear-gradient(90deg, #e53935, #ff5252); }

/* ── QUESTION ── */
.question { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.2rem; }

/* ── OPTIONS ── */
.drag-options {
  display: flex; flex-wrap: wrap; gap: 0.8rem;
  margin-bottom: 2rem; justify-content: center;
}
.drag-item {
  padding: 0.7rem 1.2rem; background: #f1f5f9;
  border-radius: 14px; cursor: pointer; user-select: none;
  font-weight: 600; transition: transform 0.2s ease, box-shadow 0.2s ease;
  border: 2px solid transparent;
}
.drag-item:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }
.drag-item.selected { background: var(--accent-main); color: #fff; border-color: #e65100; }
.drag-item.used { opacity: 0.3; pointer-events: none; text-decoration: line-through; }

/* ── DROP ZONES ── */
.drop-container { display: flex; flex-direction: column; gap: 1rem; align-items: center; }
.drop-zone {
  width: 100%; max-width: 600px; min-height: 48px;
  padding: 0.8rem 1rem; border-radius: 12px;
  border: 2px dashed var(--blue-main);
  cursor: pointer; font-weight: 600; background: #f8fafc;
  text-align: left; line-height: 1.5; font-size: 0.95rem;
  transition: background 0.2s, border-color 0.2s;
}
.drop-zone:hover:not(.filled) { background: #eef2ff; border-color: #1a56db; }
.drop-zone.filled { border-style: solid; background: #e3f2fd; }
.drop-zone.correct {
  background-color: #e8f5e9 !important; border-color: var(--green-main) !important;
  color: var(--green-main); animation: correctPulse 0.6s ease;
}
.drop-zone.wrong {
  background-color: #ffebee !important; border-color: var(--red-main) !important;
  color: var(--red-main); animation: wrongShake 0.5s ease;
}
@keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.03)} }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
@keyframes gemPop { 0%{transform:scale(1)} 50%{transform:scale(1.3) rotate(10deg)} 100%{transform:scale(1)} }
.gem-pop { animation: gemPop 0.5s ease; }

/* ── MOTIVATION TOAST ── */
#motivationBox {
  position: fixed; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 24px); max-width: 520px;
  z-index: 9999; padding: 1rem 1.2rem;
  font-size: 1.1rem; font-weight: 800; color: var(--accent-main);
  background: linear-gradient(135deg, #fff3e0, #ffe0b2);
  border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}
#motivationBox.show { opacity: 1; }

/* ── TIME'S UP OVERLAY ── */
#timesUpOverlay {
  display: none; position: fixed; inset: 0; z-index: 99999;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 1.2rem;
}
#timesUpOverlay.active { display: flex; }
.timesup-card {
  background: #060d1a; border-radius: 24px; padding: 2.5rem 2rem;
  text-align: center; max-width: 360px; width: 90%;
  border: 1px solid rgba(255,215,0,0.3);
  box-shadow: 0 30px 60px rgba(0,0,0,0.6);
  animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.timesup-emoji { font-size: 4rem; margin-bottom: 0.5rem; }
.timesup-title {
  font-family: 'Orbitron', monospace; font-size: 1.6rem;
  font-weight: 900; color: #FFD700; margin-bottom: 0.5rem;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
.timesup-sub { color: #94a3b8; font-size: 0.95rem; margin-bottom: 1.5rem; }
.timesup-btn {
  padding: 0.9rem 2rem; font-family: 'Orbitron', monospace;
  font-size: 0.8rem; font-weight: 700; letter-spacing: 1px;
  background: linear-gradient(135deg, #ff9800, #ffb300);
  color: #000; border: none; border-radius: 14px; cursor: pointer;
  width: 100%; box-shadow: 0 4px 18px rgba(255,152,0,0.4);
}

/* ── SCORE PORTAL ── */
.score-portal {
  position: relative; overflow: hidden; margin-top: 0.5rem;
  padding: 1.2rem 1rem 1.4rem; border-radius: 20px;
  background: #060d1a; color: #e2e8f0;
  box-shadow: 0 0 0 1px rgba(255,215,0,0.14), 0 20px 50px rgba(0,0,0,0.6);
  animation: portalEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.score-portal::before {
  content: ""; position: absolute; inset: 0; z-index: 0; border-radius: 20px;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.22) 0%, transparent 100%),
    radial-gradient(1px 1px at 50% 12%, rgba(255,255,255,0.18) 0%, transparent 100%),
    radial-gradient(1px 1px at 82% 60%, rgba(255,255,255,0.16) 0%, transparent 100%),
    radial-gradient(2px 2px at 38% 90%, rgba(255,215,0,0.28) 0%, transparent 100%);
  pointer-events: none;
}
.score-portal > * { position: relative; z-index: 1; }
@keyframes portalEntrance { from { opacity:0; transform:translateY(22px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }

.portal-header { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; margin-bottom: 0.85rem; }
.portal-title {
  font-family: 'Orbitron', monospace; font-size: 0.85rem; font-weight: 900;
  letter-spacing: 2.5px; text-transform: uppercase; color: #FFD700;
  text-shadow: 0 0 14px rgba(255,215,0,0.55);
}
.portal-player {
  width: 100%; font-size: 0.95rem; font-weight: 700; color: #e2e8f0;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,215,0,0.25);
  padding: 0.55rem 0.8rem; border-radius: 12px; text-align: center;
  word-break: break-word; line-height: 1.35;
  box-shadow: 0 0 18px rgba(255,215,0,0.18);
}
.portal-body {
  display: flex; flex-direction: column; align-items: center;
  gap: 1rem; margin-bottom: 0.9rem;
}
.accuracy-ring {
  width: 160px; height: 160px; border-radius: 50%; position: relative;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 6px 18px rgba(0,0,0,0.5);
  animation: ringReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
.accuracy-ring::before {
  content: ""; position: absolute; inset: 0; border-radius: 50%;
  background: conic-gradient(var(--ring-color) calc(var(--progress) * 1%), rgba(255,255,255,0.05) 0);
}
@keyframes ringReveal { from { transform: scale(0.55) rotate(-30deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }
.accuracy-inner {
  width: 110px; height: 110px; border-radius: 50%; background: #060d1a;
  display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1;
}
.accuracy-value {
  font-family: 'Orbitron', monospace; font-size: 2.1rem; font-weight: 900;
  color: var(--ring-color); line-height: 1;
  animation: accuracyPulse 2.2s ease-in-out infinite;
}
@keyframes accuracyPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.07); } }
.accuracy-label { font-size: 0.5rem; letter-spacing: 1.5px; text-transform: uppercase; color: #475569; margin-top: 2px; }

.stats-grid {
  width: 100%; max-width: 360px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
}
.stat-card {
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px; padding: 0.6rem 0.65rem 0.55rem;
  display: flex; flex-direction: column; align-items: flex-start;
  animation: statFloat 0.45s ease both;
}
.stat-card:nth-child(1){animation-delay:0.05s} .stat-card:nth-child(2){animation-delay:0.12s}
.stat-card:nth-child(3){animation-delay:0.19s} .stat-card:nth-child(4){animation-delay:0.26s}
.stat-card:nth-child(5){animation-delay:0.33s} .stat-card:nth-child(6){animation-delay:0.4s}
@keyframes statFloat { from { transform: translateY(10px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.stat-emoji { font-size: 0.85rem; line-height: 1; margin-bottom: 0.15rem; opacity: 0.75; }
.stat-value { font-family: 'Orbitron', monospace; font-size: 1.45rem; font-weight: 900; line-height: 1; margin-bottom: 0.12rem; }
.stat-label { font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; color: #475569; }
.correct-card .stat-value { color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.4); }
.wrong-card   .stat-value { color: #ff5252; text-shadow: 0 0 10px rgba(255,82,82,0.4); }
.gems-card    .stat-value { color: #FFD700; text-shadow: 0 0 12px rgba(255,215,0,0.5); }
.time-card    .stat-value { color: #38bdf8; text-shadow: 0 0 10px rgba(56,189,248,0.4); font-size: 1.1rem; }
.attempted-card .stat-value { color: #c084fc; text-shadow: 0 0 10px rgba(192,132,252,0.4); }
.remaining-card .stat-value { color: #fb923c; text-shadow: 0 0 10px rgba(251,146,60,0.4); }

.performance-message {
  font-size: 0.88rem; font-weight: 700; color: #fbbf24;
  background: rgba(251,191,36,0.07); border: 1px solid rgba(251,191,36,0.2);
  border-radius: 10px; padding: 0.5rem 0.75rem; margin-bottom: 0.8rem;
  text-align: left; line-height: 1.4;
}
.portal-actions { display: flex; flex-direction: column; gap: 0.6rem; }
.next-quest-btn {
  padding: 0.9rem 1rem; font-family: 'Orbitron', monospace;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border-radius: 14px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #ff9800, #ffb300); color: #000;
  box-shadow: 0 4px 18px rgba(255,152,0,0.4);
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.next-quest-btn:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255,152,0,0.3); }
.report-btn {
  padding: 0.9rem 1rem; font-family: 'Orbitron', monospace;
  font-size: 0.78rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  border-radius: 14px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #38bdf8, #0ea5e9); color: #021018;
  box-shadow: 0 4px 18px rgba(56,189,248,0.35);
  -webkit-tap-highlight-color: transparent; touch-action: manipulation;
  transition: transform 0.15s ease;
}
.report-btn:active { transform: scale(0.96); }
</style>
</head>
<body>

<div class="container" id="quizContainer">

  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div class="loader-ring"></div>
    <div class="loader-text">Loading question bank…</div>
  </div>

  <!-- NAME FORM -->
  <div id="nameForm" style="display:none;">
    <div class="hero-quote">
      <div class="hero-text">You have 5 minutes.<br>Make every second count.</div>
      <div class="hero-author">⏱️ Timed Quest · Quest 193</div>
    </div>
    <input type="text" id="nameInput" placeholder="Enter your name"/>
    <select id="departmentSelect">
      <option value="">-- Select Department --</option>
      <option value="Cyber Security">Cyber Security</option>
      <option value="EIE">EIE</option>
      <option value="CSE-1">CSE-1</option>
      <option value="CSE-2">CSE-2</option>
      <option value="CSE-3">CSE-3</option>
      <option value="Mechanical Engineering">Mechanical Engineering</option>
      <option value="ECE-1">ECE-1</option>
      <option value="ECE-2">ECE-2</option>
      <option value="ECE-3">ECE-3</option>
      <option value="AI DS-1">AI DS-1</option>
      <option value="AI DS-2">AI DS-2</option>
      <option value="Agri and Civil">Agri and Civil</option>
      <option value="EEE">EEE</option>
      <option value="Medical Electronics">Medical Electronics</option>
      <option value="IT-1">IT-1</option>
      <option value="IT-2">IT-2</option>
    </select>
    <div class="timer-badge">⏱️ TIMED RUN &nbsp;·&nbsp; 5:00 COUNTDOWN</div>
    <button onclick="beginQuiz()">🚀 Start Timed Quest</button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quizContent" style="display:none;">
    <div class="quiz-header">
      <div id="countdown">5:00</div>
      <div id="gemsCounter">💎 0</div>
      <div id="progressTracker">📍 0 answered</div>
      <button id="muteBtn" title="Mute / Unmute">🔊</button>
    </div>
    <div class="time-bar-wrap"><div id="timeBar"></div></div>
    <div class="question" id="question"></div>
    <div class="drag-options" id="dragOptions"></div>
    <div class="drop-container" id="dropContainer"></div>
  </div>

  <!-- SCORE SCREEN -->
  <div id="scoreScreen" style="display:none; padding-top: 1rem;"></div>

</div>

<!-- MOTIVATION TOAST -->
<div id="motivationBox"></div>

<!-- TIME'S UP OVERLAY -->
<div id="timesUpOverlay">
  <div class="timesup-card">
    <div class="timesup-emoji">⏰</div>
    <div class="timesup-title">TIME'S UP!</div>
    <div class="timesup-sub" id="timesupSub">Let's see how you did!</div>
    <button class="timesup-btn" onclick="finaliseScore()">📊 SEE MY SCORE</button>
  </div>
</div>

<script>
/* ─────────────── CONFIG ─────────────── */
const TOTAL_SECONDS     = 300; // 5 minutes
const JSON_URL          = "https://raw.githubusercontent.com/andrewveda/SRM-VEC-English-PWA/main/semII/questions.json";
const NEXT_QUEST_URL    = "https://andrewveda.github.io/SRM-VEC-English-PWA/semII/24";
const EDGE_FUNCTION_URL = "https://yellow-lab-4999.andrewveda.workers.dev/functions/v1/logQuest";
const QUEST_ID          = "Quest 193";

/* ─────────────── STATE ─────────────── */
let quizData        = [];
let totalQCount     = 0;
let current         = 0;
let correctCount    = 0;
let totalWrongCount = 0;
let gemsCount       = 0;
let answeredCount   = 0;  // questions fully completed
let playerName      = "";
let playerDept      = "";
let selectedOption  = null;
let secondsLeft     = TOTAL_SECONDS;
let timerInterval   = null;
let quizStartTime   = null;
let timesUpFired    = false;

/* ─────────────── AUDIO ─────────────── */
let isMuted = localStorage.getItem("questMuted") === "true";
const applauseSound = new Audio('https://andrewveda.github.io/SRM-VEC-English-PWA/sounds/crowd.mp3');
const wrongSound    = new Audio('https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3');
applauseSound.volume = 0.4; wrongSound.volume = 0.3;
applauseSound.muted = isMuted; wrongSound.muted = isMuted;
const muteBtn = document.getElementById("muteBtn");
muteBtn.innerText = isMuted ? "🔇" : "🔊";
muteBtn.onclick = () => {
  isMuted = !isMuted;
  localStorage.setItem("questMuted", isMuted);
  applauseSound.muted = isMuted; wrongSound.muted = isMuted;
  muteBtn.innerText = isMuted ? "🔇" : "🔊";
};
function playApplause() { if (isMuted) return; try { applauseSound.currentTime = 0; applauseSound.play().catch(()=>{}); } catch(e){} }
function playWrong()    { if (isMuted) return; try { wrongSound.currentTime = 0;    wrongSound.play().catch(()=>{}); } catch(e){} }

/* ─────────────── CONFETTI ─────────────── */
function triggerConfetti() {
  confetti({ particleCount: 80, spread: 60, origin: { y: 0.6 } });
}
function triggerMegaConfetti() {
  const duration = 2500, end = Date.now() + duration;
  const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
  const rand = (a, b) => Math.random() * (b - a) + a;
  const iv = setInterval(() => {
    const left = end - Date.now();
    if (left <= 0) return clearInterval(iv);
    const n = 40 * (left / duration);
    confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: rand(0.1,0.3), y: Math.random()-0.2 } }));
    confetti(Object.assign({}, defaults, { particleCount: n, origin: { x: rand(0.7,0.9), y: Math.random()-0.2 } }));
  }, 250);
}

/* ─────────────── MOTIVATION ─────────────── */
const rightMessages = [
  "'name' is unstoppable!",
  "'name' is awesome because 'name' has grit!",
  "Nothing can slow 'name' down today!",
  "'name' learns fast — never gives up!",
  "Who is awesome? 'name'!",
  "Every correct answer takes 'name' closer to greatness!",
  "'name' shines brighter with every question!"
];
const wrongMessages = [
  "'name' knows failure is the stepping stone to success.",
  "Mistakes guide 'name' towards victory!",
  "Every wrong attempt brings 'name' closer to the right one.",
  "Failure is feedback — 'name' takes it like a champion.",
  "'name' believes: try again, fail better!"
];
let motivationTimer = null;
function showMotivation(isCorrect) {
  const box = document.getElementById("motivationBox");
  const list = isCorrect ? rightMessages : wrongMessages;
  const msg = list[Math.floor(Math.random() * list.length)].replace(/'name'/g, playerName);
  box.innerHTML = msg; box.classList.add("show");
  if (motivationTimer) clearTimeout(motivationTimer);
  motivationTimer = setTimeout(() => box.classList.remove("show"), 2200);
}

/* ─────────────── FETCH QUESTIONS ─────────────── */
window.addEventListener("load", async () => {
  const savedName = localStorage.getItem("questPlayerName");
  const savedDept = localStorage.getItem("questPlayerDept");
  if (savedName) document.getElementById("nameInput").value = savedName;
  if (savedDept) document.getElementById("departmentSelect").value = savedDept;

  try {
    const res = await fetch(JSON_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();

    // Support both: array at root OR { questions: [...] }
    quizData = Array.isArray(raw) ? raw : (raw.questions || raw.quizData || []);
    if (!quizData.length) throw new Error("Empty question bank");

    // Shuffle the deck
    quizData = quizData.sort(() => Math.random() - 0.5);
    totalQCount = quizData.length;

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("nameForm").style.display = "flex";
  } catch (err) {
    document.getElementById("loadingScreen").innerHTML =
      `<div class="loader-error">⚠️ Could not load questions.<br><small>${err.message}</small></div>
       <button onclick="location.reload()" style="margin-top:1rem;padding:0.7rem 1.5rem;background:#2979ff;color:#fff;border:none;border-radius:12px;cursor:pointer;font-weight:700;">Retry</button>`;
  }
});

/* ─────────────── BEGIN QUIZ ─────────────── */
function beginQuiz() {
  const nameField = document.getElementById("nameInput");
  const deptField = document.getElementById("departmentSelect");
  if (!nameField.value.trim()) { alert("Please enter your name!"); return; }
  if (!deptField.value) { alert("Please select your department!"); return; }
  playerName = nameField.value.trim();
  playerDept = deptField.value;
  localStorage.setItem("questPlayerName", playerName);
  localStorage.setItem("questPlayerDept", playerDept);

  document.getElementById("nameForm").style.display = "none";
  document.getElementById("quizContent").style.display = "block";

  current = 0; correctCount = 0; totalWrongCount = 0;
  gemsCount = 0; answeredCount = 0; timesUpFired = false;
  secondsLeft = TOTAL_SECONDS;
  quizStartTime = Date.now();

  document.getElementById("gemsCounter").innerText = "💎 0";
  updateCountdownDisplay();
  loadQuestion();
  startCountdown();
}

/* ─────────────── COUNTDOWN ─────────────── */
function startCountdown() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateCountdownDisplay();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      if (!timesUpFired) fireTimesUp();
    }
  }, 1000);
}

function updateCountdownDisplay() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const display = `${m}:${s.toString().padStart(2,'0')}`;
  const el = document.getElementById("countdown");
  el.innerText = display;

  const pct = (secondsLeft / TOTAL_SECONDS) * 100;
  const bar = document.getElementById("timeBar");
  bar.style.width = pct + "%";

  el.className = "";
  bar.className = "";
  if (secondsLeft <= 30) {
    el.classList.add("critical");
    bar.classList.add("critical");
  } else if (secondsLeft <= 60) {
    el.classList.add("warning");
    bar.classList.add("warning");
  }
}

function fireTimesUp() {
  timesUpFired = true;
  // Show Times Up overlay with answered count
  document.getElementById("timesupSub").innerText =
    `You answered ${answeredCount} question${answeredCount !== 1 ? 's' : ''} — let's see your score!`;
  document.getElementById("timesUpOverlay").classList.add("active");
}

function finaliseScore() {
  document.getElementById("timesUpOverlay").classList.remove("active");
  showScore();
}

/* ─────────────── LOAD QUESTION ─────────────── */
function loadQuestion() {
  if (timesUpFired) return;
  if (current >= quizData.length) {
    // Exhausted all questions before time ran out — show score
    clearInterval(timerInterval);
    showScore();
    return;
  }
  selectedOption = null;
  const data = quizData[current];
  document.getElementById("progressTracker").innerText = `📍 ${answeredCount} answered`;
  const dragEl = document.getElementById("dragOptions");
  const dropEl = document.getElementById("dropContainer");
  dragEl.innerHTML = ""; dropEl.innerHTML = "";

  // Build shuffled options
  const shuffled = [...data.answers].sort(() => Math.random() - 0.5);
  shuffled.forEach(ans => {
    const div = document.createElement("div");
    div.classList.add("drag-item"); div.innerText = ans;
    div.onclick = () => selectOption(div);
    dragEl.appendChild(div);
  });

  data.questionItems.forEach(item => {
    const drop = document.createElement("div");
    drop.classList.add("drop-zone"); drop.innerText = item.word;
    drop.dataset.answer = item.answer;
    drop.onclick = () => placeOption(drop);
    dropEl.appendChild(drop);
  });
}

/* ─────────────── INTERACTION ─────────────── */
function selectOption(div) {
  if (selectedOption) selectedOption.classList.remove("selected");
  selectedOption = div; div.classList.add("selected");
}

function placeOption(dropZone) {
  if (!selectedOption || dropZone.classList.contains("filled")) return;
  const answer      = selectedOption.innerText;
  const correct     = dropZone.dataset.answer;

  if (answer === correct) {
    triggerConfetti(); playApplause();
    correctCount++; gemsCount++;
    document.getElementById("gemsCounter").innerText = `💎 ${gemsCount}`;
    const gc = document.getElementById("gemsCounter");
    gc.classList.add("gem-pop");
    setTimeout(() => gc.classList.remove("gem-pop"), 500);
    showMotivation(true);

    // Fill zone with highlighted answer
    dropZone.innerHTML = dropZone.innerText.replace("___", `<strong style="color:#00c853">${answer}</strong>`);
    dropZone.classList.add("correct", "filled");

    // Hide used option
    selectedOption.classList.add("used");
  } else {
    playWrong(); totalWrongCount++; gemsCount--;
    document.getElementById("gemsCounter").innerText = `💎 ${gemsCount}`;
    showMotivation(false);
    dropZone.classList.add("wrong");
    setTimeout(() => dropZone.classList.remove("wrong"), 600);
  }

  selectedOption.classList.remove("selected"); selectedOption = null;

  // All drop zones filled → advance
  const unfilled = document.querySelectorAll(".drop-zone:not(.filled)");
  if (unfilled.length === 0) {
    answeredCount++;
    document.getElementById("progressTracker").innerText = `📍 ${answeredCount} answered`;
    setTimeout(() => {
      current++;
      if (timesUpFired) return;
      loadQuestion();
    }, 700);
  }
}

/* ─────────────── SCORE ─────────────── */
function calculateAccuracy() {
  const total = correctCount + totalWrongCount;
  return total === 0 ? 0 : Math.round((correctCount / total) * 100);
}
function getAccuracyColor(a) {
  return a >= 85 ? "#00e676" : a >= 60 ? "#ffcc00" : "#ff5252";
}
function animateAccuracy(final) {
  const ring = document.querySelector(".accuracy-ring");
  const valEl = document.getElementById("accuracyValue");
  if (!ring || !valEl) return;
  ring.style.setProperty("--ring-color", getAccuracyColor(final));
  let cur = 0;
  const iv = setInterval(() => {
    if (cur >= final) { clearInterval(iv); return; }
    cur++;
    ring.style.setProperty("--progress", cur);
    valEl.innerText = `${cur}%`;
  }, 14);
}
function performanceBadge() {
  const a = calculateAccuracy();
  if (a >= 90) return "🌟 Outstanding — you owned every second!";
  if (a >= 75) return "🔥 Strong run! Keep pushing your limits!";
  if (a >= 50) return "💪 Solid effort — mastery is close!";
  return "🚀 Every expert was once a beginner. Go again!";
}

function showScore() {
  clearInterval(timerInterval);
  timesUpFired = true;
  triggerMegaConfetti();
  const totalTime = Math.floor((Date.now() - quizStartTime) / 1000);
  const timeUsed  = TOTAL_SECONDS - secondsLeft;
  const mins = Math.floor(timeUsed / 60), secs = timeUsed % 60;
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  const remaining = quizData.length - answeredCount;
  const accuracy  = calculateAccuracy();

  document.getElementById("quizContent").style.display  = "none";
  document.getElementById("motivationBox").style.display = "none";
  window.scrollTo({ top: 0, behavior: "smooth" });

  const screen = document.getElementById("scoreScreen");
  screen.style.display = "block";
  screen.innerHTML = `
<div class="score-portal">
  <div class="portal-header">
    <div class="portal-title">⏱️ TIMED QUEST COMPLETE</div>
    <div class="portal-player">👤 ${playerName} · ${playerDept}</div>
  </div>
  <div class="portal-body">
    <div style="display:flex;justify-content:center;">
      <div class="accuracy-ring" style="--progress:0; --ring-color:#00e676;">
        <div class="accuracy-inner">
          <div class="accuracy-value" id="accuracyValue">0%</div>
          <div class="accuracy-label">Accuracy</div>
        </div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-card correct-card">
        <div class="stat-emoji">✅</div>
        <div class="stat-value">${correctCount}</div>
        <div class="stat-label">Correct</div>
      </div>
      <div class="stat-card wrong-card">
        <div class="stat-emoji">❌</div>
        <div class="stat-value">${totalWrongCount}</div>
        <div class="stat-label">Wrong</div>
      </div>
      <div class="stat-card gems-card">
        <div class="stat-emoji">💎</div>
        <div class="stat-value">${gemsCount}</div>
        <div class="stat-label">Gems</div>
      </div>
      <div class="stat-card time-card">
        <div class="stat-emoji">⏱️</div>
        <div class="stat-value">${timeStr}</div>
        <div class="stat-label">Time Used</div>
      </div>
      <div class="stat-card attempted-card">
        <div class="stat-emoji">📋</div>
        <div class="stat-value">${answeredCount}</div>
        <div class="stat-label">Answered</div>
      </div>
      <div class="stat-card remaining-card">
        <div class="stat-emoji">⏭️</div>
        <div class="stat-value">${remaining}</div>
        <div class="stat-label">Remaining</div>
      </div>
    </div>
  </div>
  <div class="performance-message">${performanceBadge()}</div>
  <div class="portal-actions">
    <button class="next-quest-btn" onclick="window.location.href='${NEXT_QUEST_URL}'">🚀 NEXT QUEST</button>
    <button onclick="downloadPDF()" class="report-btn">📥 Download Quest Report</button>
  </div>
</div>`;

  setTimeout(() => animateAccuracy(accuracy), 80);
  sendScore({ student_name: playerName, department: playerDept,
    correct: correctCount, wrong: totalWrongCount,
    time_spent: totalTime, quest_id: QUEST_ID });
}

/* ─────────────── SUPABASE LOG ─────────────── */
async function sendScore(payload) {
  try {
    const res = await fetch(EDGE_FUNCTION_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    if (!res.ok) console.error("Edge fn error:", await res.text());
    else console.log("✅ Score saved");
  } catch(e) { console.error("Edge fn:", e); }
}

/* ─────────────── PDF REPORT ─────────────── */
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const timeUsed = TOTAL_SECONDS - secondsLeft;
  const reportDate = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });

  // Header
  doc.setFillColor(25, 25, 60); doc.rect(0, 0, 210, 45, 'F');
  doc.setTextColor(255,255,255); doc.setFont('times','bold'); doc.setFontSize(18);
  doc.text('SRM VALLIAMMAI ENGINEERING COLLEGE', 105, 16, { align: 'center' });
  doc.setFontSize(12); doc.setFont('times','italic'); doc.text('(Autonomous)', 105, 23, { align: 'center' });
  doc.setFontSize(15); doc.setFont('times','normal'); doc.text('Department of English', 105, 31, { align: 'center' });
  doc.setFontSize(13); doc.setFont('times','bold'); doc.setTextColor(212,175,55);
  doc.text('Timed Quest Performance Report', 105, 39, { align: 'center' });

  // Candidate info
  doc.setTextColor(0,0,0); doc.setFontSize(11); doc.text('CANDIDATE INFORMATION', 20, 55);
  doc.autoTable({
    startY: 58,
    body: [
      ['Student Name', playerName], ['Department', playerDept],
      ['Quest ID', QUEST_ID], ['Mode', '5-Minute Timed Run'], ['Completed On', reportDate]
    ],
    theme: 'plain', styles: { fontSize: 10, font: 'times', cellPadding: 3 },
    columnStyles: { 0: { fontStyle: 'bold', cellWidth: 60, textColor: [70,70,70] }, 1: { cellWidth: 120 } },
    margin: { left: 20, right: 20 }
  });

  let y = doc.lastAutoTable.finalY + 10;
  doc.setFont('times','bold'); doc.text('PERFORMANCE SUMMARY', 20, y);
  doc.autoTable({
    startY: y + 4,
    body: [
      ['Total Questions in Bank', totalQCount.toString()],
      ['Questions Answered', answeredCount.toString()],
      ['Questions Remaining', (quizData.length - answeredCount).toString()],
      ['Correct Answers', correctCount.toString()],
      ['Wrong Attempts', totalWrongCount.toString()],
      ['Final Gems', gemsCount.toString()],
      ['Accuracy', calculateAccuracy() + '%'],
      ['Time Used', `${Math.floor(timeUsed/60)}m ${timeUsed%60}s`]
    ],
    theme: 'grid', styles: { fontSize: 10, font: 'times', cellPadding: 3 },
    margin: { left: 20, right: 20 }
  });

  // Question bank
  y = doc.lastAutoTable.finalY + 12;
  if (y > 250) { doc.addPage(); y = 20; }
  doc.setFont('times','bold'); doc.text('QUESTION BANK WITH ANSWERS', 20, y); y += 6;
  quizData.forEach((item, i) => {
    if (y > 260) { doc.addPage(); y = 20; }
    doc.setFontSize(11); doc.setFont('times','bold'); doc.setTextColor(25,25,60);
    doc.text(`Question ${i+1}:`, 20, y); y += 6;
    doc.setTextColor(0,0,0); doc.setFont('times','normal');
    item.questionItems.forEach((qItem, j) => {
      const lines = doc.splitTextToSize(`${j+1}. ${qItem.word.replace('___','____')}`, 160);
      if (y + lines.length * 5 > 270) { doc.addPage(); y = 20; }
      doc.text(lines, 25, y); y += lines.length * 5;
      doc.setTextColor(0,128,0); doc.text(`Answer: ${qItem.answer}`, 30, y);
      doc.setTextColor(0,0,0); y += 7;
    });
    y += 2;
    doc.setDrawColor(230,230,230); doc.setLineWidth(0.3); doc.line(20, y, 190, y); y += 5;
  });

  // Footer
  doc.setDrawColor(184,134,11); doc.setLineWidth(0.5); doc.line(20, 280, 190, 280);
  doc.setFontSize(8); doc.setTextColor(128,128,128); doc.setFont('times','italic');
  doc.text('This is a system-generated report — SRM Valliammai Engineering College', 105, 287, { align: 'center' });
  doc.save(`${playerName.replace(/[^a-zA-Z0-9]/g,'_')}_${QUEST_ID.replace(' ','')}_Timed.pdf`);
}

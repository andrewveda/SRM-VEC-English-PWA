<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Listening Lab — TED-Ed Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=IM+Fell+English:ital@0;1&family=DM+Mono:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/SRM-VEC-English-PWA/auth-guard.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
:root {
  --paper: #f8f5ef; --ink: #1c1a16; --ink-mid: #4a4640; --ink-muted: #8a837a; --ink-ghost: #c5bdb5;
  --gold: #b8913a; --gold-light: #d4aa58; --gold-pale: rgba(184,145,58,0.10); --gold-border: rgba(184,145,58,0.22);
  --crimson: #6b0f1a; --crimson-pale: rgba(107,15,26,0.08); --crimson-border: rgba(107,15,26,0.25);
  --surface: #ffffff; --green: #2f8f5b; --red: #b8393a;
  --teal: #2f6f6b; --teal-light: #4f9691; --teal-pale: rgba(47,111,107,0.10); --teal-border: rgba(47,111,107,0.28);
  --serif: 'Cormorant Garamond', Georgia, serif; --fell: 'IM Fell English', Georgia, serif;
  --mono: 'DM Mono', monospace; --sans: 'Jost', system-ui, sans-serif;
  --ease: cubic-bezier(0.4,0,0.2,1); --spring: cubic-bezier(0.34,1.56,0.64,1);
  --topbar-h: 54px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--paper); color: var(--ink); font-family: var(--sans); overscroll-behavior: none; }
button { touch-action: manipulation; font-family: inherit; border: none; background: none; cursor: pointer; }

.screen { display: none; height: 100dvh; width: 100vw; }
.screen.active { display: flex; flex-direction: column; }

/* ═══ TOP BAR (no back button — title + user chip only) ═══ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; gap: 12px;
  padding: calc(10px + var(--safe-top)) 16px 12px;
  background: linear-gradient(to bottom, rgba(248,245,239,0.97) 60%, rgba(248,245,239,0));
}
.topbar.dark { background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 100%); }
.tb-title { font-family: var(--fell); font-style: italic; font-size: 1.08rem; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.topbar.dark .tb-title { color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
.tb-user {
  width: 34px; height: 34px; min-width: 34px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--crimson));
  display: flex; align-items: center; justify-content: center;
  font-family: var(--fell); font-style: italic; font-size: 13px; color: #fff; flex-shrink: 0;
}

/* ═══ HOME ═══ */
#screenHome { background: var(--paper); }
.home-scroll {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: calc(var(--topbar-h) + var(--safe-top) + 10px) 0 calc(26px + var(--safe-bottom));
}
.home-heading { padding: 6px 18px 16px; }
.home-eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); margin-bottom: 4px; }
.home-headline { font-family: var(--fell); font-style: italic; font-size: 1.7rem; color: var(--ink); margin-bottom: 8px; }
.home-sub { font-family: var(--serif); font-size: 14px; color: var(--ink-muted); line-height: 1.4; max-width: 92%; }

.filter-row { display: flex; gap: 8px; padding: 4px 18px 18px; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  font-family: var(--mono); font-size: 10.5px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 8px 14px; border-radius: 20px; border: 1px solid var(--gold-border); color: var(--ink-mid);
  background: var(--surface); white-space: nowrap; flex-shrink: 0; transition: all 0.2s var(--ease);
}
.filter-chip.active { background: var(--ink); border-color: var(--ink); color: var(--paper); }

.test-list { display: flex; flex-direction: column; gap: 12px; padding: 0 16px; }
.test-card {
  background: var(--surface); border-radius: 16px; overflow: hidden;
  border: 1px solid rgba(28,26,22,0.07); box-shadow: 0 1px 3px rgba(28,26,22,0.04);
  transition: transform 0.15s var(--ease);
}
.test-card:active { transform: scale(0.98); }
.test-thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; overflow: hidden; }
.test-thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.92; }
.test-thumb-play {
  position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.05) 45%, rgba(0,0,0,0.15) 100%);
}
.test-thumb-play span {
  width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.92);
  display: flex; align-items: center; justify-content: center; color: var(--ink); font-size: 15px;
}
.test-score-badge {
  position: absolute; top: 10px; right: 10px; font-family: var(--mono); font-size: 10.5px; font-weight: 500;
  color: #fff; background: var(--green); padding: 3px 9px; border-radius: 10px;
}
.test-thumb-tags { position: absolute; top: 10px; left: 10px; display: flex; gap: 5px; }
.test-body { padding: 13px 15px 15px; }
.tag-exam {
  font-family: var(--mono); font-size: 8.5px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 10px; font-weight: 500;
  background: rgba(255,255,255,0.9); color: var(--ink);
}
.tag-exam.tededcolor { background: var(--crimson); color: #fff; }
.test-title { font-family: var(--fell); font-style: italic; font-size: 1.12rem; color: var(--ink); line-height: 1.25; margin-bottom: 4px; }
.test-desc { font-family: var(--serif); font-size: 13px; color: var(--ink-muted); line-height: 1.35; margin-bottom: 9px; }
.test-meta-row { display: flex; align-items: center; gap: 14px; }
.test-meta-item { display: flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10.5px; color: var(--ink-mid); }
.test-meta-item .ico { font-size: 12px; color: var(--gold); }

.home-empty { padding: 60px 30px; text-align: center; color: var(--ink-muted); font-family: var(--fell); font-style: italic; font-size: 1.15rem; }

/* ═══ INTRO SCREEN ═══ */
#screenIntro { background: var(--paper); }
.intro-scroll { flex: 1; overflow-y: auto; padding: calc(var(--topbar-h) + var(--safe-top) + 14px) 22px calc(24px + var(--safe-bottom)); -webkit-overflow-scrolling: touch; }
.intro-back-link {
  display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 11px;
  letter-spacing: 1px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 14px;
}
.intro-back-link:active { color: var(--teal); }
.intro-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 16px; overflow: hidden; margin-bottom: 18px; position: relative; }
.intro-thumb img { width: 100%; height: 100%; object-fit: cover; }
.intro-tags { display: flex; gap: 6px; margin-bottom: 14px; }
.intro-title { font-family: var(--fell); font-style: italic; font-size: 1.7rem; line-height: 1.15; margin-bottom: 10px; }
.intro-desc { font-family: var(--serif); font-size: 15.5px; color: var(--ink-mid); line-height: 1.55; margin-bottom: 26px; }

.mode-section-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 12px; }
.mode-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 26px; }
.mode-card {
  display: flex; align-items: center; gap: 14px; padding: 15px 16px; border-radius: 14px;
  background: var(--surface); border: 1.5px solid rgba(28,26,22,0.08); text-align: left;
  transition: all 0.15s var(--ease);
}
.mode-card:active { transform: scale(0.98); }
.mode-card.casual { border-left: 4px solid var(--teal); }
.mode-card.hard { border-left: 4px solid var(--gold); }
.mode-card.boss { border-left: 4px solid var(--crimson); }
.mode-dots { display: flex; gap: 3px; flex-shrink: 0; }
.mode-dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(28,26,22,0.12); }
.mode-dot.on.casual { background: var(--teal); }
.mode-dot.on.hard { background: var(--gold); }
.mode-dot.on.boss { background: var(--crimson); }
.mode-body { flex: 1; min-width: 0; }
.mode-name { font-family: var(--fell); font-style: italic; font-size: 1.05rem; color: var(--ink); }
.mode-desc { font-family: var(--sans); font-size: 12.5px; color: var(--ink-muted); margin-top: 2px; line-height: 1.35; }
.mode-count { font-family: var(--mono); font-size: 10.5px; color: var(--ink-mid); margin-top: 5px; }
.mode-best { font-family: var(--mono); font-size: 10px; color: var(--green); margin-top: 3px; }
.mode-chevron { color: var(--ink-ghost); font-size: 17px; flex-shrink: 0; }

.intro-rules { background: var(--surface); border: 1px solid var(--gold-border); border-radius: 14px; padding: 16px; margin-bottom: 10px; }
.intro-rules-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.intro-rules ul { list-style: none; display: flex; flex-direction: column; gap: 8px; }
.intro-rules li { font-family: var(--sans); font-size: 13.5px; color: var(--ink-mid); display: flex; gap: 8px; line-height: 1.4; }
.intro-rules li::before { content: '—'; color: var(--gold); flex-shrink: 0; }

/* ═══ PLAYER SCREEN ═══ */
#screenPlayer { background: #000; position: relative; }
.video-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; flex-shrink: 0; }
.video-wrap #ytPlayer, .video-wrap iframe { width: 100%; height: 100%; }
.video-blocker { position: absolute; inset: 0; z-index: 5; } /* swallows taps on the iframe so users can't reach native controls */

.timeline-wrap { padding: 12px 18px 8px; background: #000; }
.timeline-track { position: relative; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.15); }
.timeline-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; background: var(--gold); border-radius: 4px; transition: width 0.2s linear; }
.timeline-marker {
  position: absolute; top: 50%; width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,0.85); border: 2px solid #000; transform: translate(-50%, -50%);
  transition: background 0.25s var(--ease);
}
.timeline-marker.answered { background: var(--teal); }
.timeline-meta-row { display: flex; justify-content: space-between; margin-top: 9px; }
.timeline-time { font-family: var(--mono); font-size: 10.5px; color: rgba(255,255,255,0.6); }
.timeline-qcount { font-family: var(--mono); font-size: 10.5px; color: rgba(255,255,255,0.6); }
.timeline-mode-badge { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding: 2px 8px; border-radius: 8px; }
.timeline-mode-badge.casual { background: var(--teal-pale); color: var(--teal-light); }
.timeline-mode-badge.hard { background: rgba(184,145,58,0.15); color: var(--gold-light); }
.timeline-mode-badge.boss { background: rgba(107,15,26,0.2); color: #e08a93; }

.player-info { flex: 1; overflow-y: auto; padding: 6px 20px calc(24px + var(--safe-bottom)); background: #0a0908; -webkit-overflow-scrolling: touch; }
.player-title { font-family: var(--fell); font-style: italic; font-size: 1.2rem; color: #fff; margin-bottom: 8px; }
.player-hint { font-family: var(--sans); font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.5; margin-bottom: 18px; }
.player-exit-link { font-family: var(--mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.45); display: inline-block; }
.player-exit-link:active { color: rgba(255,255,255,0.8); }

/* ─── MCQ BOTTOM SHEET (appears at each timestamp) ─── */
.mcq-sheet {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
  background: var(--paper); border-radius: 22px 22px 0 0;
  padding: 22px 20px calc(24px + var(--safe-bottom));
  transform: translateY(100%); transition: transform 0.4s var(--spring);
  box-shadow: 0 -8px 30px rgba(0,0,0,0.35);
  max-height: 78dvh; overflow-y: auto;
}
.mcq-sheet.show { transform: translateY(0); }
.mcq-sheet-handle { width: 40px; height: 4px; border-radius: 4px; background: rgba(28,26,22,0.15); margin: 0 auto 18px; }
.mcq-timestamp { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 10px; }
.mcq-question { font-family: var(--fell); font-style: italic; font-size: 1.28rem; line-height: 1.35; color: var(--ink); margin-bottom: 20px; }
.mcq-options { display: flex; flex-direction: column; gap: 10px; }
.mcq-option {
  display: flex; align-items: center; gap: 12px; padding: 15px 16px; border-radius: 13px;
  background: var(--surface); border: 1.5px solid rgba(28,26,22,0.09); text-align: left;
  transition: all 0.15s var(--ease); min-height: 56px;
}
.mcq-option:active { transform: scale(0.98); }
.mcq-option-letter {
  width: 26px; height: 26px; min-width: 26px; border-radius: 50%; border: 1.5px solid var(--ink-ghost);
  display: flex; align-items: center; justify-content: center; font-family: var(--mono); font-size: 11px; color: var(--ink-mid);
  transition: all 0.15s var(--ease); flex-shrink: 0;
}
.mcq-option-text { font-family: var(--sans); font-size: 14.5px; color: var(--ink); line-height: 1.35; }
.mcq-option.correct { border-color: var(--green); background: rgba(47,143,91,0.1); }
.mcq-option.correct .mcq-option-letter { background: var(--green); border-color: var(--green); color: #fff; }
.mcq-option.wrong { border-color: var(--red); background: rgba(184,57,58,0.08); }
.mcq-option.wrong .mcq-option-letter { background: var(--red); border-color: var(--red); color: #fff; }
.mcq-option[disabled] { pointer-events: none; }
.mcq-feedback { margin-top: 16px; text-align: center; font-family: var(--mono); font-size: 11.5px; letter-spacing: 1px; color: var(--ink-muted); min-height: 16px; }
.mcq-continue { width: 100%; margin-top: 14px; padding: 15px; border-radius: 13px; background: var(--ink); color: var(--paper); font-family: var(--sans); font-weight: 500; font-size: 14.5px; display: none; text-align: center; }
.mcq-continue.show { display: block; }
.mcq-continue:active { transform: scale(0.97); }

/* ═══ RESULTS SCREEN ═══ */
#screenResults { background: var(--paper); }
.results-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: calc(var(--topbar-h) + var(--safe-top) + 20px) 22px calc(30px + var(--safe-bottom)); }
.results-hero { display: flex; flex-direction: column; align-items: center; padding: 10px 0 30px; }
.score-ring-wrap { position: relative; width: 168px; height: 168px; margin-bottom: 18px; }
.score-ring-wrap svg { transform: rotate(-90deg); width: 100%; height: 100%; }
.score-ring-track { fill: none; stroke: rgba(28,26,22,0.08); stroke-width: 9; }
.score-ring-fill { fill: none; stroke: var(--teal); stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset 1.1s var(--spring); }
.score-ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.score-ring-pct { font-family: var(--fell); font-style: italic; font-size: 2.4rem; color: var(--ink); }
.score-ring-frac { font-family: var(--mono); font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
.results-title { font-family: var(--fell); font-style: italic; font-size: 1.3rem; color: var(--ink); text-align: center; }
.results-sub { font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--ink-muted); margin-top: 5px; }
.results-mode-badge { display: inline-block; margin-top: 10px; font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 10px; }
.results-mode-badge.casual { background: var(--teal-pale); color: var(--teal); border: 1px solid var(--teal-border); }
.results-mode-badge.hard { background: var(--gold-pale); color: var(--gold); border: 1px solid var(--gold-border); }
.results-mode-badge.boss { background: var(--crimson-pale); color: var(--crimson); border: 1px solid var(--crimson-border); }

.sync-status {
  display: flex; align-items: center; gap: 8px; padding: 11px 14px; border-radius: 12px;
  font-family: var(--mono); font-size: 11px; margin: 20px 0 24px; letter-spacing: 0.3px;
}
.sync-status.ok { background: rgba(47,143,91,0.1); color: var(--green); border: 1px solid rgba(47,143,91,0.25); }
.sync-status.pending { background: var(--gold-pale); color: var(--gold); border: 1px solid var(--gold-border); }
.sync-status.fail { background: rgba(184,57,58,0.08); color: var(--red); border: 1px solid rgba(184,57,58,0.22); }
.sync-retry { margin-left: auto; font-family: var(--mono); font-size: 10px; text-decoration: underline; color: inherit; flex-shrink: 0; }

.breakdown-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 12px; }
.breakdown-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px; }
.breakdown-item { background: var(--surface); border-radius: 12px; padding: 13px 14px; border: 1px solid rgba(28,26,22,0.07); }
.bd-top { display: flex; align-items: flex-start; gap: 9px; }
.bd-icon { width: 20px; height: 20px; min-width: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #fff; margin-top: 1px; }
.bd-icon.correct { background: var(--green); }
.bd-icon.wrong { background: var(--red); }
.bd-q { font-family: var(--serif); font-size: 14px; color: var(--ink); line-height: 1.35; }
.bd-ts { font-family: var(--mono); font-size: 9.5px; color: var(--ink-ghost); margin-top: 2px; }
.bd-answers { margin-top: 8px; padding-left: 29px; display: flex; flex-direction: column; gap: 3px; }
.bd-answer { font-family: var(--mono); font-size: 11px; }
.bd-answer.right-ans { color: var(--green); }
.bd-answer.wrong-ans { color: var(--red); }
.bd-answer.correct-ans { color: var(--ink-muted); }

.results-actions { display: flex; gap: 10px; }
.results-btn { flex: 1; padding: 15px; border-radius: 13px; font-family: var(--sans); font-weight: 500; font-size: 14px; text-align: center; transition: all 0.2s var(--ease); }
.results-btn.primary { background: var(--ink); color: var(--paper); }
.results-btn.secondary { background: var(--surface); color: var(--ink); border: 1.5px solid rgba(28,26,22,0.12); }
.results-btn:active { transform: scale(0.97); }

@media (max-width: 360px) {
  .intro-title { font-size: 1.5rem; }
  .mcq-question { font-size: 1.14rem; }
  .score-ring-wrap { width: 148px; height: 148px; }
}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <span class="tb-title" id="tbTitle">Listening Lab</span>
  <div class="tb-user" id="tbUser">–</div>
</div>

<!-- HOME -->
<div class="screen active" id="screenHome">
  <div class="home-scroll">
    <div class="home-heading">
      <div class="home-eyebrow">Practice Archive</div>
      <div class="home-headline">Listening Lab</div>
      <div class="home-sub">Watch a TED-Ed video, keep your ears open — a question pops up at set moments and the video won't continue until you answer.</div>
    </div>
    <div class="filter-row" id="filterRow"></div>
    <div class="test-list" id="testList"></div>
  </div>
</div>

<!-- INTRO -->
<div class="screen" id="screenIntro">
  <div class="intro-scroll" id="introScroll"></div>
</div>

<!-- PLAYER -->
<div class="screen" id="screenPlayer">
  <div class="video-wrap">
    <div id="ytPlayer"></div>
    <div class="video-blocker" id="videoBlocker"></div>
  </div>
  <div class="timeline-wrap">
    <div class="timeline-track" id="timelineTrack">
      <div class="timeline-fill" id="timelineFill"></div>
    </div>
    <div class="timeline-meta-row">
      <span class="timeline-time" id="timelineTime">0:00 / 0:00</span>
      <span class="timeline-qcount" id="timelineQCount">0 / 0 answered</span>
    </div>
  </div>
  <div class="player-info">
    <div class="player-title" id="playerTitle">—</div>
    <div class="player-hint" id="playerHint">Playback pauses automatically when a question comes up. Answer it to keep watching.</div>
    <button class="player-exit-link" id="playerExitLink">Exit practice</button>
  </div>
</div>

<div class="mcq-sheet" id="mcqSheet">
  <div class="mcq-sheet-handle"></div>
  <div class="mcq-timestamp" id="mcqTimestamp">At 0:00</div>
  <div class="mcq-question" id="mcqQuestion">—</div>
  <div class="mcq-options" id="mcqOptions"></div>

let currentTest = null;
let currentMode = null;
let currentQuestions = [];
let ytPlayer = null;
let selectedAnswers = {};
let askedIds = new Set();
let startTime = null;
let pollInterval = null;
let scoresMap = loadJSON('lst_scores', {});   // `${testId}__${mode}` -> {score,total,percentage,answers,synced,timeTaken}

function loadJSON(key, fallback) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } }
function saveJSON(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) {} }
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtTime(s) { s = Math.max(0, Math.floor(s || 0)); const m = Math.floor(s/60); const sec = s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }
function getInitials(name) { return String(name || '?').split(' ').map(n => n[0]).join('').slice(0,2).toUpperCase(); }
function ytThumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function scoreKey(testId, mode) { return `${testId}__${mode}`; }
function questionsForMode(test, modeKey) {
  const tier = MODES[modeKey].tier;
  return test.questions.filter(q => q.tier <= tier).slice().sort((a, b) => a.at - b.at);
}

/* ── init ── */
let youtubeReady = false;
window.onYouTubeIframeAPIReady = () => { youtubeReady = true; };
function waitForYT() {
  return new Promise((resolve) => {
    if (youtubeReady && window.YT && YT.Player) return resolve();
    const check = setInterval(() => { if (youtubeReady && window.YT && YT.Player) { clearInterval(check); resolve(); } }, 100);
  });
}

function init() {
  document.getElementById('tbUser').textContent = getInitials(GH.name || GH.username || 'Guest');
  document.getElementById('playerExitLink').addEventListener('click', confirmLeavePlayer);
  renderFilters();
  renderHome('ALL');
  showScreen('home');
}

let activeFilter = 'ALL';
let currentScreen = 'home';

function showScreen(which, title, dark) {
  currentScreen = which;
  ['Home','Intro','Player','Results'].forEach(s => {
    document.getElementById('screen'+s).classList.toggle('active', s.toLowerCase() === which);
  });
  document.getElementById('tbTitle').textContent = title || 'Listening Lab';
  document.getElementById('tbUser').style.display = which === 'home' ? '' : 'none';
  document.getElementById('topbar').classList.toggle('dark', !!dark);
}

function confirmLeavePlayer() {
  teardownPlayer();
  renderHome(activeFilter);
  showScreen('home');
}

function teardownPlayer() {
  clearInterval(pollInterval); pollInterval = null;
  hideSheet();
  if (ytPlayer && typeof ytPlayer.destroy === 'function') { try { ytPlayer.destroy(); } catch (e) {} }
  ytPlayer = null;
}

/* ── HOME ── */
function renderFilters() {
  const cats = ['ALL', ...new Set(TESTS.map(t => t.category))];
  const wrap = document.getElementById('filterRow');
  wrap.innerHTML = cats.map(c => `<button class="filter-chip${c===activeFilter?' active':''}" data-f="${escHtml(c)}">${c === 'ALL' ? 'All topics' : escHtml(c)}</button>`).join('');
  wrap.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => { activeFilter = btn.dataset.f; renderFilters(); renderHome(activeFilter); });
  });
}

function bestRecordFor(test) {
  // priority: boss > hard > casual, so the badge reflects the toughest mode attempted
  for (const m of ['boss', 'hard', 'casual']) {
    const r = scoresMap[scoreKey(test.id, m)];
    if (r) return { mode: m, record: r };
  }
  return null;
}

function renderHome(filter) {
  const list = TESTS.filter(t => filter === 'ALL' || t.category === filter);
  const container = document.getElementById('testList');
  if (!list.length) { container.innerHTML = `<div class="home-empty">No videos in this topic yet</div>`; return; }

  container.innerHTML = list.map(t => {
    const best = bestRecordFor(t);
    return `
    <div class="test-card" data-id="${t.id}">
      <div class="test-thumb">
        <img src="${ytThumb(t.youtubeId)}" alt="" loading="lazy">
        <div class="test-thumb-play"><span>▶</span></div>
        <div class="test-thumb-tags"><span class="tag-exam tededcolor">TED-Ed</span></div>
        ${best ? `<span class="test-score-badge">${MODES[best.mode].label} ${best.record.score}/${best.record.total}</span>` : ''}
      </div>
      <div class="test-body">
        <div class="test-title">${escHtml(t.title)}</div>
        <div class="test-desc">${escHtml(t.description)}</div>
        <div class="test-meta-row">
          <span class="test-meta-item"><span class="ico">◷</span>${t.questions.length} questions total</span>
          <span class="test-meta-item"><span class="ico">▤</span>${escHtml(t.difficulty)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll('.test-card').forEach(card => {
    card.addEventListener('click', () => openIntro(TESTS.find(t => t.id === card.dataset.id)));
  });
}

/* ── INTRO (mode selection lives here) ── */
function openIntro(test) {
  currentTest = test;
  const scroll = document.getElementById('introScroll');

  const modeCardsHtml = ['casual', 'hard', 'boss'].map(key => {
    const mode = MODES[key];
    const record = scoresMap[scoreKey(test.id, key)];
    const dotsHtml = [1,2,3].map(i => `<div class="mode-dot${i <= mode.tier ? ' on ' + key : ''}"></div>`).join('');
    return `
    <button class="mode-card ${key}" data-mode="${key}">
      <div class="mode-dots">${dotsHtml}</div>
      <div class="mode-body">
        <div class="mode-name">${mode.label}</div>
        <div class="mode-desc">${mode.blurb}</div>
        <div class="mode-count">${mode.count} questions${record ? ` · last time ${record.score}/${record.total}` : ''}</div>
      </div>
      <div class="mode-chevron">›</div>
    </button>`;
  }).join('');

  scroll.innerHTML = `
    <button class="intro-back-link" id="introBackLink">‹ All videos</button>
    <div class="intro-thumb"><img src="${ytThumb(test.youtubeId)}" alt=""></div>
    <div class="intro-tags">
      <span class="tag-exam tededcolor">TED-Ed</span>
      <span class="tag-exam" style="background:var(--gold-pale);color:var(--gold);border:1px solid var(--gold-border);">${escHtml(test.category)}</span>
    </div>
    <div class="intro-title">${escHtml(test.title)}</div>
    <div class="intro-desc">${escHtml(test.description)}</div>

    <div class="mode-section-title">Choose your mode</div>
    <div class="mode-list">${modeCardsHtml}</div>

    <div class="intro-rules">
      <div class="intro-rules-title">Before you start</div>
      <ul>
        <li>Use headphones for the clearest listening.</li>
        <li>The video plays straight through — you can't skip ahead or rewind.</li>
        <li>It pauses on its own when a question comes up. Pick an answer to keep going.</li>
        <li>Your score and answer breakdown appear once the video ends.</li>
      </ul>
    </div>
  `;

  document.getElementById('introBackLink').addEventListener('click', () => { renderHome(activeFilter); showScreen('home'); });
  scroll.querySelectorAll('.mode-card').forEach(btn => {
    btn.addEventListener('click', () => startPlayer(test, btn.dataset.mode));
  });

  showScreen('intro', test.title, false);
}

/* ── PLAYER ── */
async function startPlayer(test, modeKey) {
  currentMode = modeKey;
  currentQuestions = questionsForMode(test, modeKey);
  selectedAnswers = {};
  askedIds = new Set();
  startTime = Date.now();

  document.getElementById('playerTitle').textContent = test.title;
  document.getElementById('playerHint').textContent = `${MODES[modeKey].label} mode — ${currentQuestions.length} questions. Playback pauses automatically when one comes up.`;
  updateQCount();

  showScreen('player', test.title, true);
  await waitForYT();

  teardownPlayer();
  ytPlayer = new YT.Player('ytPlayer', {
    videoId: test.youtubeId,
    playerVars: { rel: 0, modestbranding: 1, playsinline: 1, controls: 0, disablekb: 1, fs: 0, mute: 0, autoplay: 0 },
    events: {
      onReady: () => { ytPlayer.playVideo(); startPolling(test); },
      onStateChange: (e) => onPlayerStateChange(test, e)
    }
  });
}

function positionTimelineMarkers() {
  const track = document.getElementById('timelineTrack');
  track.querySelectorAll('.timeline-marker').forEach(m => m.remove());
  if (!ytPlayer || !ytPlayer.getDuration) return;
  const duration = ytPlayer.getDuration();
  if (!duration) return;
  currentQuestions.forEach((q, qi) => {
    const pct = Math.min(100, (q.at / duration) * 100);
    const marker = document.createElement('div');
    marker.className = 'timeline-marker' + (selectedAnswers[qi] !== undefined ? ' answered' : '');
    marker.style.left = pct + '%';
    track.appendChild(marker);
  });
}

function updateQCount() {
  const answered = Object.keys(selectedAnswers).length;
  document.getElementById('timelineQCount').innerHTML = `${answered} / ${currentQuestions.length} answered <span class="timeline-mode-badge ${currentMode}">${MODES[currentMode].label}</span>`;
}

function onPlayerStateChange(test, e) {
  if (e.data === YT.PlayerState.PLAYING) {
    if (!document.getElementById('timelineTrack').querySelector('.timeline-marker')) positionTimelineMarkers();
  }
  if (e.data === YT.PlayerState.ENDED) {
    clearInterval(pollInterval); pollInterval = null;
    onVideoEnded(test);
  }
}

function startPolling(test) {
  clearInterval(pollInterval);
  pollInterval = setInterval(() => {
    if (!ytPlayer || typeof ytPlayer.getCurrentTime !== 'function') return;
    const t = ytPlayer.getCurrentTime();
    const duration = ytPlayer.getDuration() || 0;

    document.getElementById('timelineTime').textContent = `${fmtTime(t)} / ${fmtTime(duration)}`;
    if (duration) document.getElementById('timelineFill').style.width = Math.min(100, (t / duration) * 100) + '%';

    currentQuestions.forEach((q, qi) => {
      if (t >= q.at && !askedIds.has(qi) && selectedAnswers[qi] === undefined) {
        askedIds.add(qi);
        triggerQuestion(test, qi);
      }
    });
  }, 300);
}

function triggerQuestion(test, qi) {
  if (ytPlayer && typeof ytPlayer.pauseVideo === 'function') ytPlayer.pauseVideo();
  const q = currentQuestions[qi];

  document.getElementById('mcqTimestamp').textContent = `At ${fmtTime(q.at)}`;
  document.getElementById('mcqQuestion').textContent = q.q;
  document.getElementById('mcqFeedback').textContent = '';
  document.getElementById('mcqContinue').classList.remove('show');

  const optsWrap = document.getElementById('mcqOptions');
  optsWrap.innerHTML = q.options.map((opt, oi) => `
    <button class="mcq-option" data-oi="${oi}">
      <span class="mcq-option-letter">${String.fromCharCode(65 + oi)}</span>
      <span class="mcq-option-text">${escHtml(opt)}</span>
    </button>
  `).join('');

  optsWrap.querySelectorAll('.mcq-option').forEach(btn => {
    btn.addEventListener('click', () => answerQuestion(test, qi, parseInt(btn.dataset.oi)));
  });

  showSheet();
}

function answerQuestion(test, qi, chosenOi) {
  const q = currentQuestions[qi];
  selectedAnswers[qi] = chosenOi;

  const optsWrap = document.getElementById('mcqOptions');
  optsWrap.querySelectorAll('.mcq-option').forEach(btn => {
    const oi = parseInt(btn.dataset.oi);
    btn.setAttribute('disabled', 'true');
    if (oi === q.correct) btn.classList.add('correct');
    else if (oi === chosenOi) btn.classList.add('wrong');
  });

  const isCorrect = chosenOi === q.correct;
  document.getElementById('mcqFeedback').textContent = isCorrect ? '✓ Correct' : `✕ The recording said: ${q.options[q.correct]}`;
  document.getElementById('mcqContinue').classList.add('show');
  document.getElementById('mcqContinue').onclick = () => {
    hideSheet();
    updateQCount();
    positionTimelineMarkers();
    setTimeout(() => { if (ytPlayer && typeof ytPlayer.playVideo === 'function') ytPlayer.playVideo(); }, 250);
  };

  updateQCount();
  positionTimelineMarkers();
}

function showSheet() { document.getElementById('mcqSheet').classList.add('show'); }
function hideSheet() { document.getElementById('mcqSheet').classList.remove('show'); }

function onVideoEnded(test) {
  const allAnswered = currentQuestions.every((_, qi) => selectedAnswers[qi] !== undefined);
  if (allAnswered) { finishTest(test); return; }
  const remaining = currentQuestions.map((_, qi) => qi).filter(qi => selectedAnswers[qi] === undefined);
  askRemainingSequentially(test, remaining);
}

function askRemainingSequentially(test, remainingQis) {
  if (!remainingQis.length) { finishTest(test); return; }
  const qi = remainingQis[0];
  triggerQuestion(test, qi);
  document.getElementById('mcqOptions').querySelectorAll('.mcq-option').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('mcqContinue').onclick = () => {
        hideSheet();
        updateQCount();
        askRemainingSequentially(test, remainingQis.slice(1));
      };
    }, { once: true });
  });
}

function finishTest(test) {
  teardownPlayer();
  const timeTaken = Math.round((Date.now() - startTime) / 1000);

  let correct = 0;
  const answerDetail = currentQuestions.map((q, qi) => {
    const chosen = selectedAnswers[qi];
    const isCorrect = chosen === q.correct;
    if (isCorrect) correct++;
    return { question: q.q, timestamp: q.at, chosenText: chosen !== undefined ? q.options[chosen] : '—', correctText: q.options[q.correct], isCorrect };
  });

  const total = currentQuestions.length;
  const percentage = Math.round((correct / total) * 100);
  const record = { score: correct, total, percentage, answers: answerDetail, timeTaken, synced: false, completedAt: new Date().toISOString() };
  scoresMap[scoreKey(test.id, currentMode)] = record;
  saveJSON('lst_scores', scoresMap);

  renderResults(test, currentMode, record);
  showScreen('results', test.title, false);
  submitScore(test, record);
}

/* ── RESULTS ── */
function renderResults(test, modeKey, record) {
  const scroll = document.getElementById('resultsScroll');
  const r = 74, circumference = 2 * Math.PI * r;
  const offset = circumference - (record.percentage / 100) * circumference;

  scroll.innerHTML = `
    <div class="results-hero">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 168 168">
          <circle class="score-ring-track" cx="84" cy="84" r="${r}"></circle>
          <circle class="score-ring-fill" cx="84" cy="84" r="${r}" stroke-dasharray="${circumference}" stroke-dashoffset="${circumference}" id="ringFill"></circle>
        </svg>
        <div class="score-ring-center">
          <div class="score-ring-pct">${record.percentage}%</div>
          <div class="score-ring-frac">${record.score} / ${record.total} correct</div>
        </div>
      </div>
      <div class="results-title">${escHtml(test.title)}</div>
      <div class="results-sub">Completed in ${fmtTime(record.timeTaken)}</div>
      <div class="results-mode-badge ${modeKey}">${MODES[modeKey].label} mode</div>
    </div>

    <div class="sync-status pending" id="syncStatus">
      <span>⏳</span><span>Saving your score…</span>
    </div>

    <div class="breakdown-title">Answer breakdown</div>
    <div class="breakdown-list">
      ${record.answers.map((a, i) => `
        <div class="breakdown-item">
          <div class="bd-top">
            <div class="bd-icon ${a.isCorrect ? 'correct' : 'wrong'}">${a.isCorrect ? '✓' : '✕'}</div>
            <div>
              <div class="bd-q">${i + 1}. ${escHtml(a.question)}</div>
              <div class="bd-ts">Asked at ${fmtTime(a.timestamp)}</div>
            </div>
          </div>
          <div class="bd-answers">
            <div class="bd-answer ${a.isCorrect ? 'right-ans' : 'wrong-ans'}">Your answer: ${escHtml(a.chosenText)}</div>
            ${!a.isCorrect ? `<div class="bd-answer correct-ans">Correct answer: ${escHtml(a.correctText)}</div>` : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="results-actions">
      <button class="results-btn secondary" id="btnHome">Back to videos</button>
      <button class="results-btn primary" id="btnRetake">Try another mode</button>
    </div>
  `;

  requestAnimationFrame(() => { document.getElementById('ringFill').style.strokeDashoffset = offset; });
  document.getElementById('btnHome').addEventListener('click', () => { renderHome(activeFilter); showScreen('home'); });
  document.getElementById('btnRetake').addEventListener('click', () => openIntro(test));
}

async function submitScore(test, record) {
  const payload = {
    student_name: GH.name || GH.username || 'Guest',
    department: GH.dept || localStorage.getItem('vfv_dept') || localStorage.getItem('userDept') || '',
    github_username: GH.username || '',
    github_id: GH.githubId || '',
    github_profile: GH.profile || '',
    quest_id: test.questId,
    time_spent: record.timeTaken
  };

  try {
    const res = await fetch(SAVE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    record.synced = true;
    scoresMap[scoreKey(test.id, currentMode)] = record;
    saveJSON('lst_scores', scoresMap);
    setSyncStatus('ok', '✓ Score saved');
  } catch (e) {
    console.error('Save failed', e);
    setSyncStatus('fail', '⚠ Save failed — tap to retry', true, () => submitScore(test, record));
  }
}

function setSyncStatus(kind, msg, retry, onRetry) {
  const el = document.getElementById('syncStatus');
  if (!el) return;
  el.className = `sync-status ${kind}`;
  el.innerHTML = `<span>${kind === 'ok' ? '✓' : kind === 'fail' ? '⚠' : '⏳'}</span><span>${msg}</span>${retry ? '<button class="sync-retry" id="syncRetryBtn">Retry</button>' : ''}`;
  if (retry) document.getElementById('syncRetryBtn').addEventListener('click', onRetry);
}

/* ── retry any unsynced scores in the background ── */
function resyncPending() {
  Object.entries(scoresMap).forEach(([key, record]) => {
    if (!record.synced) {
      const testId = key.split('__')[0];
      const test = TESTS.find(t => t.id === testId);
      if (test) submitScore(test, record).catch(() => {});
    }
  });
}

document.addEventListener('DOMContentLoaded', () => { init(); resyncPending(); });
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Vox Forum</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;600;700&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" crossorigin="anonymous"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --deep:        #faf7f2;
  --surface:     #ffffff;
  --surface2:    #f5efe6;
  --gold:        #c9a84c;
  --gold-light:  #e8c97a;
  --gold-dim:    rgba(201,168,76,0.12);
  --gold-border: rgba(201,168,76,0.35);
  --crimson:     #7A0019;
  --text:        #2a2a2a;
  --text-muted:  #7a766f;
  --text-dim:    #b0a99f;
  --border:      rgba(0,0,0,0.06);
  --shadow-sm:   0 2px 8px rgba(0,0,0,0.06);
  --shadow-gold: 0 8px 24px rgba(201,168,76,0.18);
  --serif: 'Playfair Display', Georgia, serif;
  --mono:  'DM Mono', monospace;
  --sans:  'Raleway', sans-serif;
  --fell:  'IM Fell English', Georgia, serif;
  --corm:  'Cormorant Garamond', Georgia, serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--deep);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

body::after {
  content: '';
  position: fixed;
  top: -20%; left: -10%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(201,168,76,0.07), transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: breathe 12s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50%      { transform: scale(1.1); opacity: 1; }
}

/* ─── MASTHEAD ─── */
.masthead {
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 16px 20px 0;
  position: sticky;
  top: 0;
  z-index: 50;
  box-shadow: var(--shadow-sm);
}
.masthead-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.masthead-dateline { color: var(--text-muted); }
.masthead-edition {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 9px;
  font-family: var(--sans);
  font-weight: 700;
  letter-spacing: 1.5px;
  box-shadow: 0 2px 8px rgba(201,168,76,0.25);
}
.masthead-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(32px, 7vw, 60px);
  color: var(--text);
  letter-spacing: 2px;
  line-height: 1;
  margin-bottom: 2px;
}
.masthead-rule-ornament {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
}
.masthead-rule-ornament::before,
.masthead-rule-ornament::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--gold-border);
}
.masthead-ornament { font-size: 14px; color: var(--gold); }
.masthead-tagline {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 1px;
  text-transform: uppercase;
  padding-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.masthead-tagline .inf {
  color: var(--gold);
  font-weight: 900;
  font-size: 28px;
  font-family: var(--serif);
  line-height: 0.8;
  flex-shrink: 0;
}

/* ─── BREADCRUMB ─── */
.breadcrumb-bar {
  background: rgba(255,255,255,0.95);
  border-top: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
}
.breadcrumb-bar a {
  color: var(--gold);
  text-decoration: none;
  transition: opacity 0.2s;
}
.breadcrumb-bar a:hover { opacity: 0.7; }
.breadcrumb-sep { opacity: 0.4; }

/* ─── PAGE BODY ─── */
.page-body {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 0 16px 80px;
}

/* ─── HERO ─── */
.pres-hero {
  background: linear-gradient(145deg, #ffffff, #f8f2e8);
  border: 1px solid var(--border);
  border-top: 4px solid var(--gold);
  border-radius: 0 0 16px 16px;
  padding: 32px 36px 28px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-gold);
  animation: fadeUp 0.45s cubic-bezier(.4,0,.2,1) both;
}
.pres-hero::before {
  content: '"';
  position: absolute;
  top: -10px; left: 20px;
  font-family: var(--serif);
  font-size: 180px;
  line-height: 1;
  color: var(--gold);
  opacity: 0.06;
  user-select: none;
}
.pres-kicker {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  margin-bottom: 12px;
}
.pres-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: clamp(22px, 4vw, 38px);
  font-weight: 400;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 20px;
  position: relative;
  z-index: 1;
  padding-left: 16px;
  border-left: 3px solid var(--gold);
}
.pres-byline-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.pres-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(201,168,76,0.3);
}
.pres-author-name {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.1;
}
.pres-author-dept {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  margin-top: 2px;
}

/* ─── SECTION LABEL ─── */
.section-label {
  display: flex;
  align-items: center;
  gap: 0;
  margin: 28px 0 16px;
  animation: fadeUp 0.45s cubic-bezier(.4,0,.2,1) both;
}
.section-label-text {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: white;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  padding: 5px 16px;
  border-radius: 4px 0 0 4px;
}
.section-label-rule {
  flex: 1;
  height: 2px;
  background: var(--gold-border);
}

/* ─── CONTENT BLOCKS ─── */
.content-block {
  background: linear-gradient(145deg, #ffffff, #f8f2e8);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 26px 28px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  animation: fadeUp 0.45s cubic-bezier(.4,0,.2,1) both;
  position: relative;
  overflow: hidden;
}
.content-block::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 16px 16px 0 0;
}
.block-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 14px;
}
.block-text {
  font-family: var(--corm);
  font-size: clamp(17px, 2vw, 20px);
  line-height: 1.75;
  color: var(--text);
  white-space: pre-line;
}

/* ─── PLACEHOLDER ─── */
.placeholder-block {
  background: var(--gold-dim);
  border: 2px dashed var(--gold-border);
  border-radius: 16px;
  padding: 32px 28px;
  margin-bottom: 14px;
  text-align: center;
}
.placeholder-block p {
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.6;
}
.placeholder-block strong {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  display: block;
  margin-bottom: 8px;
}

/* ─── DISCUSSION SECTION ─── */
.discussion-wrap {
  margin-top: 32px;
  animation: fadeUp 0.45s cubic-bezier(.4,0,.2,1) both;
  animation-delay: 300ms;
}
.discussion-header {
  background: linear-gradient(145deg, var(--gold-dim), rgba(201,168,76,0.04));
  border: 1px solid var(--gold-border);
  border-top: 3px solid var(--gold);
  border-radius: 16px 16px 0 0;
  padding: 20px 24px 16px;
}
.discussion-kicker {
  font-family: var(--sans);
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--crimson);
  margin-bottom: 6px;
}
.discussion-title {
  font-family: var(--fell);
  font-style: italic;
  font-size: 20px;
  color: var(--text);
  margin-bottom: 4px;
}
.discussion-sub {
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  text-transform: uppercase;
}
#discussion {
  border: 1px solid var(--gold-border);
  border-top: none;
  border-radius: 0 0 16px 16px;
  overflow: hidden;
  background: var(--surface);
  padding: 20px;
}

/* ─── ERROR STATE ─── */
.error-state {
  text-align: center;
  padding: 80px 20px;
}
.error-state h2 {
  font-family: var(--fell);
  font-style: italic;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 12px;
}
.error-state p {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 20px;
}
.error-state a {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: white;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  padding: 10px 22px;
  border-radius: 20px;
  text-decoration: none;
  display: inline-block;
}

/* ─── FOOTER ─── */
.site-footer {
  background: var(--text);
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 20px;
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface2); }
::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.35); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 500px) {
  .pres-hero { padding: 22px 18px 20px; }
  .content-block { padding: 20px 18px; }
  .masthead-meta { flex-direction: column; gap: 4px; text-align: center; }
}
</style>
</head>
<body>

<!-- ─── MASTHEAD ─── -->
<header class="masthead">
  <div class="masthead-meta">
    <span class="masthead-dateline" id="mastDateline">—</span>
    <span class="masthead-edition">Vox Forum</span>
    <span style="font-family:var(--mono);font-size:9px;">Class Presentation</span>
  </div>
  <div class="masthead-title">Vox Forum</div>
  <div class="masthead-rule-ornament">
    <span class="masthead-ornament">❡</span>
  </div>
  <div class="masthead-tagline">In Pursuit of Draft <span class="inf">∞</span></div>
</header>

<!-- ─── BREADCRUMB ─── -->
<div class="breadcrumb-bar">
  <a href="https://andrewveda.github.io/SRM-VEC-English-PWA">✦ A Quote A Day</a>
  <span class="breadcrumb-sep">›</span>
  <a href="https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/vox-forum">Vox Forum</a>
  <span class="breadcrumb-sep">›</span>
  <span id="breadcrumb-name">—</span>
</div>

<!-- ─── BODY ─── -->
<main class="page-body" id="pageBody">
  <!-- Rendered by JS -->
</main>

<!-- ─── FOOTER ─── -->
<footer class="site-footer">Vox Forum · SRM VEC English Department · Live Long and Prosper</footer>

<script>
/* ── DATELINE ── */
(function () {
  const now  = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('mastDateline').textContent =
    now.toLocaleDateString('en-US', opts).toUpperCase();
})();

/* ── MAIN ── */
(async function () {
  const params   = new URLSearchParams(window.location.search);
  const studentId = params.get('id');
  const body     = document.getElementById('pageBody');

  if (!studentId) {
    renderError(body, 'No student specified.', 'Add ?id=Name to the URL.');
    return;
  }

  let students;
  try {
    // Fetch students.json from the same directory as this page
    const res = await fetch('./students.json');
    if (!res.ok) throw new Error('Failed to load students.json');
    students = await res.json();
  } catch (e) {
    renderError(body, 'Could not load data.', 'Make sure students.json is in the same folder as this page.');
    return;
  }

  const student = students.find(s => s.id === studentId);

  if (!student) {
    renderError(body, `"${studentId}" not found.`, 'Check the spelling of the id parameter or add this student to students.json.');
    return;
  }

  // Update page title and breadcrumb
  document.title = `Vox Forum — ${student.name}`;
  document.getElementById('breadcrumb-name').textContent = student.name;

  // ── RENDER ──
  let html = `
    <div class="pres-hero">
      <div class="pres-kicker">✦ Class Presentation</div>
      <div class="pres-title">${escHtml(student.title)}</div>
      <div class="pres-byline-row">
        <div class="pres-avatar">${escHtml(student.initials)}</div>
        <div>
          <div class="pres-author-name">${escHtml(student.name)}</div>
          <div class="pres-author-dept">${escHtml(student.dept)}</div>
        </div>
      </div>
    </div>
  `;

  // Summary
  html += `
    <div class="section-label" style="animation-delay:60ms;">
      <div class="section-label-text">Summary</div>
      <div class="section-label-rule"></div>
    </div>
  `;
  if (student.summary && student.summary.trim()) {
    html += `
      <div class="content-block" style="animation-delay:80ms;">
        <div class="block-label">In Their Own Words</div>
        <div class="block-text">${escHtml(student.summary)}</div>
      </div>
    `;
  } else {
    html += `
      <div class="placeholder-block">
        <strong>Coming Soon</strong>
        <p>The summary for this presentation has not been added yet.<br>Check back later.</p>
      </div>
    `;
  }

  // Conclusion (only show section if there's content or a conclusion field exists)
  if (student.conclusion !== undefined) {
    html += `
      <div class="section-label" style="animation-delay:140ms;">
        <div class="section-label-text">Conclusion</div>
        <div class="section-label-rule"></div>
      </div>
    `;
    if (student.conclusion && student.conclusion.trim()) {
      html += `
        <div class="content-block" style="animation-delay:160ms;">
          <div class="block-label">Key Takeaway</div>
          <div class="block-text">${escHtml(student.conclusion)}</div>
        </div>
      `;
    } else {
      html += `
        <div class="placeholder-block">
          <strong>Coming Soon</strong>
          <p>The conclusion for this presentation has not been added yet.</p>
        </div>
      `;
    }
  }

  // Discussion
  html += `
    <div class="discussion-wrap">
      <div class="discussion-header">
        <div class="discussion-kicker">✦ Open Forum</div>
        <div class="discussion-title">Respond. Question Deeply.</div>
        <div class="discussion-sub">Comments &amp; Critical Responses</div>
      </div>
      <div id="discussion"></div>
    </div>
  `;

  body.innerHTML = html;

  // Load Giscus with this student's unique id as the discussion term
  loadGiscus(student.id);
})();

function loadGiscus(term) {
  const container = document.getElementById('discussion');
  if (!container) return;
  const script = document.createElement('script');
  script.src = 'https://giscus.app/client.js';
  script.setAttribute('data-repo', 'andrewveda/a-quote-a-day');
  script.setAttribute('data-repo-id', 'R_kgDORI8-yw');
  script.setAttribute('data-category', 'General');
  script.setAttribute('data-category-id', 'DIC_kwDORI8-y84C1-Jq');
  script.setAttribute('data-mapping', 'specific');
 const sharedThreads = {
  "Sunanda": "brain-not-a-computer",
  "Barid_Baran": "freedom-democracy-cost-of-silence"
};

const giscusTerm = sharedThreads[term] || term;

script.setAttribute('data-term', giscusTerm);
  
  script.setAttribute('data-reactions-enabled', '1');
  script.setAttribute('data-theme', 'light');
  script.crossOrigin = 'anonymous';
  script.async = true;
  container.appendChild(script);
}

function renderError(container, heading, detail) {
  container.innerHTML = `
    <div class="error-state">
      <h2>${escHtml(heading)}</h2>
      <p>${escHtml(detail)}</p>
      <a href="https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/vox-forum">← Back to Vox Forum</a>
    </div>
  `;
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>

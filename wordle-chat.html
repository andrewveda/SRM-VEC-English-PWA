<!doctype html>

<html lang="en">    
<head>    
<meta charset="utf-8" />    
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />    
<title>Wordle Embed</title>    
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>    
:root{    
  --bg:#0b1220; --card:#0f1724; --text:#e6eef8;    
  --absent:#3a3a3c; --present:#b59f3b; --correct:#538d4e;    
  --key:#818384; --key-pressed:#565758;
  --ivory:#FAF6EA; --ivory-card:#FFFDF7; --ivory-deep:#F0E7CE;
  --gold:#B8935A; --gold-deep:#8C6A34; --gold-light:#E4CE9B; --ink:#2A2115; --ink-soft:#8A7A5C;
  font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;    
}    
*{box-sizing:border-box;margin:0;padding:0}    
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}    
.wrap{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;height:100dvh;padding:8px;position:relative;overflow:hidden;gap:6px}    
.board{display:grid;grid-template-rows:repeat(6,minmax(0,1fr));gap:4px;width:100%;max-width:340px;height:32vh;flex:0 0 auto}    
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}    
.tile{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:clamp(15px,4.2vh,24px);border-radius:6px;background:#121826;color:var(--text)}    
.tile.absent{background:var(--absent)}    
.tile.present{background:var(--present)}    
.tile.correct{background:var(--correct)}    
.keyboard{display:flex;flex-direction:column;gap:4px;margin-top:2px;width:100%;max-width:400px;flex:0 0 auto}    
.krow{display:flex;gap:4px;justify-content:center}    
.key{flex:1;padding:7px 0;border-radius:6px;text-align:center;user-select:none;background:var(--key);color:white;font-weight:700;cursor:pointer;font-size:13px}    
.key.enter {    
  background: var(--correct); /* green */    
}  .key.back {  
background: #b91c1c; /* red */  
}  .key.wide{flex:1.5}
.hint{color:#9fb7db;margin-top:0;font-size:12px;text-align:center;flex:0 0 auto;min-height:14px}
@media (min-width: 1024px) {
.container {width: 90vw; margin: 0 auto; height: auto;}
.scorecard {position: fixed; top: 10px; right: 10px;}
}

/* ==== OVERLAY (Instructions Full Screen) ==== */
.overlay {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
background: linear-gradient(180deg, #0b1220 0%, #111a2d 100%);
display: flex;
justify-content: center;
align-items: center;
z-index: 30;
text-align: center;
padding: 30px;
}

.overlayContent {
background: var(--card);
padding: 60px 40px;
border-radius: 30px;
max-width: 800px;
width: 100%;
box-shadow: 0 0 40px rgba(0,0,0,0.6);
animation: fadeIn 0.6s ease-out;
}

.overlayContent h1 {
font-size: 3rem;
color: #fff;
margin-bottom: 20px;
text-shadow: 0 0 20px #1f6feb;
}

.overlayContent p {
font-size: 1.5rem;
line-height: 2rem;
margin: 10px 0;
color: #bcd3ef;
}

.overlayContent strong {
color: #ffd700;
}

#startBtn {
margin-top: 40px;
padding: 18px 36px;
font-size: 1.5rem;
font-weight: 700;
background: #1f6feb;
color: white;
border: none;
border-radius: 14px;
cursor: pointer;
transition: background 0.3s ease;
}

#startBtn:hover {
background: #2c8eff;
}

@keyframes fadeIn {
from {opacity: 0; transform: scale(0.8);}
to {opacity: 1; transform: scale(1);}
}

/* Scorecard popup */
.scorecard{position:absolute;top:50%;left:50%;transform:translate(-50%, -50%);background:var(--card);padding:40px 60px;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.8);text-align:center;display:none;z-index:20;animation:pop 0.6s ease-out;}
.scorecard h1{font-size:48px;margin-bottom:20px;color:#fff;animation:scaleUp 1s ease-in-out;}
.scorecard p{font-size:24px;margin-bottom:20px;color:#bcd3ef;}
.scorecard input{padding:10px 12px;border-radius:8px;border:none;font-size:16px;margin-bottom:12px;width:80%;text-align:center;}
.scorecard button{padding:16px 24px;border:none;border-radius:12px;background:#1f6feb;color:white;font-weight:700;font-size:18px;cursor:pointer}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0;}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);}}
@keyframes scaleUp{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.sparkle{position:absolute;width:10px;height:10px;background:radial-gradient(circle,#fff,#f0f0f0 70%);border-radius:50%;pointer-events:none;animation:fly 1.5s linear infinite;}
@keyframes fly{0%{transform:translate(0,0) scale(1);}50%{transform:translate(0,-200px) scale(0.5);}100%{transform:translate(200px,-400px) scale(0);opacity:0;}}
@media (max-width:520px){
.overlayContent {padding: 40px 20px;}
.overlayContent h1 {font-size: 2.2rem;}
.overlayContent p {font-size: 1.2rem;}
#startBtn {font-size: 1.2rem; padding: 14px 28px;}
}

/* Chatbot styles — ivory & gold "puzzle directory" theme */
.chat-container {
  width: 100%;
  max-width: 360px;
  margin-top: 4px;
  border-radius: 16px;
  background: var(--ivory-card);
  border: 1px solid rgba(184,147,90,0.35);
  box-shadow: 0 4px 20px rgba(140,106,52,0.18);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  flex: 1 1 auto;
  min-height: 0;
}

.chat-header {
  background: linear-gradient(135deg, #8C6A34 0%, #C9A961 100%);
  color: var(--ivory);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  font-weight: 700;
  font-size: 14px;
  font-family: 'Cinzel', serif;
  letter-spacing: 0.3px;
  flex: 0 0 auto;
}

.chat-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.25);
  margin-right: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.chat-messages {
  flex: 1 1 auto;
  min-height: 0;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
  background: var(--ivory);
}

.message {
  max-width: 85%;
  padding: 8px 12px;
  border-radius: 16px;
  font-size: 12.5px;
  line-height: 1.35;
  position: relative;
  animation: messageAppear 0.3s ease-out;
}

@keyframes messageAppear {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.alien {
  background: var(--ivory-deep);
  color: var(--ink);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(184,147,90,0.25);
}

.message.user {
  background: linear-gradient(135deg, var(--gold), var(--gold-deep));
  color: var(--ivory);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.message-options {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-self: flex-start;
  width: 100%;
}

.option-btn {
  background: var(--ivory-deep);
  border: 1px solid rgba(184,147,90,0.4);
  color: var(--ink);
  padding: 7px 12px;
  border-radius: 16px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
}

.option-btn:hover {
  background: var(--gold-light);
  border-color: var(--gold-deep);
}

.chat-input-container {
  display: flex;
  padding: 8px;
  background: var(--ivory);
  border-top: 1px solid rgba(184,147,90,0.25);
  flex: 0 0 auto;
}

.chat-input {
  flex: 1;
  background: var(--ivory-card);
  border: 1px solid rgba(184,147,90,0.3);
  border-radius: 20px;
  padding: 8px 14px;
  color: var(--ink);
  font-size: 13px;
  outline: none;
}

.chat-send-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-deep));
  border: none;
  border-radius: 50%;
  width: 34px;
  height: 34px;
  margin-left: 8px;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: filter 0.2s ease;
  flex-shrink: 0;
}

.chat-send-btn:hover {
  filter: brightness(1.1);
}

.typing-indicator {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  background: var(--ivory-deep);
  border-radius: 16px;
  border-bottom-left-radius: 4px;
  align-self: flex-start;
  width: fit-content;
  border: 1px solid rgba(184,147,90,0.25);
}

.typing-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ink-soft);
  margin: 0 2px;
  animation: typing 1.4s infinite;
}

.typing-dot:nth-child(2) {
  animation-delay: 0.2s;
}

.typing-dot:nth-child(3) {
  animation-delay: 0.4s;
}

@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-5px); }
}
</style>

</head>    
<body>    
  <div id="introOverlay" class="overlay">    
    <div class="overlayContent">    
      <h1>🎯 How to Play Wordle</h1>    
      <p>Guess the <strong>5-letter word</strong> in <strong>6 tries</strong>.</p>    
      <p>🟩 <strong>Green</strong> = correct letter, correct place</p>    
      <p>🟨 <strong>Yellow</strong> = letter is in the word, but wrong place</p>    
      <p>⬛ <strong>Gray</strong> = letter not in the word</p>    
      <p style="margin-top:20px; color:#9fb7db; font-size:1.3rem;">    
        Type letters on your keyboard or tap the on-screen keys.      
        Press <strong>Enter</strong> to submit your guess.    
      </p>    
      <button id="startBtn">🚀 Start Game</button>    
    </div>    
  </div>    <div class="wrap">    
    <div id="board" class="board" aria-live="polite"></div>    
    <div class="keyboard" id="keyboard"></div>    
    <div class="hint" id="hint"></div>
    
    <!-- Chatbot Interface -->
    <div class="chat-container" id="chatContainer">

        <div class="chat-avatar">👽</div>

      </div>

    <div id="scorecard" class="scorecard">

</select>

      <p id="leaderboardText" style="margin-bottom:12px; color:#bcd3ef; font-size:18px;"></p>    
      <button id="leaderboardBtn" style="display:none;">Check Leaderboard</button>    
      <button id="shareBtn">Share on WhatsApp</button>    
    </div>    
  </div>    <!-- Keep your full JS code here (unchanged) -->    <!-- Paste your original <script> content below this line -->  <script>    
const EDGE_FUNCTION_URL =    
  "https://yellow-lab-4999.andrewveda.workers.dev/functions/v1/logQuest";    async function sendViaEdgeFunction(payload) {
try {
const response = await fetch(EDGE_FUNCTION_URL, {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify(payload),
});

if (!response.ok) {    
  console.error("❌ Edge function error:", await response.text());    
  return false;    
}    

await response.json().catch(() => ({}));    
return true;

} catch (err) {
console.error("⚠️ Error calling edge function:", err);
return false;
}
}
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5Z6lmXH4jxHYMKUcimj_M-IV1pwtBUF72YKJIi_BO-KD_NYwWBJBQqni7m4NmQyU9NMdve4vGZ7rh/pub?gid=0&single=true&output=csv';
let WORDS=[],ANSWER='',guesses=[],current='',MAX_GUESSES=6;
let startTime = Date.now(); // start timer
const boardEl=document.getElementById('board');
const keyboardEl=document.getElementById('keyboard');
const hintEl=document.getElementById('hint');
const scorecard=document.getElementById('scorecard');
const scoreTitle=document.getElementById('scoreTitle');
const scoreMsg=document.getElementById('scoreMsg');
const shareBtn = document.getElementById('shareBtn');
const introOverlay = document.getElementById('introOverlay');
const startBtn = document.getElementById('startBtn');
const NAME_KEY = "questPlayerName";
const DEPT_KEY = "questPlayerDept";
startBtn.addEventListener('click', () => {
introOverlay.style.display = 'none';
document.addEventListener('keydown', keydownHandler); // enable keyboard after overlay
initChat();
});

// --- Save/Load progress ---
const STORAGE_KEY = 'wordle-progress';
function saveProgress() {
const data = { date: new Date().toDateString(), guesses, answer: ANSWER };
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}
function loadProgress() {
const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
return data;
}

// --- CSV parsing ---
function parseCSV(text){
const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
return Array.from(new Set(lines.map(l=>l.split(/,|\t/)[0].trim().toLowerCase()))).filter(w=>/^[a-z]{5}$/.test(w));
}

// --- Board & Keyboard ---
function createBoard(){boardEl.innerHTML='';for(let r=0;r<MAX_GUESSES;r++){const row=document.createElement('div');row.className='row';for(let c=0;c<5;c++){const tile=document.createElement('div');tile.className='tile';row.appendChild(tile);}boardEl.appendChild(row);}}
function renderKeyboard(){keyboardEl.innerHTML='';const KEYS=['qwertyuiop','asdfghjkl','zxcvbnm'];KEYS.forEach(rowStr=>{const r=document.createElement('div');r.className='krow';for(const ch of rowStr){const k=document.createElement('div');k.className='key';k.textContent=ch;k.dataset.key=ch;k.addEventListener('click',()=>onKey(ch));r.appendChild(k);}if(rowStr==='asdfghjkl'){const enter=document.createElement('div');enter.className = 'key wide back';
;enter.textContent='⌫';enter.addEventListener('click',()=>onKey('Backspace'));r.appendChild(enter);}if(rowStr==='zxcvbnm'){const back=document.createElement('div');back.className = 'key wide enter';back.textContent='Enter';back.addEventListener('click',()=>onKey('Enter'));r.appendChild(back);}keyboardEl.appendChild(r);});}

// --- Key handling ---
function onKey(k){if(k==='Enter')return submitGuess();if(k==='Backspace')return deleteLetter();if(current.length<5 && /^[a-zA-Z]$/.test(k)){current+=k.toLowerCase();updateBoard();}}
function deleteLetter(){if(current.length>0){current=current.slice(0,-1);updateBoard();}}
function updateBoard(){const row=boardEl.children[guesses.length];for(let c=0;c<5;c++){const tile=row.children[c];tile.textContent=current[c]||'';tile.className='tile';}}
function submitGuess() {
if (current.length !== 5) { hintEl.textContent = 'Guess must be 5 letters.'; return; }
if (!WORDS.includes(current.toLowerCase())) { hintEl.textContent = 'Not a valid English word.'; return; }
evaluateGuess(current);
current = '';
}
function evaluateGuess(guess){
const row=boardEl.children[guesses.length];
const answerArr=ANSWER.split('');
const guessArr=guess.split('');
const result=Array(5).fill('absent');
const answerFreq={};
for(let i=0;i<5;i++){answerFreq[answerArr[i]]=(answerFreq[answerArr[i]]||0)+1;}
for(let i=0;i<5;i++){if(guessArr[i]===answerArr[i]){result[i]='correct';answerFreq[guessArr[i]]--;}}
for(let i=0;i<5;i++){if(result[i]!=='correct' && answerFreq[guessArr[i]]>0){result[i]='present';answerFreq[guessArr[i]]--;}}
for(let i=0;i<5;i++){const tile=row.children[i];tile.textContent=guessArr[i];tile.classList.add(result[i]);}
updateKeys(guessArr,result);
guesses.push(guess);
saveProgress();

// Trigger chatbot response based on guess
processGuessResult(guess, result);

if(guess===ANSWER){showScore(true);document.removeEventListener('keydown',keydownHandler);return;}
if(guesses.length>=MAX_GUESSES){showScore(false);document.removeEventListener('keydown',keydownHandler);return;}
hintEl.textContent='';
}
function updateKeys(letters,results){letters.forEach((ch,i)=>{

const keyEls = keyboardEl.querySelectorAll('[data-key]');
keyEls.forEach(k=>{if(k.dataset.key===ch){if(results[i]==='correct'){k.style.backgroundColor='var(--correct)';}else if(results[i]==='present'){if(k.style.backgroundColor!=='var(--correct)')k.style.backgroundColor='var(--present)';}else{if(!k.style.backgroundColor)k.style.backgroundColor='var(--absent)';}}});});}
function keydownHandler(e){const k=e.key;if(k==='Enter')onKey('Enter');else if(k==='Backspace')onKey('Backspace');else if(/^[a-zA-Z]$/.test(k))onKey(k);}
function createSparkles(){for(let i=0;i<30;i++){const s=document.createElement('div');s.className='sparkle';s.style.left=Math.random()*window.innerWidth+'px';s.style.top=Math.random()*window.innerHeight+'px';s.style.animationDelay=Math.random()+'s';s.style.width=s.style.height=(5+Math.random()*10)+'px';document.body.appendChild(s);}}

function fetchToSheet(playerName){

const totalTime = Math.floor((Date.now() - startTime) / 1000);

sendViaEdgeFunction({
student_name: playerName,
tries: guesses.length,
time_spent: totalTime,
department: localStorage.getItem(DEPT_KEY) || "Unknown",
quest_id: "Wordle", 
  answer: ANSWER
});
}
function showScore(win) {
  scorecard.style.display = 'block';
  createSparkles();

  // Clear daily progress
  localStorage.removeItem(STORAGE_KEY);

  const nameInput = document.getElementById('playerName');
  const leaderboardText = document.getElementById('leaderboardText');
  const leaderboardBtn = document.getElementById('leaderboardBtn');

  const savedName = localStorage.getItem(NAME_KEY);
const savedDept = localStorage.getItem(DEPT_KEY);
const deptSelect = document.getElementById('playerDept');

if (savedName && savedDept) {

  /* ✅ Known identity */

  nameInput.value = savedName;
  deptSelect.value = savedDept;

  nameInput.style.display = "none";
  deptSelect.style.display = "none";

  leaderboardText.textContent =
     `Score recorded for ${savedName}`;

  fetchToSheet(savedName);

} else {

  /* ✅ New identity */

  leaderboardText.textContent = "Enter details to join leaderboard";

}


  // 3️⃣ Leaderboard button
  leaderboardBtn.style.display = "inline-block";
  leaderboardBtn.onclick = () => {
    window.open(
      "https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/leaderboard_live",
      "_blank"
    );
  };

  // 4️⃣ When user enters/changes name
function saveIdentity(){

  const name = nameInput.value.trim();
  const dept = document.getElementById('playerDept').value;

  if (!name || !dept) return;

  localStorage.setItem(NAME_KEY, name);
  localStorage.setItem(DEPT_KEY, dept);

  fetchToSheet(name);

  leaderboardText.textContent =
     `Thanks ${name}, score recorded!`;

}

nameInput.addEventListener('change', saveIdentity);
document.getElementById('playerDept').addEventListener('change', saveIdentity);


  // 5️⃣ Result message
  if (win) {
    const tries = guesses.length;
    if (tries === 1) {
      scoreTitle.textContent = '🎉 Genius!';
      scoreMsg.textContent = `You got it in one try! The word was ${ANSWER.toUpperCase()}!`;
      // Add special chat message for genius
      addAlienMessage("Wow! You're a true word wizard! 🧙‍♂️ One guess? That's legendary!");
    } else if (tries === 2) {
      scoreTitle.textContent = '✨ Excellent!';
      scoreMsg.textContent = `Got it in 2 tries! The word was ${ANSWER.toUpperCase()}!`;
      // Add special chat message for excellent
      addAlienMessage("Incredible performance! Two guesses shows both intuition and logic! 🌟");
    } else if (tries <= 4) {
      scoreTitle.textContent = '🌟 Great!';
      scoreMsg.textContent = `Solved in ${tries} tries! The word was ${ANSWER.toUpperCase()}!`;
      // Add special chat message for great
      addAlienMessage("Well done! Your persistence paid off beautifully! 🎯");
    } else {
      scoreTitle.textContent = '👍 Good!';
      scoreMsg.textContent = `You solved it in ${tries} tries! The word was ${ANSWER.toUpperCase()}!`;
      // Add special chat message for good
      addAlienMessage("You did it! Sometimes the journey matters more than the destination! 🛤️");
    }
  } else {
    scoreTitle.textContent = '💔 Hard Luck';
    scoreMsg.textContent =
      `Hard luck. I could not crack today's Wordle. ` +
      `The word was ${ANSWER.toUpperCase()}! 😎 ` +
      `Check it out: https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/wordle`;
    
    // Add special chat message for losing
    addAlienMessage("Don't let this defeat define you. As Marcus Aurelius said, 'The impediment to action advances action.' Try again tomorrow with renewed vigor! 💪");
  }

  // 6️⃣ WhatsApp share
  shareBtn.onclick = () => {
    let grid = guesses.map((guess) => {
      const answerArr = ANSWER.split('');
      const guessArr = guess.split('');
      const result = Array(5).fill('⬜');
      const answerFreq = {};

      answerArr.forEach(ch => answerFreq[ch] = (answerFreq[ch] || 0) + 1);

      for (let i = 0; i < 5; i++) {
        if (guessArr[i] === answerArr[i]) {
          result[i] = '🟩';
          answerFreq[guessArr[i]]--;
        }
      }

      for (let i = 0; i < 5; i++) {
        if (result[i] === '⬜' && answerFreq[guessArr[i]] > 0) {
          result[i] = '🟨';
          answerFreq[guessArr[i]]--;
        }
      }

      return result.join('');
    }).join('\n');

    const msg = win
      ? `I solved today's Wordle in ${guesses.length} tries! 🎉\n${grid}\n😎 Check it out: https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/wordle`
      : `Hard luck. I could not crack today's Wordle. 😢\n${grid}\nLet us see if you can get it! 😎 Check it out: https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/wordle`;

    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
  };
}
function chooseDailyWord() {
const today = new Date();
const start = new Date(today.getFullYear(), 0, 1);
const diff = today - start;
const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));
const index = dayOfYear % WORDS.length;
ANSWER = WORDS[index];
}

// Function to initialize the chatbot
function initChat() {
  // Clear any existing messages
  chatMessages.innerHTML = '';
  
  // Show typing indicator then first message
  showTypingIndicator();
  
  setTimeout(() => {
    hideTypingIndicator();
    showConversation('greeting');
  }, 1500);
}

// Function to show typing indicator
function showTypingIndicator() {
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing-indicator';
  typingDiv.id = 'typingIndicator';
  typingDiv.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
  chatMessages.appendChild(typingDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Function to hide typing indicator
function hideTypingIndicator() {
  const typingIndicator = document.getElementById('typingIndicator');
  if (typingIndicator) {
    typingIndicator.remove();
  }
}

// Function to show a conversation
function showConversation(conversationId) {
  const conversation = conversations[conversationId] || guessResponses[conversationId];
  
  if (!conversation) return;
  
  // Add alien message
  addAlienMessage(conversation.message);
  
  // Add options if they exist
  if (conversation.options && conversation.options.length > 0) {
    setTimeout(() => {
      showOptions(conversation.options);
    }, 500);
  }
}

// Function to add an alien message
function addAlienMessage(message) {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message alien';
  messageDiv.textContent = message;
  chatMessages.appendChild(messageDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Function to add a user message
function addUserMessage(message) {
  const messageDiv = document.createElement('div');
  messageDiv.className = 'message user';
  messageDiv.textContent = message;
  chatMessages.appendChild(messageDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Function to show options
function showOptions(options) {
  // Remove any existing options
  const existingOptions = document.querySelector('.message-options');
  if (existingOptions) {
    existingOptions.remove();
  }
  
  const optionsDiv = document.createElement('div');
  optionsDiv.className = 'message-options';
  
  options.forEach(option => {
    const optionBtn = document.createElement('button');
    optionBtn.className = 'option-btn';
    optionBtn.textContent = option.text;
    optionBtn.addEventListener('click', () => {
      // Remove options after selection
      optionsDiv.remove();
      
      // Add user message
      addUserMessage(option.text);
      
      // Show typing indicator then next conversation
      if (option.next) {
        showTypingIndicator();
        setTimeout(() => {
          hideTypingIndicator();
          showConversation(option.next);
        }, 1000);
      }
    });
    
    optionsDiv.appendChild(optionBtn);
  });
  
  chatMessages.appendChild(optionsDiv);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// Build a praising, guess-aware feedback line mentioning the word tried
// and exactly which letters were correct, present, or absent.
function letterFeedbackText(guess, result) {
  const g = guess.toUpperCase();
  const correct = [], present = [], absent = [];
  guess.split('').forEach((ch, i) => {
    const L = ch.toUpperCase();
    if (result[i] === 'correct') correct.push(L);
    else if (result[i] === 'present') present.push(L);
    else absent.push(L);
  });

  const openers = [
    "Great swing at it!",
    "Nice work!",
    "Ooh, good instincts!",
    "Solid guess!",
    "Love the strategy here!",
    "Sharp thinking!"
  ];
  const opener = openers[Math.floor(Math.random() * openers.length)];

  const parts = [];
  if (correct.length) {
    parts.push(`${correct.join(', ')} ${correct.length > 1 ? 'are' : 'is'} exactly right 🟩`);
  }
  if (present.length) {
    parts.push(`${present.join(', ')} ${present.length > 1 ? 'are' : 'is'} hiding somewhere else in the word 🟨`);
  }
  if (absent.length) {
    parts.push(`${absent.join(', ')} ${absent.length > 1 ? "aren't" : "isn't"} in today's word ⬛`);
  }

  const closers = [
    "Keep going, you've got this! 💪",
    "You're closing in on it! ✨",
    "Trust the process, you're doing great! 🌟",
    "Every clue counts, nice progress! 🚀"
  ];
  const closer = closers[Math.floor(Math.random() * closers.length)];

  return `${opener} You tried ${g}. ${parts.join('. ')}. ${closer}`;
}

// Function to process guess results and trigger appropriate chat responses
function processGuessResult(guess, result) {
  const guessNumber = guesses.length;
  const correctCount = result.filter(r => r === 'correct').length;
  const presentCount = result.filter(r => r === 'present').length;
  
  // Remove any existing options
  const existingOptions = document.querySelector('.message-options');
  if (existingOptions) {
    existingOptions.remove();
  }

  const feedback = letterFeedbackText(guess, result);

  // First: a praising, data-driven message about this exact guess
  showTypingIndicator();
  setTimeout(() => {
    hideTypingIndicator();
    addAlienMessage(feedback);

    // Then: continue the coaching conversation
    setTimeout(() => {
      if (guessNumber === 1) {
        // First guess responses
        showTypingIndicator();
        setTimeout(() => {
          hideTypingIndicator();
          if (correctCount > 0) {
            showConversation('firstGreen');
          } else if (presentCount > 0) {
            showConversation('firstYellow');
          } else {
            showConversation('firstGray');
          }
        }, 800);
      } else if (guessNumber < 4) {
        // Mid-game responses
        const midGameResponse = guessResponses.midGame[Math.floor(Math.random() * guessResponses.midGame.length)];
        showTypingIndicator();
        setTimeout(() => {
          hideTypingIndicator();
          addAlienMessage(midGameResponse.message);
          setTimeout(() => {
            showOptions(midGameResponse.options);
          }, 400);
        }, 800);
      } else {
        // Late-game responses
        const lateGameResponse = guessResponses.lateGame[Math.floor(Math.random() * guessResponses.lateGame.length)];
        showTypingIndicator();
        setTimeout(() => {
          hideTypingIndicator();
          addAlienMessage(lateGameResponse.message);
          setTimeout(() => {
            showOptions(lateGameResponse.options);
          }, 400);
        }, 800);
      }
    }, 900);
  }, 900);
}

        "I appreciate your sharing! As Carl Jung noted, 'Until you make the unconscious conscious, it will direct your life and you will call it fate.' What unconscious patterns might be influencing your game?"
      ];
      
      responseMessage = defaultResponses[Math.floor(Math.random() * defaultResponses.length)];
    }
    
    addAlienMessage(responseMessage);
  }, 1500);
}

// Event listeners for chat input
chatSendBtn.addEventListener('click', handleCustomInput);
chatInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    handleCustomInput();
  }
});

init();

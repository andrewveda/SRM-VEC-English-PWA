<!doctype html>
<html lang="en">    
<head>    
<meta charset="utf-8" />    
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />    
<title>Wordle</title>    
<style>    
:root{    
  --bg:#0b1220; --card:#0f1724; --text:#e6eef8;    
  --absent:#3a3a3c; --present:#b59f3b; --correct:#538d4e;    
  --key:#818384; --key-pressed:#565758;    
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial;    
}    
*{box-sizing:border-box;margin:0;padding:0}    
html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}    
.wrap{display:flex;flex-direction:column;align-items:center;height:100%;padding:6px 10px;overflow:hidden}    
.board{display:grid;grid-template-rows:repeat(6,56px);gap:4px;width:100%;max-width:340px;flex-shrink:0}    
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}    
.tile{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:21px;border-radius:4px;background:#121826;transition:background .3s}    
.tile.absent{background:var(--absent)}    
.tile.present{background:var(--present)}    
.tile.correct{background:var(--correct)}    
.keyboard{display:flex;flex-direction:column;gap:4px;margin-top:6px;width:100%;max-width:340px;flex-shrink:0}    
.krow{display:flex;gap:3px;justify-content:center}    
.key{flex:1;padding:7px 0;border-radius:4px;text-align:center;user-select:none;background:var(--key);color:white;font-weight:700;cursor:pointer;font-size:13px;transition:background .12s}    
.key:active{background:var(--key-pressed)}    
.key.enter{background:var(--correct)}    
.key.back{background:#b91c1c}    
.key.wide{flex:1.5}    
.hint{color:#9fb7db;font-size:12px;height:16px;flex-shrink:0;text-align:center}

/* Chat - ultra compact */
.chat{flex:1;width:100%;max-width:400px;margin-top:6px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:2px 0;scrollbar-width:none}
.chat-messages::-webkit-scrollbar{display:none}
.m{padding:5px 10px;border-radius:20px;font-size:12px;line-height:1.2;white-space:nowrap;overflow-x:auto;overflow-y:hidden;max-width:92%;scrollbar-width:none;animation:mi .2s ease-out}
.m::-webkit-scrollbar{display:none}
@keyframes mi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.m.a{background:#1a2332;color:#94a7bf;align-self:flex-start}
.m.u{background:#1f6feb;color:#fff;align-self:flex-end}
.opts{display:flex;flex-direction:column;gap:3px;align-self:flex-start}
.o{background:#1a2332;border:1px solid #253040;color:#7b8fa6;padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:all .12s;text-align:left;max-width:92%}
.o:hover{background:#1e2b3d;color:#b0c4de;border-color:#1f6feb}
.t{display:flex;gap:3px;padding:5px 10px;align-self:flex-start;width:fit-content}
.t span{width:5px;height:5px;border-radius:50%;background:#3a4a5c;animation:b 1.2s infinite}
.t span:nth-child(2){animation-delay:.15s}
.t span:nth-child(3){animation-delay:.3s}
@keyframes b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-3px)}}

/* Scorecard */
.scorecard{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);padding:36px 44px;border-radius:18px;box-shadow:0 10px 40px rgba(0,0,0,.8);text-align:center;display:none;z-index:20;animation:pop .6s ease-out}
.scorecard h1{font-size:38px;margin-bottom:14px;color:#fff;animation:scaleUp 1s ease-in-out}
.scorecard p{font-size:18px;margin-bottom:14px;color:#bcd3ef}
.scorecard input,.scorecard select{padding:9px 10px;border-radius:8px;border:none;font-size:14px;margin-bottom:8px;width:85%;text-align:center;background:#1e293b;color:#e6eef8}
.scorecard button{padding:12px 20px;border:none;border-radius:10px;background:#1f6feb;color:white;font-weight:700;font-size:15px;cursor:pointer;margin:3px}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) scale(1)}}
@keyframes scaleUp{0%{transform:scale(.3);opacity:0}50%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
.sparkle{position:fixed;width:7px;height:7px;background:radial-gradient(circle,#fff,#f0f0f0 70%);border-radius:50%;pointer-events:none;animation:fly 1.5s linear infinite;z-index:25}
@keyframes fly{0%{transform:translate(0,0) scale(1)}50%{transform:translate(0,-200px) scale(.5)}100%{transform:translate(200px,-400px) scale(0);opacity:0}}
</style>
</head>

let WORDS=[],ANSWER='',guesses=[],current='',MAX=6,startTime=Date.now();
const boardEl=document.getElementById('board'),kbEl=document.getElementById('keyboard'),hintEl=document.getElementById('hint'),chatMsg=document.getElementById('chatMessages');
const NAME_KEY="questPlayerName",DEPT_KEY="questPlayerDept",STORAGE_KEY='wordle-progress';

function parseCSV(t){return[...new Set(t.split(/\r?\n/).map(l=>l.trim()).filter(Boolean).map(l=>l.split(/,|\t/)[0].trim().toLowerCase()))].filter(w=>/^[a-z]{5}$/.test(w))}
function createBoard(){boardEl.innerHTML='';for(let r=0;r<MAX;r++){const row=document.createElement('div');row.className='row';for(let c=0;c<5;c++){const t=document.createElement('div');t.className='tile';row.appendChild(t)}boardEl.appendChild(row)}}
function renderKB(){kbEl.innerHTML='';['qwertyuiop','asdfghjkl','zxcvbnm'].forEach(s=>{const r=document.createElement('div');r.className='krow';for(const c of s){const k=document.createElement('div');k.className='key';k.textContent=c;k.dataset.key=c;k.onclick=()=>onKey(c);r.appendChild(k)}if(s==='asdfghjkl'){const e=document.createElement('div');e.className='key wide back';e.textContent='⌫';e.onclick=()=>onKey('Backspace');r.appendChild(e)}if(s==='zxcvbnm'){const b=document.createElement('div');b.className='key wide enter';b.textContent='Enter';b.onclick=()=>onKey('Enter');r.appendChild(b)}kbEl.appendChild(r)})}
function onKey(k){if(k==='Enter')return submitGuess();if(k==='Backspace')return delLetter();if(current.length<5&&/^[a-zA-Z]$/.test(k)){current+=k.toLowerCase();updateBoard()}}
function delLetter(){if(current.length>0){current=current.slice(0,-1);updateBoard()}}
function updateBoard(){const row=boardEl.children[guesses.length];for(let c=0;c<5;c++){const t=row.children[c];t.textContent=current[c]||'';t.className='tile'}}
function submitGuess(){if(current.length!==5){hintEl.textContent='5 letters needed';return}if(!WORDS.includes(current.toLowerCase())){hintEl.textContent='Not in word list';return}evaluateGuess(current);current=''}

function evaluateGuess(guess){
  const row=boardEl.children[guesses.length],ans=ANSWER.split(),g=guess.split(),res=Array(5).fill('absent'),freq={};
  for(let i=0;i<5;i++)freq[ans[i]]=(freq[ans[i]]||0)+1;
  for(let i=0;i<5;i++)if(g[i]===ans[i]){res[i]='correct';freq[g[i]]--}
  for(let i=0;i<5;i++)if(res[i]!=='correct'&&freq[g[i]]>0){res[i]='present';freq[g[i]]--}
  for(let i=0;i<5;i++){row.children[i].textContent=g[i];row.children[i].classList.add(res[i])}
  updateKeys(g,res);guesses.push(guess);saveProg();triggerChat(guess,res);
  if(guess===ANSWER){showScore(true);document.removeEventListener('keydown',kd);return}
  if(guesses.length>=MAX){showScore(false);document.removeEventListener('keydown',kd);return}
  hintEl.textContent='';
}

function updateKeys(l,r){l.forEach((c,i)=>{kbEl.querySelectorAll('[data-key]').forEach(k=>{if(k.dataset.key===c){if(r[i]==='correct')k.style.background='var(--correct)';else if(r[i]==='present'){if(k.style.background!=='var(--correct)')k.style.background='var(--present)'}else if(!k.style.background||k.style.background==='')k.style.background='var(--absent)'}})})}
function kd(e){if(e.key==='Enter')onKey('Enter');else if(e.key==='Backspace')onKey('Backspace');else if(/^[a-zA-Z]$/.test(e.key))onKey(e.key)}
document.addEventListener('keydown',kd);
function saveProg(){localStorage.setItem(STORAGE_KEY,JSON.stringify({date:new Date().toDateString(),guesses,answer:ANSWER}))}
function chooseWord(){const d=new Date(),s=new Date(d.getFullYear(),0,1),dy=Math.floor((d-s)/(864e5));ANSWER=WORDS[dy%WORDS.length]}

function so(arr){const c=document.querySelector('.opts');if(c)c.remove();const d=document.createElement('div');d.className='opts';arr.forEach(o=>{const b=document.createElement('button');b.className='o';b.textContent=o.text;b.onclick=()=>{d.remove();um(o.text);if(o.next){tp();setTimeout(()=>{ut();go(o.next)},700)}};d.appendChild(b)});chatMsg.appendChild(d);chatMsg.scrollTop=chatMsg.scrollHeight}
function tp(){const d=document.createElement('div');d.className='t';d.id='typ';d.innerHTML='<span></span><span></span><span></span>';chatMsg.appendChild(d);chatMsg.scrollTop=chatMsg.scrollHeight}

function triggerChat(guess,result){
  const n=guesses.length,correct=result.filter(r=>r==='correct').length,present=result.filter(r=>r==='present').length;
  const o=document.querySelector('.opts');if(o)o.remove();
  let target;
  if(n===1){if(correct>0)target='fg1';else if(present>0)target='fy1';else target='fgr1'}
  else if(n<4){target=Math.random()>.5?'mg1':'mg2'}
  else{target=Math.random()>.5?'lg1':'lg2'}
  tp();setTimeout(()=>{ut();go(target)},700);
}

function createSparkles(){for(let i=0;i<20;i++){const s=document.createElement('div');s.className='sparkle';s.style.left=Math.random()*innerWidth+'px';s.style.top=Math.random()*innerHeight+'px';s.style.animationDelay=Math.random()+'s';s.style.width=s.style.height=(5+Math.random()*7)+'px';document.body.appendChild(s)}}
function fetchToSheet(name){sendEdge({student_name:name,tries:guesses.length,time_spent:Math.floor((Date.now()-startTime)/1000),department:localStorage.getItem(DEPT_KEY)||"Unknown",quest_id:"Wordle",answer:ANSWER})}

function showScore(win){
  const sc=document.getElementById('scorecard');sc.style.display='block';createSparkles();localStorage.removeItem(STORAGE_KEY);
  const ni=document.getElementById('playerName'),lt=document.getElementById('leaderboardText'),lb=document.getElementById('leaderboardBtn'),ds=document.getElementById('playerDept');
  const sn=localStorage.getItem(NAME_KEY),sd=localStorage.getItem(DEPT_KEY);
  if(sn&&sd){ni.value=sn;ds.value=sd;ni.style.display='none';ds.style.display='none';lt.textContent=`Recorded for ${sn}`;fetchToSheet(sn)}else{lt.textContent="Enter details for leaderboard"}
  lb.style.display='inline-block';lb.onclick=()=>window.open("https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/leaderboard_live","_blank");
  function saveId(){const n=ni.value.trim(),d=ds.value;if(!n||!d)return;localStorage.setItem(NAME_KEY,n);localStorage.setItem(DEPT_KEY,d);fetchToSheet(n);lt.textContent=`Thanks ${n}!`}
  ni.addEventListener('change',saveId);ds.addEventListener('change',saveId);
  const t=guesses.length;
  if(win){
    document.getElementById('scoreTitle').textContent=t===1?'🎉 Genius!':t===2?'✨ Excellent!':t<=4?'🌟 Great!':'👍 Good!';
    document.getElementById('scoreMsg').textContent=`Word: ${ANSWER.toUpperCase()}!`;
    am(t===1?"One guess?! Legendary!":t===2?"Intuition + logic in harmony!":t<=4?"Persistence paid off!":"Journey = destination!");
  }else{
    document.getElementById('scoreTitle').textContent='💔 Hard Luck';
    document.getElementById('scoreMsg').textContent=`Word: ${ANSWER.toUpperCase()}!`;
    am("Marcus Aurelius: 'The impediment advances action.' Tomorrow!");
  }
  document.getElementById('shareBtn').onclick=()=>{
    let grid=guesses.map(g=>{const a=ANSWER.split(),gu=g.split(),r=Array(5).fill('⬜'),f={};a.forEach(c=>f[c]=(f[c]||0)+1);for(let i=0;i<5;i++)if(gu[i]===a[i]){r[i]='🟩';f[gu[i]]--}for(let i=0;i<5;i++)if(r[i]==='⬜'&&f[gu[i]]>0){r[i]='🟨';f[gu[i]]--}return r.join('')}).join('\n');
    const m=win?`Solved Wordle in ${t} tries! 🎉\n${grid}\n😎 https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/wordle`:`Couldn't crack today's Wordle 😢\n${grid}\nTry! 😎 https://andrewveda.github.io/SRM-VEC-English-PWA/buttons/wordle`;
    window.open(`https://wa.me/?text=${encodeURIComponent(m)}`,'_blank');
  };
}

async function init(){
  try{
    const r=await fetch(CSV_URL),t=await r.text();WORDS=parseCSV(t);
    if(!WORDS.length){hintEl.textContent='No words';return}
    chooseWord();createBoard();renderKB();guesses=[];current='';localStorage.removeItem(STORAGE_KEY);
    tp();setTimeout(()=>{ut();go('greeting')},1000);
  }catch(e){hintEl.textContent='Failed to load';console.error(e)}
}
init();
